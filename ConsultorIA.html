<template id="consultor-ia-template">
  <div style="max-width:95%;margin:1.5rem auto 4rem;display:flex;flex-direction:column;gap:1.25rem;min-height:100vh;"
       :style="isMobile ? 'max-width:100%;padding:0 0.5rem;margin:0.75rem auto 4rem;' : ''">

    <!-- Header -->
    <div class="premium-card" style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;"
         :style="isMobile ? 'padding:1rem;gap:1rem;' : 'padding:1.5rem 2rem;gap:1.5rem;'">
      <div style="display:flex;align-items:center;gap:1.25rem;">
        <div style="padding:0.75rem;background:var(--brand-indigo-light);color:var(--brand-indigo);border-radius:var(--radius-lg);border:1px solid var(--brand-indigo-muted);">
          <i data-lucide="brain-circuit" style="width:1.5rem;height:1.5rem;"></i>
        </div>
        <div>
          <h2 class="t-title" style="color:var(--text-primary);letter-spacing:-0.02em;">Consultor IA</h2>
          <p class="t-label-sm" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:0.2em;margin-top:0.25rem;">
            Analise diaria de portfolio com Claude
          </p>
        </div>
      </div>
      <button @click="iniciarAnalise" :disabled="carregandoLista"
              style="display:flex;align-items:center;gap:0.625rem;padding:0.625rem 1.5rem;border-radius:var(--radius-md);font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;border:none;"
              :style="carregandoLista
                ? 'background:var(--surface-overlay);color:var(--text-muted);cursor:not-allowed;'
                : 'background:var(--brand-indigo);color:#fff;'">
        <i data-lucide="play-circle" style="width:1rem;height:1rem;"
           :style="carregandoLista ? 'animation:spin 1s linear infinite;' : ''"></i>
        {{ carregandoLista ? 'Carregando...' : 'Analisar Portfolio' }}
      </button>
    </div>

    <!-- Erro global -->
    <div v-if="erroGlobal" class="premium-card" style="padding:2rem;display:flex;align-items:center;gap:1rem;background:var(--brand-rose-light);border:1px solid var(--brand-rose-muted);">
      <i data-lucide="alert-circle" style="width:1.5rem;height:1.5rem;color:var(--brand-rose);flex-shrink:0;"></i>
      <div>
        <p style="font-weight:700;color:var(--brand-rose);font-size:0.875rem;">{{ erroGlobal }}</p>
        <p v-if="erroGlobal.includes('ANTHROPIC_API_KEY')" style="font-size:0.75rem;color:var(--text-secondary);margin-top:4px;">
          Configure a chave em Configuracoes > PropertiesService > ANTHROPIC_API_KEY
        </p>
      </div>
    </div>

    <!-- Estado inicial -->
    <div v-if="!listaCarregada && !carregandoLista && !erroGlobal"
         class="premium-card" style="padding:4rem 2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem;">
      <div style="padding:1.25rem;background:var(--brand-indigo-light);border-radius:50%;border:1px solid var(--brand-indigo-muted);">
        <i data-lucide="brain-circuit" style="width:2.5rem;height:2.5rem;color:var(--brand-indigo);"></i>
      </div>
      <div>
        <h3 style="font-size:1.125rem;font-weight:700;color:var(--text-primary);margin-bottom:0.5rem;">
          Consultor pronto
        </h3>
        <p style="color:var(--text-muted);font-size:0.875rem;max-width:400px;">
          Clique em "Analisar Portfolio" para carregar suas posicoes e receber recomendacoes personalizadas da IA.
        </p>
      </div>
    </div>

    <!-- Loading lista -->
    <div v-if="carregandoLista" class="premium-card" style="padding:3rem 2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem;">
      <div style="width:2.5rem;height:2.5rem;border:3px solid var(--border-subtle);border-top-color:var(--brand-indigo);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <p style="color:var(--text-muted);font-size:0.875rem;">Carregando posicoes e dados de mercado...</p>
    </div>

    <!-- Layout principal: lista + painel -->
    <div v-if="listaCarregada && posicoes.length > 0"
         style="display:flex;gap:1rem;align-items:flex-start;"
         :style="isMobile ? 'flex-direction:column;' : ''">

      <!-- Lista de posicoes (esquerda) -->
      <div style="width:320px;flex-shrink:0;display:flex;flex-direction:column;gap:0.5rem;"
           :style="isMobile ? 'width:100%;' : 'position:sticky;top:1rem;max-height:calc(100vh - 200px);overflow-y:auto;'">

        <!-- Legenda de urgencia -->
        <div style="display:flex;gap:1rem;padding:0.5rem 0;flex-wrap:wrap;">
          <div v-for="u in legendaUrgencia" :key="u.nivel" style="display:flex;align-items:center;gap:5px;">
            <div style="width:8px;height:8px;border-radius:50%;" :style="'background:' + u.cor + ';'"></div>
            <span style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">
              {{ u.nivel }} ({{ contarUrgencia(u.nivel) }})
            </span>
          </div>
        </div>

        <!-- Cards de posicao -->
        <div v-for="pos in posicoes" :key="pos.opcao"
             @click="selecionarPosicao(pos)"
             class="premium-card"
             style="cursor:pointer;overflow:hidden;transition:all 0.15s;"
             :style="posicaoSelecionada && posicaoSelecionada.opcao === pos.opcao
               ? 'border-color:var(--brand-indigo);box-shadow:0 0 0 2px var(--brand-indigo-muted);'
               : ''">

          <!-- Faixa de urgencia -->
          <div style="height:3px;width:100%;"
               :style="'background:' + corUrgencia(pos.urgencia) + ';'"></div>

          <div style="padding:0.875rem 1rem;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <div>
                <div style="display:flex;align-items:center;gap:0.5rem;">
                  <span style="font-size:1rem;font-weight:900;color:var(--text-primary);">{{ pos.ticker }}</span>
                  <span style="font-size:0.65rem;font-weight:800;padding:2px 6px;border-radius:99px;"
                        :style="pos.tipo === 'CALL'
                          ? 'background:var(--brand-indigo-light);color:var(--brand-indigo);border:1px solid var(--brand-indigo-muted);'
                          : 'background:var(--brand-amber-light);color:var(--brand-amber);border:1px solid var(--brand-amber-muted);'">
                    {{ pos.tipo }}
                  </span>
                </div>
                <p style="font-size:0.7rem;color:var(--text-muted);margin-top:2px;font-family:'JetBrains Mono',monospace;">
                  {{ pos.opcao }}
                </p>
              </div>
              <!-- Badge de status da analise -->
              <div v-if="pos.analisado" style="padding:2px 8px;border-radius:99px;font-size:0.6rem;font-weight:700;background:var(--brand-emerald-light);color:var(--brand-emerald);border:1px solid var(--brand-emerald-muted);">
                Analisado
              </div>
              <div v-else-if="pos.analisando" style="display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:0.6rem;font-weight:700;background:var(--brand-indigo-light);color:var(--brand-indigo);border:1px solid var(--brand-indigo-muted);">
                <div style="width:6px;height:6px;border:1px solid var(--brand-indigo);border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;"></div>
                IA...
              </div>
            </div>

            <!-- Metricas resumidas -->
            <div style="display:flex;gap:1rem;margin-top:0.625rem;flex-wrap:wrap;">
              <div>
                <div style="font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">Lucro</div>
                <div style="font-size:0.875rem;font-weight:800;font-family:'JetBrains Mono',monospace;"
                     :style="pos.lucroPct >= 75 ? 'color:var(--brand-emerald);' : pos.lucroPct >= 40 ? 'color:var(--brand-amber);' : 'color:var(--text-secondary);'">
                  {{ pos.lucroPct }}%
                </div>
              </div>
              <div>
                <div style="font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">DTE</div>
                <div style="font-size:0.875rem;font-weight:800;font-family:'JetBrains Mono',monospace;"
                     :style="pos.dte <= 14 ? 'color:var(--brand-rose);' : pos.dte <= 21 ? 'color:var(--brand-amber);' : 'color:var(--text-secondary);'">
                  {{ pos.dte }}d
                </div>
              </div>
              <div>
                <div style="font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">Tend.</div>
                <div style="font-size:0.875rem;font-weight:800;">
                  <span v-if="pos.tendenciaM9 === 1" style="color:var(--brand-emerald);">^</span>
                  <span v-else-if="pos.tendenciaM9 === -1" style="color:var(--brand-rose);">v</span>
                  <span v-else style="color:var(--text-muted);">--</span>
                </div>
              </div>
              <div>
                <div style="font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">Score</div>
                <div style="font-size:0.875rem;font-weight:800;font-family:'JetBrains Mono',monospace;"
                     :style="pos.scoreFund >= 3 ? 'color:var(--brand-emerald);' : pos.scoreFund >= 1 ? 'color:var(--brand-amber);' : 'color:var(--text-muted);'">
                  {{ pos.scoreFund }}/5
                </div>
              </div>
            </div>

            <!-- Motivo de urgencia -->
            <p style="font-size:0.65rem;color:var(--text-muted);margin-top:0.5rem;border-top:1px solid var(--border-subtle);padding-top:0.5rem;">
              {{ pos.urgenciaMot }}
            </p>
          </div>
        </div>

      </div>

      <!-- Painel de analise (direita) -->
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:1rem;">

        <!-- Placeholder: nenhuma posicao selecionada -->
        <div v-if="!posicaoSelecionada" class="premium-card"
             style="padding:4rem 2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem;opacity:0.6;">
          <i data-lucide="mouse-pointer-click" style="width:2rem;height:2rem;color:var(--text-muted);"></i>
          <p style="color:var(--text-muted);font-size:0.875rem;">
            Selecione uma posicao ao lado para ver a analise detalhada.
          </p>
        </div>

        <!-- Loading analise IA -->
        <div v-else-if="posicaoSelecionada && posicaoSelecionada.analisando"
             class="premium-card" style="padding:3rem 2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1.25rem;">
          <div style="display:flex;gap:4px;">
            <div v-for="i in 3" :key="i" style="width:8px;height:8px;border-radius:50%;background:var(--brand-indigo);animation:comp-pulse 1.2s ease-in-out infinite;"
                 :style="'animation-delay:' + ((i-1) * 0.2) + 's;'"></div>
          </div>
          <div>
            <p style="font-weight:700;color:var(--text-primary);margin-bottom:4px;">Claude esta analisando...</p>
            <p style="font-size:0.8rem;color:var(--text-muted);">Consultando tendencias, score fundamentalista e opcoes disponiveis.</p>
          </div>
        </div>

        <!-- Resultado da analise -->
        <template v-else-if="analiseAtual">

          <!-- Header da analise -->
          <div class="premium-card" style="overflow:hidden;">
            <div style="height:4px;" :style="'background:' + corStatusIA(analiseAtual.status) + ';'"></div>
            <div style="padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;">
              <div>
                <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;">
                  <span style="font-size:1.5rem;font-weight:900;color:var(--text-primary);letter-spacing:-0.03em;">{{ posicaoSelecionada.ticker }}</span>
                  <span style="font-size:0.75rem;font-weight:800;padding:3px 10px;border-radius:99px;"
                        :style="'background:' + bgStatusIA(analiseAtual.status) + ';color:' + corStatusIA(analiseAtual.status) + ';border:1px solid ' + corStatusIA(analiseAtual.status) + '33;'">
                    {{ labelStatus(analiseAtual.status) }}
                  </span>
                  <span style="font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:99px;"
                        :style="analiseAtual.urgencia === 'alta'
                          ? 'background:var(--brand-rose-light);color:var(--brand-rose);'
                          : analiseAtual.urgencia === 'media'
                          ? 'background:var(--brand-amber-light);color:var(--brand-amber);'
                          : 'background:var(--brand-emerald-light);color:var(--brand-emerald);'">
                    {{ analiseAtual.urgencia === 'alta' ? 'Urgente' : analiseAtual.urgencia === 'media' ? 'Atencao' : 'Tranquilo' }}
                  </span>
                </div>
                <p style="font-size:0.8rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;">
                  {{ posicaoSelecionada.opcao }} | K{{ posicaoSelecionada.strike }} | {{ posicaoSelecionada.dte }}d | {{ posicaoSelecionada.lucroPct }}% lucro
                </p>
              </div>
            </div>
          </div>

          <!-- Diagnostico + Recomendacao -->
          <div class="premium-card" style="padding:1.5rem;">
            <div style="display:flex;flex-direction:column;gap:1.25rem;">

              <div>
                <div style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem;">
                  <i data-lucide="stethoscope" style="width:0.875rem;height:0.875rem;"></i>
                  Diagnostico
                </div>
                <p style="font-size:0.9rem;color:var(--text-primary);line-height:1.6;">
                  {{ analiseAtual.diagnostico }}
                </p>
              </div>

              <div style="padding:1rem 1.25rem;border-radius:var(--radius-md);border-left:4px solid;"
                   :style="'border-color:' + corStatusIA(analiseAtual.status) + ';background:' + bgStatusIA(analiseAtual.status) + '22;'">
                <div style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:0.375rem;"
                     :style="'color:' + corStatusIA(analiseAtual.status) + ';'">
                  Recomendacao
                </div>
                <p style="font-size:1rem;font-weight:700;color:var(--text-primary);">
                  {{ analiseAtual.recomendacao }}
                </p>
              </div>

              <div>
                <div style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem;">
                  <i data-lucide="info" style="width:0.875rem;height:0.875rem;"></i>
                  Justificativa
                </div>
                <p style="font-size:0.875rem;color:var(--text-secondary);line-height:1.6;">
                  {{ analiseAtual.justificativa }}
                </p>
              </div>

              <!-- Alertas -->
              <div v-if="analiseAtual.alertas && analiseAtual.alertas.length > 0">
                <div style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--brand-amber);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem;">
                  <i data-lucide="triangle-alert" style="width:0.875rem;height:0.875rem;"></i>
                  Alertas
                </div>
                <div style="display:flex;flex-direction:column;gap:0.375rem;">
                  <div v-for="alerta in analiseAtual.alertas" :key="alerta"
                       style="display:flex;align-items:flex-start;gap:0.5rem;padding:0.5rem 0.75rem;background:var(--brand-amber-light);border-radius:var(--radius-sm);border:1px solid var(--brand-amber-muted);">
                    <i data-lucide="alert-triangle" style="width:0.75rem;height:0.75rem;color:var(--brand-amber);flex-shrink:0;margin-top:2px;"></i>
                    <span style="font-size:0.8rem;color:var(--brand-amber);">{{ alerta }}</span>
                  </div>
                </div>
              </div>

            </div>
          </div>

          <!-- Opcao sugerida -->
          <div v-if="analiseAtual.opcao_sugerida" class="premium-card" style="overflow:hidden;">
            <div style="padding:0.75rem 1.25rem;border-bottom:1px solid var(--border-subtle);background:var(--surface-overlay);display:flex;align-items:center;gap:0.5rem;">
              <i data-lucide="target" style="width:1rem;height:1rem;color:var(--brand-indigo);"></i>
              <span style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand-indigo);">Opcao Sugerida</span>
            </div>
            <div style="padding:1.25rem;">
              <div style="display:flex;align-items:baseline;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;">
                <span style="font-size:1.5rem;font-weight:900;color:var(--text-primary);font-family:'JetBrains Mono',monospace;">
                  {{ analiseAtual.opcao_sugerida.ticker_opcao }}
                </span>
                <span style="font-size:0.875rem;color:var(--text-muted);">
                  {{ analiseAtual.opcao_sugerida.ticker_ativo }} | Strike R${{ analiseAtual.opcao_sugerida.strike }}
                </span>
              </div>

              <div style="display:flex;gap:1px;background:var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;margin-bottom:1rem;">
                <div v-for="campo in camposOpcaoSugerida" :key="campo.label"
                     style="flex:1 1 0%;padding:0.75rem 0.875rem;background:var(--surface-base);display:flex;flex-direction:column;gap:3px;min-width:80px;">
                  <span style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">{{ campo.label }}</span>
                  <span style="font-size:0.9rem;font-weight:800;font-family:'JetBrains Mono',monospace;"
                        :style="campo.cor ? 'color:' + campo.cor + ';' : 'color:var(--text-primary);'">
                    {{ campo.valor }}
                  </span>
                </div>
              </div>

              <p style="font-size:0.8rem;color:var(--text-secondary);font-style:italic;">
                {{ analiseAtual.opcao_sugerida.motivo_escolha }}
              </p>
            </div>
          </div>

          <!-- Simulacao P&L -->
          <div v-if="analiseAtual.simulacao" class="premium-card" style="overflow:hidden;">
            <div style="padding:0.75rem 1.25rem;border-bottom:1px solid var(--border-subtle);background:var(--surface-overlay);display:flex;align-items:center;gap:0.5rem;">
              <i data-lucide="calculator" style="width:1rem;height:1rem;color:var(--brand-emerald);"></i>
              <span style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand-emerald);">Simulacao da Operacao</span>
            </div>
            <div style="display:flex;gap:1px;background:var(--border-subtle);">
              <div style="flex:1;padding:1rem 1.25rem;background:var(--brand-rose-light);display:flex;flex-direction:column;gap:4px;">
                <span style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--brand-rose);">Custo Recompra</span>
                <span style="font-size:1.1rem;font-weight:800;color:var(--brand-rose);font-family:'JetBrains Mono',monospace;">
                  {{ fmtMoeda(analiseAtual.simulacao.custo_recompra) }}
                </span>
              </div>
              <div style="flex:1;padding:1rem 1.25rem;background:var(--brand-emerald-light);display:flex;flex-direction:column;gap:4px;">
                <span style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--brand-emerald);">Nova Receita</span>
                <span style="font-size:1.1rem;font-weight:800;color:var(--brand-emerald);font-family:'JetBrains Mono',monospace;">
                  + {{ fmtMoeda(analiseAtual.simulacao.receita_nova_venda) }}
                </span>
              </div>
              <div style="flex:1.5;padding:1rem 1.25rem;background:var(--surface-base);display:flex;flex-direction:column;gap:4px;border-left:3px solid var(--brand-emerald);">
                <span style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">Resultado Liquido</span>
                <span style="font-size:1.25rem;font-weight:900;font-family:'JetBrains Mono',monospace;"
                      :style="(analiseAtual.simulacao.resultado_liquido_operacao||0) >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);'">
                  {{ (analiseAtual.simulacao.resultado_liquido_operacao||0) >= 0 ? '+' : '' }}{{ fmtMoeda(analiseAtual.simulacao.resultado_liquido_operacao) }}
                </span>
                <span style="font-size:0.7rem;color:var(--text-muted);">
                  {{ fmtMoeda(analiseAtual.simulacao.resultado_por_contrato) }}/contrato
                </span>
              </div>
            </div>
            <div v-if="analiseAtual.simulacao.observacao" style="padding:0.75rem 1.25rem;background:var(--surface-overlay);border-top:1px solid var(--border-subtle);">
              <p style="font-size:0.78rem;color:var(--text-muted);font-style:italic;">{{ analiseAtual.simulacao.observacao }}</p>
            </div>
          </div>

          <!-- Acoes -->
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
            <button @click="analisarProxima"
                    :disabled="!proximaParaAnalisar"
                    style="flex:1;display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.75rem 1rem;border-radius:var(--radius-md);font-size:0.8rem;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.2s;"
                    :style="proximaParaAnalisar
                      ? 'background:var(--brand-indigo);color:#fff;border-color:var(--brand-indigo);'
                      : 'background:var(--surface-overlay);color:var(--text-muted);border-color:var(--border-subtle);cursor:not-allowed;'">
              <i data-lucide="chevron-right" style="width:0.875rem;height:0.875rem;"></i>
              {{ proximaParaAnalisar ? 'Analisar Proxima' : 'Todas Analisadas' }}
            </button>
            <button @click="verHistorico"
                    style="display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.75rem 1.25rem;border-radius:var(--radius-md);font-size:0.8rem;font-weight:700;cursor:pointer;border:1px solid var(--border-default);background:var(--surface-base);color:var(--text-secondary);transition:all 0.2s;"
                    onmouseover="this.style.borderColor='var(--brand-indigo)';this.style.color='var(--brand-indigo)';"
                    onmouseout="this.style.borderColor='var(--border-default)';this.style.color='var(--text-secondary)';">
              <i data-lucide="history" style="width:0.875rem;height:0.875rem;"></i>
              Ver Historico
            </button>
            <button @click="reanalisarAtual"
                    style="display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.75rem 1.25rem;border-radius:var(--radius-md);font-size:0.8rem;font-weight:700;cursor:pointer;border:1px solid var(--border-default);background:var(--surface-base);color:var(--text-secondary);transition:all 0.2s;"
                    onmouseover="this.style.borderColor='var(--brand-indigo)';this.style.color='var(--brand-indigo)';"
                    onmouseout="this.style.borderColor='var(--border-default)';this.style.color='var(--text-secondary)';">
              <i data-lucide="refresh-cw" style="width:0.875rem;height:0.875rem;"></i>
              Reanalisar
            </button>
          </div>

        </template>

        <!-- Selecao sem analise ainda -->
        <div v-else-if="posicaoSelecionada && !posicaoSelecionada.analisando" class="premium-card"
             style="padding:3rem 2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem;">
          <i data-lucide="sparkles" style="width:2rem;height:2rem;color:var(--brand-indigo);"></i>
          <p style="color:var(--text-secondary);font-size:0.875rem;max-width:300px;">
            Clique abaixo para que o Claude analise esta posicao.
          </p>
          <button @click="solicitarAnalise(posicaoSelecionada)"
                  style="display:flex;align-items:center;gap:0.5rem;padding:0.625rem 1.5rem;border-radius:var(--radius-md);background:var(--brand-indigo);color:#fff;border:none;font-size:0.8rem;font-weight:700;cursor:pointer;">
            <i data-lucide="brain-circuit" style="width:0.875rem;height:0.875rem;"></i>
            Analisar com IA
          </button>
        </div>

      </div>
    </div>

    <!-- Sem posicoes abertas -->
    <div v-if="listaCarregada && posicoes.length === 0"
         class="premium-card" style="padding:4rem 2rem;text-align:center;">
      <i data-lucide="check-circle-2" style="width:2.5rem;height:2.5rem;color:var(--brand-emerald);margin-bottom:1rem;"></i>
      <h3 style="font-weight:700;color:var(--text-primary);margin-bottom:0.5rem;">Nenhuma posicao ativa</h3>
      <p style="color:var(--text-muted);font-size:0.875rem;">Seu portfolio esta sem posicoes abertas no momento.</p>
    </div>

    <!-- Painel Historico -->
    <div v-if="mostraHistorico" class="premium-card" style="overflow:hidden;">
      <div style="padding:0.75rem 1.25rem;border-bottom:1px solid var(--border-subtle);background:var(--surface-overlay);display:flex;justify-content:space-between;align-items:center;">
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <i data-lucide="history" style="width:1rem;height:1rem;color:var(--brand-indigo);"></i>
          <span style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand-indigo);">Historico de Analises</span>
        </div>
        <button @click="mostraHistorico=false" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:0.75rem;">Fechar</button>
      </div>
      <div v-if="carregandoHistorico" style="padding:2rem;text-align:center;">
        <div style="width:1.5rem;height:1.5rem;border:2px solid var(--border-subtle);border-top-color:var(--brand-indigo);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;"></div>
      </div>
      <div v-else-if="historico.length === 0" style="padding:2rem;text-align:center;color:var(--text-muted);font-size:0.875rem;">
        Nenhuma analise salva ainda.
      </div>
      <div v-else style="overflow-x:auto;">
        <table style="width:100%;border-collapse:separate;border-spacing:0;min-width:600px;">
          <thead>
            <tr style="background:var(--surface-overlay);">
              <th style="padding:0.5rem 0.875rem;text-align:left;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);">Data</th>
              <th style="padding:0.5rem 0.875rem;text-align:left;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);">Opcao</th>
              <th style="padding:0.5rem 0.875rem;text-align:center;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);">Status</th>
              <th style="padding:0.5rem 0.875rem;text-align:center;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);">Urgencia</th>
              <th style="padding:0.5rem 0.875rem;text-align:left;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);">Recomendacao</th>
              <th style="padding:0.5rem 0.875rem;text-align:right;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);">Resultado Liq.</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="(h, idx) in historico" :key="idx"
                :style="idx % 2 === 0 ? 'background:var(--surface-base);' : 'background:var(--surface-sunken);'">
              <td style="padding:0.5rem 0.875rem;border-bottom:1px solid var(--border-subtle);font-size:0.75rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;">{{ fmtData(h.ANALISADO_EM) }}</td>
              <td style="padding:0.5rem 0.875rem;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.8rem;font-weight:700;color:var(--text-primary);">{{ h.TICKER }}</span>
                <span style="font-size:0.7rem;color:var(--text-muted);margin-left:6px;font-family:'JetBrains Mono',monospace;">{{ h.OPCAO }}</span>
              </td>
              <td style="padding:0.5rem 0.5rem;text-align:center;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:99px;white-space:nowrap;"
                      :style="h.STATUS_RECOMENDADO==='FECHAR' ? 'background:var(--brand-rose-light);color:var(--brand-rose);'
                        : h.STATUS_RECOMENDADO==='MANTER' ? 'background:var(--brand-emerald-light);color:var(--brand-emerald);'
                        : 'background:var(--brand-amber-light);color:var(--brand-amber);'">
                  {{ h.STATUS_RECOMENDADO }}
                </span>
              </td>
              <td style="padding:0.5rem 0.5rem;text-align:center;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.65rem;font-weight:700;"
                      :style="h.URGENCIA==='alta' ? 'color:var(--brand-rose);' : h.URGENCIA==='media' ? 'color:var(--brand-amber);' : 'color:var(--brand-emerald);'">{{ h.URGENCIA }}</span>
              </td>
              <td style="padding:0.5rem 0.875rem;border-bottom:1px solid var(--border-subtle);font-size:0.75rem;color:var(--text-secondary);max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ h.RECOMENDACAO }}</td>
              <td style="padding:0.5rem 0.875rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.8rem;font-weight:700;font-family:'JetBrains Mono',monospace;"
                      :style="parseFloat(h.SIM_RESULTADO_LIQUIDO||0) >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);'">{{ fmtMoeda(h.SIM_RESULTADO_LIQUIDO) }}</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</template>

<script>
window.ConsultorIA = {
  template: '#consultor-ia-template',
  props: {
    statsPreCalculados: { type: Object, default: () => ({}) },
    isMobile:           { type: Boolean, default: false }
  },
  setup(props) {
    const { ref, computed, nextTick } = Vue;

    const posicoes           = ref([]);
    const posicaoSelecionada = ref(null);
    const analiseAtual       = ref(null);
    const carregandoLista    = ref(false);
    const listaCarregada     = ref(false);
    const erroGlobal         = ref('');
    const cacheAnalises      = ref({});
    const mostraHistorico    = ref(false);
    const carregandoHistorico= ref(false);
    const historico          = ref([]);

    const legendaUrgencia = [
      { nivel: 'alta',  cor: 'var(--brand-rose)'    },
      { nivel: 'media', cor: 'var(--brand-amber)'   },
      { nivel: 'baixa', cor: 'var(--brand-emerald)' },
    ];

    const corUrgencia = (nivel) => {
      return nivel === 'alta' ? 'var(--brand-rose)' : nivel === 'media' ? 'var(--brand-amber)' : 'var(--brand-emerald)';
    };

    const corStatusIA = (status) => {
      if (status === 'FECHAR')           return 'var(--brand-rose)';
      if (status === 'ROLAR_MESMO_ATIVO' || status === 'ROLAR_OUTRO_ATIVO') return 'var(--brand-amber)';
      return 'var(--brand-emerald)';
    };

    const bgStatusIA = (status) => {
      if (status === 'FECHAR')           return 'var(--brand-rose-light)';
      if (status === 'ROLAR_MESMO_ATIVO' || status === 'ROLAR_OUTRO_ATIVO') return 'var(--brand-amber-light)';
      return 'var(--brand-emerald-light)';
    };

    const labelStatus = (status) => {
      const mapa = {
        'MANTER':            'Manter posicao',
        'ROLAR_MESMO_ATIVO': 'Rolar mesmo ativo',
        'ROLAR_OUTRO_ATIVO': 'Trocar de ativo',
        'FECHAR':            'Fechar agora',
      };
      return mapa[status] || status;
    };

    const contarUrgencia = (nivel) => posicoes.value.filter(p => p.urgencia === nivel).length;

    const fmtMoeda = (v) => {
      const n = parseFloat(v);
      if (isNaN(n)) return 'R$ --';
      const abs = Math.abs(n);
      const pre = n < 0 ? '-R$ ' : 'R$ ';
      return pre + abs.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    const camposOpcaoSugerida = computed(() => {
      const op = analiseAtual.value && analiseAtual.value.opcao_sugerida;
      if (!op) return [];
      return [
        { label: 'Vencimento', valor: op.vencimento, cor: null },
        { label: 'DTE',        valor: op.dte + 'd',  cor: 'var(--brand-indigo)' },
        { label: 'Premio Est.', valor: 'R$ ' + parseFloat(op.premio_estimado || 0).toFixed(2), cor: 'var(--brand-emerald)' },
        { label: 'Taxa',       valor: parseFloat(op.taxa_lucro_pct || 0).toFixed(1) + '%', cor: 'var(--brand-emerald)' },
      ];
    });

    const proximaParaAnalisar = computed(() => {
      return posicoes.value.find(p => !p.analisado && !p.analisando) || null;
    });

    const iniciarAnalise = () => {
      carregandoLista.value = true;
      listaCarregada.value  = false;
      erroGlobal.value      = '';
      posicaoSelecionada.value = null;
      analiseAtual.value       = null;
      cacheAnalises.value      = {};

      google.script.run
        .withSuccessHandler(function(res) {
          carregandoLista.value = false;
          if (!res.success) {
            erroGlobal.value = res.error || 'Erro ao carregar posicoes.';
            return;
          }
          posicoes.value    = res.posicoes || [];
          listaCarregada.value = true;
          nextTick(() => { if (window.lucide) window.lucide.createIcons(); });
        })
        .withFailureHandler(function(err) {
          carregandoLista.value = false;
          erroGlobal.value = String(err);
        })
        .consultorListarPosicoes();
    };

    const selecionarPosicao = (pos) => {
      posicaoSelecionada.value = pos;
      const cache = cacheAnalises.value[pos.opcao];
      analiseAtual.value = cache || null;
      nextTick(() => { if (window.lucide) window.lucide.createIcons(); });
    };

    const solicitarAnalise = (pos) => {
      if (!pos || pos.analisando) return;
      pos.analisando = true;
      pos.analisado  = false;
      analiseAtual.value = null;

      google.script.run
        .withSuccessHandler(function(res) {
          pos.analisando = false;
          if (!res.success) {
            erroGlobal.value = res.error || 'Erro na analise da IA.';
            return;
          }
          pos.analisado = true;
          cacheAnalises.value[pos.opcao] = res.analise;
          if (posicaoSelecionada.value && posicaoSelecionada.value.opcao === pos.opcao) {
            analiseAtual.value = res.analise;
          }
          nextTick(() => { if (window.lucide) window.lucide.createIcons(); });
        })
        .withFailureHandler(function(err) {
          pos.analisando = false;
          erroGlobal.value = String(err);
        })
        .consultorAnalisarPosicao(pos.raw);
    };

    const analisarProxima = () => {
      const prox = proximaParaAnalisar.value;
      if (prox) {
        selecionarPosicao(prox);
        solicitarAnalise(prox);
      }
    };

    const reanalisarAtual = () => {
      if (!posicaoSelecionada.value) return;
      const pos = posicaoSelecionada.value;
      pos.analisado = false;
      delete cacheAnalises.value[pos.opcao];
      solicitarAnalise(pos);
    };

    const verHistorico = () => {
      mostraHistorico.value    = true;
      carregandoHistorico.value= true;
      google.script.run
        .withSuccessHandler(function(res) {
          carregandoHistorico.value = false;
          if (res.success) historico.value = res.historico || [];
        })
        .withFailureHandler(function() { carregandoHistorico.value = false; })
        .consultorLerHistorico(50);
    };

    const fmtData = (v) => {
      if (!v) return '--';
      try { return new Date(v).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' }); }
      catch(e) { return String(v).substring(0, 16); }
    };

    return {
      posicoes, posicaoSelecionada, analiseAtual, carregandoLista,
      listaCarregada, erroGlobal, legendaUrgencia, camposOpcaoSugerida,
      proximaParaAnalisar, corUrgencia, corStatusIA, bgStatusIA,
      labelStatus, contarUrgencia, fmtMoeda, iniciarAnalise,
      selecionarPosicao, solicitarAnalise, analisarProxima, reanalisarAtual,
    };
  }
};
</script>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes comp-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>

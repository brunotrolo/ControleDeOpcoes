<template id="dash-vencimentos-gantt-template">
  <div class="w-full h-full flex flex-col gap-4 p-4 overflow-y-auto hide-scrollbar">

    <!-- Header -->
    <div class="premium-card shrink-0" style="padding:1rem 1.5rem;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1rem;">
      <div class="flex items-center gap-3">
        <div style="padding:0.5rem;background:var(--brand-amber-light);border-radius:var(--radius-md);border:1px solid var(--brand-amber-muted);">
          <i data-lucide="calendar-range" style="width:18px;height:18px;color:var(--brand-amber);display:block;"></i>
        </div>
        <div>
          <h3 class="t-title" style="color:var(--text-primary);">Timeline de Vencimentos</h3>
          <p style="font-size:0.72rem;color:var(--text-muted);margin-top:2px;">Calendario visual de posicoes abertas . hoje marcado em amarelo</p>
        </div>
      </div>
      <!-- Legenda de moneyness -->
      <div class="flex items-center gap-3 flex-wrap">
        <div v-for="item in legendaMoneyness" :key="item.label" class="flex items-center gap-1.5">
          <div style="width:10px;height:10px;border-radius:3px;" :style="'background:' + (item.cor) + ';'"></div>
          <span style="font-size:0.7rem;color:var(--text-muted);">{{ item.label }}</span>
        </div>
      </div>
    </div>

    <!-- Gantt -->
    <div class="premium-card flex-1 overflow-x-auto" style="padding:1.5rem;">
      <div v-if="posicoes.length === 0"
        style="padding:4rem;text-align:center;color:var(--text-muted);">
        Nenhuma posicao ativa para exibir.
      </div>

      <div v-else style="display:flex;flex-direction:column;gap:0.625rem;min-width:600px;">

        <!-- Regua de datas -->
        <div style="display:grid;grid-template-columns:180px 1fr;gap:1rem;align-items:center;margin-bottom:0.5rem;">
          <div></div>
          <div style="position:relative;height:24px;">
            <!-- Marcadores de data -->
            <div v-for="marco in marcosData" :key="marco.label"
              style="position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;"
              :style="'left:' + (marco.pct) + '%;'">
              <div style="width:1px;height:8px;background:var(--border-subtle);"></div>
              <span style="font-size:0.6rem;font-weight:600;color:var(--text-muted);white-space:nowrap;margin-top:2px;">{{ marco.label }}</span>
            </div>
            <!-- Linha de hoje -->
            <div style="position:absolute;top:0;bottom:0;width:2px;background:#FBBF24;border-radius:2px;z-index:2;"
              :style="'left:' + (pctHoje) + '%;'">
            </div>
          </div>
        </div>

        <!-- Linha por posicao -->
        <div v-for="(pos, idx) in posicoes" :key="pos.simbolo"
          style="display:grid;grid-template-columns:180px 1fr;gap:1rem;align-items:center;">

          <!-- Label da posicao -->
          <div style="display:flex;flex-direction:column;gap:2px;padding-right:0.5rem;min-width:0;">
            <div style="display:flex;align-items:center;gap:0.5rem;">
              <span style="font-size:0.85rem;font-weight:800;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                {{ pos.ticker }}
              </span>
              <span style="font-size:0.65rem;font-weight:700;padding:1px 6px;border-radius:99px;border:1px solid;flex-shrink:0;"
                :style="getMoneynessStyle(pos.moneyness)">
                {{ pos.moneyness }}
              </span>
            </div>
            <span style="font-size:0.65rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
              {{ pos.simbolo }} . K{{ pos.strike }}
            </span>
          </div>

          <!-- Barra Gantt -->
          <div style="position:relative;height:36px;background:var(--surface-sunken);border-radius:var(--radius-md);overflow:hidden;">

            <!-- Barra da posicao -->
            <div style="position:absolute;top:6px;bottom:6px;border-radius:var(--radius-sm);display:flex;align-items:center;padding:0 8px;transition:opacity 0.2s;"
              :style="'left:' + (pos.pctInicio) + '%;width:' + (pos.pctDuracao) + '%;background:' + (getCorMoneyness(pos.moneyness)) + ';opacity:0.85;'"
              onmouseover="this.style.opacity='1'"
              onmouseout="this.style.opacity='0.85'">
              <span style="font-size:0.65rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                {{ pos.dte }}d . {{ formatarPL(pos.plAtual) }}
              </span>
            </div>

            <!-- Hoje -->
            <div style="position:absolute;top:0;bottom:0;width:2px;background:#FBBF24;z-index:3;"
              :style="'left:' + (pctHoje) + '%;'">
            </div>

            <!-- Vencimento: marcador -->
            <div style="position:absolute;top:4px;bottom:4px;width:3px;border-radius:2px;z-index:2;background:var(--text-muted);"
              :style="'left:' + (pos.pctFim) + '%;'"
              :title="'Vencimento: ' + pos.dataVenc">
            </div>

          </div>
        </div>

        <!-- Linha de totais por vencimento -->
        <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border-subtle);">
          <div style="display:grid;grid-template-columns:180px 1fr;gap:1rem;align-items:center;">
            <span style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">P/L por vencimento</span>
            <div style="position:relative;height:24px;">
              <div v-for="grp in gruposPorVencimento" :key="grp.data"
                style="position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;"
                :style="'left:' + (grp.pct) + '%;'">
                <span style="font-size:0.7rem;font-weight:800;font-family:'JetBrains Mono',monospace;"
                  :style="grp.plTotal >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);'">
                  {{ formatarPL(grp.plTotal) }}
                </span>
                <span style="font-size:0.6rem;color:var(--text-muted);">{{ grp.label }}</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</template>

<script>
window.DashVencimentosGantt = {
  template: '#dash-vencimentos-gantt-template',
  props: {
    statsPreCalculados: { type: Object, default: () => ({}) },
    ativos:             { type: Array,  default: () => [] }
  },
  setup(props) {
    const { computed } = Vue;

    const legendaMoneyness = [
      { label: 'OTM',  cor: '#10B981' },
      { label: 'ATM',  cor: '#D97706' },
      { label: 'ITM',  cor: '#E11D48' },
    ];

    const hoje = new Date();
    hoje.setHours(0, 0, 0, 0);

    // Janela do Gantt: de 30 dias atras ate 60 dias a frente
    const janelaInicio = new Date(hoje);
    janelaInicio.setDate(janelaInicio.getDate() - 30);
    const janelaFim = new Date(hoje);
    janelaFim.setDate(janelaFim.getDate() + 60);
    const janelaDias = (janelaFim - janelaInicio) / 86400000;

    const pctHoje = computed(() => ((hoje - janelaInicio) / (janelaFim - janelaInicio)) * 100);

    // Marcos de data na regua
    const marcosData = computed(() => {
      const marcos = [];
      const cur = new Date(janelaInicio);
      cur.setDate(1); // proximo inicio de mes
      while (cur <= janelaFim) {
        const pct = ((cur - janelaInicio) / (janelaFim - janelaInicio)) * 100;
        if (pct >= 0 && pct <= 100) {
          marcos.push({
            label: cur.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }),
            pct
          });
        }
        cur.setDate(cur.getDate() + 7);
      }
      return marcos;
    });

    const parseData = (v) => {
      if (!v) return null;
      if (v instanceof Date) return v;
      const d = new Date(v);
      return isNaN(d.getTime()) ? null : d;
    };

    const posicoes = computed(() => {
      return (props.statsPreCalculados?.listaAtivas || [])
        .map(op => {
          const abertura  = parseData(op.dataTrade)      || hoje;
          const vencimento = parseData(op.dataVencimento) || hoje;
          const dte       = Math.max(0, Math.round(parseFloat(op.dteCorridos || 0)));

          // Clamp a janela
          const inicio  = new Date(Math.max(abertura.getTime(),  janelaInicio.getTime()));
          const fim     = new Date(Math.min(vencimento.getTime(), janelaFim.getTime()));

          const pctInicio  = Math.max(0, ((inicio - janelaInicio)    / (janelaFim - janelaInicio)) * 100);
          const pctFim     = Math.min(100, ((vencimento - janelaInicio) / (janelaFim - janelaInicio)) * 100);
          const pctDuracao = Math.max(1, pctFim - pctInicio);

          return {
            ticker:    op.tickerAtivo  || '--',
            simbolo:   op.simboloOpcao || '--',
            strike:    parseFloat(op.strike || 0).toFixed(2).replace('.', ','),
            moneyness: op.moneynessCode || '--',
            dataVenc:  vencimento.toLocaleDateString('pt-BR'),
            dataVencRaw: vencimento,
            dte,
            plAtual:   parseFloat(op.plTotalValor || 0),
            pctInicio, pctFim, pctDuracao
          };
        })
        .sort((a, b) => a.dataVencRaw - b.dataVencRaw);
    });

    // Totais agrupados por vencimento
    const gruposPorVencimento = computed(() => {
      const mapa = {};
      posicoes.value.forEach(pos => {
        const k = pos.dataVenc;
        if (!mapa[k]) mapa[k] = { data: k, plTotal: 0, pct: pos.pctFim, label: pos.dataVenc };
        mapa[k].plTotal += pos.plAtual;
      });
      return Object.values(mapa);
    });

    const getMoneynessStyle = (code) => {
      const c = String(code || '').toUpperCase();
      if (c.includes('ITM')) return 'background:var(--brand-rose-light);color:var(--brand-rose);border-color:var(--brand-rose-muted);';
      if (c.includes('ATM')) return 'background:var(--brand-amber-light);color:var(--brand-amber);border-color:var(--brand-amber-muted);';
      return 'background:var(--brand-emerald-light);color:var(--brand-emerald);border-color:var(--brand-emerald-muted);';
    };

    const getCorMoneyness = (code) => {
      const c = String(code || '').toUpperCase();
      if (c.includes('ITM')) return '#E11D48';
      if (c.includes('ATM')) return '#D97706';
      return '#10B981';
    };

    const formatarPL = (val) => {
      if (val === null || val === undefined) return '--';
      const n   = parseFloat(val);
      const abs = Math.abs(n);
      const pre = n < 0 ? '-R$' : 'R$';
      if (abs >= 1000) return pre + (abs / 1000).toFixed(1) + 'k';
      return pre + abs.toFixed(0);
    };

    return { legendaMoneyness, pctHoje, marcosData, posicoes, gruposPorVencimento, getMoneynessStyle, getCorMoneyness, formatarPL };
  }
};
</script>

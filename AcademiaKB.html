    analogia: 'A Trava de Alta com PUT ĂŠ uma Venda de PUT com um mecanismo de seguranĂ§a embutido. VocĂŞ vende uma PUT (assumindo a obrigaĂ§ĂŁo de comprar a aĂ§ĂŁo se ela cair) para receber um prĂŞmio. Com parte desse prĂŞmio, vocĂŞ compra uma outra PUT com um strike mais baixo. Ao comprar essa segunda PUT, vocĂŞ adquire o DIREITO de vender a aĂ§ĂŁo por esse strike mais baixo. Isso cria um "piso": se a aĂ§ĂŁo desabar a zero, vocĂŞ ĂŠ obrigado a comprar pelo strike mais alto, mas tem o direito garantido de vender pelo strike mais baixo, travando a sua perda mĂĄxima desde o dia 1.',
    quando_usar: [

      'VocĂŞ quer receber um crĂŠdito para montar a operaĂ§ĂŁo, mas nĂŁo quer correr o risco de perda ilimitada de uma Venda de PUT simples.',

      { dte: 0,  titulo: 'Vencimento', descricao: 'O resultado depende unicamente de onde o preĂ§o da aĂ§ĂŁo terminar em relaĂ§ĂŁo aos seus dois strikes (R$ 14,00 e R$ 13,00).' }

    cenarios: [
      { titulo: 'CSAN3 subiu ou ficou acima de R$ 14,00', resultado: 'Perfeito (Ganho MĂĄximo)', descricao: 'O preĂ§o de mercado estĂĄ acima dos dois strikes. NinguĂŠm vai querer te vender a aĂ§ĂŁo por R$ 14,00, e vocĂŞ tambĂŠm nĂŁo vai querer exercer seu direito de vender a R$ 13,00. Ambas as pernas expiram sem valor (viram pĂł). VocĂŞ nĂŁo tem nenhuma obrigaĂ§ĂŁo e fica com os R$ 30,00 de crĂŠdito lĂ­quido.', cor: 'emerald' },
      { titulo: 'CSAN3 caiu para R$ 13,50 (Ficou entre os strikes)', resultado: 'PrejuĂ­zo Parcial',  descricao: 'Aqui as pernas se separam. A perna VENDIDA ĂŠ exercida: vocĂŞ ĂŠ obrigado a comprar as aĂ§Ăľes por R$ 14,00. A perna COMPRADA (strike R$ 13,00) vira pĂł, porque nĂŁo faz sentido vocĂŞ exercer o direito de vender por R$ 13,00 algo que no mercado vale R$ 13,50. Seu resultado: vocĂŞ comprou por R$ 14,00 algo que vale R$ 13,50 (perdeu R$ 0,50). Como vocĂŞ recebeu R$ 0,30 no inĂ­cio, seu prejuĂ­zo real ĂŠ de R$ 0,20 por aĂ§ĂŁo.', cor: 'amber' },

    manejo: [

      { condicao: 'AĂ§ĂŁo caiu para perto do strike vendido (R$ 14,00)', acao: 'Avalie fechar a trava inteira assumindo a perda parcial, ou desmontar rolando apenas a perna vendida (o que exige mais experiĂŞncia).' },
      { condicao: 'AĂ§ĂŁo desabou rapidamente', acao: 'Deixe chegar perto do vencimento. A sua perda mĂĄxima jĂĄ estĂĄ definida e limitada pela perna comprada. VocĂŞ nĂŁo perderĂĄ mais do que os R$ 70,00 calculados.' }

    comparativo: 'Comparado Ă  Venda de PUT simples: na simples, se CSAN3 for a R$ 10,00, vocĂŞ perde R$ 4,00 por aĂ§ĂŁo. Na Trava, por ter comprado a PUT de R$ 13,00, vocĂŞ trava a hemorragia e perde no mĂĄximo R$ 0,70. VocĂŞ recebe um prĂŞmio menor na entrada, mas dorme tranquilo sabendo exatamente qual ĂŠ o pior cenĂĄrio matemĂĄtico possĂ­vel.'

'iron-condor-short': {
    analogia: 'O Iron Condor ĂŠ a montagem simultĂ˘nea de duas travas que vocĂŞ jĂĄ conhece: uma Trava de Alta com PUT (para defender o piso) e uma Trava de Baixa com CALL (para defender o teto). VocĂŞ recebe dois prĂŞmios para montar essa "zona de lucro". A mĂĄgica da estrutura ĂŠ que o mercado sĂł pode ir para um lado: se a aĂ§ĂŁo subir muito, a trava de PUT vira pĂł e vocĂŞ sĂł se preocupa com a de CALL. Se cair muito, a de CALL vira pĂł e vocĂŞ sĂł lida com a de PUT. As pernas compradas garantem que o seu risco mĂĄximo seja travado e conhecido desde o primeiro minuto.',
    quando_usar: [

      'IV Rank acima de 50% -- a volatilidade alta infla os prĂŞmios, permitindo que vocĂŞ receba um crĂŠdito maior para montar a estrutura.',

    linha_do_tempo: [
      { dte: 45, titulo: 'Montagem', descricao: 'VocĂŞ monta as 4 pernas de uma vez, recebe os R$ 55,00 de crĂŠdito e estabelece sua zona de conforto entre R$ 14,00 e R$ 16,00. O Theta comeĂ§a a corroer o valor de todas as opĂ§Ăľes.' },
      { dte: 21, titulo: 'Acompanhamento', descricao: 'Se a aĂ§ĂŁo continua prĂłxima dos R$ 15,00, as 4 opĂ§Ăľes perderam valor. Como vocĂŞ vendeu por R$ 0,55, se custar R$ 0,25 para recomprar tudo, vocĂŞ jĂĄ tem lucro e pode encerrar.' },

    cenarios: [
      { titulo: 'CSNA3 ficou em R$ 15,00 (No meio do intervalo)', resultado: 'Perfeito', descricao: 'O preĂ§o nĂŁo atingiu nem os strikes de R$ 14,00, nem de R$ 16,00. Os titulares das opĂ§Ăľes nĂŁo exercem seus direitos e vocĂŞ tambĂŠm nĂŁo exerce os seus. Todos os 4 contratos viram pĂł e deixam de existir. VocĂŞ fica com 100% do prĂŞmio de R$ 55,00 sem nenhuma obrigaĂ§ĂŁo residual.', cor: 'emerald' },
      { titulo: 'CSNA3 disparou para R$ 19,00 (Rompeu o teto)', resultado: 'Perda MĂĄxima na CALL', descricao: 'A Trava de PUT inteira vira pĂł (ninguĂŠm exerce). O problema estĂĄ na Trava de CALL: a CALL VENDIDA te obriga a vender a aĂ§ĂŁo por R$ 16,00. PorĂŠm, a CALL COMPRADA te dĂĄ o direito de comprar a aĂ§ĂŁo por R$ 17,00. VocĂŞ compra por R$ 17,00 e ĂŠ obrigado a entregar por R$ 16,00, travando sua perda na aĂ§ĂŁo em exatos R$ 1,00. Como vocĂŞ recebeu R$ 0,55 no inĂ­cio, seu prejuĂ­zo final travou em R$ 0,45 por aĂ§ĂŁo, mesmo a aĂ§ĂŁo tendo ido a R$ 19,00.', cor: 'rose' },
      { titulo: 'CSNA3 desabou para R$ 11,00 (Rompeu o piso)', resultado: 'Perda MĂĄxima na PUT', descricao: 'A Trava de CALL inteira vira pĂł (ninguĂŠm exerce). O problema estĂĄ na Trava de PUT: a PUT VENDIDA te obriga a comprar a aĂ§ĂŁo por R$ 14,00. PorĂŠm, a PUT COMPRADA te dĂĄ o direito de vender a aĂ§ĂŁo por R$ 13,00. VocĂŞ ĂŠ obrigado a comprar por R$ 14,00 e imediatamente exerce seu direito de vender por R$ 13,00, travando sua perda na aĂ§ĂŁo em exatos R$ 1,00. Subtraindo o crĂŠdito de R$ 0,55, seu prejuĂ­zo final ĂŠ de exatos R$ 0,45 por aĂ§ĂŁo.', cor: 'rose' }

      { condicao: 'AĂ§ĂŁo se aproximou fortemente de uma das travas', acao: 'A trava do lado oposto jĂĄ virou pĂł e garantiu o lucro dela. Se a aĂ§ĂŁo subiu muito, a trava de PUT jĂĄ ĂŠ lucro no bolso; o foco da gestĂŁo passa a ser exclusivamente lidar com a trava de CALL ameaĂ§ada.' }

    comparativo: 'Versus Short Strangle: O Strangle (Vender PUT e Vender CALL sem proteĂ§ĂŁo) gera um prĂŞmio muito maior, mas o risco ĂŠ ilimitado se a aĂ§ĂŁo explodir ou desabar. O Iron Condor usa parte desse prĂŞmio para comprar as pontas de proteĂ§ĂŁo, reduzindo o ganho, mas permitindo que vocĂŞ saiba matematicamente o seu pior cenĂĄrio.'

'regra-50': {
    analogia: 'A Regra dos 50% ĂŠ uma mĂŠtrica de gestĂŁo de risco puramente matemĂĄtica para posiĂ§Ăľes vendidas. O conceito ĂŠ simples: se a opĂ§ĂŁo que vocĂŞ vendeu jĂĄ perdeu metade do valor (gerando 50% do seu lucro mĂĄximo possĂ­vel), vocĂŞ recompra a opĂ§ĂŁo e encerra a operaĂ§ĂŁo. O motivo ĂŠ estatĂ­stico: os Ăşltimos 50% do prĂŞmio demoram muito mais tempo para decair e carregam um risco direcional exponencialmente maior. A ideia ĂŠ embolsar o lucro e eliminar a obrigaĂ§ĂŁo o mais rĂĄpido possĂ­vel.',
    quando_usar: [
      'Em qualquer estratĂŠgia de crĂŠdito (Venda de PUT, Venda Coberta, Trava de Alta com PUT, Iron Condor).',
      'Independentemente de quantos dias faltam para o vencimento. Se bateu a meta no dia seguinte ou semanas depois, a ordem ĂŠ fechar.',
      'Especialmente para liberar o seu dinheiro (margem de garantia) rapidamente para novas operaĂ§Ăľes.'
    ],
    como_montar: 'VocĂŞ vendeu uma PUT de CSAN3 e recebeu R$ 1,00 de prĂŞmio (R$ 100,00 no total). O seu lucro mĂĄximo e absoluto nessa operaĂ§ĂŁo ĂŠ R$ 100,00. Imediatamente apĂłs a venda, vocĂŞ programa na corretora uma ordem de compra dessa mesma PUT por R$ 0,50. Quando o mercado se mover a seu favor e a ordem for executada, vocĂŞ embolsa R$ 50,00 lĂ­quidos e, o mais importante, zera a sua obrigaĂ§ĂŁo com o mercado.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Entrada com prĂŞmio mĂĄximo', descricao: 'VocĂŞ lanĂ§a a opĂ§ĂŁo, recebe R$ 1,00 e jĂĄ deixa a ordem de recompra engatilhada a R$ 0,50 (GTC - vĂĄlida atĂŠ cancelar).' },
      { dte: 30, titulo: 'Alvo atingido', descricao: 'A aĂ§ĂŁo subiu ou a volatilidade caiu. A opĂ§ĂŁo passa a valer R$ 0,50. Sua ordem ĂŠ executada. Lucro de R$ 0,50 garantido e risco zerado.' },
      { dte: 0,  titulo: 'Vencimento', descricao: 'Se vocĂŞ aplica esta regra com disciplina matemĂĄtica, o seu objetivo ĂŠ raramente chegar ao dia do vencimento com a posiĂ§ĂŁo ainda aberta.' }
    ],
    cenarios: [
      { titulo: 'Atingiu 50% em 10 dias', resultado: 'Excelente', descricao: 'A aĂ§ĂŁo disparou a favor da sua posiĂ§ĂŁo. O prĂŞmio derrete de R$ 1,00 para R$ 0,50 rapidamente. VocĂŞ capturou metade do ganho em uma fraĂ§ĂŁo do tempo total. Seu retorno anualizado sobre o capital ĂŠ altĂ­ssimo e a margem jĂĄ estĂĄ livre.', cor: 'emerald' },
      { titulo: 'Atingiu 30% em 30 dias', resultado: 'Neutro', descricao: 'O mercado ficou lento. Passaram-se 30 dias e a opĂ§ĂŁo caiu de R$ 1,00 para R$ 0,70. VocĂŞ ainda tem lucro, mas nĂŁo bateu a meta. Aqui vocĂŞ deve avaliar fechar a operaĂ§ĂŁo mesmo assim para nĂŁo ficar exposto ao risco dos dias finais (Regra dos 21 DTE).', cor: 'amber' },
      { titulo: 'AĂ§ĂŁo desabou contra a posiĂ§ĂŁo', resultado: 'AtenĂ§ĂŁo Ă  Defesa', descricao: 'VocĂŞ vendeu por R$ 1,00 e a aĂ§ĂŁo caiu forte. A opĂ§ĂŁo passou a valer R$ 2,50. A regra dos 50% de lucro obviamente nĂŁo ĂŠ acionada. O foco muda de "realizar lucro" para gerenciar o risco (aceitar a perda ou fazer rolagem defensiva).', cor: 'rose' }
    ],
    manejo: [

    comparativo: 'Esperar o vencimento para ganhar os R$ 0,50 restantes (os outros 50%) exige que vocĂŞ deixe o seu capital travado como garantia por mais 30 dias, assumindo o risco de uma notĂ­cia repentina reverter a aĂ§ĂŁo contra vocĂŞ. Fechar com 50% libera seu capital para vender uma nova opĂ§ĂŁo com um strike mais distante e seguro, coletando um novo prĂŞmio cheio.'

'regra-21dte': {
    analogia: 'A Regra dos 21 DTE ĂŠ um mecanismo de defesa matemĂĄtico contra o "Risco de Gamma". O Gamma ĂŠ a mĂŠtrica que mede a aceleraĂ§ĂŁo do preĂ§o da opĂ§ĂŁo. Faltando mais de um mĂŞs para o vencimento, uma pequena oscilaĂ§ĂŁo na aĂ§ĂŁo muda pouco o valor da sua opĂ§ĂŁo vendida. PorĂŠm, ao entrar nos Ăşltimos 21 dias, o Gamma "explode". Qualquer pequena variaĂ§ĂŁo de 1% no preĂ§o da aĂ§ĂŁo causa uma alteraĂ§ĂŁo violenta e imprevisĂ­vel no preĂ§o da opĂ§ĂŁo. A regra diz: encerre ou role a sua posiĂ§ĂŁo antes de entrar nessa zona de turbulĂŞncia.',
    quando_usar: [

      'Sempre que a posiĂ§ĂŁo ainda nĂŁo tiver atingido a meta da "Regra dos 50%" de lucro e vocĂŞ precisar decidir o que fazer com ela.',
      'Especialmente crĂ­tico em posiĂ§Ăľes grandes, onde o sobe-e-desce acelerado dos Ăşltimos dias pode causar chamadas de margem na corretora.'
    ],
    como_montar: 'VocĂŞ vendeu uma PUT de CSAN3 faltando 45 dias para o vencimento. VocĂŞ nĂŁo olha para a operaĂ§ĂŁo todos os dias, mas coloca um alarme no calendĂĄrio: quando faltarem exatamente 21 dias para o vencimento, vocĂŞ farĂĄ uma revisĂŁo obrigatĂłria. Se a operaĂ§ĂŁo nĂŁo deu o lucro esperado atĂŠ aqui, vocĂŞ nĂŁo vai arriscar ficar atĂŠ o vencimento. VocĂŞ farĂĄ a "rolagem": recompra a PUT atual e vende uma nova PUT para o vencimento do mĂŞs seguinte, restaurando o seu tempo de tela (voltando para 45 dias) e o seu nĂ­vel de seguranĂ§a.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Entrada ideal', descricao: 'O decaimento do tempo (Theta) ĂŠ excelente e o risco de aceleraĂ§ĂŁo direcional (Gamma) ĂŠ baixo. CenĂĄrio perfeito para quem vende opĂ§Ăľes.' },
      { dte: 21, titulo: 'Ponto de decisĂŁo obrigatĂłrio', descricao: 'A janela de seguranĂ§a se fechou. Aqui vocĂŞ toma uma atitude mecĂ˘nica: ou fecha a operaĂ§ĂŁo, ou rola para o ciclo seguinte.' },
      { dte: 7,  titulo: 'Zona de perigo extremo', descricao: 'O Gamma atinge o pico. Uma notĂ­cia boba no mercado pode transformar uma opĂ§ĂŁo de R$ 0,10 em R$ 1,50 em minutos, destruindo o lucro de semanas.' },
      { dte: 0,  titulo: 'Vencimento', descricao: 'Regra de ouro: vendedores profissionais de volatilidade raramente chegam ao dia do vencimento com a posiĂ§ĂŁo em aberto.' }

    cenarios: [
      { titulo: 'Chegou em 21 DTE com 60% de lucro', resultado: 'Fechar', descricao: 'A operaĂ§ĂŁo jĂĄ ultrapassou a meta da Regra dos 50%. Feche imediatamente, embolse o lucro e libere sua margem.', cor: 'emerald' },
      { titulo: 'Chegou em 21 DTE com 20% de lucro', resultado: 'Rolar',  descricao: 'A CSAN3 subiu, mas muito devagar. A opĂ§ĂŁo deu lucro, mas nĂŁo bateu a meta e o Gamma vai comeĂ§ar a ficar perigoso. SoluĂ§ĂŁo: recompre esta opĂ§ĂŁo, venda a opĂ§ĂŁo do prĂłximo mĂŞs no mesmo strike (ou mais baixo). VocĂŞ recebe mais crĂŠdito e ganha mais 30 dias de tranquilidade.', cor: 'amber' },
      { titulo: 'Chegou em 21 DTE no prejuĂ­zo',      resultado: 'Defesa', descricao: 'A aĂ§ĂŁo caiu. Ficar segurando a posiĂ§ĂŁo na esperanĂ§a de que a aĂ§ĂŁo suba nos Ăşltimos 20 dias ĂŠ jogar roleta com o Gamma contra vocĂŞ. Ă hora de aceitar a perda (fechando) ou rolar a PUT para o prĂłximo mĂŞs em um strike mais barato, pagando a diferenĂ§a ou buscando um crĂŠdito neutro.', cor: 'rose' }

'kelly': {
    analogia: 'O CritĂŠrio de Kelly nĂŁo ĂŠ uma estratĂŠgia de opĂ§Ăľes, mas sim uma fĂłrmula matemĂĄtica de gestĂŁo de risco usada para definir exatamente o tamanho ideal de uma posiĂ§ĂŁo (position sizing). Em vez de alocar tamanhos fixos (ex: operar sempre 100 opĂ§Ăľes), o Kelly calcula qual a porcentagem ideal da sua conta que deve ser colocada em risco naquela operaĂ§ĂŁo especĂ­fica, utilizando a sua taxa de acerto histĂłrica (win rate) e a sua relaĂ§ĂŁo de lucro/prejuĂ­zo (payoff). O objetivo ĂŠ maximizar o crescimento do capital e zerar matematicamente o risco de falĂŞncia.',
    quando_usar: [
      'Obrigatoriamente antes de abrir qualquer nova operaĂ§ĂŁo para definir o nĂşmero exato de contratos a operar.',
      'Quando vocĂŞ jĂĄ possui um diĂĄrio de operaĂ§Ăľes com dados estatĂ­sticos confiĂĄveis (pelo menos 30 trades da mesma estratĂŠgia).',
      'Para evitar a superexposiĂ§ĂŁo direcional â o maior causador de quebra de contas no mercado de opĂ§Ăľes.'
    ],
    como_montar: 'FĂłrmula: f = (p * b - q) / b. Onde: "p" ĂŠ a sua probabilidade de ganho (ex: 70% ou 0.70). "q" ĂŠ a probabilidade de perda (1 - p = 0.30). "b" ĂŠ a proporĂ§ĂŁo do seu ganho mĂŠdio dividido pela perda mĂŠdia (ex: se nas travas vocĂŞ ganha R$ 100 mas quando perde, perde R$ 150, b = 100/150 = 0.66). Exemplo: f = (0.70 * 0.66 - 0.30) / 0.66 = 0.24 (24%). A matemĂĄtica diria para alocar 24% do capital. PorĂŠm, por seguranĂ§a contra oscilaĂ§Ăľes bruscas de mercado, operadores de opĂ§Ăľes utilizam o "Kelly Fracionado" (geralmente 1/4 ou 1/5 do valor da fĂłrmula), resultando em uma alocaĂ§ĂŁo real de cerca de 5% a 6% do capital.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Antes da ExecuĂ§ĂŁo', descricao: 'Calcula-se o risco baseado na distĂ˘ncia dos strikes e na fĂłrmula de Kelly para definir se vocĂŞ vai operar 100, 500 ou 1.000 opĂ§Ăľes.' },
      { dte: 0,  titulo: 'ApĂłs o Encerramento', descricao: 'O resultado (lucro ou prejuĂ­zo) da operaĂ§ĂŁo ĂŠ registrado no diĂĄrio de trades, alterando levemente as suas variĂĄveis "p", "q" e "b" para o cĂĄlculo da prĂłxima operaĂ§ĂŁo.' }
    ],
    cenarios: [
      { titulo: 'CĂĄlculo resultou em 20%', resultado: 'Use o Fracionado (5%)', descricao: 'O "Full Kelly" (Kelly Integral) ĂŠ teoricamente perfeito, mas na prĂĄtica a volatilidade do mercado exige margem de erro. Aplique o "Quarter-Kelly" (divida por 4). Alocar no mĂĄximo 5% do capital total em uma Ăşnica operaĂ§ĂŁo.', cor: 'emerald' },
      { titulo: 'Kelly resultou em nĂşmero negativo', resultado: 'Alerta Vermelho: NĂŁo Opere', descricao: 'Um Kelly negativo significa que a matemĂĄtica provou que a sua estratĂŠgia nĂŁo tem vantagem estatĂ­stica ("edge"). Se vocĂŞ continuar operando com essas taxas de acerto e relaĂ§ĂŁo risco/retorno, vocĂŞ vai quebrar. O sistema proĂ­be a entrada.', cor: 'rose' },
      { titulo: 'Iniciante (Sem histĂłrico de trades)', resultado: 'Tamanho Fixo e Baixo', descricao: 'Se vocĂŞ nĂŁo tem dados reais para preencher a fĂłrmula, nĂŁo "chute" os nĂşmeros. Utilize uma alocaĂ§ĂŁo fixa ultraconservadora (1% a 2% do capital em risco por operaĂ§ĂŁo) atĂŠ acumular 30 resultados reais.', cor: 'amber' }
    ],
    manejo: [
      { condicao: 'A cada mĂŞs ou a cada sĂŠrie de 20 operaĂ§Ăľes concluĂ­das', acao: 'Recalcule o seu CritĂŠrio de Kelly. Se vocĂŞ estiver numa fase ruim e sua taxa de acerto cair, a fĂłrmula automaticamente mandarĂĄ vocĂŞ reduzir o tamanho da mĂŁo na prĂłxima operaĂ§ĂŁo, protegendo a sua conta.' }
    ],
    comparativo: 'A maioria dos operadores de varejo usa tamanho fixo por operaĂ§ĂŁo com base no "sentimento" (ex: "estou confiante, vou comprar 1.000 opĂ§Ăľes"). O CritĂŠrio de Kelly retira totalmente a emoĂ§ĂŁo do processo. A matemĂĄtica te forĂ§a a apostar menos quando seu desempenho estĂĄ ruim e mais quando seu mĂŠtodo estĂĄ se provando eficaz no mercado atual.'
  },

'rolagem-tempo': {
    analogia: 'A Rolagem no Tempo (Roll Forward) ĂŠ uma manobra puramente matemĂĄtica para ganhar mais prazo em uma operaĂ§ĂŁo que estĂĄ ameaĂ§ada. Em vez de aceitar o exercĂ­cio ou realizar o prejuĂ­zo de uma opĂ§ĂŁo que estĂĄ prestes a vencer, vocĂŞ encerra essa obrigaĂ§ĂŁo hoje (recomprando a opĂ§ĂŁo) e, no mesmo instante, abre uma obrigaĂ§ĂŁo idĂŞntica para o mĂŞs seguinte (vendendo uma nova opĂ§ĂŁo). O objetivo ĂŠ usar o prĂŞmio mais caro da opĂ§ĂŁo futura para pagar a recompra da opĂ§ĂŁo atual, ganhando mais 30 dias para a aĂ§ĂŁo se mover a seu favor.',
    quando_usar: [

      'A matemĂĄtica permite que a rolagem gere um crĂŠdito lĂ­quido (vocĂŞ recebe mais pela nova opĂ§ĂŁo do que paga para fechar a antiga).'

    como_montar: 'VocĂŞ vendeu uma PUT de CSAN3 no strike R$ 15,00 que vence em 7 dias. A aĂ§ĂŁo caiu para R$ 15,10 e o risco de exercĂ­cio ĂŠ alto. VocĂŞ recompra essa PUT atual pagando R$ 0,40 para encerrar a obrigaĂ§ĂŁo. Imediatamente, vocĂŞ vende uma nova PUT de CSAN3, no mesmo strike de R$ 15,00, mas com vencimento para daqui a 35 dias, recebendo R$ 0,70. O resultado final dessa troca ĂŠ um crĂŠdito lĂ­quido de R$ 0,30 por opĂ§ĂŁo (R$ 30,00 totais na sua conta) e mais um mĂŞs inteiro de prazo.',
    linha_do_tempo: [
      { dte: 7,  titulo: 'PosiĂ§ĂŁo atual ameaĂ§ada', descricao: 'A aĂ§ĂŁo se aproximou do seu strike e o risco (Gamma) estĂĄ alto. VocĂŞ recompra a opĂ§ĂŁo e encerra definitivamente o ciclo atual.' },
      { dte: 0,  titulo: 'Nova posiĂ§ĂŁo aberta', descricao: 'No mesmo instante, vocĂŞ vende a opĂ§ĂŁo para o mĂŞs seguinte. O relĂłgio do decaimento (Theta) recomeĂ§a a rodar a seu favor.' },
      { dte: 35, titulo: 'Novo vencimento', descricao: 'VocĂŞ tem mais 30 ou 40 dias de respiro para que a aĂ§ĂŁo se afaste do seu strike e a nova opĂ§ĂŁo perca valor atĂŠ virar pĂł.' }
    ],
    cenarios: [
      { titulo: 'A Rolagem gerou crĂŠdito (Ex: R$ 0,30 lĂ­quidos)', resultado: 'Excelente', descricao: 'O cenĂĄrio ideal. VocĂŞ empurrou o problema para o mĂŞs que vem, ganhou mais tempo para a aĂ§ĂŁo se recuperar e ainda foi pago por isso. Esse crĂŠdito extra reduz ainda mais o seu preĂ§o mĂŠdio se vocĂŞ for exercido no futuro.', cor: 'emerald' },
      { titulo: 'A Rolagem foi neutra (Zero a zero)', resultado: 'Ok', descricao: 'A recompra custou exatamente o mesmo que a nova venda. VocĂŞ nĂŁo ganhou prĂŞmio extra, mas ganhou 30 dias de prazo "de graĂ§a". VĂĄlido se a sua convicĂ§ĂŁo na aĂ§ĂŁo for muito alta.', cor: 'amber' },
      { titulo: 'A Rolagem exigiria pagar um dĂŠbito', resultado: 'NĂŁo role', descricao: 'A recompra estĂĄ custando mais caro do que a venda da nova opĂ§ĂŁo. Significa que a situaĂ§ĂŁo piorou tanto (a opĂ§ĂŁo entrou muito no dinheiro) que o mercado estĂĄ cobrando para vocĂŞ rolar. Aceite o exercĂ­cio ou feche com prejuĂ­zo.', cor: 'rose' }
    ],
    manejo: [
      { condicao: 'Regra de Ouro', acao: 'Nunca role pagando dĂŠbito. Se a rolagem tira dinheiro da sua conta para manter o mesmo strike, a operaĂ§ĂŁo original jĂĄ fracassou. Feche a posiĂ§ĂŁo.' },

    comparativo: 'Em vez de aceitar o exercĂ­cio imediato e ter que comprar/vender a aĂ§ĂŁo hoje imobilizando muito capital, a rolagem dĂĄ uma segunda chance para a operaĂ§ĂŁo dar certo, utilizando o prĂłprio dinheiro do mercado (o prĂŞmio da opĂ§ĂŁo futura) para financiar essa extensĂŁo de prazo.'

'bull-call-spread': {
    analogia: 'A Trava de Alta com CALL ĂŠ uma aposta de alta "financiada". VocĂŞ quer comprar uma CALL porque acha que a aĂ§ĂŁo vai subir, mas nĂŁo quer pagar caro pelo prĂŞmio. Para baratear esse custo de entrada, vocĂŞ VENDE uma outra CALL com um strike mais alto. A CALL vendida gera uma obrigaĂ§ĂŁo de entregar as aĂ§Ăľes, sim. PorĂŠm, a CALL que vocĂŞ COMPROU garante o seu direito de comprar as aĂ§Ăľes mais barato. Se a aĂ§ĂŁo explodir para cima, vocĂŞ exerce o seu direito de comprar barato e usa essas mesmas aĂ§Ăľes para cumprir a sua obrigaĂ§ĂŁo de entregar mais caro. O lucro ĂŠ a diferenĂ§a entre esses dois preĂ§os.',

      { dte: 21, titulo: 'Acompanhamento', descricao: 'Se a aĂ§ĂŁo jĂĄ subiu e chegou em R$ 17,00, a sua trava atingiu quase o valor mĂĄximo. Avalie vender a estrutura inteira no mercado para colocar o lucro no bolso sem esperar o vencimento.' },

    cenarios: [
      { titulo: 'CSAN3 explodiu para R$ 19,00 (Acima dos dois strikes)', resultado: 'Ganho MĂĄximo Travado', descricao: 'O titular da CALL que vocĂŞ vendeu exerce o direito, te OBRIGANDO a entregar as aĂ§Ăľes por R$ 17,00. Como vocĂŞ se defende? VocĂŞ exerce a SUA CALL comprada, garantindo o DIREITO de comprar as aĂ§Ăľes por R$ 15,00. VocĂŞ compra a R$ 15,00 e entrega a R$ 17,00, ganhando R$ 2,00 nessa troca. Como vocĂŞ pagou R$ 0,60 na montagem, seu lucro lĂ­quido e definitivo ĂŠ de R$ 1,40 por aĂ§ĂŁo. A alta alĂŠm dos R$ 17,00 nĂŁo te beneficia mais.', cor: 'emerald' },
      { titulo: 'CSAN3 subiu para R$ 16,00 (No meio dos strikes)', resultado: 'Lucro Parcial', descricao: 'A CALL VENDIDA de R$ 17,00 vira pĂł (ninguĂŠm te obriga a vender a R$ 17,00 algo que no mercado vale R$ 16,00). Excelente. A sua CALL COMPRADA de R$ 15,00 estĂĄ no lucro. Ela tem R$ 1,00 de valor intrĂ­nseco. VocĂŞ pode vendĂŞ-la no mercado por R$ 1,00. Subtraindo os R$ 0,60 que vocĂŞ gastou para montar a trava inteira, sobra um lucro lĂ­quido de R$ 0,40 por aĂ§ĂŁo.', cor: 'amber' },

'bear-call-spread': {

      { titulo: 'CSNA3 subiu para R$ 16,50 (Entre os strikes)', resultado: 'PrejuĂ­zo Parcial', descricao: 'O cenĂĄrio chato. A perna VENDIDA de R$ 16,00 entra no dinheiro. O titular te OBRIGA a entregar as aĂ§Ăľes por R$ 16,00. Como vocĂŞ nĂŁo as tem, vocĂŞ precisaria comprar no mercado por R$ 16,50 e entregar a R$ 16,00 (perdendo R$ 0,50). A perna COMPRADA de R$ 17,00 vira pĂł, pois nĂŁo vale a pena exercĂŞ-la. Seu prejuĂ­zo real de R$ 0,50 ĂŠ amenizado pelos R$ 0,30 de crĂŠdito inicial, resultando em uma perda final de R$ 0,20 por aĂ§ĂŁo.', cor: 'amber' },

    comparativo: 'Comparado a Vender uma CALL a descoberto (Naked Call): a Venda Descoberta te dĂĄ todo o prĂŞmio, mas se a aĂ§ĂŁo receber uma notĂ­cia de fusĂŁo e disparar 50%, sua conta quebra. Na Trava de Baixa com CALL, vocĂŞ "paga" uma parte desse prĂŞmio para comprar o seguro (CALL mais alta) e dorme tranquilo sabendo que seu risco nĂŁo passa de R$ 70,00 no lote.'

'bear-put-spread': {

'collar': {

'fence': {

      { condicao: 'AĂ§ĂŁo subiu forte logo no inĂ­cio', acao: 'A Trava de Alta (Bull Call Spread) vai dar lucro rĂĄpido e a PUT vendida vai virar pĂł. Feche as trĂŞs pernas e embolse o lucro sem esperar o vencimento.' }

  },

'jade-lizard': {
    analogia: 'O Jade Lizard ĂŠ a uniĂŁo de uma Venda de PUT isolada com uma Trava de Baixa com CALL. O grande diferencial desta estratĂŠgia ĂŠ uma regra matemĂĄtica obrigatĂłria: o crĂŠdito total recebido ao montar as trĂŞs pernas DEVE ser maior ou igual Ă  largura dos strikes da Trava de CALL. Ao seguir essa regra, vocĂŞ garante que o prĂŞmio arrecadado paga antecipadamente qualquer prejuĂ­zo mĂĄximo que a Trava de CALL possa gerar. Com isso, o risco da aĂ§ĂŁo explodir para cima ĂŠ eliminado matematicamente no dia da montagem. O Ăşnico risco restante ĂŠ o da PUT vendida: a aĂ§ĂŁo desabar.',
    quando_usar: [
      'VocĂŞ tem um viĂŠs neutro a levemente altista para a aĂ§ĂŁo.',
      'A volatilidade (IV) estĂĄ alta nos dois extremos do mercado, permitindo coletar prĂŞmios generosos.',
      'VocĂŞ aceita assumir a obrigaĂ§ĂŁo de comprar a aĂ§ĂŁo na queda (risco da PUT), mas exige que o seu risco de alta seja matematicamente zero.'
    ],
    como_montar: 'CSNA3 a R$ 15,00. Passo 1: VocĂŞ VENDE uma PUT no strike R$ 14,00 e recebe R$ 0,60. Passo 2 (Trava de CALL): VocĂŞ VENDE a CALL R$ 16,00 (recebe R$ 0,50) e COMPRA a CALL R$ 17,00 (paga R$ 0,10). O CrĂŠdito Total que entra na sua conta ĂŠ de R$ 1,00 por aĂ§ĂŁo (R$ 100,00 no total). VerificaĂ§ĂŁo da Regra: A distĂ˘ncia entre as CALLs (17 - 16) ĂŠ de R$ 1,00. Como o crĂŠdito de R$ 1,00 ĂŠ igual Ă  largura da trava de R$ 1,00, a estrutura estĂĄ perfeita e o risco de alta sumiu.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Montagem Blindada na Alta', descricao: 'VocĂŞ recebe o prĂŞmio mĂĄximo na entrada. A sua Ăşnica preocupaĂ§ĂŁo atĂŠ o vencimento serĂĄ observar se a aĂ§ĂŁo ameaĂ§a cair abaixo dos R$ 14,00.' },
      { dte: 21, titulo: 'Monitoramento do Suporte', descricao: 'Se a aĂ§ĂŁo lateralizou ou subiu, a estrutura inteira estĂĄ perdendo valor rapidamente (o que ĂŠ Ăłtimo). O foco ĂŠ sempre o lado da PUT.' },
      { dte: 0,  titulo: 'Vencimento', descricao: 'Dependendo do fechamento da CSNA3, vocĂŞ embolsa tudo, sai no zero a zero na alta, ou ĂŠ exercido na ponta de baixo.' }
    ],
    cenarios: [
      { titulo: 'CSNA3 ficou em R$ 15,00 (Entre os strikes vendidos)', resultado: 'Lucro MĂĄximo', descricao: 'A aĂ§ĂŁo nĂŁo atingiu R$ 16,00 nem caiu a R$ 14,00. Todas as trĂŞs opĂ§Ăľes (as duas CALLs e a PUT) expiram sem valor. Suas obrigaĂ§Ăľes somem. VocĂŞ nĂŁo precisa comprar nem entregar nada, e os R$ 100,00 de crĂŠdito ficam integralmente na sua conta.', cor: 'emerald' },
      { titulo: 'CSNA3 explodiu para R$ 20,00 (A mĂĄgica do Risco Zero)', resultado: 'Empate ou Lucro Residual', descricao: 'A PUT vira pĂł. O titular da CALL VENDIDA te obriga a entregar as aĂ§Ăľes por R$ 16,00. VocĂŞ exerce a sua CALL COMPRADA para comprar a R$ 17,00. VocĂŞ perde exatamente R$ 1,00 por aĂ§ĂŁo nesta trava. PorĂŠm, como vocĂŞ recebeu R$ 1,00 de crĂŠdito ao montar a estrutura, o prĂŞmio anula a perda da trava. Seu prejuĂ­zo ĂŠ ZERO. Se o crĂŠdito inicial fosse de R$ 1,20, vocĂŞ ainda teria saĂ­do com R$ 0,20 de lucro mesmo errando feio na alta.', cor: 'emerald' },
      { titulo: 'CSNA3 desabou para R$ 11,00 (O Risco Real)', resultado: 'ObrigaĂ§ĂŁo de Compra', descricao: 'A Trava de CALL inteira vira pĂł. O problema estĂĄ na PUT: o titular da PUT VENDIDA exerce o direito dele, te OBRIGANDO a comprar a aĂ§ĂŁo por R$ 14,00. Como o mercado estĂĄ a R$ 11,00, vocĂŞ tem uma desvalorizaĂ§ĂŁo de R$ 3,00 na aĂ§ĂŁo. O crĂŠdito inicial de R$ 1,00 ajuda a amortecer, mas o seu prejuĂ­zo financeiro lĂ­quido ĂŠ de R$ 2,00 por aĂ§ĂŁo.', cor: 'rose' }

    manejo: [
      { condicao: 'AĂ§ĂŁo desabou para perto do strike da PUT (R$ 14,00)', acao: 'A Trava de CALL jĂĄ virou pĂł e o lucro dela estĂĄ garantido. O seu manejo foca exclusivamente em defender a PUT: recompre a atual e venda para o mĂŞs seguinte num strike mais baixo (Rolagem).' },
      { condicao: 'AĂ§ĂŁo disparou acima de R$ 17,00', acao: 'NĂŁo faĂ§a absolutamente nada. Deixe o vencimento chegar. A matemĂĄtica do Jade Lizard jĂĄ garantiu que vocĂŞ nĂŁo perderĂĄ dinheiro desse lado. Rolar a posiĂ§ĂŁo agora apenas destruiria essa vantagem.' }
    ],
    comparativo: 'Versus Short Strangle: O Strangle (vender PUT e vender CALL secas) gera mais crĂŠdito na entrada, mas se a CSNA3 fosse a R$ 20,00, a sua perda na CALL vendida seria ilimitada. O Jade Lizard usa uma pequena parte do prĂŞmio do Strangle para comprar uma CALL de proteĂ§ĂŁo, sacrificando um pouco de lucro para dormir com o teto perfeitamente blindado.'
  },

'broken-wing-put': {
    analogia: 'A Trava de Baixa SimĂŠtrica (Bull Put Spread padrĂŁo) compra a proteĂ§ĂŁo no strike imediatamente abaixo da venda. Na versĂŁo de "Asa Quebrada" (Strikes AssimĂŠtricos), vocĂŞ decide afastar a sua PUT comprada. VocĂŞ pula um ou mais strikes para comprar um seguro mais barato. Como o seguro custou menos, sobra mais crĂŠdito (dinheiro) na sua conta na montagem. O preĂ§o disso? A distĂ˘ncia entre o strike que vocĂŞ ĂŠ obrigado a comprar e o strike que vocĂŞ tem o direito de vender fica muito maior, aumentando significativamente a sua perda mĂĄxima se a aĂ§ĂŁo desabar.',
    quando_usar: [
      'VocĂŞ tem um viĂŠs altista ou neutro, mas quer receber um crĂŠdito maior do que a trava padrĂŁo paga.',
      'VocĂŞ tem forte convicĂ§ĂŁo em um suporte de preĂ§o da aĂ§ĂŁo e acredita que o risco de uma queda brusca (que ativaria a perda mĂĄxima) ĂŠ quase zero.',
      'A volatilidade (IV) estĂĄ alta, o que significa que afastar a proteĂ§ĂŁo gera um ganho financeiro que justifica o risco extra assumido.'

    como_montar: 'CSNA3 estĂĄ a R$ 15,00. Na trava normal, vocĂŞ venderia a R$ 14,00 e compraria a R$ 13,00. Aqui, vocĂŞ VENDE a PUT de R$ 14,00 (recebe R$ 0,60) e pula o 13, COMPRANDO a PUT de R$ 12,00 (paga apenas R$ 0,15). O crĂŠdito lĂ­quido sobe para R$ 0,45 por opĂ§ĂŁo (R$ 45,00 totais). PorĂŠm, o seu "buraco" de risco agora ĂŠ de R$ 2,00 (diferenĂ§a entre 14 e 12). Sua Perda MĂĄxima: R$ 2,00 menos o crĂŠdito de R$ 0,45 = R$ 1,55 por aĂ§ĂŁo (R$ 155,00 no total).',
    linha_do_tempo: [
      { dte: 45, titulo: 'Montagem Turbinada', descricao: 'VocĂŞ recebe um prĂŞmio 50% maior que o da trava normal (ex: R$ 0,45 em vez de R$ 0,30), mas assume um risco de queda duas vezes maior.' },
      { dte: 21, titulo: 'Monitoramento de Risco', descricao: 'Como a proteĂ§ĂŁo estĂĄ muito longe (sĂł no R$ 12,00), qualquer queda da aĂ§ĂŁo rumo aos R$ 14,00 exige atenĂ§ĂŁo imediata. A zona de prejuĂ­zo desprotegido ĂŠ grande.' },
      { dte: 0,  titulo: 'Vencimento', descricao: 'O resultado ideal ĂŠ a aĂ§ĂŁo ficar acima de R$ 14,00. Abaixo disso, as perdas aceleram sem a proteĂ§ĂŁo imediata para segurar.' }
    ],
    cenarios: [
      { titulo: 'CSNA3 ficou em R$ 15,00 (Acima da obrigaĂ§ĂŁo)', resultado: 'Ganho MĂĄximo', descricao: 'O preĂ§o nĂŁo atingiu R$ 14,00. NinguĂŠm vai te obrigar a comprar as aĂ§Ăľes. A PUT VENDIDA vira pĂł e a PUT COMPRADA tambĂŠm. VocĂŞ fica com os R$ 45,00 inteiros. A estratĂŠgia funcionou perfeitamente e pagou mais que o normal.', cor: 'emerald' },
      { titulo: 'CSNA3 caiu para R$ 13,00 (Caiu na "Asa Quebrada")', resultado: 'Perda Parcial Desprotegida', descricao: 'A PUT VENDIDA entra no dinheiro e te OBRIGA a comprar a aĂ§ĂŁo por R$ 14,00. O problema: a sua PUT COMPRADA ĂŠ de R$ 12,00, entĂŁo ela nĂŁo serve para nada aqui (vira pĂł). VocĂŞ assume o prejuĂ­zo integral de R$ 1,00 na aĂ§ĂŁo. Descontando os R$ 0,45 recebidos, sua perda lĂ­quida ĂŠ de R$ 0,55 por aĂ§ĂŁo.', cor: 'amber' },
      { titulo: 'CSNA3 desabou para R$ 10,00 (Queda CatastrĂłfica)', resultado: 'Perda MĂĄxima Travada', descricao: 'VocĂŞ ĂŠ OBRIGADO a comprar a R$ 14,00. A sua proteĂ§ĂŁo entra em cena: a PUT COMPRADA te dĂĄ o DIREITO de vender a R$ 12,00. VocĂŞ compra a 14 e vende a 12, perdendo R$ 2,00 nessa troca. Descontando o prĂŞmio recebido, vocĂŞ atinge o teto de perda financeira de R$ 1,55 por aĂ§ĂŁo.', cor: 'rose' }

    manejo: [

    ],
    comparativo: 'Versus Trava de Alta com PUT simples: A trava simples (14-13) tem uma relaĂ§ĂŁo risco-retorno de perder R$ 0,70 para ganhar R$ 0,30. A Asa Quebrada (14-12) muda essa matemĂĄtica para perder R$ 1,55 para ganhar R$ 0,45. Ă uma estrutura para quem prefere ganhar mais dinheiro na entrada e aceita que, no raro cenĂĄrio em que erra, vai perder bastante.'
  },

'pmcc': {
    analogia: 'A Venda Coberta do Pobre (Poor Man\'s Covered Call - PMCC) ĂŠ uma Venda Coberta alavancada. Em vez de imobilizar muito capital comprando 100 aĂ§Ăľes no mercado, vocĂŞ COMPRA uma opĂ§ĂŁo CALL muito dentro do dinheiro (Deep ITM) com vencimento bem longo (ex: 1 ano para frente). Essa opĂ§ĂŁo longa funciona como um "substituto" da aĂ§ĂŁo na sua carteira, pois garante o DIREITO de comprar o ativo por um preĂ§o bem mais baixo do que o atual. Com essa garantia de longo prazo em mĂŁos, vocĂŞ VENDE CALLs curtas (ex: 30 dias) todos os meses contra ela para gerar renda. VocĂŞ simula a posse da aĂ§ĂŁo, mas gastando uma fraĂ§ĂŁo do capital.',
    quando_usar: [
      'VocĂŞ quer gerar renda mensal com Venda Coberta, mas a aĂ§ĂŁo ĂŠ muito cara e comprar o lote de 100 unidades comprometeria muito do seu capital.',
      'VocĂŞ tem um viĂŠs altista para a aĂ§ĂŁo no longo prazo, mas acredita que ela vai subir devagar ou lateralizar no curto prazo.',
      'VocĂŞ quer otimizar o seu Retorno sobre Capital Investido (ROC), alocando bem menos dinheiro para buscar prĂŞmios mensais semelhantes aos da Venda Coberta tradicional.'
    ],
    como_montar: 'CSNA3 estĂĄ a R$ 15,00. Comprar 100 aĂ§Ăľes custaria R$ 1.500,00. No PMCC, Passo 1: VocĂŞ COMPRA 100 CALLs de longo prazo (ex: para daqui a 12 meses) no strike R$ 10,00 (Deep ITM), pagando R$ 5,50 por opĂ§ĂŁo (gasta R$ 550,00). Passo 2: VocĂŞ VENDE 100 CALLs de curto prazo (30 dias) no strike R$ 16,00, recebendo R$ 0,40 (entra R$ 40,00). O custo lĂ­quido para entrar na operaĂ§ĂŁo ĂŠ de R$ 5,10 por aĂ§ĂŁo (R$ 510,00 totais). VocĂŞ montou o equivalente a uma Venda Coberta imobilizando R$ 510,00 em vez de R$ 1.500,00.',
    linha_do_tempo: [
      { dte: 365, titulo: 'Compra da CALL Longa (O Substituto)', descricao: 'VocĂŞ paga o dĂŠbito inicial para adquirir a sua garantia. Essa opĂ§ĂŁo de 12 meses perde valor pelo tempo (Theta) de forma extremamente lenta.' },
      { dte: 30,  titulo: 'Ciclo de Renda Mensal', descricao: 'VocĂŞ lanĂ§a a sua CALL de 30 dias. OpĂ§Ăľes curtas perdem valor muito rĂĄpido. O tempo joga a seu favor na perna vendida e te machuca pouco na perna comprada.' },
      { dte: 0,   titulo: 'RenovaĂ§ĂŁo do Ciclo', descricao: 'Se a CALL mensal virar pĂł, a obrigaĂ§ĂŁo acaba. VocĂŞ mantĂŠm sua opĂ§ĂŁo de 12 meses e lanĂ§a uma nova CALL curta para o mĂŞs seguinte, coletando mais prĂŞmio e diminuindo o seu custo inicial.' }
    ],
    cenarios: [
      { titulo: 'CSNA3 lateralizou ou subiu abaixo de R$ 16,00', resultado: 'Renda Recorrente Perfeita', descricao: 'A CALL curta VENDIDA de R$ 16,00 vira pĂł. A sua obrigaĂ§ĂŁo deixa de existir e vocĂŞ embolsa os R$ 40,00 do mĂŞs. A sua CALL COMPRADA de 12 meses continua firme na carteira. VocĂŞ repete o processo no mĂŞs seguinte, gerando um "aluguel" altĂ­ssimo em relaĂ§ĂŁo aos R$ 510,00 que vocĂŞ investiu.', cor: 'emerald' },
      { titulo: 'CSNA3 disparou e ultrapassou R$ 16,00', resultado: 'Lucro MĂĄximo do Ciclo', descricao: 'O titular da CALL curta te OBRIGA a entregar as aĂ§Ăľes por R$ 16,00. Como vocĂŞ se defende? Exerce a sua CALL longa, acionando o DIREITO de comprar as aĂ§Ăľes por R$ 10,00. VocĂŞ compra a 10 e entrega a 16, ganhando R$ 6,00 de diferenĂ§a nos strikes. Como vocĂŞ pagou R$ 5,10 na montagem da estrutura, seu lucro limpo e definitivo ĂŠ de R$ 0,90 por aĂ§ĂŁo. A operaĂ§ĂŁo inteira ĂŠ encerrada.', cor: 'emerald' },
      { titulo: 'CSNA3 desabou no curto/mĂŠdio prazo', resultado: 'Risco de Perda Total do Capital', descricao: 'A CALL curta vira pĂł (o que ĂŠ bom), mas a aĂ§ĂŁo despencou, arrastando junto o valor da sua CALL longa de 12 meses. O grande risco aqui ĂŠ o prazo de validade: diferente da aĂ§ĂŁo fĂ­sica que vocĂŞ pode segurar para sempre esperando recuperar, a sua CALL longa vai expirar. Se a aĂ§ĂŁo nĂŁo se recuperar antes desses 12 meses, vocĂŞ perde 100% dos R$ 550,00 investidos na garantia.', cor: 'rose' }

    manejo: [

      { condicao: 'A CALL longa atingiu a marca de 60 dias para o vencimento', acao: 'A partir de 60 dias, o Theta da sua opĂ§ĂŁo longa comeĂ§a a acelerar e destruir o valor dela rapidamente. Feche a estrutura toda (venda a longa e recompre a curta) ou "role" a sua opĂ§ĂŁo longa comprando uma nova para o ano seguinte.' }
    ],
    comparativo: 'Versus Venda Coberta clĂĄssica: O PMCC permite que vocĂŞ monte a posiĂ§ĂŁo gastando atĂŠ 80% menos dinheiro. A desvantagem brutal ĂŠ que aĂ§Ăľes nĂŁo tĂŞm data de validade, opĂ§Ăľes longas tĂŞm. Na aĂ§ĂŁo clĂĄssica, se o mercado derreter, vocĂŞ vira "sĂłcio" e espera 5 anos; no PMCC, se a aĂ§ĂŁo derreter e a opĂ§ĂŁo longa vencer, seu dinheiro investido vira pĂł.'
  },

'short-strangle': {
    analogia: 'A Venda de Strangle (Short Strangle) ĂŠ a venda simultĂ˘nea de uma PUT e de uma CALL a descoberto (sem opĂ§Ăľes compradas para proteĂ§ĂŁo) em strikes afastados do preĂ§o atual. VocĂŞ assume duas obrigaĂ§Ăľes ao mesmo tempo: comprar a aĂ§ĂŁo se ela desabar (pela PUT vendida) e entregar a aĂ§ĂŁo se ela explodir (pela CALL vendida). Em troca de abraĂ§ar esse risco duplo e direcional, vocĂŞ recebe a soma de dois prĂŞmios, criando uma ampla "zona de lucro" onde a aĂ§ĂŁo pode flutuar livremente. A diferenĂ§a para o Iron Condor ĂŠ que aqui nĂŁo hĂĄ "asas" de proteĂ§ĂŁo: se o mercado romper os seus limites, a sua perda cresce de forma ilimitada.',

      { dte: 21, titulo: 'Acelerador de Risco (Gamma)', descricao: 'O ponto crĂ­tico. Nos Ăşltimos 21 dias, o Gamma torna o preĂ§o das opĂ§Ăľes muito sensĂ­vel. Um pequeno movimento da aĂ§ĂŁo pode inflar o preĂ§o da opĂ§ĂŁo vendida e devorar todo o seu lucro.' },

    ],
    cenarios: [

'hedge-assimetrico': {
    analogia: 'O Hedge AssimĂŠtrico (Tail Risk Hedging) ĂŠ uma estratĂŠgia de proteĂ§ĂŁo de portfĂłlio que utiliza a compra de opĂ§Ăľes de venda (PUTs) bem fora do dinheiro (OTM) em uma proporĂ§ĂŁo superior Ă  proteĂ§ĂŁo 1:1. O objetivo nĂŁo ĂŠ compensar pequenas oscilaĂ§Ăľes de mercado, mas sim gerar um lucro explosivo em cenĂĄrios de quedas extremas ("cisnes negros"). A assimetria reside na convexidade da operaĂ§ĂŁo: vocĂŞ aceita perder 100% de um prĂŞmio pequeno (o custo da opĂ§ĂŁo) em cenĂĄrios de alta ou estabilidade, em troca de um ganho que multiplica dezenas de vezes o capital investido se a volatilidade implĂ­cita disparar e o preĂ§o dos ativos desabar.',
    quando_usar: [
      'VocĂŞ possui uma carteira de aĂ§Ăľes e quer protegĂŞ-la contra riscos sistĂŞmicos e quedas superiores a 20%.',
      'A Volatilidade ImplĂ­cita (IV) das PUTs OTM estĂĄ em nĂ­veis historicamente baixos, tornando o "custo de proteĂ§ĂŁo" barato.',
      'CenĂĄrio macroeconĂ´mico de incerteza extrema, onde o risco de uma correĂ§ĂŁo severa ĂŠ maior do que o prĂŞmio pago pelas opĂ§Ăľes.'
    ],
    como_montar: 'Carteira de R$ 100.000,00 em aĂ§Ăľes. Em vez de comprar proteĂ§ĂŁo para cada real investido, vocĂŞ compra PUTs OTM (com strike 20% ou 30% abaixo do preĂ§o atual) em uma quantidade 2x ou 3x superior ao tamanho da sua carteira. O custo total do prĂŞmio deve ser pequeno (ex: 0,5% a 1,5% do valor total do portfĂłlio ao ano). Se o mercado cair 30%, o ganho explosivo das PUTs (pelo aumento do Delta e Vega) compensa a perda das aĂ§Ăľes e pode atĂŠ gerar lucro lĂ­quido no crash.',
    linha_do_tempo: [
      { dte: 365, titulo: 'Planejamento de Hedge', descricao: 'O custo do hedge ĂŠ diluĂ­do ao longo do ano. VocĂŞ compra sĂŠries longas ou renova mensalmente as OTMs para manter a convexidade ativa.' },
      { dte: 180, titulo: 'Rolagem de ProteĂ§ĂŁo', descricao: 'Se o mercado subiu, os strikes das suas PUTs ficaram longe demais. Ă necessĂĄrio rolar a proteĂ§ĂŁo para strikes mais prĂłximos (ajuste de Delta) para manter o hedge eficiente.' },
      { dte: 0,  titulo: 'Exaurimento ou ExercĂ­cio', descricao: 'No vencimento, se nĂŁo houve crise, o prĂŞmio vira pĂł. Se houve o crash, as PUTs sĂŁo exercidas ou vendidas com lucro massivo para recomprar aĂ§Ăľes baratas.' }
    ],
    cenarios: [
      { titulo: 'Mercado desabou 30% (Crash)', resultado: 'Alpha na Crise', descricao: 'As aĂ§Ăľes perdem R$ 30.000,00. As PUTs OTM (compradas em excesso) valorizam 5.000%, gerando um ganho de R$ 40.000,00. Resultado: lucro lĂ­quido de R$ 10.000,00 em pleno mercado de baixa.', cor: 'emerald' },
      { titulo: 'Mercado subiu 15% (Alta)', resultado: 'Custo de ProteĂ§ĂŁo', descricao: 'Suas aĂ§Ăľes valorizam R$ 15.000,00. O prĂŞmio das PUTs (R$ 1.500,00) ĂŠ perdido integralmente. Seu lucro lĂ­quido ĂŠ de R$ 13.500,00. O hedge funcionou como uma taxa de seguranĂ§a que nĂŁo precisou ser usada.', cor: 'emerald' },
      { titulo: 'Mercado lateralizado', resultado: 'Time Decay (Theta)', descricao: 'As aĂ§Ăľes nĂŁo se movem. As PUTs perdem valor pelo tempo (Theta) e pela queda da volatilidade. O custo do hedge ĂŠ absorvido como uma despesa operacional da carteira.', cor: 'amber' }
    ],
    manejo: [
      { condicao: 'Volatilidade ImplĂ­cita (IV) dispara repentinamente', acao: 'Realize o lucro das PUTs (ganho de Vega) mesmo que a aĂ§ĂŁo nĂŁo tenha caĂ­do tanto. Use o lucro para comprar proteĂ§ĂŁo ainda mais barata ou para aumentar a posiĂ§ĂŁo em aĂ§Ăľes (rebalanceamento).' },
      { condicao: 'AĂ§ĂŁo subiu muito e a PUT ficou "pĂł"', acao: 'NĂŁo espere o vencimento. Role o strike para cima para manter a "distĂ˘ncia de proteĂ§ĂŁo" constante em relaĂ§ĂŁo ao novo preĂ§o de mercado.' }

    comparativo: 'Versus Collar: O Collar limita o seu ganho se a aĂ§ĂŁo subir muito (pois vocĂŞ vende CALLs para pagar a PUT). O Hedge AssimĂŠtrico mantĂŠm o seu ganho de alta ilimitado, pois vocĂŞ paga pela proteĂ§ĂŁo separadamente. Versus Put Reale: O Hedge AssimĂŠtrico foca no custo fixo anualizado, enquanto a Put Reale costuma ser uma aposta mais tĂĄtica de curto prazo.'
  },

    cenarios: [

      { titulo: 'CSNA3 caiu para R$ 11,00', resultado: 'ExercĂ­cio da PUT', descricao: 'A CALL vira pĂł. VocĂŞ ĂŠ obrigado a comprar a aĂ§ĂŁo por R$ 13,00. Como ela vale R$ 11,00, vocĂŞ comeĂ§a com uma desvalorizaĂ§ĂŁo de R$ 2,00, amortecida pelo crĂŠdito de R$ 0,10. Seu custo de aquisiĂ§ĂŁo final ĂŠ R$ 12,90.', cor: 'rose' }

    quando_usar: [

    comparativo: 'Versus Box-3 ClĂĄssico: O clĂĄssico ĂŠ uma operaĂ§ĂŁo passiva de "Buy and Hold" de opĂ§Ăľes. O Smart ĂŠ um trade de valor relativo. No Smart, vocĂŞ nĂŁo trata o lucro como um destino, mas como uma taxa. Ă a diferenĂ§a entre ganhar 1% ao mĂŞs esperando 30 dias, ou ganhar 0,8% em 5 dias e poder operar de novo. Para o seu app de trading, esta ĂŠ a estratĂŠgia que diferencia o investidor comum do arbitrador profissional.'

'origami': {
    analogia: 'O Origami ĂŠ a Engenharia de Payoff Customizado. Em vez de usar uma trava ou borboleta padrĂŁo, vocĂŞ desenha o grĂĄfico de lucro (payoff) que deseja e trabalha de trĂĄs para frente para encontrar a combinaĂ§ĂŁo de strikes, vencimentos e quantidades que geram essa forma. Ă uma estrutura multi-perna (geralmente de 4 a 10 pontas) onde cada opĂ§ĂŁo serve como uma "dobra" matemĂĄtica para ajustar a curvatura do risco, a exposiĂ§ĂŁo Ă  volatilidade ou a aceleraĂ§ĂŁo do ganho. Ă o nĂ­vel mĂĄximo de sofisticaĂ§ĂŁo, transformando o trader em um arquiteto de probabilidades.',
    quando_usar: [

      'Operadores profissionais que precisam de "Delta Neutro" absoluto com exposiĂ§ĂŁo positiva a movimentos explosivos em pontos muito especĂ­ficos do grĂĄfico.'
    ],
    como_montar: 'NĂŁo existe uma fĂłrmula fixa. A montagem comeĂ§a com o grĂĄfico de Payoff desejado. Exemplo em CSNA3: vocĂŞ quer ganhar se a aĂ§ĂŁo ficar entre R$ 14,50 e R$ 15,20, mas quer um "puxadinho" de lucro se ela disparar acima de R$ 18,00. Para isso, vocĂŞ combina uma Borboleta ATM com um Backspread de CALLs OTM. VocĂŞ seleciona cada perna para que a soma das gregas ($ \sum \Delta, \sum \Gamma $) resulte no perfil de risco planejado. Exige plataformas de simulaĂ§ĂŁo avanĂ§ada e execuĂ§ĂŁo via robĂ´s para evitar o erro de execuĂ§ĂŁo.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Modelagem MatemĂĄtica', descricao: 'Uso de software para desenhar o payoff e simular o impacto da passagem do tempo (Theta) e da mudanĂ§a de volatilidade (Vega) na estrutura.' },
      { dte: 40, titulo: 'ExecuĂ§ĂŁo AlgorĂ­tmica', descricao: 'Montagem das diversas pernas simultaneamente. Em estruturas de 6 ou 8 pontas, a execuĂ§ĂŁo manual ĂŠ impossĂ­vel devido ao risco de "ficar pendurado" em metade da operaĂ§ĂŁo.' },
      { dte: 0,  titulo: 'ConvergĂŞncia de Design', descricao: 'No vencimento, a estrutura entrega o perfil de lucro customizado. O resultado ĂŠ a prova real da precisĂŁo do seu desenho matemĂĄtico.' }

      { titulo: 'MudanĂ§a drĂĄstica na Volatilidade (Vega)', resultado: 'DeformaĂ§ĂŁo do Payoff', descricao: 'Estruturas muito complexas costumam ser sensĂ­veis a mudanĂ§as na IV. Se a volatilidade mudar de forma nĂŁo planejada, as "dobras" do seu Origami podem se desfazer antes do tempo, exigindo ajuste.', cor: 'rose' },
      { titulo: 'Erro de ExecuĂ§ĂŁo (Slippage)', resultado: 'Risco Operacional', descricao: 'O maior perigo nĂŁo ĂŠ o mercado, mas a montagem. Se uma perna for executada num preĂ§o errado, todo o equilĂ­brio matemĂĄtico da estrutura ĂŠ comprometido.', cor: 'rose' }
    ],
    manejo: [

      { condicao: 'Atingiu o lucro alvo em uma das pernas isoladas', acao: 'Avaliar se compensa "desmontar o Origami" por partes ou se a integridade da estrutura depende da permanĂŞncia de todas as pontas atĂŠ o final.' }

    comparativo: 'Versus Estruturas Convencionais: As convencionais sĂŁo como roupas de tamanho Ăşnico; o Origami ĂŠ um terno sob medida. A complexidade nĂŁo garante maior lucro, mas garante maior PRECISĂO. Ă a ferramenta definitiva para quem jĂĄ domina as Gregas e nĂŁo se satisfaz com as limitaĂ§Ăľes das travas simples. Ă onde o trading de opĂ§Ăľes encontra a ciĂŞncia de dados.'

'wheel-leap': {
    analogia: 'A Wheel-LEAP ĂŠ uma variante de alta eficiĂŞncia de capital da tradicional EstratĂŠgia da Roda. Em vez de imobilizar 100% do valor do ativo em dinheiro para garantir a venda de uma PUT (Cash Secured Put), vocĂŞ utiliza uma LEAP PUT (opĂ§ĂŁo de venda de longo prazo) como colateral sintĂŠtico. A LEAP atua como um "piso" de proteĂ§ĂŁo e garantia de margem perante a corretora. Isso permite que vocĂŞ execute os ciclos de renda mensal da Roda (Venda de PUT -> ExercĂ­cio -> Venda Coberta) utilizando apenas uma fraĂ§ĂŁo do capital que seria necessĂĄrio na versĂŁo clĂĄssica, liberando o restante do caixa para outros investimentos.',
    quando_usar: [
      'VocĂŞ jĂĄ domina a EstratĂŠgia da Roda e busca escalar sua operaĂ§ĂŁo com maior eficiĂŞncia financeira (alavancagem controlada).',
      'Existem opĂ§Ăľes de longo prazo (LEAPs) disponĂ­veis com prĂŞmios atrativos e liquidez suficiente para servirem de Ă˘ncora.',
      'Sua corretora permite o uso de opĂ§Ăľes compradas de longo prazo como margem para o lanĂ§amento de opĂ§Ăľes curtas (operaĂ§Ăľes em conta margem).'
    ],
    como_montar: 'CSNA3 estĂĄ cotada a R$ 15,00. Em vez de deixar R$ 1.500,00 parados em conta para garantir a venda de uma PUT no strike R$ 15,00, vocĂŞ COMPRA uma LEAP PUT no strike R$ 15,00 com vencimento para 12 meses (paga R$ 2,50 por aĂ§ĂŁo, ou R$ 250,00). Com a LEAP em custĂłdia, vocĂŞ VENDE a PUT mensal no strike R$ 15,00 (recebe R$ 0,80). O capital efetivamente imobilizado caiu de R$ 1.500,00 para os R$ 250,00 do custo da LEAP, aumentando o seu Retorno sobre Capital (ROC).',
    linha_do_tempo: [
      { dte: 365, titulo: 'Abertura do Colateral Longo', descricao: 'VocĂŞ adquire a LEAP PUT. Ela ĂŠ a sua "Ă˘ncora" de seguranĂ§a e o ativo que permite a alavancagem durante todo o ano, protegendo contra quedas sistĂŞmicas.' },
      { dte: 30, titulo: 'Ciclos de Renda (Motor de Fluxo)', descricao: 'VocĂŞ vende PUTs mensais contra a LEAP. Se a aĂ§ĂŁo subir, vocĂŞ embolsa o prĂŞmio. Se cair, vocĂŞ ĂŠ exercido e passa a fazer Venda Coberta (Covered Call) normalmente, usando a LEAP como proteĂ§ĂŁo.' },
      { dte: 90, titulo: 'GestĂŁo da LEAP', descricao: 'Faltando cerca de 3 meses para o vencimento da LEAP, vocĂŞ deve avaliar a rolagem para o prĂłximo ano para evitar que o decaimento temporal (Theta) acelere na sua perna comprada.' }

      { titulo: 'Queda Acentuada do Ativo', resultado: 'ProteĂ§ĂŁo de Cauda', descricao: 'Diferente da Roda clĂĄssica onde vocĂŞ sofre a queda cheia do papel, aqui a LEAP PUT valoriza e limita o seu prejuĂ­zo total. VocĂŞ possui um seguro ativo que o dinheiro parado em conta nĂŁo ofereceria.', cor: 'emerald' },
      { titulo: 'AĂ§ĂŁo disparou muito acima do Strike', resultado: 'Perda de Valor do Colateral', descricao: 'O valor da sua LEAP PUT comprada derrete. Embora vocĂŞ ganhe nos prĂŞmios das vendas mensais, a estrutura perde eficiĂŞncia como margem, exigindo uma rolagem do strike da LEAP para cima.', cor: 'amber' }

    manejo: [

'delta-hedging': {
    analogia: 'O Delta-Hedging ĂŠ o processo de neutralizaĂ§ĂŁo do risco direcional de uma carteira de opĂ§Ăľes. O objetivo ĂŠ manter o "Delta da PosiĂ§ĂŁo" o mais prĂłximo de zero possĂ­vel (Delta-Neutral). Isso ĂŠ feito comprando ou vendendo o ativo subjacente (aĂ§Ăľes) em quantidades que anulem o Delta das opĂ§Ăľes. Quando vocĂŞ estĂĄ Delta-Neutro, o valor da sua carteira nĂŁo muda com pequenas oscilaĂ§Ăľes no preĂ§o da aĂ§ĂŁo; seu lucro passa a depender exclusivamente do decaimento temporal (Theta) ou de mudanĂ§as na volatilidade (Vega). Ă a ferramenta fundamental para quem deseja "vender tempo" sem apostar em uma direĂ§ĂŁo.',
    quando_usar: [
      'VocĂŞ ĂŠ um lanĂ§ador (vendedor) de opĂ§Ăľes e quer coletar o Theta sem correr o risco de a aĂ§ĂŁo se mover contra vocĂŞ.',
      'OperaĂ§Ăľes de Volatilidade Relativa: vocĂŞ acredita que a Volatilidade Realizada serĂĄ menor que a ImplĂ­cita (IV), independente da direĂ§ĂŁo.',
      'GestĂŁo de grandes posiĂ§Ăľes onde o risco de uma variaĂ§ĂŁo brusca no Delta (causada pelo Gamma) pode gerar prejuĂ­zos superiores ao prĂŞmio coletado.'
    ],
    como_montar: 'CSNA3 estĂĄ a R$ 15,00. VocĂŞ vende 1.000 CALLs no strike R$ 15,00, que possuem um Delta de 0,50 (exposiĂ§ĂŁo equivalente a 500 aĂ§Ăľes). Para neutralizar esse risco, vocĂŞ COMPRA 500 aĂ§Ăľes de CSNA3 no mercado Ă  vista. Agora, se a aĂ§ĂŁo subir R$ 1,00, vocĂŞ ganha R$ 500,00 nas aĂ§Ăľes e perde R$ 500,00 nas opĂ§Ăľes (Delta Zero). Seu lucro real virĂĄ do tempo passando e desvalorizando a opĂ§ĂŁo que vocĂŞ vendeu.',
    linha_do_tempo: [
      { dte: 45, titulo: 'NeutralizaĂ§ĂŁo Inicial', descricao: 'VocĂŞ calcula o Delta total da posiĂ§ĂŁo e executa a compra/venda das aĂ§Ăľes correspondentes para zerar a exposiĂ§ĂŁo direcional.' },
      { dte: 21, titulo: 'Rebalanceamento DinĂ˘mico', descricao: 'Conforme a aĂ§ĂŁo se move, o Delta das opĂ§Ăľes muda (efeito do Gamma). VocĂŞ precisa ajustar sua posiĂ§ĂŁo em aĂ§Ăľes (comprar mais ou vender parte) para retornar ao Delta Zero.' },

      { titulo: 'Mercado Lateral (Sideways)', resultado: 'Lucro de Theta', descricao: 'CenĂĄrio ideal. Como a aĂ§ĂŁo nĂŁo se moveu muito, vocĂŞ precisou de poucos rebalanceamentos. O decaimento temporal das opĂ§Ăľes foi capturado quase integralmente como lucro puro.', cor: 'emerald' },
      { titulo: 'Mercado em TendĂŞncia Forte', resultado: 'Custo de Hedge Elevado', descricao: 'A aĂ§ĂŁo se moveu muito, forĂ§ando constantes ajustes na posiĂ§ĂŁo de aĂ§Ăľes. O custo de "comprar caro e vender barato" nos rebalanceamentos (Gamma Scalping reverso) pode consumir todo o prĂŞmio recebido.', cor: 'amber' },

      { condicao: 'Proximidade do vencimento (Gamma Alto)', acao: 'O Delta muda de forma explosiva perto do vencimento. O manejo torna-se muito caro e arriscado. O ideal ĂŠ encerrar ou rolar a posiĂ§ĂŁo antes da semana do exercĂ­cio.' }
    ],
    comparativo: 'O Delta-Hedging nĂŁo ĂŠ uma estratĂŠgia de aposta, mas uma metodologia de controle de risco. Enquanto um investidor comum "torce" para a aĂ§ĂŁo nĂŁo subir, o Delta-Hedger ajusta sua posiĂ§ĂŁo para que o movimento seja irrelevante. Para o pequeno investidor (PF), o custo de corretagem em rebalanceamentos frequentes costuma inviabilizar a prĂĄtica rigorosa, servindo mais como um conceito para entender o risco das Gregas.'
  },

'rolagem-baixo': {
    analogia: 'A Rolagem para Baixo ĂŠ uma manobra defensiva utilizada quando o preĂ§o da aĂ§ĂŁo cai e se aproxima (ou ultrapassa) o strike da sua PUT vendida. A tĂŠcnica consiste em encerrar a posiĂ§ĂŁo atual (recomprar a opĂ§ĂŁo com prejuĂ­zo) e, simultaneamente, abrir uma nova venda em um strike mais baixo (mais seguro). Para que essa operaĂ§ĂŁo faĂ§a sentido financeiro, ela ĂŠ geralmente combinada com uma "Rolagem para Fora" (extensĂŁo do prazo), garantindo que o prĂŞmio recebido pela nova opĂ§ĂŁo seja superior ao custo de recompra da antiga, gerando um crĂŠdito lĂ­quido e reduzindo o seu preĂ§o de equilĂ­brio (Break-even).',
    quando_usar: [
      'O preĂ§o do ativo caiu e estĂĄ testando o strike da sua PUT vendida, aumentando o risco de exercĂ­cio.',
      'VocĂŞ ainda mantĂŠm o viĂŠs de alta ou neutralidade para o papel no longo prazo e nĂŁo quer ser exercido no preĂ§o atual.',
      'A Volatilidade ImplĂ­cita (IV) estĂĄ alta, o que aumenta o prĂŞmio das opĂ§Ăľes mais distantes e facilita a rolagem com crĂŠdito.'
    ],
    como_montar: 'CSNA3 caiu para R$ 14,50 e sua PUT vendida tem strike R$ 15,00 (vencimento em 5 dias). Passo 1: VocĂŞ recompra a PUT de R$ 15,00 (paga R$ 0,80). Passo 2: VocĂŞ vende uma nova PUT no strike R$ 14,00 para o mĂŞs seguinte (recebe R$ 1,00). Resultado: VocĂŞ baixou o seu risco em R$ 1,00 e ainda recebeu um crĂŠdito lĂ­quido de R$ 0,20 por aĂ§ĂŁo. Regra de Ouro: Se a conta resultar em dĂŠbito (pagar para rolar), a operaĂ§ĂŁo nĂŁo ĂŠ recomendada, pois vocĂŞ estĂĄ aumentando o prejuĂ­zo sem garantia de recuperaĂ§ĂŁo.',
    linha_do_tempo: [
      { dte: 7, titulo: 'Monitoramento do Strike', descricao: 'Faltando pouco para o vencimento e com o strike "no dinheiro" (ITM), a rolagem torna-se necessĂĄria para evitar o exercĂ­cio ou a perda de valor extrĂ­nseco.' },
      { dte: 4, titulo: 'ExecuĂ§ĂŁo da Defesa', descricao: 'Momento ideal para a rolagem. VocĂŞ fecha a sĂŠrie atual e abre a prĂłxima, "comprando tempo" para que o ativo se recupere acima do novo strike.' },
      { dte: 0, titulo: 'Novo Ciclo de ProteĂ§ĂŁo', descricao: 'A posiĂ§ĂŁo antiga foi encerrada. VocĂŞ agora tem uma obrigaĂ§ĂŁo em um patamar mais baixo e seguro, com o caixa reforĂ§ado pelo crĂŠdito da rolagem.' }
    ],
    cenarios: [
      { titulo: 'Rolagem com CrĂŠdito LĂ­quido', resultado: 'Sucesso Defensivo', descricao: 'VocĂŞ conseguiu baixar o strike e colocar mais dinheiro no bolso. Seu novo break-even estĂĄ significativamente mais baixo, aumentando sua margem de seguranĂ§a.', cor: 'emerald' },
      { titulo: 'Rolagem com "Zero a Zero"', resultado: 'AceitĂĄvel', descricao: 'VocĂŞ nĂŁo recebeu crĂŠdito, mas conseguiu baixar o strike sem custo adicional. Ă vĂĄlido para evitar um exercĂ­cio em um preĂ§o que vocĂŞ considera caro.', cor: 'amber' },
      { titulo: 'Rolagem exigindo DĂŠbito', resultado: 'Risco Elevado (Evitar)', descricao: 'O mercado estĂĄ cobrando para vocĂŞ se defender. Isso indica que a queda foi muito brusca ou a IV estĂĄ baixa. Nestes casos, pode ser melhor aceitar o exercĂ­cio ou encerrar a posiĂ§ĂŁo com prejuĂ­zo fixo.', cor: 'rose' }
    ],
    manejo: [
      { condicao: 'AĂ§ĂŁo continua caindo apĂłs a primeira rolagem', acao: 'Repetir o processo (Rolar para baixo e para fora) enquanto for possĂ­vel obter crĂŠdito lĂ­quido. Se o ativo perder os fundamentos, encerre a operaĂ§ĂŁo.' },
      { condicao: 'AĂ§ĂŁo se recupera e ultrapassa o novo strike', acao: 'A nova PUT vendida valoriza (derrete). VocĂŞ pode encerrar antecipadamente com lucro ou aguardar o vencimento para embolsar o prĂŞmio total.' }

    comparativo: 'Versus Rolagem no Tempo: Na rolagem apenas temporal, vocĂŞ mantĂŠm o strike e sĂł ganha tempo. Na Rolagem para Baixo, vocĂŞ prioriza a seguranĂ§a do strike. Para o pequeno investidor, a combinaĂ§ĂŁo dos dois (Baixo + Fora) ĂŠ a ferramenta mais potente para "cozinhar" uma posiĂ§ĂŁo perdedora atĂŠ que ela se torne vencedora.'
  },

'rolagem-cima': {
    analogia: 'A Rolagem para Cima ĂŠ uma manobra de ajuste em posiĂ§Ăľes de Venda Coberta (Covered Call) ou travas de crĂŠdito quando o preĂ§o da aĂ§ĂŁo sobe alĂŠm do esperado. A tĂŠcnica consiste em recomprar a CALL atual (que estĂĄ "No Dinheiro" ou "Dentro do Dinheiro") e vender uma nova CALL em um strike mais alto. O objetivo ĂŠ "liberar" mais espaĂ§o para que a sua aĂ§ĂŁo valorize na carteira, aumentando o seu ganho de capital. Como as CALLs ITM sĂŁo caras para recomprar, essa manobra quase sempre exige uma "Rolagem para Fora" (extensĂŁo do prazo) para que o prĂŞmio da nova opĂ§ĂŁo cubra o custo da anterior, idealmente gerando um crĂŠdito lĂ­quido.',

      'VocĂŞ acredita que a tendĂŞncia de alta vai continuar e o strike antigo ficou "curto" demais para o potencial do papel.',

    linha_do_tempo: [
      { dte: 7, titulo: 'AmeaĂ§a de ExercĂ­cio', descricao: 'A aĂ§ĂŁo estĂĄ acima do strike. O valor extrĂ­nseco da opĂ§ĂŁo vendida estĂĄ sumindo. Ă o momento tĂŠcnico para decidir entre a rolagem ou a entrega das aĂ§Ăľes.' },
      { dte: 3, titulo: 'Subida do Teto', descricao: 'VocĂŞ executa a rolagem. Ao subir o strike, vocĂŞ "destrava" o potencial de lucro da aĂ§ĂŁo que estava limitado pelo strike anterior.' },

      { titulo: 'Rolagem com DĂŠbito Pequeno', resultado: 'AceitĂĄvel', descricao: 'VocĂŞ pagou um pouco para subir o strike. Isso sĂł vale a pena se o aumento no strike (espaĂ§o para alta) for muito superior ao valor pago no dĂŠbito da rolagem.', cor: 'amber' },
      { titulo: 'Rolagem com DĂŠbito Alto', resultado: 'Melhor ser Exercido', descricao: 'Se o mercado cobra caro demais para rolar, aceite o exercĂ­cio. Realize o lucro da venda da aĂ§ĂŁo no strike antigo e procure uma nova oportunidade de entrada ou venda de PUT.', cor: 'rose' }
    ],
    manejo: [

'rolagem-diagonal': {
    analogia: 'A Rolagem Diagonal ĂŠ a manobra defensiva mais flexĂ­vel do arsenal de um trader. Ela consiste em ajustar simultaneamente o strike e o vencimento de uma opĂ§ĂŁo. Em vez de apenas "empurrar" o problema para o mĂŞs seguinte no mesmo preĂ§o, vocĂŞ move a sua obrigaĂ§ĂŁo para um strike mais seguro (mais longe do preĂ§o atual) e compensa o custo dessa mudanĂ§a estendendo o prazo de validade. Ă a estratĂŠgia ideal para quando um ativo sofre um movimento brusco e vocĂŞ precisa de "distĂ˘ncia" e "tempo" para que a tese original se recupere, garantindo que a operaĂ§ĂŁo sempre resulte em um crĂŠdito lĂ­quido.',
    quando_usar: [
      'A opĂ§ĂŁo vendida estĂĄ profundamente "No Dinheiro" (ITM) e uma rolagem apenas de tempo (mesmo strike) nĂŁo gera crĂŠdito.',
      'VocĂŞ precisa de uma margem de seguranĂ§a maior (distanciar o strike) devido a uma mudanĂ§a na volatilidade ou nos fundamentos do ativo.',
      'VocĂŞ deseja reduzir o seu risco direcional (Delta) e o seu risco de aceleraĂ§ĂŁo (Gamma) movendo a operaĂ§ĂŁo para uma sĂŠrie mais longa e um strike fora do dinheiro (OTM).'
    ],
    como_montar: 'CSNA3 desabou para R$ 13,50 e vocĂŞ tem uma PUT vendida no strike R$ 15,00 vencendo em 4 dias. Passo 1: VocĂŞ recompra a PUT de R$ 15,00 (paga R$ 1,60). Passo 2: Em vez de rolar para o strike 15 do mĂŞs seguinte, vocĂŞ vende uma PUT no strike R$ 13,00 para daqui a 60 dias (recebe R$ 1,85). Resultado: VocĂŞ baixou seu strike em R$ 2,00 (ganhou distĂ˘ncia) e ainda recebeu um crĂŠdito lĂ­quido de R$ 0,25 por aĂ§ĂŁo para "esperar" o mercado se acalmar.',
    linha_do_tempo: [
      { dte: 7, titulo: 'AnĂĄlise de Viabilidade', descricao: 'O strike original foi rompido. VocĂŞ testa combinaĂ§Ăľes de novos strikes e novos prazos (30, 60 ou 90 dias) atĂŠ encontrar um ponto que gere crĂŠdito satisfatĂłrio.' },
      { dte: 3, titulo: 'ExecuĂ§ĂŁo da Diagonal', descricao: 'VocĂŞ encerra a sĂŠrie curta e abre a sĂŠrie longa em um patamar de preĂ§o muito mais confortĂĄvel. O seu "Delta" diminui, tornando a posiĂ§ĂŁo menos sensĂ­vel a novas quedas.' },
      { dte: 0, titulo: 'PerĂ­odo de MaturaĂ§ĂŁo', descricao: 'Com mais tempo e um strike melhor, vocĂŞ permite que o decaimento temporal (Theta) da nova opĂ§ĂŁo comece a trabalhar, enquanto aguarda a reversĂŁo do ativo.' }
    ],
    cenarios: [
      { titulo: 'CrĂŠdito LĂ­quido com Melhora de Strike', resultado: 'Defesa Perfeita', descricao: 'VocĂŞ conseguiu se afastar do perigo (melhorou o strike) e ainda aumentou o caixa da operaĂ§ĂŁo. A probabilidade de lucro (POP) da nova posiĂ§ĂŁo ĂŠ muito maior que a anterior.', cor: 'emerald' },
      { titulo: 'Rolagem com DĂŠbito (Erro TĂŠcnico)', resultado: 'NĂŁo Executar', descricao: 'Se a combinaĂ§ĂŁo de tempo e strike exigir que vocĂŞ tire dinheiro do bolso, a diagonal perde sua funĂ§ĂŁo defensiva. Procure um strike mais prĂłximo ou um prazo ainda mais longo para garantir o crĂŠdito.', cor: 'rose' },
      { titulo: 'Ativo continua caindo apĂłs a Diagonal', resultado: 'Nova Rolagem ou ExercĂ­cio', descricao: 'Mesmo com a diagonal, o risco de queda persiste. Se o novo strike for testado, vocĂŞ terĂĄ que decidir entre uma nova diagonal para um prazo ainda maior ou aceitar a compra definitiva do ativo.', cor: 'amber' }
    ],
    manejo: [
      { condicao: 'O ativo volta a subir antes do esperado', acao: 'A nova PUT vendida (de longo prazo) desvalorizarĂĄ. VocĂŞ pode encerrar a posiĂ§ĂŁo antecipadamente com lucro, sem precisar esperar os 60 dias totais do novo vencimento.' },
      { condicao: 'DistorĂ§ĂŁo de IV entre os vencimentos', acao: 'Aproveite momentos em que a volatilidade curta estĂĄ muito alta para rolar para uma sĂŠrie longa onde a IV estĂĄ menor (comprando Vega barato e vendendo Vega caro).' }

    comparativo: 'Versus Rolagem Horizontal (Tempo): A horizontal apenas adia o problema no mesmo preĂ§o. A Diagonal resolve o problema do preĂ§o usando o tempo como moeda de troca. Ă a manobra mais resiliente para gerenciar "caudas" de mercado e evitar exercĂ­cios indesejados em momentos de pĂ˘nico.'
  },

'conversao': {
    analogia: 'A ConversĂŁo Defensiva ĂŠ a manobra de transformar uma posiĂ§ĂŁo de venda a descoberto (nua) em uma estrutura travada (spread). Quando uma PUT vendida ĂŠ testada pela queda do ativo, o operador compra uma PUT de strike mais baixo para limitar o risco de cauda. Tecnicamente, vocĂŞ converte uma obrigaĂ§ĂŁo de compra aberta em um Bull Put Spread. O objetivo nĂŁo ĂŠ necessariamente transformar o prejuĂ­zo em lucro imediato, mas sim "comprar tranquilidade", eliminando a possibilidade de uma perda catastrĂłfica e definindo com precisĂŁo o seu prejuĂ­zo mĂĄximo (Max Loss) para o vencimento.',

    linha_do_tempo: [
      { dte: 15, titulo: 'IdentificaĂ§ĂŁo do Risco', descricao: 'O ativo rompe suportes tĂŠcnicos. O Delta da PUT vendida aumenta agressivamente. Ă o momento de decidir entre fechar com prejuĂ­zo ou travar a posiĂ§ĂŁo.' },
      { dte: 14, titulo: 'ExecuĂ§ĂŁo da Trava', descricao: 'Compra-se a PUT de proteĂ§ĂŁo (asa inferior). A margem de garantia exigida pela corretora cai imediatamente, pois o risco agora ĂŠ limitado.' },
      { dte: 0,  titulo: 'ExposiĂ§ĂŁo Controlada', descricao: 'No vencimento, se a aĂ§ĂŁo estiver acima de R$ 15,00, vocĂŞ ainda fica com o lucro remanescente. Se estiver abaixo de R$ 13,00, vocĂŞ entrega o prejuĂ­zo mĂĄximo e preserva o resto do seu capital.' }
    ],
    cenarios: [

      { titulo: 'Queda para R$ 10,00 (Crash)', resultado: 'PrejuĂ­zo Travado', descricao: 'Sem a conversĂŁo, vocĂŞ estaria perdendo R$ 5,00 por aĂ§ĂŁo. Com a trava, sua perda parou nos R$ 1,55. A estratĂŠgia cumpriu sua funĂ§ĂŁo de "cinto de seguranĂ§a".', cor: 'amber' },
      { titulo: 'AĂ§ĂŁo lateral em R$ 14,00', resultado: 'PrejuĂ­zo Parcial', descricao: 'VocĂŞ ĂŠ exercido na venda de 15, mas a PUT de 13 ainda tem valor. O resultado ĂŠ negativo, mas controlado dentro do gerenciamento de risco.', cor: 'rose' }
    ],

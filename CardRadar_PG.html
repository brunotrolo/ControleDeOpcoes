<script>
window.CardRadarPG = Object.assign({}, window.CardRadar, {
  methods: Object.assign({}, window.CardRadar.methods, {
    pgConicPl: function(pv) {
      var a = Math.max(0, Math.min(100, pv.pctLucro     || 0));
      var b = Math.max(0, Math.min(100 - a, pv.pctBreakeven || 0));
      return 'conic-gradient(var(--brand-emerald) 0% ' + a + '%, var(--brand-amber) ' + a + '% ' + (a+b) + '%, var(--brand-rose) ' + (a+b) + '% 100%)';
    },
    pgConicMoney: function(mv) {
      var a = Math.max(0, Math.min(100, (mv[0] && mv[0].pct) || 0));
      var b = Math.max(0, Math.min(100 - a, (mv[1] && mv[1].pct) || 0));
      return 'conic-gradient(var(--brand-emerald) 0% ' + a + '%, var(--brand-amber) ' + a + '% ' + (a+b) + '%, var(--brand-rose) ' + (a+b) + '% 100%)';
    }
  }),
  template: `
<div style="width:100%;font-family:'Plus Jakarta Sans',sans-serif;">

  <!-- DRAWER LATERAL -->
  <transition name="radar-drawer">
    <div v-if="drawer.aberto" class="pg-drawer" style="display:flex;flex-direction:column;gap:12px;">
      <!-- header drawer -->
      <div class="pg-drawer-h">
        <div>
          <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);">{{ drawer.grupoLabel }}</div>
          <div style="font-size:17px;font-weight:800;color:var(--text-primary);margin-top:2px;">{{ drawer.titulo }}</div>
        </div>
        <button @click="fecharDrawer" style="background:var(--surface-overlay);border:1px solid var(--border-subtle);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--text-tertiary);font-size:16px;line-height:1;">✕</button>
      </div>
      <!-- strip totais -->
      <div class="pg-drawer-strip">
        <div class="s"><div class="l">Posições</div><div class="v">{{ drawer.ops.length }}</div></div>
        <div class="s"><div class="l">Nocional</div><div class="v" style="font-size:13px;">{{ fmtK(somaDrawer('nocional')) }}</div></div>
        <div class="s"><div class="l">P/L Aberto</div><div class="v" :class="somaDrawer('plTotalValor') >= 0 ? 'pg-pos' : 'pg-neg'" style="font-size:13px;">{{ fmt('plTotalValor', somaDrawer('plTotalValor')) }}</div></div>
      </div>
      <!-- lista de posições -->
      <div v-for="op in drawer.ops" :key="op.simboloOpcao || op.tickerAtivo"
        class="pg-poscard" :class="drawerCardBorder(op)" style="margin-bottom:8px;flex:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:17px;font-weight:800;color:var(--text-primary);">{{ op.tickerAtivo }}</span>
          <div style="display:flex;gap:5px;flex-wrap:wrap;">
            <span class="pg-chip" :class="(op.tipoOpcao||'').toUpperCase()==='PUT' ? 'amber' : 'red'" style="font-size:10px;">
              {{ (op.direcaoTrade||'V')[0].toUpperCase() }} · {{ op.tipoOpcao }}
            </span>
            <span class="pg-chip" :class="(op.moneynessCode||'').toUpperCase().includes('OTM') ? 'green' : (op.moneynessCode||'').toUpperCase().includes('ITM') ? 'red' : 'amber'" style="font-size:10px;">
              {{ op.moneynessCode || '--' }}
            </span>
          </div>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">
          {{ op.simboloOpcao }} · {{ op.quantidade }} · {{ op.dteCorridos || '--' }}d
        </div>
        <div class="pg-pc-grid">
          <div class="b"><div class="l">Prêmio PM</div><div class="v">{{ fmt('premioMedio', op.premioMedio) }}</div></div>
          <div class="b"><div class="l">Atual</div><div class="v">{{ fmt('premioAtual', op.premioAtual) }}</div></div>
          <div class="b"><div class="l">Break-Even</div><div class="v">{{ fmt('premioMedio', drawerBreakEven(op)) }}</div></div>
          <div class="b"><div class="l">Ganho Máx</div><div class="v pg-pos">{{ fmtK(op.ganhoMaximo) }}</div></div>
          <div class="b"><div class="l">Delta</div><div class="v" style="color:var(--brand-indigo);">{{ op.delta != null ? parseFloat(op.delta).toFixed(4).replace('.',',') : '--' }}</div></div>
          <div class="b"><div class="l">Nocional</div><div class="v">{{ fmtK(op.nocional) }}</div></div>
        </div>
        <div class="pg-pc-foot">
          <div>
            <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);">P/L Aberto</div>
            <div style="font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;" :class="parseFloat(op.plTotalValor) >= 0 ? 'pg-pos' : 'pg-neg'">
              {{ fmt('plTotalValor', op.plTotalValor) }}
              <span style="font-size:11px;opacity:.7;">({{ fmt('plTotalPct', op.plTotalPct) }})</span>
            </div>
          </div>
          <div style="font-size:20px;">{{ parseFloat(op.plTotalValor) >= 0 ? '✅' : '🚨' }}</div>
        </div>
      </div>
    </div>
  </transition>
  <div v-if="drawer.aberto" class="pg-drawer-ov" @click="fecharDrawer"></div>

  <!-- CARD PRINCIPAL -->
  <div class="pg-card lead-cyan">

    <!-- Cabeçalho -->
    <div class="pg-card-h">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="pg-card-icon">📡</div>
        <div>
          <h2>Radar do Portfólio</h2>
          <div class="pg-hint">Clique numa linha para ver as posições do ciclo</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <span class="pg-chip green">OTM <b>{{ (moneynessVisoes[0] && moneynessVisoes[0].count) || 0 }}</b></span>
        <span class="pg-chip amber">ATM <b>{{ (moneynessVisoes[1] && moneynessVisoes[1].count) || 0 }}</b></span>
        <span class="pg-chip red">ITM <b>{{ (moneynessVisoes[2] && moneynessVisoes[2].count) || 0 }}</b></span>
      </div>
    </div>

    <!-- Empty state -->
    <div v-if="!operacoes.length" style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">
      Nenhuma operação ativa
    </div>

    <!-- Tabela de ciclos -->
    <div v-else>
      <div class="pg-scroll-x" style="margin-bottom:16px;">
        <table class="pg-tbl">
          <thead><tr>
            <th>Ciclo</th>
            <th>Nocional</th>
            <th class="num">OTM</th>
            <th class="num">ATM</th>
            <th class="num">ITM</th>
            <th class="num">P/L Aberto</th>
          </tr></thead>
          <tbody>
            <tr v-for="cv in cicloVisoes" :key="cv.chave"
              @click="abrirDrawer('ciclo', cv.chave, cv.label)"
              style="cursor:pointer;">
              <td>
                <span class="pg-chip violet" style="font-size:10px;">{{ cv.label }}</span>
              </td>
              <td>
                <div style="font-size:11.5px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text-primary);">
                  {{ fmtK(cv.nocional) }} <span style="font-size:10px;color:var(--text-muted);">{{ cv.count }}p</span>
                </div>
                <div class="pg-bar"><span class="pg-bar-fill" :style="'width:'+cv.pctNoc+'%'"></span></div>
              </td>
              <td class="num pg-pos" style="font-size:12px;">
                <span v-if="cv.OTM && cv.OTM.count">{{ cv.OTM.count }}p</span>
                <span v-else style="color:var(--text-muted);">—</span>
              </td>
              <td class="num pg-warn" style="font-size:12px;">
                <span v-if="cv.ATM && cv.ATM.count">{{ cv.ATM.count }}p</span>
                <span v-else style="color:var(--text-muted);">—</span>
              </td>
              <td class="num pg-neg" style="font-size:12px;">
                <span v-if="cv.ITM && cv.ITM.count">{{ cv.ITM.count }}p</span>
                <span v-else style="color:var(--text-muted);">—</span>
              </td>
              <td class="num" :class="(cv.pl || 0) >= 0 ? 'pg-pos' : 'pg-neg'" style="font-size:12px;font-weight:700;">
                {{ fmt('plTotalValor', cv.pl || 0) }}
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Anéis P/L + Moneyness -->
      <div class="pg-rings">
        <div class="pg-gauge">
          <div class="pg-ring" :style="'background:'+pgConicPl(plVisao)">
            <span>{{ plVisao.pctLucro }}%</span>
          </div>
          <div>
            <div class="pg-ring-label">Lucro · Neutro · Prejuízo</div>
            <div class="pg-ring-desc">
              <span class="pg-pos">{{ plVisao.lucro }}</span> em lucro ·
              <span class="pg-warn">{{ plVisao.breakeven }}</span> neutro ·
              <span class="pg-neg">{{ plVisao.prejuizo }}</span> no vermelho
            </div>
          </div>
        </div>
        <div class="pg-gauge" v-if="moneynessVisoes && moneynessVisoes.length">
          <div class="pg-ring" :style="'background:'+pgConicMoney(moneynessVisoes)">
            <span>{{ (moneynessVisoes[0] && moneynessVisoes[0].pct) || 0 }}%</span>
          </div>
          <div>
            <div class="pg-ring-label">Distribuição Moneyness</div>
            <div class="pg-ring-desc">
              <span class="pg-pos">{{ (moneynessVisoes[0] && moneynessVisoes[0].pct) || 0 }}%</span> OTM ·
              <span class="pg-warn">{{ (moneynessVisoes[1] && moneynessVisoes[1].pct) || 0 }}%</span> ATM ·
              <span class="pg-neg">{{ (moneynessVisoes[2] && moneynessVisoes[2].pct) || 0 }}%</span> ITM
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
  `
});
</script>

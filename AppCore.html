<script>
// ============================================================================
// APPCORE - MAESTRO V6 (NUCLEO DE ORQUESTRACAO, ESTADO E UI)
//
// CHANGELOG V6 — 3 correcoes de performance aplicadas:
//
// [C1] cuboOlap vira computed memoizado
//      Antes: ref manual recalculado 2x (Fase1 + Fase2) e em qualquer
//             mudanca de db. Agora: computed que so roda quando db.value
//             muda de fato. Elimina processamento duplicado do Agregador.
//
// [C2] ativosDaHome vira computed memoizado
//      Antes: forEach dentro de getComponentProps, rodava a cada render
//             cycle (timerVisual--, isLoading, qualquer ref). Agora:
//             computed separado, memoizado, usando Set para O(1) lookup.
//
// [C3] lucide centralizado com debounce de 50ms
//      Antes: createIcons() chamado em navigate(), toggleSidebar(),
//             onMounted() e em cada mounted()/updated() dos componentes.
//             Multiplas varreduras do DOM inteiro por navegacao.
//      Agora: unico ponto de chamada — refreshIcons() com debounce.
//             Componentes individuais DEVEM remover suas chamadas diretas.
// ============================================================================

const { createApp, ref, shallowRef, computed, onMounted, onBeforeUnmount, provide, watch } = Vue;

const app = createApp({
  setup() {
    // ====================================================================
    // 1. ESTADO GLOBAL REATIVO (Single Source of Truth)
    // ====================================================================
    const db = shallowRef({
      cockpit:          [],
      resumoGerencial:  { timestamp: '--:--' },
      configGlobal:     {},
      dadosAtivos:      [],
      dadosTendencia:   [],
      necton:           [],
      calcGreeks:       []
    });

    // [C1] cuboOlap como computed memoizado.
    // So recalcula quando db.value muda — nao quando timerVisual,
    // isLoading ou qualquer outro ref de UI sofre update.
    // O spread {...} foi removido: o Agregador ja retorna objeto novo.
    const cuboOlap = computed(() => {
      if (!db.value.cockpit || !db.value.cockpit.length) {
        return window.Agregador ? window.Agregador._gerarCuboVazio() : {};
      }
      return window.Agregador
        ? window.Agregador.processarSumario(db.value)
        : {};
    });

    const isLoading      = ref(true);
    const hasError       = ref(false);
    const errorMessage   = ref('');
    const lastSync       = ref('');
    const status         = ref('Iniciando...');

    // ====================================================================
    // 2. ROTEAMENTO E MENU
    // ====================================================================
    const currentView  = ref('cockpit');
    const isCollapsed  = ref(true);
    const modalCalcBS  = ref(false);
    const menu         = ref(window.APP_MENU || []);

    const currentMenuLabel = computed(() => {
      const item = menu.value.find(
        m => String(m.id).toLowerCase() === String(currentView.value).toLowerCase()
      );
      return item ? item.label : 'Dashboard';
    });

    const currentLayout = computed(() => {
      const map  = window.LAYOUT_MAP || {};
      const view = String(currentView.value).toLowerCase();
      return map[view] || [];
    });

    // [C3] Motor centralizado de refresh de icones com debounce.
    // Elimina multiplas varreduras do DOM por navegacao.
    // Todos os setTimeout(() => lucide.createIcons()) do codigo
    // original foram substituidos por refreshIcons().
    let _lucideTimer = null;
    const refreshIcons = () => {
      clearTimeout(_lucideTimer);
      _lucideTimer = setTimeout(() => {
        if (window.lucide) window.lucide.createIcons();
      }, 50);
    };

    // Expoe globalmente para que componentes individuais possam
    // chamar window.refreshIcons() em vez de window.lucide.createIcons().
    // Componentes devem REMOVER chamadas diretas em mounted()/updated().
    window.refreshIcons = refreshIcons;

    const toggleSidebar = () => {
      isCollapsed.value = !isCollapsed.value;
      // [C3] Aguarda transicao de 310ms antes de redesenhar icones.
      // Tempo mantido do original para nao cortar a animacao da sidebar.
      setTimeout(refreshIcons, 310);
    };

    const navigate = (viewName) => {
      var itemMenu = (menu.value || []).find(function(m) { return m.id === viewName; });
      if (itemMenu && itemMenu.modal) {
        if (viewName === 'calc-bs') { modalCalcBS.value = true; }
        if (isMobile.value) isCollapsed.value = true;
        // [C3] Uma unica chamada debounced no lugar de setTimeout direto.
        refreshIcons();
        return;
      }
      currentView.value = viewName;
      if (isMobile.value) isCollapsed.value = true;
      // [C3] Debounce garante no maximo 1 varredura por navegacao,
      // independente de quantos watchers/hooks tambem chamem refreshIcons.
      refreshIcons();
    };

    const dynamicSummaryData = computed(() => {
      // [C1] Agora lemos cuboOlap.value diretamente — e um computed,
      // entao Vue ja sabe rastrear a dependencia corretamente.
      const s     = cuboOlap.value.resumoGlobal || {};
      const lista = cuboOlap.value.listaAtivas  || [];

      const ivMedio = (() => {
        const comIV = lista.filter(op => parseFloat(op.ivAtual || 0) > 0);
        if (!comIV.length) return 0;
        const somaIV = comIV.reduce((acc, op) => acc + parseFloat(op.ivAtual || 0), 0);
        return somaIV / comIV.length;
      })();

      return [
        { key: 'PL_TOTAL_PCT', label: 'P/L %',    value: s.plTotalPct   || 0, type: 'percentage', active: true },
        { key: 'PL_TOTAL',     label: 'P/L Total', value: s.plTotalValor || 0, type: 'currency',   active: true },
        { key: 'NOCIONAL',     label: 'Nocional',  value: s.nocional     || 0, type: 'currency',   active: true },
        { key: 'THETA',        label: 'Theta',     value: s.theta        || 0, type: 'currency',   active: true },
        { key: 'IV_CURRENT',   label: 'IV Medio',  value: ivMedio,             type: 'percentage', active: true }
      ];
    });

    // ====================================================================
    // 3. SENSOR MOBILE E FATIAMENTO
    // ====================================================================
    const isMobile = ref(false);

    const checkMobileStatus = () => {
      const userAgent        = navigator.userAgent || navigator.vendor || window.opera;
      const isMobileHardware = /android|ipad|iphone|ipod/i.test(userAgent.toLowerCase());
      const isSmallScreen    = window.innerWidth <= 1024;
      isMobile.value = isMobileHardware || isSmallScreen;
      if (isMobile.value) isCollapsed.value = true;
    };

    checkMobileStatus();

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(checkMobileStatus, 150);
    });

    const topGridComponents = computed(() => {
      if (!isMobile.value) return currentLayout.value;
      const config = window.MOBILE_ORCHESTRATOR_CONFIG || { sequence: [] };
      const seqIds = config.sequence.map(s => s.id);
      if (!seqIds.length) return currentLayout.value;
      const idx = currentLayout.value.findIndex(c => seqIds.includes(c.id));
      return idx === -1 ? currentLayout.value : currentLayout.value.slice(0, idx);
    });

    const mobileCarouselComponents = computed(() => {
      if (!isMobile.value) return [];
      const config = window.MOBILE_ORCHESTRATOR_CONFIG || { sequence: [] };
      const seqIds = config.sequence.map(s => s.id);
      if (!seqIds.length) return [];
      return currentLayout.value.filter(c => seqIds.includes(c.id));
    });

    const bottomGridComponents = computed(() => {
      if (!isMobile.value) return [];
      const config = window.MOBILE_ORCHESTRATOR_CONFIG || { sequence: [] };
      const seqIds = config.sequence.map(s => s.id);
      if (!seqIds.length) return [];
      const idx = currentLayout.value.findIndex(c => seqIds.includes(c.id));
      if (idx === -1) return [];
      return currentLayout.value.slice(idx).filter(c => !seqIds.includes(c.id));
    });

    const getMobileLayoutZones = computed(() => {
      return window.LayoutConfig && window.LayoutConfig.MOBILE_ORCHESTRATOR_CONFIG
        ? window.LayoutConfig.MOBILE_ORCHESTRATOR_CONFIG
        : { top: [], carousel: [], bottom: [] };
    });

    // ====================================================================
    // 4. POLLING E SYNC
    // ====================================================================
    const timerVisual       = ref(300);
    const isOrquestrando    = ref(false);
    const isAutoSyncEnabled = ref(false);
    let pollingInterval     = null;

    const toggleAutoSync = () => {
      isAutoSyncEnabled.value = !isAutoSyncEnabled.value;
      if (isAutoSyncEnabled.value) timerVisual.value = 300;
    };

    const formatCountdown = computed(() => {
      const m = Math.floor(timerVisual.value / 60).toString().padStart(2, '0');
      const s = (timerVisual.value % 60).toString().padStart(2, '0');
      return m + ':' + s;
    });

    const iniciarMotorRelogio = () => {
      if (pollingInterval) clearInterval(pollingInterval);
      pollingInterval = setInterval(() => {
        if (isAutoSyncEnabled.value && !isLoading.value) {
          if (timerVisual.value > 0) {
            timerVisual.value--;
          } else {
            timerVisual.value = 300;
            sincronizarDashboard();
          }
        }
      }, 1000);
    };

    // ====================================================================
    // 5. MOTOR DE SINCRONIZACAO EM ESTAGIOS (LAZY FETCHING)
    // ====================================================================
    const tempoCarga = ref('');

    const handleFailure = (err) => {
      console.error('[APP_CORE] Erro na Sincronizacao:', err);
      hasError.value     = true;
      errorMessage.value = String(err);
      isLoading.value    = false;
      status.value       = 'Falha na Sincronizacao';
      const st = document.getElementById('debug-status');
      if (st) st.innerText = 'Erro: ' + err;
    };

    // --- FASE 2: CARGA PESADA (Background) ---
    let _abasPesadasEmVoo = false;
    const carregarAbasPesadas = () => {
      if (_abasPesadasEmVoo) return;
      _abasPesadasEmVoo = true;
      const st = document.getElementById('debug-status');
      if (st) st.innerText = 'Baixando dados tecnicos (Background)...';

      const _timeoutFase2 = setTimeout(() => { _abasPesadasEmVoo = false; }, 60000);

      google.script.run
        .withSuccessHandler((response) => {
          clearTimeout(_timeoutFase2);
          if (!response || !response.success) {
            _abasPesadasEmVoo = false;
            return;
          }
          try {
            const dadosTraduzidos = window.Tradutor.processarBancoCompleto(response.raw);

            const cockpitBruto  = db.value.cockpit       || [];
            const dadosTecnicos = db.value.dadosTendencia || [];

            const cockpitEnriquecido = cockpitBruto.map(op => {
              const ticker = String(op.tickerAtivo || '').trim().toUpperCase();
              const infoTecnica = dadosTecnicos.find(t =>
                String(t.tickerAtivo || '').trim().toUpperCase() === ticker && ticker !== ''
              ) || {};
              return Object.assign({}, op, infoTecnica);
            });

            // [C1] Atribuimos o novo db — o computed cuboOlap recalcula
            // automaticamente apos essa mudanca, sem necessidade de
            // chamar Agregador.processarSumario() manualmente aqui.
            db.value = Object.assign({}, db.value, {
              dadosAtivos:    dadosTraduzidos.dadosAtivos    || [],
              logs:           dadosTraduzidos.logs            || [],
              calcGreeks:     dadosTraduzidos.calcGreeks      || [],
              dadosGreeks:    dadosTraduzidos.dadosGreeks     || [],
              necton:         dadosTraduzidos.necton          || [],
              detalhes:       dadosTraduzidos.detalhes        || [],
              cockpit:        cockpitEnriquecido,
              raw:            Object.assign({}, db.value.raw || {}, response.raw || {})
            });

            lastSync.value = new Date().toLocaleTimeString();
            if (st) st.innerText = 'Sistema Nominal (100% Carregado)';

          } catch (err) {
            console.error('[APP_CORE] Erro no processamento background:', err);
          } finally {
            _abasPesadasEmVoo = false;
          }
        })
        .withFailureHandler(() => { clearTimeout(_timeoutFase2); _abasPesadasEmVoo = false; })
        .getAbasPesadas();
    };

    // --- FASE 1: VOO RAPIDO ---
    const sincronizarDashboard = () => {
      isLoading.value = true;
      status.value    = 'Conectando...';

      const tempoInicio = performance.now();
      const st = document.getElementById('debug-status');
      if (st) st.innerText = 'Aguardando Cockpit...';

      const _timeoutFase1 = setTimeout(() => handleFailure('Timeout: GAS não respondeu em 30s'), 30000);

      google.script.run
        .withSuccessHandler((response) => {
          clearTimeout(_timeoutFase1);
          const tempoBackend = performance.now();
          const msBackend    = tempoBackend - tempoInicio;

          if (!response || !response.success) return handleFailure('Falha na API');

          try {
            if (st) st.innerText = 'Cockpit Recebido (' + (msBackend / 1000).toFixed(1) + 's). Renderizando...';

            const dadosTraduzidos = window.Tradutor.processarBancoCompleto(response.raw);

            const cockpitExpresso = (dadosTraduzidos.cockpit || []).map(op =>
              Object.assign({}, op, {
                tickerAtivo: String(op.tickerAtivo || '').trim().toUpperCase()
              })
            );

            const rawConfig   = response.raw['CONFIG_GLOBAL'] || response.raw['Config_Global'] || [];
            const configArray = rawConfig.slice(1)
              .filter(row => row[0])
              .map(row => ({ CHAVE: row[0], VALOR: row[1] }));

            // [C1] Atribuimos db — cuboOlap computed recalcula sozinho.
            // Nao ha mais chamada manual a Agregador.processarSumario() aqui.
            db.value = Object.assign({}, db.value, dadosTraduzidos, {
              cockpit:           cockpitExpresso,
              configGlobal:      dadosTraduzidos.configGlobal    || {},
              configGlobalArray: configArray,
              resumoGerencial:   dadosTraduzidos.resumoGerencial || { timestamp: new Date().toLocaleString() },
              raw:               Object.assign({}, db.value.raw || {}, dadosTraduzidos.raw || {})
            });

            const tempoFim   = performance.now();
            const msFrontend = tempoFim - tempoBackend;
            const msTotal    = tempoFim - tempoInicio;

            tempoCarga.value = (msTotal / 1000).toFixed(2) + 's (GAS: ' +
                               (msBackend / 1000).toFixed(2) + 's | CPU: ' +
                               (msFrontend / 1000).toFixed(2) + 's)';

            lastSync.value  = new Date().toLocaleTimeString();
            status.value    = 'Online';
            isLoading.value = false;

            if (st) st.innerText = tempoCarga.value;

            setTimeout(carregarAbasPesadas, 500);

          } catch (err) {
            console.error('[APP_CORE] Erro no Processamento Expresso:', err);
            handleFailure(err.message);
          }
        })
        .withFailureHandler((err) => { clearTimeout(_timeoutFase1); handleFailure(err); })
        .getDadosLight();
    };

    // ====================================================================
    // 6. DISPENSADOR DE PROPS (Dependency Injection V6)
    // ====================================================================

    // [C2] ativosDaHome como computed memoizado.
    // Antes: forEach dentro de getComponentProps rodava em CADA render,
    // inclusive a cada tick do timerVisual (1x por segundo).
    // Agora: so recalcula quando db.value.cockpit muda de fato.
    // Set garante lookup O(1) para deduplicacao de tickers.
    const ativosDaHome = computed(() => {
      const vistos = new Set();
      const lista  = db.value.cockpit || [];
      const result = [];
      for (var i = 0; i < lista.length; i++) {
        var op = lista[i];
        var t  = String(op.tickerAtivo || '').trim().toUpperCase();
        if (t && t !== '---' && !vistos.has(t)) {
          vistos.add(t);
          result.push({ tickerAtivo: t, spotPrice: op.spotPrice || 0 });
        }
      }
      return result;
    });

    // getComponentProps agora e uma funcao pura — nao faz mais loops
    // sobre cockpit. Apenas monta o objeto de props usando computeds
    // ja calculados (ativosDaHome, cuboOlap).
    const getComponentProps = (compConfig) => {
      const baseProps = {
        isMobile:      isMobile.value,
        isLoading:     isLoading.value,
        lastSync:      lastSync.value,
        configGlobais: db.value.configGlobal || {}
      };
      if (compConfig.props) {
        Object.assign(baseProps, compConfig.props);
      }

      const customProps = {
        // =========================================================
        // 0. INFRAESTRUTURA & NAVEGACAO
        // =========================================================
        'menu-sidebar': {
          menu:        menu.value,
          currentView: currentView.value,
          isCollapsed: isCollapsed.value,
          isMobile:    isMobile.value,
          lastSync:    lastSync.value,
          isLoading:   isLoading.value
        },

        // =========================================================
        // 1. HOME & COCKPIT
        // =========================================================
        // 'card-ticker-tape': { ativos: ativosDaHome.value },
        'card-radar':       { statsPreCalculados: cuboOlap.value, isMobile: isMobile.value },
        'card-notional':    { statsPreCalculados: cuboOlap.value, configGlobais: db.value.configGlobal || {}, isMobile: isMobile.value },
        'card-strategies-book': { statsPreCalculados: cuboOlap.value, isMobile: isMobile.value },
        'card-vencimentos':     { statsPreCalculados: cuboOlap.value, isMobile: isMobile.value },
        'card-dashboard':       { statsPreCalculados: cuboOlap.value, isMobile: isMobile.value },
        'card-decisao':         { statsPreCalculados: cuboOlap.value },
        'card-carousel-ativas': { statsPreCalculados: cuboOlap.value },
        'card-table':           { statsPreCalculados: cuboOlap.value },

        // =========================================================
        // 2. ANALISE & GESTAO
        // =========================================================
        'comparativo-view': { db: db.value },

        // =========================================================
        // 3. COCKPIT SUMMARY
        // =========================================================
        'card-summary': { cockpit: db.value.cockpit || [] },

        // =========================================================
        // 5. FERRAMENTAS
        // =========================================================
        'necton-import':   { data:      db.value.necton || [] },
        'automation-view': { logs:      db.value.logs   || [] },
        'wheel-manager':   { dadosWheel: cuboOlap.value.custodiaWheel || [] },
        'bancodedados-view': { dbRaw: db.value.raw || {}, isLoading: isLoading.value },
        'settings-view':   { configItems: db.value.configGlobalArray || [], isMobile: isMobile.value, isLoading: isLoading.value }
      };

      return Object.assign({}, baseProps, customProps[compConfig.component] || {});
    };

    provide('getComponentProps', getComponentProps);

    // ====================================================================
    // 7. INICIALIZACAO
    // ====================================================================
    onMounted(() => {
      sincronizarDashboard();
      iniciarMotorRelogio();

      // [C3] Unica chamada a refreshIcons no boot — debounce garante
      // que nao duplica com o refreshIcons chamado dentro de navigate().
      refreshIcons();
    });

    onBeforeUnmount(() => {
      if (pollingInterval) clearInterval(pollingInterval);
    });

    // ====================================================================
    // 8. EXPOSICAO PARA O TEMPLATE
    // ====================================================================
    return {
      // ESTADO E DADOS
      db, cuboOlap, isLoading, status, hasError, errorMessage, lastSync, tempoCarga,

      // NAVEGACAO E LAYOUT
      currentView, navigate, isCollapsed, toggleSidebar, isMobile, modalCalcBS,
      menu, currentMenuLabel, currentLayout, dynamicSummaryData,

      // COMPONENTES DE INTERFACE
      topGridComponents,
      mobileCarouselComponents,
      bottomGridComponents,
      getMobileLayoutZones,

      // LOGICA E SINCRONIZACAO
      getComponentProps,
      handleRefresh:       () => sincronizarDashboard(),
      timerVisual,
      formatCountdown,
      isOrquestrando,
      isAutoSyncEnabled,
      toggleAutoSync,

      MOBILE_ORCHESTRATOR_CONFIG: window.MOBILE_ORCHESTRATOR_CONFIG || { settings: {} }
    };
  } // fim setup()
}); // fim createApp

// ============================================================================
// REGISTRO DE MICRO FRONT-ENDS E MONTAGEM
// ============================================================================
const COMPONENTES_V6 = [
  // 0. INFRAESTRUTURA & NAVEGACAO
  ['menu-sidebar',           window.MenuSidebar],

  // 1. HOME & COCKPIT
  ['card-radar',             window.CardRadar],
  ['card-notional',          window.CardNotional],
  ['card-strategies-book',   window.CardStrategiesBook],
  ['card-vencimentos',       window.CardVencimentos],
  ['card-decisao',           window.CardDecisao],
  ['card-carousel-ativas',  window.CardCarouselAtivas],
  ['card-table',             window.CardTable],
  ['card-summary',           window.CardSummary],

  // 2. ANALISE & GESTAO
  ['comparativo-view',       window.ComparativoView],

  // 3. FERRAMENTAS
  ['necton-import',          window.NectonImport],
  ['automation-view',        window.AutomationView],
  ['wheel-manager',          window.WheelManager],
  ['log-console',            window.LogConsole],
  ['bancodedados-view',      window.BancoDeDadosView],
  ['oplab-explorer-view',    window.OpLabExplorerView],
  ['settings-view',          window.SettingsView],
  ['calculadora-bs',         window.CalculadoraBS],
  ['academia-opcoes',        window.AcademiaOpcoes]
];

COMPONENTES_V6.forEach(function(par) {
  var name = par[0];
  var comp = par[1];
  if (comp) {
    app.component(name, comp);
  } else {
    console.error(
      '[CRITICO] Falha ao carregar Micro Front-end: <' + name + '>. ' +
      'Verifique se o arquivo HTML esta incluido no Index.'
    );
  }
});

app.mount('#app');
</script>

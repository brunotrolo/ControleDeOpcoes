<template id="automation-view-template">
  <div style="max-width:95%;margin:0 auto;padding-bottom:4rem;padding-top:1.5rem;display:flex;flex-direction:column;gap:2rem;">

    <!-- HEADER -->
    <div class="premium-card" style="padding:1.5rem 2rem;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1.5rem;">
      <div style="display:flex;align-items:center;gap:1.25rem;">
        <div style="padding:0.75rem;background:var(--brand-indigo-light);color:var(--brand-indigo);border-radius:var(--radius-lg);border:1px solid var(--brand-indigo-muted);flex-shrink:0;">
          <i data-lucide="zap" style="width:24px;height:24px;display:block;"></i>
        </div>
        <div>
          <h2 class="t-title" style="color:var(--text-primary);">Automacao</h2>
          <p class="t-label-sm" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:0.2em;margin-top:0.2rem;">Sincroniza, Calcula e Notifica em Cascata</p>
        </div>
      </div>
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
        <button @click="run('executarFluxoSequencial')"
          style="display:flex;align-items:center;gap:0.75rem;background:var(--brand-indigo);border:1px solid var(--brand-indigo);padding:0.75rem 1.5rem;border-radius:var(--radius-full);cursor:pointer;"
          onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
          <i data-lucide="play" style="width:14px;height:14px;color:#fff;fill:#fff;display:block;"></i>
          <span class="t-label-sm" style="font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#fff;">Rodar Fluxo Mestre</span>
        </button>
      </div>
    </div>

    <!-- ACOES -->
    <div class="premium-card" style="padding:0.5rem;">
      <div style="padding:1rem;display:flex;flex-direction:column;">
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border-subtle);">
          <i data-lucide="database" style="width:18px;height:18px;color:var(--text-muted);flex-shrink:0;display:block;"></i>
          <h3 class="t-label-sm" style="font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-tertiary);">Sincronizacao de Dados</h3>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.5rem;">
          <button @click="run('AtualizarNecton_Menu')"      class="auto-btn">1. Atualizar Portfolio (Necton)</button>
          <button @click="run('AtualizarDadosAtivos_Menu')" class="auto-btn">2. Sincronizar Ativos</button>
          <button @click="run('AtualizarDetalhes_Menu')"    class="auto-btn">3. Sincronizar Detalhes de Opcoes</button>
          <button @click="run('AtualizarGregasAPI_Menu')"   class="auto-btn">4a. Gregas (API OPLab)</button>
          <button @click="run('CalcularGregasNativo_Menu')" class="auto-btn">4b. Gregas (Nativo BS)</button>
        </div>
      </div>
    </div>

    <!-- LOG CONSOLE -->
    <div style="margin-top:1rem;">
      <h3 class="t-label-sm" style="font-weight:700;text-transform:uppercase;letter-spacing:0.25em;color:var(--text-muted);margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border-subtle);">
        Monitoramento em Tempo Real
      </h3>
      <log-console :logs="logs" style="width:100%;" @refresh="$emit('refresh')"></log-console>
    </div>

    <!-- OVERLAY DE EXECUCAO -->
    <div v-if="running"
      style="position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;">
      <div class="premium-card" style="padding:2.5rem;text-align:center;max-width:22rem;width:100%;">

        <div v-if="!finished">
          <div style="width:3rem;height:3rem;border:3px solid var(--border-subtle);border-top-color:var(--brand-indigo);border-radius:50%;animation:auto-spin 0.8s linear infinite;margin:0 auto 1.5rem;"></div>
          <h4 class="t-subtitle" style="color:var(--text-primary);margin-bottom:0.75rem;">Processando...</h4>
          <p class="t-body" style="color:var(--text-tertiary);line-height:1.6;">A rotina esta sendo executada no Google Sheets.<br>Aguarde um momento...</p>
        </div>

        <div v-else>
          <div style="width:3rem;height:3rem;background:var(--brand-emerald-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;border:2px solid var(--brand-emerald);">
            <i data-lucide="check" style="width:1.5rem;height:1.5rem;color:var(--brand-emerald);display:block;"></i>
          </div>
          <h4 class="t-subtitle" style="color:var(--brand-emerald);margin-bottom:0.75rem;">Concluido!</h4>
          <p class="t-body" style="color:var(--text-tertiary);line-height:1.6;">A rotina foi finalizada com sucesso.</p>
        </div>

      </div>
    </div>

  </div>
</template>

<style>
  @keyframes auto-spin { to { transform: rotate(360deg); } }

  .auto-btn {
    text-align: left;
    padding: 0.6rem 1rem;
    background: var(--surface-base);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-tertiary);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    width: 100%;
  }
  .auto-btn:hover {
    color: var(--brand-indigo);
    border-color: var(--brand-indigo-muted);
    background: var(--brand-indigo-light);
  }

</style>

<script>
window.AutomationView = {
  template: '#automation-view-template',
  props: ['logs'],
  data() {
    return {
      running:  false,
      finished: false
    };
  },
  mounted() {
    if (window.refreshIcons) window.refreshIcons();
  },
  methods: {
    run(functionName) {
      const self = this;
      self.running  = true;
      self.finished = false;
      google.script.run
        .withSuccessHandler(() => {
          self.finished = true;
          self.$emit('refresh');
          setTimeout(() => { self.running = false; self.finished = false; }, 3000);
        })
        .withFailureHandler((err) => {
          self.running  = false;
          self.finished = false;
          alert('[x] Erro: ' + err);
        })
        [functionName]();
    }
  }
};
</script>

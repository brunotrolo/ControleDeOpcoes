'regra-50': {

    quando_usar: [
      'Em qualquer estrategia de credito (Venda de PUT, Venda Coberta, Trava de Alta com PUT, Iron Condor).',
      'Independentemente de quantos dias faltam para o vencimento. Se bateu a meta no dia seguinte ou semanas depois, a ordem e fechar.',

    ],
    como_montar: 'Voce vendeu uma PUT de CSAN3 e recebeu R$ 1,00 de premio (R$ 100,00 no total). O seu lucro maximo e absoluto nessa operacao e R$ 100,00. Imediatamente apos a venda, voce programa na corretora uma ordem de compra dessa mesma PUT por R$ 0,50. Quando o mercado se mover a seu favor e a ordem for executada, voce embolsa R$ 50,00 liquidos e, o mais importante, zera a sua obrigacao com o mercado.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Entrada com premio maximo', descricao: 'Voce lanca a opcao, recebe R$ 1,00 e ja deixa a ordem de recompra engatilhada a R$ 0,50 (GTC - valida ate cancelar).' },
      { dte: 30, titulo: 'Alvo atingido', descricao: 'A acao subiu ou a volatilidade caiu. A opcao passa a valer R$ 0,50. Sua ordem e executada. Lucro de R$ 0,50 garantido e risco zerado.' },
      { dte: 0,  titulo: 'Vencimento', descricao: 'Se voce aplica esta regra com disciplina matematica, o seu objetivo e raramente chegar ao dia do vencimento com a posicao ainda aberta.' }

    cenarios: [
      { titulo: 'Atingiu 50% em 10 dias', resultado: 'Excelente', descricao: 'A acao disparou a favor da sua posicao. O premio derrete de R$ 1,00 para R$ 0,50 rapidamente. Voce capturou metade do ganho em uma fracao do tempo total. Seu retorno anualizado sobre o capital e altissimo e a margem ja esta livre.', cor: 'emerald' },

    manejo: [

    comparativo: 'Esperar o vencimento para ganhar os R$ 0,50 restantes (os outros 50%) exige que voce deixe o seu capital travado como garantia por mais 30 dias, assumindo o risco de uma noticia repentina reverter a acao contra voce. Fechar com 50% libera seu capital para vender uma nova opcao com um strike mais distante e seguro, coletando um novo premio cheio.'

'regra-21dte': {
    analogia: 'A Regra dos 21 DTE e um mecanismo de defesa matematico contra o "Risco de Gamma". O Gamma e a metrica que mede a aceleracao do preco da opcao. Faltando mais de um mes para o vencimento, uma pequena oscilacao na acao muda pouco o valor da sua opcao vendida. Porem, ao entrar nos ultimos 21 dias, o Gamma "explode". Qualquer pequena variacao de 1% no preco da acao causa uma alteracao violenta e imprevisivel no preco da opcao. A regra diz: encerre ou role a sua posicao antes de entrar nessa zona de turbulencia.',
    quando_usar: [
      'Em toda e qualquer posicao de venda de opcoes (Venda de PUT, Travas, Iron Condor) que atinja a marca de 21 dias para o vencimento.',
      'Sempre que a posicao ainda nao tiver atingido a meta da "Regra dos 50%" de lucro e voce precisar decidir o que fazer com ela.',

    como_montar: 'Voce vendeu uma PUT de CSAN3 faltando 45 dias para o vencimento. Voce nao olha para a operacao todos os dias, mas coloca um alarme no calendario: quando faltarem exatamente 21 dias para o vencimento, voce fara uma revisao obrigatoria. Se a operacao nao deu o lucro esperado ate aqui, voce nao vai arriscar ficar ate o vencimento. Voce fara a "rolagem": recompra a PUT atual e vende uma nova PUT para o vencimento do mes seguinte, restaurando o seu tempo de tela (voltando para 45 dias) e o seu nivel de seguranca.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Entrada ideal', descricao: 'O decaimento do tempo (Theta) e excelente e o risco de aceleracao direcional (Gamma) e baixo. Cenario perfeito para quem vende opcoes.' },
      { dte: 21, titulo: 'Ponto de decisao obrigatorio', descricao: 'A janela de seguranca se fechou. Aqui voce toma uma atitude mecanica: ou fecha a operacao, ou rola para o ciclo seguinte.' },
      { dte: 7,  titulo: 'Zona de perigo extremo', descricao: 'O Gamma atinge o pico. Uma noticia boba no mercado pode transformar uma opcao de R$ 0,10 em R$ 1,50 em minutos, destruindo o lucro de semanas.' },

    cenarios: [
      { titulo: 'Chegou em 21 DTE com 60% de lucro', resultado: 'Fechar', descricao: 'A operacao ja ultrapassou a meta da Regra dos 50%. Feche imediatamente, embolse o lucro e libere sua margem.', cor: 'emerald' },
      { titulo: 'Chegou em 21 DTE com 20% de lucro', resultado: 'Rolar',  descricao: 'A CSAN3 subiu, mas muito devagar. A opcao deu lucro, mas nao bateu a meta e o Gamma vai comecar a ficar perigoso. Solucao: recompre esta opcao, venda a opcao do proximo mes no mesmo strike (ou mais baixo). Voce recebe mais credito e ganha mais 30 dias de tranquilidade.', cor: 'amber' },
      { titulo: 'Chegou em 21 DTE no prejuizo',      resultado: 'Defesa', descricao: 'A acao caiu. Ficar segurando a posicao na esperanca de que a acao suba nos ultimos 20 dias e jogar roleta com o Gamma contra voce. E hora de aceitar a perda (fechando) ou rolar a PUT para o proximo mes em um strike mais barato, pagando a diferenca ou buscando um credito neutro.', cor: 'rose' }
    ],
    manejo: [
      { condicao: 'Ao abrir qualquer operacao de venda', acao: 'A gestao de risco nao depende de memoria. Operou hoje para vencimento em 45 dias? Ja configure o alarme no celular/plataforma para daqui a 24 dias (quando faltarem 21 DTE).' }
    ],
    comparativo: 'A combinacao da "Regra dos 50% de lucro" com a "Regra dos 21 DTE" forma a espinha dorsal matematica de uma carteira de opcoes sobrevivente. Uma garante que voce nao devolva o lucro que ja conquistou; a outra garante que voce nao sofra com movimentos caoticos de ultima hora.'

'kelly': {
    analogia: 'O Criterio de Kelly nao e uma estrategia de opcoes, mas sim uma formula matematica de gestao de risco usada para definir exatamente o tamanho ideal de uma posicao (position sizing). Em vez de alocar tamanhos fixos (ex: operar sempre 100 opcoes), o Kelly calcula qual a porcentagem ideal da sua conta que deve ser colocada em risco naquela operacao especifica, utilizando a sua taxa de acerto historica (win rate) e a sua relacao de lucro/prejuizo (payoff). O objetivo e maximizar o crescimento do capital e zerar matematicamente o risco de falencia.',
    quando_usar: [
      'Obrigatoriamente antes de abrir qualquer nova operacao para definir o numero exato de contratos a operar.',
      'Quando voce ja possui um diario de operacoes com dados estatisticos confiaveis (pelo menos 30 trades da mesma estrategia).',
      'Para evitar a superexposicao direcional -- o maior causador de quebra de contas no mercado de opcoes.'
    ],
    como_montar: 'Formula: f = (p * b - q) / b. Onde: "p" e a sua probabilidade de ganho (ex: 70% ou 0.70). "q" e a probabilidade de perda (1 - p = 0.30). "b" e a proporcao do seu ganho medio dividido pela perda media (ex: se nas travas voce ganha R$ 100 mas quando perde, perde R$ 150, b = 100/150 = 0.66). Exemplo: f = (0.70 * 0.66 - 0.30) / 0.66 = 0.24 (24%). A matematica diria para alocar 24% do capital. Porem, por seguranca contra oscilacoes bruscas de mercado, operadores de opcoes utilizam o "Kelly Fracionado" (geralmente 1/4 ou 1/5 do valor da formula), resultando em uma alocacao real de cerca de 5% a 6% do capital.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Antes da Execucao', descricao: 'Calcula-se o risco baseado na distancia dos strikes e na formula de Kelly para definir se voce vai operar 100, 500 ou 1.000 opcoes.' },
      { dte: 0,  titulo: 'Apos o Encerramento', descricao: 'O resultado (lucro ou prejuizo) da operacao e registrado no diario de trades, alterando levemente as suas variaveis "p", "q" e "b" para o calculo da proxima operacao.' }
    ],
    cenarios: [
      { titulo: 'Calculo resultou em 20%', resultado: 'Use o Fracionado (5%)', descricao: 'O "Full Kelly" (Kelly Integral) e teoricamente perfeito, mas na pratica a volatilidade do mercado exige margem de erro. Aplique o "Quarter-Kelly" (divida por 4). Alocar no maximo 5% do capital total em uma unica operacao.', cor: 'emerald' },
      { titulo: 'Kelly resultou em numero negativo', resultado: 'Alerta Vermelho: Nao Opere', descricao: 'Um Kelly negativo significa que a matematica provou que a sua estrategia nao tem vantagem estatistica ("edge"). Se voce continuar operando com essas taxas de acerto e relacao risco/retorno, voce vai quebrar. O sistema proibe a entrada.', cor: 'rose' },
      { titulo: 'Iniciante (Sem historico de trades)', resultado: 'Tamanho Fixo e Baixo', descricao: 'Se voce nao tem dados reais para preencher a formula, nao "chute" os numeros. Utilize uma alocacao fixa ultraconservadora (1% a 2% do capital em risco por operacao) ate acumular 30 resultados reais.', cor: 'amber' }
    ],
    manejo: [
      { condicao: 'A cada mes ou a cada serie de 20 operacoes concluidas', acao: 'Recalcule o seu Criterio de Kelly. Se voce estiver numa fase ruim e sua taxa de acerto cair, a formula automaticamente mandara voce reduzir o tamanho da mao na proxima operacao, protegendo a sua conta.' }
    ],
    comparativo: 'A maioria dos operadores de varejo usa tamanho fixo por operacao com base no "sentimento" (ex: "estou confiante, vou comprar 1.000 opcoes"). O Criterio de Kelly retira totalmente a emocao do processo. A matematica te forca a apostar menos quando seu desempenho esta ruim e mais quando seu metodo esta se provando eficaz no mercado atual.'
  },

'rolagem-tempo': {
    analogia: 'A Rolagem no Tempo (Roll Forward) e uma manobra puramente matematica para ganhar mais prazo em uma operacao que esta ameacada. Em vez de aceitar o exercicio ou realizar o prejuizo de uma opcao que esta prestes a vencer, voce encerra essa obrigacao hoje (recomprando a opcao) e, no mesmo instante, abre uma obrigacao identica para o mes seguinte (vendendo uma nova opcao). O objetivo e usar o premio mais caro da opcao futura para pagar a recompra da opcao atual, ganhando mais 30 dias para a acao se mover a seu favor.',
    quando_usar: [
      'A opcao que voce vendeu esta ameacada (muito proxima do strike) e restam poucos dias para o vencimento.',

    linha_do_tempo: [
      { dte: 7,  titulo: 'Posicao atual ameacada', descricao: 'A acao se aproximou do seu strike e o risco (Gamma) esta alto. Voce recompra a opcao e encerra definitivamente o ciclo atual.' },
      { dte: 0,  titulo: 'Nova posicao aberta', descricao: 'No mesmo instante, voce vende a opcao para o mes seguinte. O relogio do decaimento (Theta) recomeca a rodar a seu favor.' },
      { dte: 35, titulo: 'Novo vencimento', descricao: 'Voce tem mais 30 ou 40 dias de respiro para que a acao se afaste do seu strike e a nova opcao perca valor ate virar po.' }

    cenarios: [
      { titulo: 'A Rolagem gerou credito (Ex: R$ 0,30 liquidos)', resultado: 'Excelente', descricao: 'O cenario ideal. Voce empurrou o problema para o mes que vem, ganhou mais tempo para a acao se recuperar e ainda foi pago por isso. Esse credito extra reduz ainda mais o seu preco medio se voce for exercido no futuro.', cor: 'emerald' },
      { titulo: 'A Rolagem foi neutra (Zero a zero)', resultado: 'Ok', descricao: 'A recompra custou exatamente o mesmo que a nova venda. Voce nao ganhou premio extra, mas ganhou 30 dias de prazo "de graca". Valido se a sua conviccao na acao for muito alta.', cor: 'amber' },

    ],
    manejo: [
      { condicao: 'Regra de Ouro', acao: 'Nunca role pagando debito. Se a rolagem tira dinheiro da sua conta para manter o mesmo strike, a operacao original ja fracassou. Feche a posicao.' },
      { condicao: 'Acao nao se recupera apos varias rolagens', acao: 'Nao vire "torcedor". Estabeleca um limite mental (ex: maximo de 2 ou 3 rolagens). Se a acao continua indo contra voce mes apos mes, aceite que a tese estava errada e encerre a operacao.' }
    ],
    comparativo: 'Em vez de aceitar o exercicio imediato e ter que comprar/vender a acao hoje imobilizando muito capital, a rolagem da uma segunda chance para a operacao dar certo, utilizando o proprio dinheiro do mercado (o premio da opcao futura) para financiar essa extensao de prazo.'

'bull-call-spread': {

      { dte: 21, titulo: 'Acompanhamento', descricao: 'Se a acao ja subiu e chegou em R$ 17,00, a sua trava atingiu quase o valor maximo. Avalie vender a estrutura inteira no mercado para colocar o lucro no bolso sem esperar o vencimento.' },
      { dte: 0,  titulo: 'Vencimento', descricao: 'O resultado final sera definido pelo preco de fechamento da CSAN3. Ou vira po (voce perde o que pagou), ou da lucro parcial, ou atinge o ganho maximo.' }

    cenarios: [
      { titulo: 'CSAN3 explodiu para R$ 19,00 (Acima dos dois strikes)', resultado: 'Ganho Maximo Travado', descricao: 'O titular da CALL que voce vendeu exerce o direito, te OBRIGANDO a entregar as acoes por R$ 17,00. Como voce se defende? Voce exerce a SUA CALL comprada, garantindo o DIREITO de comprar as acoes por R$ 15,00. Voce compra a R$ 15,00 e entrega a R$ 17,00, ganhando R$ 2,00 nessa troca. Como voce pagou R$ 0,60 na montagem, seu lucro liquido e definitivo e de R$ 1,40 por acao. A alta alem dos R$ 17,00 nao te beneficia mais.', cor: 'emerald' },
      { titulo: 'CSAN3 subiu para R$ 16,00 (No meio dos strikes)', resultado: 'Lucro Parcial', descricao: 'A CALL VENDIDA de R$ 17,00 vira po (ninguem te obriga a vender a R$ 17,00 algo que no mercado vale R$ 16,00). Excelente. A sua CALL COMPRADA de R$ 15,00 esta no lucro. Ela tem R$ 1,00 de valor intrinseco. Voce pode vende-la no mercado por R$ 1,00. Subtraindo os R$ 0,60 que voce gastou para montar a trava inteira, sobra um lucro liquido de R$ 0,40 por acao.', cor: 'amber' },
      { titulo: 'CSAN3 caiu para R$ 14,00 (Abaixo dos strikes)', resultado: 'Perda Maxima (Restrita ao valor pago)', descricao: 'A acao foi na direcao oposta ao que voce queria. Ninguem exerce nada. A CALL que voce vendeu vira po (sua obrigacao some) e a CALL que voce comprou tambem vira po (nao faz sentido voce exercer o direito de comprar a R$ 15,00 algo que vale R$ 14,00). Ambas expiram sem valor. Voce perde exatamente os R$ 60,00 que pagou no inicio e nada mais.', cor: 'rose' }

'jade-lizard': {
    analogia: 'O Jade Lizard e a uniao de uma Venda de PUT isolada com uma Trava de Baixa com CALL. O grande diferencial desta estrategia e uma regra matematica obrigatoria: o credito total recebido ao montar as tres pernas DEVE ser maior ou igual a largura dos strikes da Trava de CALL. Ao seguir essa regra, voce garante que o premio arrecadado paga antecipadamente qualquer prejuizo maximo que a Trava de CALL possa gerar. Com isso, o risco da acao explodir para cima e eliminado matematicamente no dia da montagem. O unico risco restante e o da PUT vendida: a acao desabar.',
    quando_usar: [
      'Voce tem um vies neutro a levemente altista para a acao.',
      'A volatilidade (IV) esta alta nos dois extremos do mercado, permitindo coletar premios generosos.',
      'Voce aceita assumir a obrigacao de comprar a acao na queda (risco da PUT), mas exige que o seu risco de alta seja matematicamente zero.'
    ],
    como_montar: 'CSNA3 a R$ 15,00. Passo 1: Voce VENDE uma PUT no strike R$ 14,00 e recebe R$ 0,60. Passo 2 (Trava de CALL): Voce VENDE a CALL R$ 16,00 (recebe R$ 0,50) e COMPRA a CALL R$ 17,00 (paga R$ 0,10). O Credito Total que entra na sua conta e de R$ 1,00 por acao (R$ 100,00 no total). Verificacao da Regra: A distancia entre as CALLs (17 - 16) e de R$ 1,00. Como o credito de R$ 1,00 e igual a largura da trava de R$ 1,00, a estrutura esta perfeita e o risco de alta sumiu.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Montagem Blindada na Alta', descricao: 'Voce recebe o premio maximo na entrada. A sua unica preocupacao ate o vencimento sera observar se a acao ameaca cair abaixo dos R$ 14,00.' },
      { dte: 21, titulo: 'Monitoramento do Suporte', descricao: 'Se a acao lateralizou ou subiu, a estrutura inteira esta perdendo valor rapidamente (o que e otimo). O foco e sempre o lado da PUT.' },
      { dte: 0,  titulo: 'Vencimento', descricao: 'Dependendo do fechamento da CSNA3, voce embolsa tudo, sai no zero a zero na alta, ou e exercido na ponta de baixo.' }
    ],
    cenarios: [
      { titulo: 'CSNA3 ficou em R$ 15,00 (Entre os strikes vendidos)', resultado: 'Lucro Maximo', descricao: 'A acao nao atingiu R$ 16,00 nem caiu a R$ 14,00. Todas as tres opcoes (as duas CALLs e a PUT) expiram sem valor. Suas obrigacoes somem. Voce nao precisa comprar nem entregar nada, e os R$ 100,00 de credito ficam integralmente na sua conta.', cor: 'emerald' },
      { titulo: 'CSNA3 explodiu para R$ 20,00 (A magica do Risco Zero)', resultado: 'Empate ou Lucro Residual', descricao: 'A PUT vira po. O titular da CALL VENDIDA te obriga a entregar as acoes por R$ 16,00. Voce exerce a sua CALL COMPRADA para comprar a R$ 17,00. Voce perde exatamente R$ 1,00 por acao nesta trava. Porem, como voce recebeu R$ 1,00 de credito ao montar a estrutura, o premio anula a perda da trava. Seu prejuizo e ZERO. Se o credito inicial fosse de R$ 1,20, voce ainda teria saido com R$ 0,20 de lucro mesmo errando feio na alta.', cor: 'emerald' },
      { titulo: 'CSNA3 desabou para R$ 11,00 (O Risco Real)', resultado: 'Obrigacao de Compra', descricao: 'A Trava de CALL inteira vira po. O problema esta na PUT: o titular da PUT VENDIDA exerce o direito dele, te OBRIGANDO a comprar a acao por R$ 14,00. Como o mercado esta a R$ 11,00, voce tem uma desvalorizacao de R$ 3,00 na acao. O credito inicial de R$ 1,00 ajuda a amortecer, mas o seu prejuizo financeiro liquido e de R$ 2,00 por acao.', cor: 'rose' }
    ],
    manejo: [
      { condicao: 'Acao desabou para perto do strike da PUT (R$ 14,00)', acao: 'A Trava de CALL ja virou po e o lucro dela esta garantido. O seu manejo foca exclusivamente em defender a PUT: recompre a atual e venda para o mes seguinte num strike mais baixo (Rolagem).' },
      { condicao: 'Acao disparou acima de R$ 17,00', acao: 'Nao faca absolutamente nada. Deixe o vencimento chegar. A matematica do Jade Lizard ja garantiu que voce nao perdera dinheiro desse lado. Rolar a posicao agora apenas destruiria essa vantagem.' }
    ],
    comparativo: 'Versus Short Strangle: O Strangle (vender PUT e vender CALL secas) gera mais credito na entrada, mas se a CSNA3 fosse a R$ 20,00, a sua perda na CALL vendida seria ilimitada. O Jade Lizard usa uma pequena parte do premio do Strangle para comprar uma CALL de protecao, sacrificando um pouco de lucro para dormir com o teto perfeitamente blindado.'
  },

    quando_usar: [

    como_montar: 'CSNA3 esta a R$ 15,00. Na trava normal, voce venderia a R$ 14,00 e compraria a R$ 13,00. Aqui, voce VENDE a PUT de R$ 14,00 (recebe R$ 0,60) e pula o 13, COMPRANDO a PUT de R$ 12,00 (paga apenas R$ 0,15). O credito liquido sobe para R$ 0,45 por opcao (R$ 45,00 totais). Porem, o seu "buraco" de risco agora e de R$ 2,00 (diferenca entre 14 e 12). Sua Perda Maxima: R$ 2,00 menos o credito de R$ 0,45 = R$ 1,55 por acao (R$ 155,00 no total).',
    linha_do_tempo: [

      { dte: 21, titulo: 'Monitoramento de Risco', descricao: 'Como a protecao esta muito longe (so no R$ 12,00), qualquer queda da acao rumo aos R$ 14,00 exige atencao imediata. A zona de prejuizo desprotegido e grande.' },
      { dte: 0,  titulo: 'Vencimento', descricao: 'O resultado ideal e a acao ficar acima de R$ 14,00. Abaixo disso, as perdas aceleram sem a protecao imediata para segurar.' }

    cenarios: [
      { titulo: 'CSNA3 ficou em R$ 15,00 (Acima da obrigacao)', resultado: 'Ganho Maximo', descricao: 'O preco nao atingiu R$ 14,00. Ninguem vai te obrigar a comprar as acoes. A PUT VENDIDA vira po e a PUT COMPRADA tambem. Voce fica com os R$ 45,00 inteiros. A estrategia funcionou perfeitamente e pagou mais que o normal.', cor: 'emerald' },
      { titulo: 'CSNA3 caiu para R$ 13,00 (Caiu na "Asa Quebrada")', resultado: 'Perda Parcial Desprotegida', descricao: 'A PUT VENDIDA entra no dinheiro e te OBRIGA a comprar a acao por R$ 14,00. O problema: a sua PUT COMPRADA e de R$ 12,00, entao ela nao serve para nada aqui (vira po). Voce assume o prejuizo integral de R$ 1,00 na acao. Descontando os R$ 0,45 recebidos, sua perda liquida e de R$ 0,55 por acao.', cor: 'amber' },
      { titulo: 'CSNA3 desabou para R$ 10,00 (Queda Catastrofica)', resultado: 'Perda Maxima Travada', descricao: 'Voce e OBRIGADO a comprar a R$ 14,00. A sua protecao entra em cena: a PUT COMPRADA te da o DIREITO de vender a R$ 12,00. Voce compra a 14 e vende a 12, perdendo R$ 2,00 nessa troca. Descontando o premio recebido, voce atinge o teto de perda financeira de R$ 1,55 por acao.', cor: 'rose' }
    ],
    manejo: [
      { condicao: 'Acao caiu para o strike da PUT vendida (R$ 14,00)', acao: 'Feche a posicao (recompre a trava). A essencia dessa estrutura e a alta probabilidade de sucesso em troca de um risco feio na queda. Se a queda comecou, nao espere ela bater no seu strike mais baixo de R$ 12,00.' }
    ],
    comparativo: 'Versus Trava de Alta com PUT simples: A trava simples (14-13) tem uma relacao risco-retorno de perder R$ 0,70 para ganhar R$ 0,30. A Asa Quebrada (14-12) muda essa matematica para perder R$ 1,55 para ganhar R$ 0,45. E uma estrutura para quem prefere ganhar mais dinheiro na entrada e aceita que, no raro cenario em que erra, vai perder bastante.'
  },

    como_montar: 'CSNA3 esta a R$ 15,00. Comprar 100 acoes custaria R$ 1.500,00. No PMCC, Passo 1: Voce COMPRA 100 CALLs de longo prazo (ex: para daqui a 12 meses) no strike R$ 10,00 (Deep ITM), pagando R$ 5,50 por opcao (gasta R$ 550,00). Passo 2: Voce VENDE 100 CALLs de curto prazo (30 dias) no strike R$ 16,00, recebendo R$ 0,40 (entra R$ 40,00). O custo liquido para entrar na operacao e de R$ 5,10 por acao (R$ 510,00 totais). Voce montou o equivalente a uma Venda Coberta imobilizando R$ 510,00 em vez de R$ 1.500,00.',
    linha_do_tempo: [

      { dte: 30,  titulo: 'Ciclo de Renda Mensal', descricao: 'Voce lanca a sua CALL de 30 dias. Opcoes curtas perdem valor muito rapido. O tempo joga a seu favor na perna vendida e te machuca pouco na perna comprada.' },

      { titulo: 'CSNA3 desabou no curto/medio prazo', resultado: 'Risco de Perda Total do Capital', descricao: 'A CALL curta vira po (o que e bom), mas a acao despencou, arrastando junto o valor da sua CALL longa de 12 meses. O grande risco aqui e o prazo de validade: diferente da acao fisica que voce pode segurar para sempre esperando recuperar, a sua CALL longa vai expirar. Se a acao nao se recuperar antes desses 12 meses, voce perde 100% dos R$ 550,00 investidos na garantia.', cor: 'rose' }

      { condicao: 'A CALL longa atingiu a marca de 60 dias para o vencimento', acao: 'A partir de 60 dias, o Theta da sua opcao longa comeca a acelerar e destruir o valor dela rapidamente. Feche a estrutura toda (venda a longa e recompre a curta) ou "role" a sua opcao longa comprando uma nova para o ano seguinte.' }

'short-strangle': {

    como_montar: 'CSNA3 esta a R$ 15,00. Voce VENDE uma PUT no strike R$ 13,00 (recebe R$ 0,40) e VENDE uma CALL no strike R$ 17,00 (recebe R$ 0,35). O Credito Total depositado na sua conta e de R$ 0,75 por acao (R$ 75,00 totais). A sua Zona de Lucro vai de R$ 13,00 a R$ 17,00. Seu ganho maximo e exatamente os R$ 75,00 recebidos. Seu risco: perda catastrofica e ilimitada se a acao romper a faixa dos R$ 17,00, ou perda severa se cair abaixo dos R$ 13,00.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Montagem Direta', descricao: 'O credito duplo entra na conta. O Theta comeca a desvalorizar as duas opcoes a seu favor. O tempo e o seu melhor amigo num Strangle.' },
      { dte: 21, titulo: 'Acelerador de Risco (Gamma)', descricao: 'O ponto critico. Nos ultimos 21 dias, o Gamma torna o preco das opcoes muito sensivel. Um pequeno movimento da acao pode inflar o preco da opcao vendida e devorar todo o seu lucro.' },
      { dte: 0,  titulo: 'Vencimento', descricao: 'Chegar ao dia do vencimento com um Strangle aberto e um erro primario de gestao de risco. A posicao ja deveria ter sido encerrada com lucro ou rolada.' }

    cenarios: [
      { titulo: 'CSNA3 ficou em R$ 15,00 (No meio do caixote)', resultado: 'Lucro Maximo', descricao: 'A acao nao ameacou o teto (17) nem o piso (13). Ambas as opcoes que voce vendeu expiram sem valor (viram po). Suas obrigacoes deixam de existir e voce fica com 100% dos R$ 75,00 na conta sem ter tido dor de cabeca.', cor: 'emerald' },
      { titulo: 'CSNA3 subiu para R$ 18,00 (Rompimento Leve)', resultado: 'Prejuizo', descricao: 'A PUT de 13 vira po. A CALL de 17 entra no dinheiro e o titular te OBRIGA a vender as acoes por R$ 17,00. Como voce operou a descoberto, tera que comprar no mercado por R$ 18,00 e entregar por R$ 17,00 (perdendo R$ 1,00 por acao). O credito de R$ 0,75 amortece a perda, resultando num prejuizo liquido de R$ 0,25 por acao.', cor: 'amber' },
      { titulo: 'CSNA3 explodiu para R$ 22,00 (O Risco Ilimitado)', resultado: 'Perda Catastrofica', descricao: 'A PUT de 13 vira po. A CALL de 17 e exercida. Voce e OBRIGADO a comprar a acao a R$ 22,00 no mercado para entregar a R$ 17,00, assumindo uma perda brutal de R$ 5,00 por acao. Descontando os R$ 0,75 iniciais, seu prejuizo liquido e de R$ 4,25 por acao (R$ 425,00 no lote). E aqui que contas pequenas quebram se nao houver stop ou manejo rapido.', cor: 'rose' }
    ],
    manejo: [
      { condicao: 'Atingiu 50% do credito total (ex: recomprar as duas pernas por R$ 0,37)', acao: 'Feche o Strangle inteiro IMEDIATAMENTE. Jamais seja ganancioso quando se tem risco ilimitado em aberto. Embolse o lucro e libere sua margem.' },

    ],
    comparativo: 'Versus Iron Condor: O Strangle paga mais premio na entrada porque voce nao gastou dinheiro comprando as pernas de protecao (as "asas" do condor). Em contrapartida, o Iron Condor te deixa dormir a noite limitando matematicamente o seu prejuizo a um valor conhecido, enquanto o Strangle exige acompanhamento constante e margem altissima na corretora devido ao risco ilimitado.'

'skip-butterfly': {
    analogia: 'A Skip-Strike Butterfly (ou Borboleta de Asa Quebrada) e uma variante da borboleta tradicional onde a distancia entre os strikes nao e igual. Ao "pular" um strike no miolo (ex: em vez de 13-14-15, usa-se 13-16-18), voce cria uma estrutura assimetrica. O objetivo e reduzir o custo de montagem (debito) ao coletar mais premio nas opcoes vendidas. A grande vantagem tecnica e que, se o preco da acao ultrapassar todas as asas, a estrutura ainda pode resultar em lucro ou custo zero, ao contrario da borboleta comum que vira po. O risco fica concentrado exclusivamente se a acao nao atingir o primeiro strike ou parar exatamente no "vao" entre as asas.',
    quando_usar: [
      'Expectativa de lateralizacao em um intervalo de preco mais amplo e incerto.',
      'Voce quer uma operacao de "baixo custo" ou "custo zero" para apostar na estabilidade de um ativo.',
      'IV moderada que permita que a venda das duas opcoes centrais financie quase integralmente as asas compradas.'
    ],
    como_montar: 'CSNA3 esta a R$ 15,00. Asa Inferior: voce COMPRA 1 CALL no strike R$ 13,00 (paga R$ 2,10). Corpo (O Salto): voce VENDE 2 CALLs no strike R$ 16,00 (recebe R$ 1,10 cada = R$ 2,20). Asa Superior: voce COMPRA 1 CALL no strike R$ 18,00 (paga R$ 0,30). Debito Liquido: R$ 0,20 por acao (R$ 20,00 totais). Observe que a distancia da asa inferior (3,00) e maior que a da superior (2,00).',
    linha_do_tempo: [
      { dte: 45, titulo: 'Montagem Assimetrica', descricao: 'Voce paga um debito minimo de R$ 0,20. O seu range de lucro e vasto: de R$ 13,20 ate o infinito (embora o lucro diminua apos os R$ 16,00).' },
      { dte: 21, titulo: 'Monitoramento do Miolo', descricao: 'Se a acao estiver entre R$ 13,00 e R$ 16,00, a estrutura ganha valor intrinseco rapidamente. O tempo (Theta) joga a favor enquanto o preco nao ultrapassar o strike vendido.' },
      { dte: 0,  titulo: 'Vencimento', descricao: 'O lucro maximo ocorre exatamente nos R$ 16,00. Diferente da borboleta comum, se a acao explodir para R$ 20,00, voce ainda sai com um lucro residual de R$ 0,80 por acao.' }
    ],
    cenarios: [
      { titulo: 'CSNA3 fechou em R$ 16,00 (O Apice)', resultado: 'Lucro Maximo', descricao: 'A CALL de R$ 13,00 vale R$ 3,00. As outras expiram. Lucro bruto de R$ 3,00 menos o debito de R$ 0,20 = R$ 2,80 de lucro liquido por acao.', cor: 'emerald' },
      { titulo: 'CSNA3 disparou para R$ 19,00 (Alem das Asas)', resultado: 'Lucro Residual', descricao: 'A CALL de 13 vale R$ 6, as duas vendidas de 16 custam R$ 6 (2x3) e a de 18 vale R$ 1. Matematica: 6 - 6 + 1 = 1,00. Menos o debito de 0,20, voce lucra R$ 0,80. O risco de alta foi eliminado.', cor: 'emerald' },

    ],
    manejo: [
      { condicao: 'Acao estacionou no strike central (R$ 16,00) antes do vencimento', acao: 'Considere realizar o lucro. No Skip Butterfly, o ganho latente no miolo e alto, mas a volatilidade pode tira-lo da zona de lucro maximo rapidamente.' },
      { condicao: 'Acao rompeu a asa inferior (abaixo de R$ 13,00)', acao: 'Aceite a perda do debito pago. Como o custo foi propositalmente baixo, o risco financeiro e minimo.' }
    ],
    comparativo: 'Versus Borboleta Comum: A Skip-Strike tem um range de lucro muito mais largo e elimina o risco de perda se a acao subir demais (no caso de CALLs). Em troca, o lucro maximo e ligeiramente menor devido ao financiamento das asas. E a escolha ideal para quem quer "comprar um range" em vez de apenas um ponto fixo de preco.'

'synthetic-long': {

    quando_usar: [
      'Voce esta extremamente otimista (bullish) com o ativo e quer "comprar" a acao usando o capital para outras finalidades ou investimentos.',
      'Voce possui margem de garantia disponivel (CDBs, outras acoes, Tesouro Direto) para suportar a venda da PUT.',
      'O ativo e muito liquido e possui um diferencial de juros/dividendos que torna a montagem com custo zero (ou ate credito) possivel.'
    ],
    como_montar: 'CSNA3 esta cotada a R$ 15,00. Voce COMPRA a CALL no strike R$ 15,00 (paga R$ 0,80) e VENDE a PUT no strike R$ 15,00 (recebe R$ 0,80). O custo liquido e R$ 0,00. Embora voce nao tenha gasto dinheiro, voce agora tem a mesma exposicao de quem comprou 100 acoes a R$ 15,00 (investimento de R$ 1.500,00). Sua corretora exigira uma margem de garantia para cobrir a PUT vendida.',
    linha_do_tempo: [

      { dte: 21, titulo: 'Monitoramento de Direcao', descricao: 'O tempo (Theta) e neutro aqui, pois o decaimento da CALL comprada e anulado pelo decaimento da PUT vendida. O que importa e apenas o preco da acao.' },
      { dte: 0,  titulo: 'Vencimento (A Hora da Verdade)', descricao: 'Se a acao estiver acima de R$ 15,00, voce exerce sua CALL e compra as acoes. Se estiver abaixo, voce e exercido na PUT e tambem compra as acoes. Em ambos os casos, voce termina dono do ativo pelo preco original de R$ 15,00.' }

    cenarios: [

    ],
    manejo: [
      { condicao: 'Acao caiu e a corretora esta pedindo mais margem', acao: 'Este e o risco real. Se voce nao tiver liquidez para cobrir a chamada de margem, precisara encerrar a posicao (recomprar a PUT) assumindo o prejuizo para evitar a liquidacao forcada.' },
      { condicao: 'Deseja encerrar o trade antes do vencimento', acao: 'Basta desfazer a estrutura: venda a CALL e recompre a PUT. O valor de mercado da estrutura refletira exatamente a variacao do preco da acao desde a montagem.' }
    ],
    comparativo: 'Versus Compra Direta de Acoes: O Synthetic Long oferece o mesmo perfil de risco e retorno, mas libera o seu caixa. Enquanto o comprador da acao imobiliza R$ 15,00, voce imobiliza apenas a margem (ex: R$ 3,00) e pode deixar o restante do dinheiro rendendo juros. E a estrategia mestre para quem sabe gerenciar fluxo de caixa e garantias.'
  },

    linha_do_tempo: [

    cenarios: [

    comparativo: 'Versus Venda a Descoberto (A Vista): No sintetico, voce nao paga taxas de aluguel e nao corre o risco de o doador da acao pedir o papel de volta (o que forcaria o fechamento da sua posicao). O risco de perda ilimitada na alta e identico. E a melhor opcao para posicoes vendidas de medio prazo em ativos com aluguel caro ou escasso.'
  },

'long-combo': {
    analogia: 'O Long Combo (ou Bull Risk Reversal) e uma estrutura direcional de alta montada com opcoes fora do dinheiro (OTM). Voce VENDE uma PUT OTM para financiar a COMPRA de uma CALL OTM. Diferente do Synthetic Long (que e feito no mesmo strike), o Combo cria um intervalo de precos entre os strikes onde voce nao tem exposicao direta ao movimento do papel. O objetivo e entrar na operacao com um credito liquido ou custo zero, garantindo o direito de lucrar com uma alta expressiva enquanto aceita a obrigacao de comprar o ativo por um preco descontado caso ele caia.',

    linha_do_tempo: [

      { dte: 21, titulo: 'Efeito do Skew', descricao: 'Se a volatilidade do mercado cair, o valor da PUT vendida derrete mais rapido que o da CALL comprada, permitindo que voce encerre a operacao com lucro mesmo sem o movimento da acao.' },
      { dte: 0,  titulo: 'Vencimento', descricao: 'O desfecho depende de onde a acao estacionar: acima de 17 (lucro), abaixo de 13 (compra obrigatoria) ou entre 13 e 17 (lucro do credito).' }

'short-combo': {

    como_montar: 'CSNA3 esta a R$ 15,00. Voce VENDE a CALL no strike R$ 17,00 (recebe R$ 0,35) e COMPRA a PUT no strike R$ 13,00 (paga R$ 0,45). O resultado e um debito liquido de apenas R$ 0,10 por acao (R$ 10,00 no lote). Entre R$ 13,00 e R$ 17,00, voce esta na "zona neutra". Voce so comeca a lucrar abaixo de R$ 12,90 (strike da PUT menos o debito).',

    comparativo: 'Versus Synthetic Short: No Sintetico (ATM), voce ganha ou perde com qualquer movimento. No Short Combo (OTM), voce tem um "colchao" entre os strikes onde o prejuizo e limitado ao debito pago. Versus Compra de PUT: O Combo e muito mais barato que a PUT a seco, mas em troca voce aceita o risco de perda ilimitada se a acao subir demais. E a escolha dos ursos que confiam na resistencia tecnica do papel.'

'box-3': {
    analogia: 'O Box de 3 Pontas e uma operacao de arbitragem pura que utiliza a paridade entre CALLs e PUTs para criar uma "Renda Fixa Sintetica". Diferente de todas as outras estrategias, o Box nao tenta prever para onde a acao vai; ele tenta capturar uma distorcao de precos entre as opcoes. Ao combinar tres pernas (geralmente uma Trava de Alta com CALL e uma PUT vendida, ou vice-versa), voce cria uma estrutura cujo valor de liquidacao no vencimento e deterministico e conhecido. Se voce paga R$ 9,50 para montar algo que obrigatoriamente valera R$ 10,00 no vencimento, voce acabou de "comprar" uma taxa de juros garantida pela matematica do mercado.',
    quando_usar: [
      'Voce identifica uma distorcao clara na Paridade Put-Call (ex: o premio da PUT esta muito barato em relacao a CALL do mesmo strike).',
      'O mercado esta com baixa liquidez ou alta volatilidade momentanea, gerando "buracos" no book de ofertas que permitem a arbitragem.',
      'Voce busca uma alternativa a renda fixa tradicional, com o objetivo de capturar uma taxa superior a Selic atraves de derivativos.'
    ],
    como_montar: 'Acao X esta a R$ 10,00. Voce identifica que pode COMPRAR uma CALL no strike R$ 10,00 (paga R$ 0,70), VENDER uma CALL no strike R$ 11,00 (recebe R$ 0,20) e VENDER uma PUT no strike R$ 10,00 (recebe R$ 0,65). O custo liquido da montagem e R$ 0,50. Pela paridade, essa estrutura garante um recebimento fixo no vencimento (geralmente a diferenca entre os strikes ou o valor intrinseco travado). Se o valor final for R$ 1,00, seu lucro e de 100% sobre o capital alocado, independente do preco da acao.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Execucao da Arbitragem', descricao: 'O lucro e definido no milissegundo da execucao. O desafio aqui e a velocidade: robos de alta frequencia (HFT) geralmente fecham essas janelas em segundos.' },
      { dte: 21, titulo: 'Inercia de Mercado', descricao: 'A estrutura e insensivel ao movimento do preco (Delta Neutro). O unico fator que importa e a proximidade do vencimento para a convergencia do valor.' },
      { dte: 0,  titulo: 'Liquidacao Financeira', descricao: 'As pernas se anulam ou sao exercidas de forma que o fluxo de caixa final seja exatamente o valor travado na montagem. O lucro cai na conta como um rendimento de juros.' }

    cenarios: [
      { titulo: 'Acao subiu, caiu ou ficou parada', resultado: 'Lucro Deterministico', descricao: 'Este e o unico setup onde o grafico de payoff e uma linha reta horizontal acima do zero. O lucro nao depende do ativo, mas sim do diferencial de preco capturado no momento em que voce "bateu" o book.', cor: 'emerald' }

    manejo: [
      { condicao: 'Distorcao aumenta apos a montagem', acao: 'Aumentar a posicao. Se o mercado se tornar ainda mais ineficiente, voce pode escalar a arbitragem para maximizar o retorno livre de risco.' },
      { condicao: 'Risco de Execucao (Slippage)', acao: 'O unico manejo real e na entrada. Se voce nao conseguir executar as 3 pernas simultaneamente nos precos calculados, a arbitragem se transforma em uma aposta direcional perigosa. Use ordens combinadas.' }
    ],
    comparativo: 'Versus Renda Fixa (Tesouro/CDB): O Box-3 busca retornos superiores a Selic usando o risco de contraparte da B3. Versus outras travas: Enquanto uma Trava de Alta depende de a acao subir, o Box-3 depende apenas de a matematica da paridade ser respeitada no vencimento. E o "Santo Graal" dos traders de volatilidade, mas exige ferramentas de execucao ultra-rapidas.'
  },

    quando_usar: [

    como_montar: 'CSNA3 esta a R$ 15,00. Voce monta um Box de 3 pontas (ex: Compra CALL 14, Vende CALL 16, Vende PUT 14) pagando R$ 1,70 para receber R$ 2,00 no vencimento (lucro de R$ 0,30). Na versao Smart, voce ja deixa uma ordem de saida (venda da estrutura) programada por R$ 1,95. Se houver um pico de volatilidade no 10o dia que leve a estrutura a R$ 1,95, voce sai com quase todo o lucro em tempo recorde.',

      { dte: 15, titulo: 'Saida Antecipada (O Pulo do Gato)', descricao: 'Uma distorcao oposta ou o fechamento do spread permite a saida por R$ 1,95. Voce abre mao de R$ 0,05, mas ganha 30 dias de capital livre para o proximo trade.' }
    ],
    cenarios: [
      { titulo: 'Saida Antecipada com Lucro Rapido', resultado: 'Rentabilidade Otimizada', descricao: 'Voce capturou a maior parte do lucro em poucos dias. Sua taxa anualizada resultante e muito superior a Selic ou ao Box classico carregado ate o fim.', cor: 'emerald' },

    comparativo: 'Versus Box-3 Classico: O classico e uma operacao passiva de "Buy and Hold" de opcoes. O Smart e um trade de valor relativo. No Smart, voce nao trata o lucro como um destino, mas como uma taxa. E a diferenca entre ganhar 1% ao mes esperando 30 dias, ou ganhar 0,8% em 5 dias e poder operar de novo. Para o seu app de trading, esta e a estrategia que diferencia o investidor comum do arbitrador profissional.'
  },

'box-4-smart': {
    analogia: 'O Box de 4 Pontas (Box Spread) e a construcao de um emprestimo ou aplicacao sintetica com risco de credito da contraparte (B3). Ao combinar quatro pernas -- uma Trava de Alta com CALL e uma Trava de Baixa com PUT, ambas nos mesmos strikes -- voce elimina completamente a variavel "preco do ativo". O valor da estrutura no vencimento sera sempre a diferenca entre os strikes escolhidos. O "Smart" aqui reside na execucao: o objetivo e montar a estrutura por um valor liquido que, somado aos custos operacionais, seja inferior ao valor de liquidacao final, garantindo uma rentabilidade superior a taxa Selic do periodo.',
    quando_usar: [

    como_montar: 'CSNA3 esta a R$ 15,00. Strikes escolhidos: R$ 14,00 ($K_1$) e R$ 16,00 ($K_2$). Passo 1: Trava de Alta (Compra CALL 14 e Vende CALL 16). Passo 2: Trava de Baixa (Compra PUT 16 e Vende PUT 14). O valor de liquidacao no vencimento e fixo em R$ 2,00 ($K_2 - K_1$). Se voce conseguir montar as 4 pernas por um custo total de R$ 1,90, seu lucro garantido e de R$ 0,10 por acao, independente de a CSNA3 estar valendo R$ 1,00 ou R$ 100,00 no vencimento.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Travamento da Taxa', descricao: 'O lucro e contratado no ato da montagem. A margem de garantia e consumida, mas o risco direcional e nulo (Delta Zero).' },

      { dte: 0,  titulo: 'Liquidacao Financeira', descricao: 'As opcoes sao exercidas ou se anulam, resultando no recebimento invariavel de R$ 2,00 por acao. O retorno final e a diferenca entre o que voce pagou e o valor de face recebido.' }

    cenarios: [
      { titulo: 'Qualquer Preco do Ativo', resultado: 'Lucro Fixo Conhecido', descricao: 'Diferente de travas direcionais, o Box-4 e uma linha horizontal perfeita no grafico de lucro. O unico risco e a corretora ou a bolsa mudarem as regras de margem ou custos operacionais durante o periodo.', cor: 'emerald' }

    manejo: [

    comparativo: 'Versus Box-3 Pontas: O Box-4 exige mais capital e gera mais custos de corretagem/emolumentos por envolver 4 pernas, mas e matematicamente mais "limpo" por nao depender da paridade sintetica de apenas um strike. E a ferramenta preferida de tesourarias para gerenciar caixa com eficiencia tributaria e retornos acima do CDI.'

'origami': {
    analogia: 'O Origami e a Engenharia de Payoff Customizado. Em vez de usar uma trava ou borboleta padrao, voce desenha o grafico de lucro (payoff) que deseja e trabalha de tras para frente para encontrar a combinacao de strikes, vencimentos e quantidades que geram essa forma. E uma estrutura multi-perna (geralmente de 4 a 10 pontas) onde cada opcao serve como uma "dobra" matematica para ajustar a curvatura do risco, a exposicao a volatilidade ou a aceleracao do ganho. E o nivel maximo de sofisticacao, transformando o trader em um arquiteto de probabilidades.',
    quando_usar: [
      'Nenhuma estrategia convencional (Trava, Condor, Butterfly) captura a distorcao especifica que voce identificou no mercado.',
      'Voce identifica anomalias em diferentes vencimentos e strikes simultaneamente (distorcoes de Skew e Term Structure).',
      'Operadores profissionais que precisam de "Delta Neutro" absoluto com exposicao positiva a movimentos explosivos em pontos muito especificos do grafico.'
    ],
    como_montar: 'Nao existe uma formula fixa. A montagem comeca com o grafico de Payoff desejado. Exemplo em CSNA3: voce quer ganhar se a acao ficar entre R$ 14,50 e R$ 15,20, mas quer um "puxadinho" de lucro se ela disparar acima de R$ 18,00. Para isso, voce combina uma Borboleta ATM com um Backspread de CALLs OTM. Voce seleciona cada perna para que a soma das gregas ($ \sum \Delta, \sum \Gamma $) resulte no perfil de risco planejado. Exige plataformas de simulacao avancada e execucao via robos para evitar o erro de execucao.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Modelagem Matematica', descricao: 'Uso de software para desenhar o payoff e simular o impacto da passagem do tempo (Theta) e da mudanca de volatilidade (Vega) na estrutura.' },
      { dte: 40, titulo: 'Execucao Algoritmica', descricao: 'Montagem das diversas pernas simultaneamente. Em estruturas de 6 ou 8 pontas, a execucao manual e impossivel devido ao risco de "ficar pendurado" em metade da operacao.' },
      { dte: 0,  titulo: 'Convergencia de Design', descricao: 'No vencimento, a estrutura entrega o perfil de lucro customizado. O resultado e a prova real da precisao do seu desenho matematico.' }
    ],
    cenarios: [
      { titulo: 'Acao se comporta conforme o Design', resultado: 'Payoff Customizado Atendido', descricao: 'A estrutura entrega exatamente o retorno planejado para aquele intervalo de preco. Voce capturou uma oportunidade que outros traders sequer conseguiram visualizar no book.', cor: 'emerald' },
      { titulo: 'Mudanca drastica na Volatilidade (Vega)', resultado: 'Deformacao do Payoff', descricao: 'Estruturas muito complexas costumam ser sensiveis a mudancas na IV. Se a volatilidade mudar de forma nao planejada, as "dobras" do seu Origami podem se desfazer antes do tempo, exigindo ajuste.', cor: 'rose' },
      { titulo: 'Erro de Execucao (Slippage)', resultado: 'Risco Operacional', descricao: 'O maior perigo nao e o mercado, mas a montagem. Se uma perna for executada num preco errado, todo o equilibrio matematico da estrutura e comprometido.', cor: 'rose' }
    ],
    manejo: [
      { condicao: 'Acao sai da zona de controle do Payoff', acao: 'Ajuste dinamico de Gregas. Voce adiciona ou remove "dobras" (novas opcoes) para recalibrar o Delta e o Gamma da estrutura, mantendo o risco dentro do planejado.' },
      { condicao: 'Atingiu o lucro alvo em uma das pernas isoladas', acao: 'Avaliar se compensa "desmontar o Origami" por partes ou se a integridade da estrutura depende da permanencia de todas as pontas ate o final.' }
    ],
    comparativo: 'Versus Estruturas Convencionais: As convencionais sao como roupas de tamanho unico; o Origami e um terno sob medida. A complexidade nao garante maior lucro, mas garante maior PRECISAO. E a ferramenta definitiva para quem ja domina as Gregas e nao se satisfaz com as limitacoes das travas simples. E onde o trading de opcoes encontra a ciencia de dados.'
  },

    analogia: 'A Wheel-LEAP e uma variante de alta eficiencia de capital da tradicional Estrategia da Roda. Em vez de imobilizar 100% do valor do ativo em dinheiro para garantir a venda de uma PUT (Cash Secured Put), voce utiliza uma LEAP PUT (opcao de venda de longo prazo) como colateral sintetico. A LEAP atua como um "piso" de protecao e garantia de margem perante a corretora. Isso permite que voce execute os ciclos de renda mensal da Roda (Venda de PUT -> Exercicio -> Venda Coberta) utilizando apenas uma fracao do capital que seria necessario na versao classica, liberando o restante do caixa para outros investimentos.',
    quando_usar: [
      'Voce ja domina a Estrategia da Roda e busca escalar sua operacao com maior eficiencia financeira (alavancagem controlada).',
      'Existem opcoes de longo prazo (LEAPs) disponiveis com premios atrativos e liquidez suficiente para servirem de ancora.',
      'Sua corretora permite o uso de opcoes compradas de longo prazo como margem para o lancamento de opcoes curtas (operacoes em conta margem).'

    como_montar: 'CSNA3 esta cotada a R$ 15,00. Em vez de deixar R$ 1.500,00 parados em conta para garantir a venda de uma PUT no strike R$ 15,00, voce COMPRA uma LEAP PUT no strike R$ 15,00 com vencimento para 12 meses (paga R$ 2,50 por acao, ou R$ 250,00). Com a LEAP em custodia, voce VENDE a PUT mensal no strike R$ 15,00 (recebe R$ 0,80). O capital efetivamente imobilizado caiu de R$ 1.500,00 para os R$ 250,00 do custo da LEAP, aumentando o seu Retorno sobre Capital (ROC).',
    linha_do_tempo: [
      { dte: 365, titulo: 'Abertura do Colateral Longo', descricao: 'Voce adquire a LEAP PUT. Ela e a sua "ancora" de seguranca e o ativo que permite a alavancagem durante todo o ano, protegendo contra quedas sistemicas.' },
      { dte: 30, titulo: 'Ciclos de Renda (Motor de Fluxo)', descricao: 'Voce vende PUTs mensais contra a LEAP. Se a acao subir, voce embolsa o premio. Se cair, voce e exercido e passa a fazer Venda Coberta (Covered Call) normalmente, usando a LEAP como protecao.' },
      { dte: 90, titulo: 'Gestao da LEAP', descricao: 'Faltando cerca de 3 meses para o vencimento da LEAP, voce deve avaliar a rolagem para o proximo ano para evitar que o decaimento temporal (Theta) acelere na sua perna comprada.' }

    cenarios: [
      { titulo: 'Acao Lateral ou em Alta Moderada', resultado: 'Eficiencia Maxima', descricao: 'A PUT mensal vira po e voce retem todo o premio. O custo da LEAP e amortizado progressivamente pelos lancamentos mensais. O seu capital livre pode ser rentabilizado em outras frentes.', cor: 'emerald' },
      { titulo: 'Queda Acentuada do Ativo', resultado: 'Protecao de Cauda', descricao: 'Diferente da Roda classica onde voce sofre a queda cheia do papel, aqui a LEAP PUT valoriza e limita o seu prejuizo total. Voce possui um seguro ativo que o dinheiro parado em conta nao ofereceria.', cor: 'emerald' },
      { titulo: 'Acao disparou muito acima do Strike', resultado: 'Perda de Valor do Colateral', descricao: 'O valor da sua LEAP PUT comprada derrete. Embora voce ganhe nos premios das vendas mensais, a estrutura perde eficiencia como margem, exigindo uma rolagem do strike da LEAP para cima.', cor: 'amber' }
    ],
    manejo: [
      { condicao: 'Faltando 90 dias para o vencimento da LEAP', acao: 'Realize a rolagem da LEAP para o ano seguinte. O objetivo e manter o colateral sempre com um Theta baixo (decaimento lento) enquanto voce explora o Theta alto das opcoes mensais.' },
      { condicao: 'Acao caiu abaixo do strike da LEAP', acao: 'Sua protecao entrou no dinheiro (ITM). Voce pode encerrar a LEAP com lucro para compensar a desvalorizacao do ativo ou manter a estrutura como um "Married Put" se acreditar na recuperacao.' }
    ],
    comparativo: 'Versus Roda Classica: A Wheel-LEAP e uma operacao de arbitragem de capital. Enquanto a Roda classica exige R$ 15,00 de caixa para cada acao, a Wheel-LEAP exige apenas o premio da opcao longa (ex: R$ 2,50). Alem disso, a LEAP oferece um "stop loss" garantido em caso de crash, algo que o dinheiro em conta nao possui. O custo dessa vantagem e o decaimento temporal (Theta) da LEAP, que deve ser superado pelos premios coletados mensalmente.'
  },

'delta-hedging': {
    analogia: 'O Delta-Hedging e o processo de neutralizacao do risco direcional de uma carteira de opcoes. O objetivo e manter o "Delta da Posicao" o mais proximo de zero possivel (Delta-Neutral). Isso e feito comprando ou vendendo o ativo subjacente (acoes) em quantidades que anulem o Delta das opcoes. Quando voce esta Delta-Neutro, o valor da sua carteira nao muda com pequenas oscilacoes no preco da acao; seu lucro passa a depender exclusivamente do decaimento temporal (Theta) ou de mudancas na volatilidade (Vega). E a ferramenta fundamental para quem deseja "vender tempo" sem apostar em uma direcao.',
    quando_usar: [
      'Voce e um lancador (vendedor) de opcoes e quer coletar o Theta sem correr o risco de a acao se mover contra voce.',
      'Operacoes de Volatilidade Relativa: voce acredita que a Volatilidade Realizada sera menor que a Implicita (IV), independente da direcao.',
      'Gestao de grandes posicoes onde o risco de uma variacao brusca no Delta (causada pelo Gamma) pode gerar prejuizos superiores ao premio coletado.'
    ],
    como_montar: 'CSNA3 esta a R$ 15,00. Voce vende 1.000 CALLs no strike R$ 15,00, que possuem um Delta de 0,50 (exposicao equivalente a 500 acoes). Para neutralizar esse risco, voce COMPRA 500 acoes de CSNA3 no mercado a vista. Agora, se a acao subir R$ 1,00, voce ganha R$ 500,00 nas acoes e perde R$ 500,00 nas opcoes (Delta Zero). Seu lucro real vira do tempo passando e desvalorizando a opcao que voce vendeu.',
    linha_do_tempo: [
      { dte: 45, titulo: 'Neutralizacao Inicial', descricao: 'Voce calcula o Delta total da posicao e executa a compra/venda das acoes correspondentes para zerar a exposicao direcional.' },
      { dte: 21, titulo: 'Rebalanceamento Dinamico', descricao: 'Conforme a acao se move, o Delta das opcoes muda (efeito do Gamma). Voce precisa ajustar sua posicao em acoes (comprar mais ou vender parte) para retornar ao Delta Zero.' },
      { dte: 0,  titulo: 'Convergencia Final', descricao: 'No vencimento, as opcoes expiram. O lucro final e a diferenca entre o premio (Theta) coletado e os custos operacionais (slippage e taxas) dos rebalanceamentos realizados.' }
    ],
    cenarios: [
      { titulo: 'Mercado Lateral (Sideways)', resultado: 'Lucro de Theta', descricao: 'Cenario ideal. Como a acao nao se moveu muito, voce precisou de poucos rebalanceamentos. O decaimento temporal das opcoes foi capturado quase integralmente como lucro puro.', cor: 'emerald' },
      { titulo: 'Mercado em Tendencia Forte', resultado: 'Custo de Hedge Elevado', descricao: 'A acao se moveu muito, forcando constantes ajustes na posicao de acoes. O custo de "comprar caro e vender barato" nos rebalanceamentos (Gamma Scalping reverso) pode consumir todo o premio recebido.', cor: 'amber' },
      { titulo: 'Explosao de Volatilidade Realizada', resultado: 'Prejuizo Tecnico', descricao: 'Se a acao oscilar (volatilidade) mais do que a IV previa, o custo para manter o Delta Neutro supera o valor da opcao vendida. A protecao (hedge) custou mais caro que o beneficio.', cor: 'rose' }
    ],
    manejo: [
      { condicao: 'Delta da Posicao ultrapassa o limite de tolerancia', acao: 'Ajuste imediato no ativo subjacente. Profissionais rebalanceiam quando o Delta foge de uma "banda" pre-definida (ex: +/- 5% da exposicao total).' },
      { condicao: 'Proximidade do vencimento (Gamma Alto)', acao: 'O Delta muda de forma explosiva perto do vencimento. O manejo torna-se muito caro e arriscado. O ideal e encerrar ou rolar a posicao antes da semana do exercicio.' }
    ],
    comparativo: 'O Delta-Hedging nao e uma estrategia de aposta, mas uma metodologia de controle de risco. Enquanto um investidor comum "torce" para a acao nao subir, o Delta-Hedger ajusta sua posicao para que o movimento seja irrelevante. Para o pequeno investidor (PF), o custo de corretagem em rebalanceamentos frequentes costuma inviabilizar a pratica rigorosa, servindo mais como um conceito para entender o risco das Gregas.'
  },

'rolagem-baixo': {
    analogia: 'A Rolagem para Baixo e uma manobra defensiva utilizada quando o preco da acao cai e se aproxima (ou ultrapassa) o strike da sua PUT vendida. A tecnica consiste em encerrar a posicao atual (recomprar a opcao com prejuizo) e, simultaneamente, abrir uma nova venda em um strike mais baixo (mais seguro). Para que essa operacao faca sentido financeiro, ela e geralmente combinada com uma "Rolagem para Fora" (extensao do prazo), garantindo que o premio recebido pela nova opcao seja superior ao custo de recompra da antiga, gerando um credito liquido e reduzindo o seu preco de equilibrio (Break-even).',
    quando_usar: [
      'O preco do ativo caiu e esta testando o strike da sua PUT vendida, aumentando o risco de exercicio.',
      'Voce ainda mantem o vies de alta ou neutralidade para o papel no longo prazo e nao quer ser exercido no preco atual.',
      'A Volatilidade Implicita (IV) esta alta, o que aumenta o premio das opcoes mais distantes e facilita a rolagem com credito.'
    ],
    como_montar: 'CSNA3 caiu para R$ 14,50 e sua PUT vendida tem strike R$ 15,00 (vencimento em 5 dias). Passo 1: Voce recompra a PUT de R$ 15,00 (paga R$ 0,80). Passo 2: Voce vende uma nova PUT no strike R$ 14,00 para o mes seguinte (recebe R$ 1,00). Resultado: Voce baixou o seu risco em R$ 1,00 e ainda recebeu um credito liquido de R$ 0,20 por acao. Regra de Ouro: Se a conta resultar em debito (pagar para rolar), a operacao nao e recomendada, pois voce esta aumentando o prejuizo sem garantia de recuperacao.',
    linha_do_tempo: [
      { dte: 7, titulo: 'Monitoramento do Strike', descricao: 'Faltando pouco para o vencimento e com o strike "no dinheiro" (ITM), a rolagem torna-se necessaria para evitar o exercicio ou a perda de valor extrinseco.' },
      { dte: 4, titulo: 'Execucao da Defesa', descricao: 'Momento ideal para a rolagem. Voce fecha a serie atual e abre a proxima, "comprando tempo" para que o ativo se recupere acima do novo strike.' },
      { dte: 0, titulo: 'Novo Ciclo de Protecao', descricao: 'A posicao antiga foi encerrada. Voce agora tem uma obrigacao em um patamar mais baixo e seguro, com o caixa reforcado pelo credito da rolagem.' }
    ],
    cenarios: [
      { titulo: 'Rolagem com Credito Liquido', resultado: 'Sucesso Defensivo', descricao: 'Voce conseguiu baixar o strike e colocar mais dinheiro no bolso. Seu novo break-even esta significativamente mais baixo, aumentando sua margem de seguranca.', cor: 'emerald' },
      { titulo: 'Rolagem com "Zero a Zero"', resultado: 'Aceitavel', descricao: 'Voce nao recebeu credito, mas conseguiu baixar o strike sem custo adicional. E valido para evitar um exercicio em um preco que voce considera caro.', cor: 'amber' },
      { titulo: 'Rolagem exigindo Debito', resultado: 'Risco Elevado (Evitar)', descricao: 'O mercado esta cobrando para voce se defender. Isso indica que a queda foi muito brusca ou a IV esta baixa. Nestes casos, pode ser melhor aceitar o exercicio ou encerrar a posicao com prejuizo fixo.', cor: 'rose' }
    ],
    manejo: [
      { condicao: 'Acao continua caindo apos a primeira rolagem', acao: 'Repetir o processo (Rolar para baixo e para fora) enquanto for possivel obter credito liquido. Se o ativo perder os fundamentos, encerre a operacao.' },
      { condicao: 'Acao se recupera e ultrapassa o novo strike', acao: 'A nova PUT vendida valoriza (derrete). Voce pode encerrar antecipadamente com lucro ou aguardar o vencimento para embolsar o premio total.' }
    ],
    comparativo: 'Versus Rolagem no Tempo: Na rolagem apenas temporal, voce mantem o strike e so ganha tempo. Na Rolagem para Baixo, voce prioriza a seguranca do strike. Para o pequeno investidor, a combinacao dos dois (Baixo + Fora) e a ferramenta mais potente para "cozinhar" uma posicao perdedora ate que ela se torne vencedora.'
  },

'rolagem-cima': {
    analogia: 'A Rolagem para Cima e uma manobra de ajuste em posicoes de Venda Coberta (Covered Call) ou travas de credito quando o preco da acao sobe alem do esperado. A tecnica consiste em recomprar a CALL atual (que esta "No Dinheiro" ou "Dentro do Dinheiro") e vender uma nova CALL em um strike mais alto. O objetivo e "liberar" mais espaco para que a sua acao valorize na carteira, aumentando o seu ganho de capital. Como as CALLs ITM sao caras para recomprar, essa manobra quase sempre exige uma "Rolagem para Fora" (extensao do prazo) para que o premio da nova opcao cubra o custo da anterior, idealmente gerando um credito liquido.',
    quando_usar: [
      'O preco da acao ultrapassou o strike da sua CALL vendida e voce deseja manter a posse das acoes para capturar dividendos ou valorizacao adicional.',
      'Voce acredita que a tendencia de alta vai continuar e o strike antigo ficou "curto" demais para o potencial do papel.',
      'A rolagem permite subir o strike mantendo um custo zero ou gerando um pequeno credito (Rolagem Up and Out).'
    ],
    como_montar: 'Voce tem acoes de CSNA3 e vendeu uma CALL no strike R$ 15,00. A acao subiu para R$ 16,50. Passo 1: Voce recompra a CALL de R$ 15,00 (paga R$ 1,80). Passo 2: Voce vende uma nova CALL no strike R$ 17,00 para o vencimento seguinte (recebe R$ 1,95). Resultado: Voce subiu o teto de venda da sua acao em R$ 2,00 e ainda recebeu um credito de R$ 0,15 por acao. Se voce fizesse a rolagem para o mesmo mes, provavelmente pagaria um debito alto, o que raramente compensa.',
    linha_do_tempo: [
      { dte: 7, titulo: 'Ameaca de Exercicio', descricao: 'A acao esta acima do strike. O valor extrinseco da opcao vendida esta sumindo. E o momento tecnico para decidir entre a rolagem ou a entrega das acoes.' },
      { dte: 3, titulo: 'Subida do Teto', descricao: 'Voce executa a rolagem. Ao subir o strike, voce "destrava" o potencial de lucro da acao que estava limitado pelo strike anterior.' },
      { dte: 0, titulo: 'Novo Horizonte de Alta', descricao: 'A posicao antiga foi encerrada. Voce inicia o novo mes com um strike mais condizente com o preco atual de mercado, mantendo a geracao de renda ativa.' }
    ],
    cenarios: [
      { titulo: 'Rolagem Up and Out com Credito', resultado: 'Excelente', descricao: 'Voce conseguiu subir o strike de venda E colocar premio no bolso. Voce otimizou o retorno total da carteira (Capital Gain + Yield).', cor: 'emerald' },
      { titulo: 'Rolagem com Debito Pequeno', resultado: 'Aceitavel', descricao: 'Voce pagou um pouco para subir o strike. Isso so vale a pena se o aumento no strike (espaco para alta) for muito superior ao valor pago no debito da rolagem.', cor: 'amber' },
      { titulo: 'Rolagem com Debito Alto', resultado: 'Melhor ser Exercido', descricao: 'Se o mercado cobra caro demais para rolar, aceite o exercicio. Realize o lucro da venda da acao no strike antigo e procure uma nova oportunidade de entrada ou venda de PUT.', cor: 'rose' }
    ],
    manejo: [
      { condicao: 'O custo da recompra e muito maior que o premio da nova serie', acao: 'Nao role. Deixe ser exercido. O objetivo da opcao e ser um plano de saida lucrativo; nao transforme um lucro garantido em um custo desnecessario.' },
      { condicao: 'Deseja manter o papel a qualquer custo', acao: 'Tente a rolagem para strikes cada vez mais longos (vencimentos de 60 ou 90 dias) ate encontrar um premio que neutralize o custo da recompra.' }
    ],
    comparativo: 'Versus Aceitar o Exercicio: Aceitar o exercicio zera sua posicao e coloca o dinheiro no bolso. A Rolagem para Cima mantem voce no jogo, mas "paga pedagio" para subir o strike. A decisao deve ser baseada no custo de oportunidade: o premio que voce ganha compensa o risco de a acao cair e voce perder o lucro que ja estava garantido no strike anterior?'
  },

'rolagem-diagonal': {
    analogia: 'A Rolagem Diagonal e a manobra defensiva mais flexivel do arsenal de um trader. Ela consiste em ajustar simultaneamente o strike e o vencimento de uma opcao. Em vez de apenas "empurrar" o problema para o mes seguinte no mesmo preco, voce move a sua obrigacao para um strike mais seguro (mais longe do preco atual) e compensa o custo dessa mudanca estendendo o prazo de validade. E a estrategia ideal para quando um ativo sofre um movimento brusco e voce precisa de "distancia" e "tempo" para que a tese original se recupere, garantindo que a operacao sempre resulte em um credito liquido.',
    quando_usar: [
      'A opcao vendida esta profundamente "No Dinheiro" (ITM) e uma rolagem apenas de tempo (mesmo strike) nao gera credito.',
      'Voce precisa de uma margem de seguranca maior (distanciar o strike) devido a uma mudanca na volatilidade ou nos fundamentos do ativo.',
      'Voce deseja reduzir o seu risco direcional (Delta) e o seu risco de aceleracao (Gamma) movendo a operacao para uma serie mais longa e um strike fora do dinheiro (OTM).'
    ],
    como_montar: 'CSNA3 desabou para R$ 13,50 e voce tem uma PUT vendida no strike R$ 15,00 vencendo em 4 dias. Passo 1: Voce recompra a PUT de R$ 15,00 (paga R$ 1,60). Passo 2: Em vez de rolar para o strike 15 do mes seguinte, voce vende uma PUT no strike R$ 13,00 para daqui a 60 dias (recebe R$ 1,85). Resultado: Voce baixou seu strike em R$ 2,00 (ganhou distancia) e ainda recebeu um credito liquido de R$ 0,25 por acao para "esperar" o mercado se acalmar.',
    linha_do_tempo: [
      { dte: 7, titulo: 'Analise de Viabilidade', descricao: 'O strike original foi rompido. Voce testa combinacoes de novos strikes e novos prazos (30, 60 ou 90 dias) ate encontrar um ponto que gere credito satisfatorio.' },
      { dte: 3, titulo: 'Execucao da Diagonal', descricao: 'Voce encerra a serie curta e abre a serie longa em um patamar de preco muito mais confortavel. O seu "Delta" diminui, tornando a posicao menos sensivel a novas quedas.' },
      { dte: 0, titulo: 'Periodo de Maturacao', descricao: 'Com mais tempo e um strike melhor, voce permite que o decaimento temporal (Theta) da nova opcao comece a trabalhar, enquanto aguarda a reversao do ativo.' }
    ],
    cenarios: [
      { titulo: 'Credito Liquido com Melhora de Strike', resultado: 'Defesa Perfeita', descricao: 'Voce conseguiu se afastar do perigo (melhorou o strike) e ainda aumentou o caixa da operacao. A probabilidade de lucro (POP) da nova posicao e muito maior que a anterior.', cor: 'emerald' },
      { titulo: 'Rolagem com Debito (Erro Tecnico)', resultado: 'Nao Executar', descricao: 'Se a combinacao de tempo e strike exigir que voce tire dinheiro do bolso, a diagonal perde sua funcao defensiva. Procure um strike mais proximo ou um prazo ainda mais longo para garantir o credito.', cor: 'rose' },
      { titulo: 'Ativo continua caindo apos a Diagonal', resultado: 'Nova Rolagem ou Exercicio', descricao: 'Mesmo com a diagonal, o risco de queda persiste. Se o novo strike for testado, voce tera que decidir entre uma nova diagonal para um prazo ainda maior ou aceitar a compra definitiva do ativo.', cor: 'amber' }
    ],
    manejo: [
      { condicao: 'O ativo volta a subir antes do esperado', acao: 'A nova PUT vendida (de longo prazo) desvalorizara. Voce pode encerrar a posicao antecipadamente com lucro, sem precisar esperar os 60 dias totais do novo vencimento.' },
      { condicao: 'Distorcao de IV entre os vencimentos', acao: 'Aproveite momentos em que a volatilidade curta esta muito alta para rolar para uma serie longa onde a IV esta menor (comprando Vega barato e vendendo Vega caro).' }
    ],
    comparativo: 'Versus Rolagem Horizontal (Tempo): A horizontal apenas adia o problema no mesmo preco. A Diagonal resolve o problema do preco usando o tempo como moeda de troca. E a manobra mais resiliente para gerenciar "caudas" de mercado e evitar exercicios indesejados em momentos de panico.'
  },

'conversao': {
    analogia: 'A Conversao Defensiva e a manobra de transformar uma posicao de venda a descoberto (nua) em uma estrutura travada (spread). Quando uma PUT vendida e testada pela queda do ativo, o operador compra uma PUT de strike mais baixo para limitar o risco de cauda. Tecnicamente, voce converte uma obrigacao de compra aberta em um Bull Put Spread. O objetivo nao e necessariamente transformar o prejuizo em lucro imediato, mas sim "comprar tranquilidade", eliminando a possibilidade de uma perda catastrofica e definindo com precisao o seu prejuizo maximo (Max Loss) para o vencimento.',
    quando_usar: [
      'A acao caiu e esta testando o strike da sua PUT vendida, gerando uma exposicao direcional (Delta) perigosa.',
      'Voce ainda acredita na recuperacao do ativo, mas nao tem margem ou estomago para suportar novas quedas acentuadas.',
      'A Volatilidade Implicita (IV) subiu, tornando o custo da PUT de protecao aceitavel frente ao risco de queda livre.'
    ],
    como_montar: 'CSNA3 caiu para R$ 14,50 e voce tem uma PUT vendida no strike R$ 15,00 (recebeu R$ 0,70 na montagem). Para converter, voce COMPRA uma PUT no strike R$ 13,00 (paga R$ 0,25). Agora, sua posicao deixou de ser "venda de PUT" e virou um "Bull Put Spread 15-13". Sua perda maxima agora esta travada em R$ 2,00 (distancia entre strikes) menos o credito liquido final de R$ 0,45. Nao importa se a acao cair para zero, voce nunca perdera mais que R$ 1,55 por acao.',
    linha_do_tempo: [
      { dte: 15, titulo: 'Identificacao do Risco', descricao: 'O ativo rompe suportes tecnicos. O Delta da PUT vendida aumenta agressivamente. E o momento de decidir entre fechar com prejuizo ou travar a posicao.' },
      { dte: 14, titulo: 'Execucao da Trava', descricao: 'Compra-se a PUT de protecao (asa inferior). A margem de garantia exigida pela corretora cai imediatamente, pois o risco agora e limitado.' },
      { dte: 0,  titulo: 'Exposicao Controlada', descricao: 'No vencimento, se a acao estiver acima de R$ 15,00, voce ainda fica com o lucro remanescente. Se estiver abaixo de R$ 13,00, voce entrega o prejuizo maximo e preserva o resto do seu capital.' }
    ],
    cenarios: [
      { titulo: 'Recuperacao para R$ 15,05', resultado: 'Lucro Reduzido', descricao: 'A acao voltou. Ambas as opcoes expiram sem valor. Voce lucra o premio original menos o custo da PUT de protecao que voce comprou para dormir tranquilo.', cor: 'emerald' },
      { titulo: 'Queda para R$ 10,00 (Crash)', resultado: 'Prejuizo Travado', descricao: 'Sem a conversao, voce estaria perdendo R$ 5,00 por acao. Com a trava, sua perda parou nos R$ 1,55. A estrategia cumpriu sua funcao de "cinto de seguranca".', cor: 'amber' },
      { titulo: 'Acao lateral em R$ 14,00', resultado: 'Prejuizo Parcial', descricao: 'Voce e exercido na venda de 15, mas a PUT de 13 ainda tem valor. O resultado e negativo, mas controlado dentro do gerenciamento de risco.', cor: 'rose' }
    ],
    manejo: [
      { condicao: 'Acao volta a subir forte', acao: 'Se a acao recuperar o patamar de seguranca, voce pode vender a PUT de protecao (que agora vale pouco) para tentar recuperar o custo da conversao, voltando a ficar "nu" se o cenario for favoravel.' },
      { condicao: 'Deseja encerrar tudo', acao: 'Basta desmontar o spread. Como o risco e limitado, o valor de mercado da estrutura sera mais estavel que o da PUT isolada.' }
    ],
    comparativo: 'Versus Fechamento Total: Fechar a posicao aceita o prejuizo na hora. A Conversao mantem voce no trade para uma possivel recuperacao, mas com um "stop" matematico. Versus Rolagem: A Rolagem joga o problema para o futuro; a Conversao resolve o risco no presente. E a manobra ideal para quem opera com responsabilidade e evita o risco de ruina.'
  },

'fechamento-parcial': {
    analogia: 'O Fechamento Parcial e a tecnica de realizar o lucro de pernas isoladas em uma estrutura multi-perna antes do vencimento. Em vez de esperar que toda a estrategia converja, o operador encerra as travas ou opcoes que ja atingiram seu alvo de rentabilidade (geralmente entre 80% e 90% do premio maximo). Isso permite reduzir a margem de garantia exigida, diminuir o Delta da carteira e eliminar o risco de uma reversao brusca (Gamma Risk) que poderia transformar um lucro latente em prejuizo nas ultimas semanas do contrato.',
    quando_usar: [
      'Uma das pernas de um Iron Condor, Strangle ou Butterfly atingiu o seu objetivo de lucro antecipadamente.',
      'Voce deseja "desalavancar" a posicao, retirando capital de risco do mercado e garantindo parte do resultado financeiro.',
      'O tempo restante (DTE) e baixo e a perna lucrativa esta muito proxima do strike, aumentando a sensibilidade a oscilacoes (Gamma alto).'
    ],
    como_montar: 'Voce montou um Iron Condor em CSNA3, recebendo R$ 1,00 de credito total (R$ 0,50 do Bear Call e R$ 0,50 do Bull Put). A acao subiu e se estabilizou. O seu Bull Put Spread (lado da baixa) agora vale apenas R$ 0,05 para recomprar. Passo: Voce faz o Fechamento Parcial recomprando essa trava de PUT. Voce garantiu R$ 0,45 de lucro real e agora sua unica preocupacao e o lado da CALL. Se o mercado cair agora, voce ja colocou metade do lucro no bolso.',
    linha_do_tempo: [
      { dte: 21, titulo: 'Regra dos 80%', descricao: 'Ao atingir 80% do lucro maximo em uma perna especifica, voce a encerra. O "custo de oportunidade" de esperar 21 dias para ganhar os 20% restantes e ineficiente.' },
      { dte: 10, titulo: 'Reducao de Exposicao', descricao: 'Com metade da estrutura fechada, sua margem de garantia na corretora e liberada, permitindo que voce use esse capital em novas oportunidades ou mantenha o caixa protegido.' },
      { dte: 0,  titulo: 'Finalizacao do Trade', descricao: 'A perna restante (que ainda tinha valor extrinseco) expira ou e fechada, completando o resultado total da operacao.' }

    cenarios: [

<script>
// Formatadores locais — delegam ao Formatador global quando disponivel
function caFmtMoeda(v) {
  var F = window.Formatador;
  if (F && F.moeda) return F.moeda(v);
  if (v == null || v === '') return '--';
  var n = parseFloat(v);
  if (isNaN(n)) return '--';
  return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function caFmtNum(v) {
  if (v == null || v === '') return '--';
  var n = parseFloat(v);
  if (isNaN(n)) return '--';
  return n.toLocaleString('pt-BR');
}

function caFmtPct(v) {
  var F = window.Formatador;
  if (F && F.pct) return F.pct(parseFloat(v || 0) * 100, 2);
  if (v == null) return '--';
  var n = parseFloat(v);
  if (isNaN(n)) return '--';
  return (n * 100).toFixed(2).replace('.', ',') + '%';
}

function caFmtDate(v) {
  var F = window.Formatador;
  if (F && F.data) return F.data(v);
  if (!v) return '--';
  if (v instanceof Date) return v.toLocaleDateString('pt-BR');
  return String(v).split(' ')[0];
}

// Posicionamento da barra Spot/Strike (range bar legivel)
// Retorna percentuais 0-100 para os marcadores + zona de exercicio.
function caTrackPos(op) {
  var strike = parseFloat(op.strike)    || 0;
  var spot   = parseFloat(op.spotPrice) || 0;
  if (!strike || !spot) return null;
  var mid    = (strike + spot) / 2;
  var spread = Math.max(Math.abs(spot - strike) * 2.5, strike * 0.06);
  var min    = mid - spread / 2;
  var max    = mid + spread / 2;
  var range  = max - min || 1;
  var sPct   = Math.max(8, Math.min(92, ((strike - min) / range) * 100));
  var spPct  = Math.max(8, Math.min(92, ((spot   - min) / range) * 100));
  var isPut  = String(op.tipoOpcao || '').toUpperCase().indexOf('PUT') >= 0;
  var exW, exL, sfW, sfL;
  // Zona de exercicio (perigo) x zona segura, separadas pelo strike.
  // PUT exerce abaixo do strike; CALL exerce acima.
  if (isPut) { exW = sPct;       exL = 0;    sfW = 100 - sPct; sfL = sPct; }
  else       { exW = 100 - sPct; exL = sPct; sfW = sPct;       sfL = 0;    }
  return {
    strikePct: sPct, spotPct: spPct,
    exerW: exW, exerLeft: exL,
    safeW: sfW, safeLeft: sfL,
    isPut: isPut
  };
}

// Tom de cor por moneyness — usado para evidenciar OTM/ITM/ATM na barra.
// ITM e ATM usam cores saturadas direto (não os tokens -light/-muted que são
// muito apagados) para garantir destaque visual mesmo no tema claro.
function caMoneyTone(op) {
  var m = String(op.moneynessCode || '').toUpperCase();
  if (m.indexOf('ITM') >= 0) return {
    code: 'ITM',
    cor:   'var(--brand-rose)',
    light: 'rgba(225,29,72,0.18)',
    muted: 'rgba(225,29,72,0.55)',
    glow:  '0 0 0 3px rgba(225,29,72,0.40), 0 0 10px rgba(225,29,72,0.30)'
  };
  if (m.indexOf('ATM') >= 0) return {
    code: 'ATM',
    cor:   'var(--brand-amber)',
    light: 'rgba(217,119,6,0.18)',
    muted: 'rgba(217,119,6,0.55)',
    glow:  '0 0 0 3px rgba(217,119,6,0.45), 0 0 10px rgba(217,119,6,0.30)'
  };
  return {
    code:  (m || 'OTM'),
    cor:   'var(--brand-emerald)',
    light: 'var(--brand-emerald-light)',
    muted: 'var(--brand-emerald-muted)',
    glow:  '0 0 0 3px var(--brand-emerald-muted), var(--shadow-sm)'
  };
}

function caFmtDistancia(v) {
  var F = window.Formatador;
  if (F && F.distanciaPct) return F.distanciaPct(v);
  if (v == null) return '--';
  var n = parseFloat(v);
  if (isNaN(n)) return '--';
  return (n >= 0 ? '+' : '') + n.toFixed(1).replace('.', ',') + '%';
}

// Contexto visual por moneyness + P/L
function caGetCtx(op) {
  var m   = String(op.moneynessCode || '').toUpperCase();
  var pct = parseFloat(op.plTotalPct) || 0;

  if (m.indexOf('ITM') >= 0) return {
    cardStyle:   'border-color:var(--brand-rose-muted);background:var(--brand-rose-light);',
    badgeStyle:  'color:#fff;background:var(--brand-rose);border-color:var(--brand-rose);',
    footerStyle: 'background:var(--brand-rose-light);border-color:var(--brand-rose-muted);color:var(--brand-rose);',
    icon: '🚨'
  };
  if (m.indexOf('ATM') >= 0) return {
    cardStyle:   'border-color:var(--brand-amber-muted);background:var(--brand-amber-light);',
    badgeStyle:  'color:var(--brand-amber);background:var(--brand-amber-light);border-color:var(--brand-amber-muted);',
    footerStyle: 'background:var(--brand-amber-light);border-color:var(--brand-amber-muted);color:var(--brand-amber);',
    icon: '⚠️'
  };
  return {
    cardStyle:   'border-color:var(--brand-emerald-muted);background:var(--brand-emerald-light);',
    badgeStyle:  'color:var(--brand-emerald);background:var(--brand-emerald-light);border-color:var(--brand-emerald-muted);',
    footerStyle: 'background:var(--brand-emerald-light);border-color:var(--brand-emerald-muted);color:var(--brand-emerald);',
    icon: '✅'
  };
}

// Badge do tipo (CALL/PUT + direcao)
function caGetTipoBadge(op) {
  var t = String(op.tipoOpcao    || '').toUpperCase();
  var d = String(op.direcaoTrade || '').toUpperCase();
  if (d.indexOf('VENDA')  >= 0 && t.indexOf('PUT')  >= 0) return 'color:var(--brand-indigo);background:var(--brand-indigo-light);border-color:var(--brand-indigo-muted);';
  if (d.indexOf('VENDA')  >= 0 && t.indexOf('CALL') >= 0) return 'color:var(--brand-amber);background:var(--brand-amber-light);border-color:var(--brand-amber-muted);';
  if (d.indexOf('COMPRA') >= 0 && t.indexOf('PUT')  >= 0) return 'color:var(--brand-rose);background:var(--brand-rose-light);border-color:var(--brand-rose-muted);';
  if (d.indexOf('COMPRA') >= 0 && t.indexOf('CALL') >= 0) return 'color:var(--brand-emerald);background:var(--brand-emerald-light);border-color:var(--brand-emerald-muted);';
  return 'color:var(--text-muted);background:var(--surface-overlay);border-color:var(--border-subtle);';
}

function caTipoBadgeLabel(op) {
  var d = String(op.direcaoTrade || '');
  return d.charAt(0) + ' ' + (op.tipoOpcao || '');
}

// 9 metricas — nenhuma removida
function caBuildMetricas(op) {
  var pl = parseFloat(op.plTotalPct) || 0;
  return [
    { label: 'Premio Medio', value: caFmtMoeda(op.premioMedio),                   style: 'color:var(--text-secondary);' },
    { label: 'Premio Atual', value: caFmtMoeda(op.premioAtual),                   style: 'color:var(--text-secondary);' },
    { label: 'Break-Even',   value: caFmtMoeda(op.breakEven || 0),                style: 'color:var(--text-secondary);' },
    { label: 'Ganho Max.',   value: caFmtMoeda(op.ganhoMaximo),                   style: 'color:var(--brand-emerald);' },
    { label: 'P/L %',        value: caFmtPct(op.plTotalPct),                      style: pl >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);' },
    { label: 'Lucro Max.',   value: caFmtPct(op.potencialLucroPct || 0),          style: 'color:var(--text-secondary);' },
    { label: 'Delta',        value: (op.delta != null ? parseFloat(op.delta).toFixed(4).replace('.', ',') : '--'), style: 'color:var(--brand-indigo);' },
    { label: 'POE',          value: (op.poe != null ? parseFloat(op.poe).toFixed(2).replace('.', ',') + '%' : '--'), style: 'color:var(--text-secondary);' },
    { label: 'Nocional',     value: caFmtMoeda(op.nocional),                      style: 'color:var(--text-primary);' }
  ];
}

// Componente principal
window.CardCarouselAtivas = {
  props: {
    isMobile:           { type: Boolean, default: false },
    isLoading:          { type: Boolean, default: false },
    statsPreCalculados: Object
  },
  template: '#card-carousel-ativas-template',

  computed: {
    activeTrades: function() {
      var lista = (this.statsPreCalculados && this.statsPreCalculados.listaAtivas) ? this.statsPreCalculados.listaAtivas : [];

      function vencTs(op) {
        var d = op.dataVencimento;
        if (!d) return 9999999999999;
        var dt = (d instanceof Date) ? d : new Date(d);
        if (isNaN(dt.getTime())) return 9999999999999;
        return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()).getTime();
      }

      function moneynessOrdem(op) {
        var m = String(op.moneynessCode || '').toUpperCase();
        if (m.indexOf('ITM') >= 0) return 0;
        if (m.indexOf('ATM') >= 0) return 1;
        return 2; // OTM ou desconhecido
      }

      return lista.slice().sort(function(a, b) {
        // 1º: vencimento mais próximo (por data real, não DTE)
        var dateDiff = vencTs(a) - vencTs(b);
        if (dateDiff !== 0) return dateDiff;
        // 2º: ITM → ATM → OTM
        var mDiff = moneynessOrdem(a) - moneynessOrdem(b);
        if (mDiff !== 0) return mDiff;
        // 3º: ticker alfabético
        return (a.tickerAtivo || '').localeCompare(b.tickerAtivo || '');
      });
    },

    operacoesPorVencimento: function() {
      var resultado = {};
      if (!this.activeTrades.length) return resultado;
      this.activeTrades.forEach(function(op) {
        var venc = window.Formatador ? window.Formatador.campo('dataVencimento', op.dataVencimento) : (op.dataVencimento || '--');
        if (!resultado[venc]) resultado[venc] = [];
        resultado[venc].push(op);
      });
      return resultado;
    },

    opsOTM: function() {
      var stats = this.statsPreCalculados;
      return (stats && stats.moneynessStats && stats.moneynessStats.otm != null)
        ? stats.moneynessStats.otm : 0;
    },

    opsITM: function() {
      var stats = this.statsPreCalculados;
      return (stats && stats.moneynessStats && stats.moneynessStats.itm != null)
        ? stats.moneynessStats.itm : 0;
    }
  },

  methods: {
    fmtMoeda:    caFmtMoeda,
    fmtNum:      caFmtNum,
    fmtPct:      caFmtPct,
    fmtDate: function(v) {
      var F = window.Formatador;
      if (F && F.data) return F.data(v);
      if (!v) return '--';
      if (v instanceof Date) return v.toLocaleDateString('pt-BR');
      return String(v).split(' ')[0];
    },
    fmtDistancia: caFmtDistancia,
    trackPos:    caTrackPos,
    moneyTone:   caMoneyTone,
    getCtx:      caGetCtx,
    getTipoBadge: caGetTipoBadge,
    tipoBadgeLabel: caTipoBadgeLabel,
    buildMetricas: caBuildMetricas
  }
};
</script>

</div>

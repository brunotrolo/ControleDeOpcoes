<div id="card-vencimentos-html">

<!-- ======================================================================
     TEMPLATE: CARD-VENCIMENTOS
     Calendário executivo de vencimentos agrupado por data de expiração.
     Dados: statsPreCalculados.distribuicaoVencimentos (do Agregador)
     ====================================================================== -->
<template id="card-vencimentos-template">
  <div class="premium-card" style="padding:0;overflow:hidden;">

    <!-- ── Skeleton ── -->
    <div v-if="isEmpty" style="padding:1.5rem;">
      <div style="height:22px;width:220px;border-radius:var(--radius-sm);
                  background:var(--surface-overlay);margin-bottom:1.25rem;
                  animation:cv-pulse 1.5s ease infinite;"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-bottom:1.25rem;">
        <div v-for="n in 3" :key="n"
          style="height:72px;border-radius:var(--radius-md);background:var(--surface-overlay);
                 animation:cv-pulse 1.5s ease infinite;"></div>
      </div>
      <div v-for="n in 4" :key="'r'+n"
        style="height:48px;border-radius:var(--radius-sm);background:var(--surface-overlay);
               margin-bottom:0.375rem;animation:cv-pulse 1.5s ease infinite;"></div>
    </div>

    <!-- ── Content ── -->
    <div v-else>

      <!-- Header -->
      <div style="padding:1.25rem 1.5rem 1rem;display:flex;justify-content:space-between;
                  align-items:center;border-bottom:1px solid var(--border-subtle);">
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <div style="width:32px;height:32px;border-radius:var(--radius-md);flex-shrink:0;
                      background:var(--brand-indigo-light);border:1px solid var(--brand-indigo-muted);
                      display:flex;align-items:center;justify-content:center;">
            <i data-lucide="calendar-clock" style="width:16px;height:16px;color:var(--brand-indigo);"></i>
          </div>
          <div>
            <div class="t-title" style="color:var(--text-primary);">Calendário de Vencimentos</div>
            <div class="t-label" style="color:var(--text-muted);margin-top:2px;">
              Pipeline de expiração das posições ativas
            </div>
          </div>
        </div>
        <span style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;font-weight:700;
                     color:var(--brand-indigo);background:var(--brand-indigo-light);
                     border:1px solid var(--brand-indigo-muted);padding:3px 10px;
                     border-radius:99px;text-transform:uppercase;letter-spacing:0.08em;
                     white-space:nowrap;">
          {{ vencimentos.length }} datas · {{ totalPosicoes }} pos
        </span>
      </div>

      <!-- Buckets de urgência -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;
                  border-bottom:1px solid var(--border-subtle);">

        <div style="padding:0.875rem 1rem;border-right:1px solid var(--border-subtle);text-align:center;">
          <div style="font-size:0.56rem;font-weight:700;color:var(--brand-rose);
                      text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px;">
            Urgente ≤15d
          </div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:800;
                      color:var(--brand-rose);line-height:1;">{{ urgente.pos }}</div>
          <div style="font-size:0.58rem;color:var(--text-muted);margin-top:3px;">
            pos · {{ urgente.datas }} exp
          </div>
        </div>

        <div style="padding:0.875rem 1rem;border-right:1px solid var(--border-subtle);text-align:center;">
          <div style="font-size:0.56rem;font-weight:700;color:var(--brand-amber);
                      text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px;">
            Atenção 16–45d
          </div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:800;
                      color:var(--brand-amber);line-height:1;">{{ atencao.pos }}</div>
          <div style="font-size:0.58rem;color:var(--text-muted);margin-top:3px;">
            pos · {{ atencao.datas }} exp
          </div>
        </div>

        <div style="padding:0.875rem 1rem;text-align:center;">
          <div style="font-size:0.56rem;font-weight:700;color:var(--brand-emerald);
                      text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px;">
            Conforto >45d
          </div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:800;
                      color:var(--brand-emerald);line-height:1;">{{ conforto.pos }}</div>
          <div style="font-size:0.58rem;color:var(--text-muted);margin-top:3px;">
            pos · {{ conforto.datas }} exp
          </div>
        </div>

      </div>

      <!-- Cabeçalho de colunas (desktop) -->
      <div v-if="!isMobile"
        style="display:grid;grid-template-columns:80px 1fr 52px 1fr 1fr 1fr;
               padding:0.5rem 1.5rem;background:var(--surface-sunken);
               border-bottom:1px solid var(--border-subtle);">
        <div class="t-label" style="color:var(--text-muted);">DTE</div>
        <div class="t-label" style="color:var(--text-muted);">Vencimento</div>
        <div class="t-label" style="color:var(--text-muted);text-align:center;">Pos.</div>
        <div class="t-label" style="color:var(--text-muted);text-align:right;">Nocional</div>
        <div class="t-label" style="color:var(--text-muted);text-align:right;">Ganho Máx</div>
        <div class="t-label" style="color:var(--text-muted);text-align:right;">P/L Aberto</div>
      </div>

      <!-- Linhas de vencimento -->
      <div>
        <div v-for="(v, idx) in vencimentos" :key="v.dataVencimento"
          style="border-bottom:1px solid var(--border-subtle);padding:0 1.5rem;"
          :style="(idx % 2 === 1) ? 'background:var(--surface-sunken);' : 'background:var(--surface-base);'">

          <!-- Desktop -->
          <div v-if="!isMobile"
            style="display:grid;grid-template-columns:80px 1fr 52px 1fr 1fr 1fr;
                   padding:0.75rem 0;align-items:center;">

            <!-- DTE badge -->
            <div>
              <span style="display:inline-block;padding:3px 9px;border-radius:99px;
                           font-family:'JetBrains Mono',monospace;font-size:0.65rem;
                           font-weight:800;border:1.5px solid;white-space:nowrap;"
                :style="'color:'+corDTE(calcDTE(v.dataVencimento)).text
                       +';background:'+corDTE(calcDTE(v.dataVencimento)).bg
                       +';border-color:'+corDTE(calcDTE(v.dataVencimento)).border+';'">
                {{ calcDTE(v.dataVencimento) }}d
              </span>
            </div>

            <!-- Data + label -->
            <div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:0.82rem;
                          font-weight:700;color:var(--text-primary);">
                {{ fmtData(v.dataVencimento) }}
              </div>
              <div style="font-size:0.56rem;font-weight:700;text-transform:uppercase;
                          letter-spacing:0.06em;margin-top:1px;"
                :style="'color:'+corDTE(calcDTE(v.dataVencimento)).text+';'">
                {{ corDTE(calcDTE(v.dataVencimento)).label }}
              </div>
            </div>

            <!-- Contagem -->
            <div style="text-align:center;">
              <span style="font-family:'JetBrains Mono',monospace;font-size:0.9rem;
                           font-weight:800;color:var(--text-primary);">{{ v.contagem }}</span>
            </div>

            <!-- Nocional + barra -->
            <div style="text-align:right;">
              <div style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;
                          font-weight:700;color:var(--text-primary);">
                {{ fmtK(v.nocional) }}
              </div>
              <div style="margin-top:5px;height:3px;border-radius:99px;background:var(--border-subtle);">
                <div style="height:100%;border-radius:99px;transition:width 0.4s ease;"
                  :style="'width:'+barPct(v.nocional)+'%;background:'
                         +corDTE(calcDTE(v.dataVencimento)).text+';'"></div>
              </div>
            </div>

            <!-- Ganho Máx -->
            <div style="text-align:right;">
              <div style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;
                          font-weight:700;color:var(--brand-emerald);">
                {{ fmtK(v.ganhoMaximo) }}
              </div>
              <div style="font-size:0.56rem;color:var(--text-muted);margin-top:1px;">
                {{ yieldStr(v.ganhoMaximo, v.nocional) }}
              </div>
            </div>

            <!-- P/L Aberto -->
            <div style="text-align:right;">
              <div style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;font-weight:700;"
                :style="(parseFloat(v.plAberto)||0) >= 0
                        ? 'color:var(--brand-emerald)' : 'color:var(--brand-rose)'">
                {{ fmtSigned(v.plAberto) }}
              </div>
              <div style="font-size:0.56rem;color:var(--text-muted);margin-top:1px;">
                {{ plPctStr(v.plAberto, v.nocional) }}
              </div>
            </div>

          </div>

          <!-- Mobile -->
          <div v-else style="padding:0.875rem 0;">

            <!-- Linha 1: DTE + data + contagem -->
            <div style="display:flex;justify-content:space-between;align-items:center;
                        margin-bottom:0.625rem;">
              <div style="display:flex;align-items:center;gap:0.5rem;">
                <span style="display:inline-block;padding:3px 8px;border-radius:99px;
                             font-family:'JetBrains Mono',monospace;font-size:0.65rem;
                             font-weight:800;border:1.5px solid;"
                  :style="'color:'+corDTE(calcDTE(v.dataVencimento)).text
                         +';background:'+corDTE(calcDTE(v.dataVencimento)).bg
                         +';border-color:'+corDTE(calcDTE(v.dataVencimento)).border+';'">
                  {{ calcDTE(v.dataVencimento) }}d
                </span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.88rem;
                             font-weight:700;color:var(--text-primary);">
                  {{ fmtData(v.dataVencimento) }}
                </span>
              </div>
              <span style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;
                           font-weight:700;color:var(--text-secondary);">
                {{ v.contagem }} pos
              </span>
            </div>

            <!-- Linha 2: métricas 3 colunas -->
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;
                        margin-bottom:0.625rem;">
              <div>
                <div class="t-label" style="color:var(--text-muted);margin-bottom:2px;">Nocional</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;
                            font-weight:700;color:var(--text-primary);">
                  {{ fmtK(v.nocional) }}
                </div>
              </div>
              <div>
                <div class="t-label" style="color:var(--text-muted);margin-bottom:2px;">Ganho Máx</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;
                            font-weight:700;color:var(--brand-emerald);">
                  {{ fmtK(v.ganhoMaximo) }}
                </div>
              </div>
              <div>
                <div class="t-label" style="color:var(--text-muted);margin-bottom:2px;">P/L</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:700;"
                  :style="(parseFloat(v.plAberto)||0) >= 0
                          ? 'color:var(--brand-emerald)' : 'color:var(--brand-rose)'">
                  {{ fmtSigned(v.plAberto) }}
                </div>
              </div>
            </div>

            <!-- Barra nocional -->
            <div style="height:3px;border-radius:99px;background:var(--border-subtle);">
              <div style="height:100%;border-radius:99px;"
                :style="'width:'+barPct(v.nocional)+'%;background:'
                       +corDTE(calcDTE(v.dataVencimento)).text+';'"></div>
            </div>

          </div>
        </div>
      </div>

      <!-- Rodapé com totais -->
      <div style="padding:0.875rem 1.5rem;background:var(--surface-sunken);
                  display:flex;justify-content:space-between;align-items:center;
                  flex-wrap:wrap;gap:0.75rem;">
        <div class="t-label" style="color:var(--text-muted);text-transform:uppercase;">
          Total do Portfólio
        </div>
        <div style="display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;">
          <div>
            <span class="t-label" style="color:var(--text-muted);margin-right:0.375rem;">Nocional</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:0.82rem;
                         font-weight:700;color:var(--text-primary);">
              {{ fmtMoeda(totais.nocional) }}
            </span>
          </div>
          <div>
            <span class="t-label" style="color:var(--text-muted);margin-right:0.375rem;">Ganho Máx</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:0.82rem;
                         font-weight:700;color:var(--brand-emerald);">
              {{ fmtMoeda(totais.ganhoMaximo) }}
            </span>
          </div>
          <div>
            <span class="t-label" style="color:var(--text-muted);margin-right:0.375rem;">P/L Aberto</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:0.82rem;font-weight:700;"
              :style="totais.plAberto >= 0 ? 'color:var(--brand-emerald)' : 'color:var(--brand-rose)'">
              {{ fmtSigned(totais.plAberto) }}
            </span>
          </div>
        </div>
      </div>

    </div>
  </div>
</template>

<style>
  @keyframes cv-pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
</style>

<script>
window.CardVencimentos = {
  props: {
    isMobile:           { type: Boolean, default: false },
    statsPreCalculados: Object
  },
  template: '#card-vencimentos-template',

  computed: {
    vencimentos: function() {
      var stats = this.statsPreCalculados;
      if (!stats || !stats.distribuicaoVencimentos) return [];
      return stats.distribuicaoVencimentos.filter(function(v) {
        return v.dataVencimento && v.dataVencimento !== 'N/A';
      });
    },

    isEmpty: function() {
      return !this.vencimentos || this.vencimentos.length === 0;
    },

    maxNocional: function() {
      var max = 0;
      this.vencimentos.forEach(function(v) {
        var n = parseFloat(v.nocional) || 0;
        if (n > max) max = n;
      });
      return max;
    },

    totalPosicoes: function() {
      var t = 0;
      this.vencimentos.forEach(function(v) { t += (parseInt(v.contagem) || 0); });
      return t;
    },

    urgente: function() {
      var datas = 0, pos = 0, self = this;
      this.vencimentos.forEach(function(v) {
        if (self.calcDTE(v.dataVencimento) <= 15) { datas++; pos += (parseInt(v.contagem) || 0); }
      });
      return { datas: datas, pos: pos };
    },

    atencao: function() {
      var datas = 0, pos = 0, self = this;
      this.vencimentos.forEach(function(v) {
        var d = self.calcDTE(v.dataVencimento);
        if (d > 15 && d <= 45) { datas++; pos += (parseInt(v.contagem) || 0); }
      });
      return { datas: datas, pos: pos };
    },

    conforto: function() {
      var datas = 0, pos = 0, self = this;
      this.vencimentos.forEach(function(v) {
        if (self.calcDTE(v.dataVencimento) > 45) { datas++; pos += (parseInt(v.contagem) || 0); }
      });
      return { datas: datas, pos: pos };
    },

    totais: function() {
      var nocional = 0, ganhoMaximo = 0, plAberto = 0;
      this.vencimentos.forEach(function(v) {
        nocional    += (parseFloat(v.nocional)    || 0);
        ganhoMaximo += (parseFloat(v.ganhoMaximo) || 0);
        plAberto    += (parseFloat(v.plAberto)    || 0);
      });
      return { nocional: nocional, ganhoMaximo: ganhoMaximo, plAberto: plAberto };
    }
  },

  methods: {
    calcDTE: function(dataStr) {
      if (!dataStr) return 999;
      var hoje = new Date();
      hoje.setHours(0, 0, 0, 0);
      var s   = String(dataStr).split('T')[0];
      var pts = s.split('-');
      if (pts.length < 3) return 999;
      var venc = new Date(parseInt(pts[0]), parseInt(pts[1]) - 1, parseInt(pts[2]));
      return Math.max(0, Math.round((venc - hoje) / 86400000));
    },

    corDTE: function(dte) {
      if (dte <= 15) return { text: 'var(--brand-rose)',    bg: 'var(--brand-rose-light)',    border: 'var(--brand-rose-muted)',    label: 'URGENTE'  };
      if (dte <= 45) return { text: 'var(--brand-amber)',   bg: 'var(--brand-amber-light)',   border: 'var(--brand-amber-muted)',   label: 'ATENÇÃO'  };
      return           { text: 'var(--brand-emerald)', bg: 'var(--brand-emerald-light)', border: 'var(--brand-emerald-muted)', label: 'CONFORTO' };
    },

    barPct: function(nocional) {
      var max = this.maxNocional;
      if (!max) return 0;
      return Math.round((parseFloat(nocional) / max) * 100);
    },

    fmtData: function(dataStr) {
      if (!dataStr) return '--';
      var pts = String(dataStr).split('T')[0].split('-');
      if (pts.length < 3) return dataStr;
      var meses = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
      return pts[2] + '/' + meses[parseInt(pts[1]) - 1] + '/' + pts[0];
    },

    fmtMoeda: function(v) {
      var F = window.Formatador;
      if (F && F.moeda) return F.moeda(v);
      var n = parseFloat(v);
      if (isNaN(n)) return '--';
      return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    },

    fmtK: function(v) {
      var n = parseFloat(v);
      if (isNaN(n)) return '--';
      var abs = Math.abs(n), sign = n < 0 ? '-' : '';
      if (abs >= 1000000) return sign + 'R$ ' + (abs / 1000000).toFixed(1).replace('.', ',') + 'M';
      if (abs >= 1000)    return sign + 'R$ ' + (abs / 1000).toFixed(1).replace('.', ',') + 'k';
      return sign + 'R$ ' + abs.toFixed(0);
    },

    fmtSigned: function(v) {
      var n = parseFloat(v);
      if (isNaN(n)) return '--';
      var sign = n >= 0 ? '+' : '-';
      var abs  = Math.abs(n);
      if (abs >= 1000000) return sign + 'R$ ' + (abs / 1000000).toFixed(1).replace('.', ',') + 'M';
      if (abs >= 1000)    return sign + 'R$ ' + (abs / 1000).toFixed(1).replace('.', ',') + 'k';
      return sign + 'R$ ' + abs.toFixed(2).replace('.', ',');
    },

    yieldStr: function(ganho, nocional) {
      var g = parseFloat(ganho) || 0, n = parseFloat(nocional) || 0;
      if (!n) return '';
      return (g / n * 100).toFixed(1).replace('.', ',') + '% yield';
    },

    plPctStr: function(pl, nocional) {
      var p = parseFloat(pl) || 0, n = parseFloat(nocional) || 0;
      if (!n) return '';
      var pct = (p / n * 100).toFixed(1).replace('.', ',');
      return (p >= 0 ? '+' : '') + pct + '%';
    }
  },

  mounted:  function() { if (window.refreshIcons) window.refreshIcons(); },
  updated:  function() { if (window.refreshIcons) window.refreshIcons(); }
};
</script>

</div>

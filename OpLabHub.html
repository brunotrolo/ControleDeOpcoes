<template id="oplab-hub-template">
  <div style="max-width:95%;margin:1.5rem auto 4rem;display:flex;flex-direction:column;gap:1.25rem;min-height:100vh;"
       :style="isMobile ? 'max-width:100%;margin:0.75rem auto 4rem;padding:0 0.5rem;' : ''">

    <!-- Header do Hub -->
    <div class="premium-card"
         style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;"
         :style="isMobile ? 'padding:1rem;gap:1rem;' : 'padding:1.5rem 2rem;gap:1.5rem;'">

      <div style="display:flex;align-items:center;gap:1.25rem;">
        <div style="padding:0.75rem;background:var(--brand-indigo-light);color:var(--brand-indigo);border-radius:var(--radius-lg);border:1px solid var(--brand-indigo-muted);">
          <i data-lucide="bar-chart-2" style="width:1.5rem;height:1.5rem;"></i>
        </div>
        <div>
          <h2 class="t-title" style="color:var(--text-primary);letter-spacing:-0.02em;">OPLab Market Data</h2>
          <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.375rem;">
            <span v-if="!carregando" style="width:0.5rem;height:0.5rem;border-radius:50%;background:var(--brand-emerald);display:inline-block;animation:comp-pulse 2s ease-in-out infinite;"></span>
            <span v-else style="width:0.5rem;height:0.5rem;border-radius:50%;background:var(--brand-amber);display:inline-block;animation:comp-pulse 0.8s ease-in-out infinite;"></span>
            <p class="t-label-sm" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:0.25em;">
              {{ carregando ? 'Carregando dados...' : ('Atualizado ' + ultimaAtualizacao) }}
            </p>
          </div>
        </div>
      </div>

      <button @click="carregarTodosDados" :disabled="carregando"
              style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1.25rem;border-radius:var(--radius-md);background:var(--brand-indigo-light);color:var(--brand-indigo);border:1px solid var(--brand-indigo-muted);font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;"
              onmouseover="if(!this.disabled){this.style.background='var(--brand-indigo)';this.style.color='#fff';}"
              onmouseout="this.style.background='var(--brand-indigo-light)';this.style.color='var(--brand-indigo)';">
        <i data-lucide="refresh-cw" style="width:0.875rem;height:0.875rem;" :style="carregando ? 'animation:spin 1s linear infinite;' : ''"></i>
        Recarregar
      </button>
    </div>

    <!-- Sub-navegacao -->
    <div class="premium-card" style="padding:0;overflow:hidden;">
      <div style="display:flex;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;background:var(--border-subtle);gap:1px;">
        <button v-for="tab in tabs" :key="tab.id" @click="navegarPara(tab.id)"
                style="flex:1;min-width:120px;padding:0.875rem 0.75rem;background:var(--surface-base);border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:0.375rem;transition:background 0.15s;position:relative;"
                :style="paginaAtiva === tab.id ? 'background:var(--surface-overlay);' : ''"
                onmouseover="if(this.getAttribute('data-active')!=='true') this.style.background='var(--surface-sunken)';"
                onmouseout="if(this.getAttribute('data-active')!=='true') this.style.background='var(--surface-base)';"
                :data-active="paginaAtiva === tab.id">
          <div v-if="paginaAtiva === tab.id"
               style="position:absolute;top:0;left:0;right:0;height:3px;border-radius:0 0 3px 3px;"
               :style="'background:' + tab.cor + ';'"></div>
          <div v-if="carregandoAbas[tab.id]"
               style="position:absolute;top:0;left:0;right:0;height:2px;background:var(--brand-amber);animation:loading-bar 1.2s ease-in-out infinite;"></div>
          <i :data-lucide="tab.icone" style="width:1.125rem;height:1.125rem;"
             :style="paginaAtiva === tab.id ? ('color:' + tab.cor) : 'color:var(--text-muted)'"></i>
          <span style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;"
                :style="paginaAtiva === tab.id ? ('color:' + tab.cor) : 'color:var(--text-muted)'">
            {{ tab.label }}
          </span>
          <span v-if="contagens[tab.id]"
                style="font-size:0.58rem;font-weight:800;padding:1px 5px;border-radius:99px;background:var(--border-subtle);color:var(--text-muted);">
            {{ contagens[tab.id] }}
          </span>
        </button>
      </div>
    </div>

    <!-- Conteudo -->
    <div style="flex:1;">

      <div v-if="carregando && !algumDadoDisponivel"
           class="premium-card" style="padding:4rem 2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem;">
        <div style="width:2.5rem;height:2.5rem;border:3px solid var(--border-subtle);border-top-color:var(--brand-indigo);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <p style="color:var(--text-muted);font-size:0.875rem;">Buscando dados do mercado...</p>
      </div>

      <div v-else-if="erro && !algumDadoDisponivel" class="premium-card" style="padding:3rem 2rem;text-align:center;">
        <i data-lucide="alert-triangle" style="width:2.5rem;height:2.5rem;color:var(--brand-amber);margin-bottom:1rem;"></i>
        <p style="color:var(--text-primary);font-weight:700;margin-bottom:0.5rem;">Falha ao carregar dados</p>
        <p style="color:var(--text-muted);font-size:0.875rem;margin-bottom:1.5rem;">{{ erro }}</p>
        <button @click="carregarTodosDados" style="padding:0.5rem 1.5rem;background:var(--brand-indigo-light);color:var(--brand-indigo);border:1px solid var(--brand-indigo-muted);border-radius:var(--radius-md);font-size:0.75rem;font-weight:700;cursor:pointer;">
          Tentar novamente
        </button>
      </div>

      <template v-else>
        <page-series-opcoes
          v-if="paginaAtiva === 'series'"
          :dados-series="dadosSeries" :dados-m9m21="dadosM9M21"
          :dados-score="dadosScore"   :is-mobile="isMobile">
        </page-series-opcoes>

        <page-melhores-taxas
          v-else-if="paginaAtiva === 'taxas'"
          :dados="dadosTaxas" :is-mobile="isMobile">
        </page-melhores-taxas>

        <page-volumes
          v-else-if="paginaAtiva === 'volumes'"
          :dados="dadosVolumes" :is-mobile="isMobile">
        </page-volumes>

        <page-variacoes
          v-else-if="paginaAtiva === 'variacoes'"
          :dados="dadosVariacoes" :is-mobile="isMobile">
        </page-variacoes>

        <page-ranking-m9m21
          v-else-if="paginaAtiva === 'm9m21'"
          :dados="dadosM9M21" :is-mobile="isMobile">
        </page-ranking-m9m21>

        <page-oplab-score
          v-else-if="paginaAtiva === 'score'"
          :dados="dadosScore" :is-mobile="isMobile">
        </page-oplab-score>

        <page-correl-ibov
          v-else-if="paginaAtiva === 'correl'"
          :dados="dadosCorrel" :is-mobile="isMobile">
        </page-correl-ibov>

        <page-fundamentalista
          v-else-if="paginaAtiva === 'fund'"
          :dados="dadosFund" :is-mobile="isMobile">
        </page-fundamentalista>

        <page-historico
          v-else-if="paginaAtiva === 'historico'"
          :dados="dadosHistorico" :is-mobile="isMobile">
        </page-historico>

        <page-planejador
          v-else-if="paginaAtiva === 'planejador'"
          :dados="dadosPlanejador"
          :dados-ativos="dadosAtivos"
          :dados-m9-m21="dadosM9M21"
          :is-mobile="isMobile">
        </page-planejador>
      </template>
    </div>

  </div>
</template>

<script>
window.OpLabHub = {
  template: '#oplab-hub-template',
  props: { isMobile: { type: Boolean, default: false } },
  setup() {
    const { ref, computed, onMounted, nextTick } = Vue;

    const paginaAtiva       = ref('series');
    const carregando        = ref(false);
    const erro              = ref(null);
    const ultimaAtualizacao = ref('--');

    const dadosSeries    = ref([]);
    const dadosTaxas     = ref([]);
    const dadosVolumes   = ref([]);
    const dadosVariacoes = ref([]);
    const dadosM9M21     = ref([]);
    const dadosScore     = ref([]);
    const dadosHistorico  = ref([]);
    const dadosCorrel     = ref([]);
    const dadosFund       = ref([]);
    const dadosPlanejador = ref([]);
    const dadosAtivos     = ref([]);

    const carregandoAbas = ref({ series:false, taxas:false, volumes:false, variacoes:false, m9m21:false, score:false, historico:false, planejador:false });

    const tabs = [
      { id: 'series',    label: 'Cadeia',    icone: 'layers',      cor: 'var(--brand-indigo)'  },
      { id: 'taxas',     label: 'Taxas',     icone: 'percent',     cor: 'var(--brand-emerald)' },
      { id: 'volumes',   label: 'Volumes',   icone: 'bar-chart',   cor: 'var(--brand-amber)'   },
      { id: 'variacoes', label: 'Variacoes', icone: 'activity',    cor: 'var(--brand-rose)'    },
      { id: 'm9m21',     label: 'M9M21',     icone: 'trending-up', cor: 'var(--brand-indigo)'  },
      { id: 'score',     label: 'Score',     icone: 'star',        cor: 'var(--brand-amber)'   },
      { id: 'historico', label: 'Historico', icone: 'clock',       cor: 'var(--text-secondary)'},
      { id: 'correl',    label: 'Correl IBOV',  icone: 'git-branch',  cor: 'var(--brand-rose)'    },
      { id: 'fund',      label: 'Fundamentals', icone: 'trending-up', cor: 'var(--brand-emerald)' },
      { id: 'planejador', label: 'Planejador',   icone: 'target',      cor: 'var(--brand-rose)'    },
    ];

    const mapa = {
      series:    { dados: dadosSeries,    aba: 'SERIES_OPCOES_INSTRUMENTO' },
      taxas:     { dados: dadosTaxas,     aba: 'SELECAO_OPCOES_MAIORES_LUCROS' },
      volumes:   { dados: dadosVolumes,   aba: 'SELECAO_MAIORES_VOLUMES' },
      variacoes: { dados: dadosVariacoes, aba: 'SELECAO_MAIORES_VARIACOES' },
      m9m21:     { dados: dadosM9M21,     aba: 'RANKING_TENDENCIA_M9M21' },
      score:     { dados: dadosScore,     aba: 'RANKING_OPLAB_SCORE' },
      historico: { dados: dadosHistorico, aba: 'HISTORICO_OPCOES' },
      correl:    { dados: dadosCorrel,   aba: 'RANKING_CORREL_IBOV' },
      fund:      { dados: dadosFund,     aba: 'RANKING_FUNDAMENTALISTA' },
      planejador:{ dados: dadosPlanejador, aba: 'SELECAO_OPCOES_MAIORES_LUCROS' },
    };

    const contagens = computed(() => ({
      series:    [...new Set(dadosSeries.value.map(r => r.TICKER))].length || null,
      taxas:     dadosTaxas.value.length    || null,
      volumes:   dadosVolumes.value.length  || null,
      variacoes: dadosVariacoes.value.length|| null,
      m9m21:     dadosM9M21.value.length    || null,
      score:     dadosScore.value.length    || null,
      historico: dadosHistorico.value.length|| null,
      correl:    dadosCorrel.value.length   || null,
      fund:      dadosFund.value.length     || null,
      planejador:dadosPlanejador.value.length || null,
    }));

    const algumDadoDisponivel = computed(() =>
      dadosSeries.value.length > 0 || dadosM9M21.value.length > 0 || dadosScore.value.length > 0
    );

    const lerAba = (nomeAba) => new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).lerAbaComoJSON(nomeAba);
    });

    const carregarAba = async (id) => {
      const m = mapa[id];
      if (!m || m.dados.value.length > 0) return;
      carregandoAbas.value[id] = true;
      try {
        m.dados.value = (await lerAba(m.aba)) || [];
      } catch(e) {
        console.error('[OpLabHub] Erro ao carregar ' + m.aba + ':', e);
      } finally {
        carregandoAbas.value[id] = false;
        nextTick(() => { if (window.lucide) window.lucide.createIcons(); });
      }
    };

    const navegarPara = async (id) => {
      paginaAtiva.value = id;
      await nextTick();
      if (window.lucide) window.lucide.createIcons();
      await carregarAba(id);
    };

    const carregarTodosDados = async () => {
      carregando.value = true;
      erro.value = null;
      Object.values(mapa).forEach(m => { m.dados.value = []; });
      try {
        const [series, m9m21, score, ativos] = await Promise.all([
          lerAba('SERIES_OPCOES_INSTRUMENTO'),
          lerAba('RANKING_TENDENCIA_M9M21'),
          lerAba('RANKING_OPLAB_SCORE'),
          lerAba('DADOS_ATIVOS'),
        ]);
        dadosSeries.value = series || [];
        dadosM9M21.value  = m9m21  || [];
        dadosScore.value  = score  || [];
        dadosAtivos.value = ativos || [];
        ultimaAtualizacao.value = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      } catch(e) {
        erro.value = String(e.message || e);
      } finally {
        carregando.value = false;
        await nextTick();
        if (window.lucide) window.lucide.createIcons();
        carregarAba(paginaAtiva.value);
      }
    };

    onMounted(() => {
      carregarTodosDados();
      nextTick(() => { if (window.lucide) window.lucide.createIcons(); });
    });

    return {
      paginaAtiva, carregando, erro, ultimaAtualizacao, tabs,
      contagens, carregandoAbas, algumDadoDisponivel,
      dadosSeries, dadosTaxas, dadosVolumes, dadosVariacoes,
      dadosM9M21, dadosScore, dadosHistorico, dadosCorrel, dadosFund,
      dadosPlanejador, dadosAtivos,
      carregarTodosDados, navegarPara,
    };
  }
};
</script>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes comp-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes loading-bar {
  0%   { transform: scaleX(0); transform-origin: left; }
  50%  { transform: scaleX(1); transform-origin: left; }
  51%  { transform: scaleX(1); transform-origin: right; }
  100% { transform: scaleX(0); transform-origin: right; }
}
</style>

name: Deploy to GAS DEV

# ─────────────────────────────────────────────────────────────────
# CI/CD: GitHub → Google Apps Script
#
# Dispara quando:
#   1. Um push chega em main ou na branch de trabalho
#   2. Manualmente: Actions → Deploy to GAS DEV → Run workflow
#
# Requisitos (configurados uma única vez):
#   - Secret CLASPRC_JSON: credenciais OAuth do clasp (~/.clasprc.json)
#   - .clasp.json no repo: aponta para o scriptId do projeto GAS DEV
#   - .claspignore no repo: exclui arquivos não-GAS (pwa, mockups, docs)
# ─────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/add-claude-documentation-GwgaT

permissions:
  contents: write   # necessário para commitar .deployment-id na primeira vez
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache clasp
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: clasp-${{ runner.os }}-node24

      - name: Install clasp
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix ~/.npm-global
          if [ ! -f ~/.npm-global/bin/clasp ]; then
            npm install -g @google/clasp
          fi
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push to GAS DEV
        id: push
        run: |
          OUTPUT=$(clasp push --force 2>&1)
          echo "$OUTPUT"
          FILES=$(echo "$OUTPUT" | grep -c '└─' || true)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      # Na primeira execução cria o web app e salva o deployment ID.
      # Nas seguintes apenas lê o ID salvo — /dev sempre aponta para HEAD.
      - name: Criar ou ler deployment do web app
        id: webdeploy
        run: |
          if [ -f .deployment-id ] && [ -s .deployment-id ]; then
            DEPLOYMENT_ID=$(cat .deployment-id)
          else
            DEPLOY_OUT=$(clasp deploy --description "Deploy automático" 2>&1)
            echo "$DEPLOY_OUT"
            DEPLOYMENT_ID=$(echo "$DEPLOY_OUT" | grep -oE 'AKfycb[A-Za-z0-9_-]+' | head -1)
            echo "$DEPLOYMENT_ID" > .deployment-id
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add .deployment-id
            git commit -m "ci: salva deployment ID do web app"
            git push
          fi
          DEV_URL="https://script.google.com/macros/s/${DEPLOYMENT_ID}/dev"
          echo "dev_url=$DEV_URL" >> $GITHUB_OUTPUT

      - name: Deploy summary
        run: |
          echo "### ✅ Deploy GAS DEV concluído" >> $GITHUB_STEP_SUMMARY
          echo "- **Arquivos enviados:** ${{ steps.push.outputs.files }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Web App (DEV)" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.webdeploy.outputs.dev_url }}" >> $GITHUB_STEP_SUMMARY

<template id="dash-volatility-skew-template">
  <div class="w-full h-full flex flex-col md:flex-row gap-4 p-4">
    
    <div class="flex-1 flex flex-col h-full premium-card overflow-hidden relative">
      
      <div class="flex flex-col sm:flex-row justify-between items-center p-4 border-b" style="background: var(--surface-overlay); border-color: var(--border-subtle);">
        <h3 class="t-title flex items-center gap-2">
          <i data-lucide="smile" class="w-5 h-5" style="color: var(--brand-amber);"></i> Sorriso de Volatilidade (Skew)
        </h3>
        
        <div class="flex items-center gap-3">
          <select 
            v-model="filtroAtivo" 
            @change="atualizarGrafico"
            class="input-base py-1.5 text-sm w-auto"
            style="min-width: 120px;"
          >
            <option v-for="ativo in ativos" :key="ativo" :value="ativo">{{ ativo }}</option>
          </select>
        </div>
      </div>

      <div class="flex-1 relative w-full h-full p-2" style="background: var(--surface-base);">

        <div v-if="dadosFiltrados.length === 0" class="absolute inset-0 flex items-center justify-center z-20" style="background: var(--surface-base); color: var(--text-muted);">
          Nenhum dado encontrado para este filtro.
        </div>

        <div id="skewPlotDiv" class="w-full h-full"></div>
      </div>
    </div>

    <div class="w-full md:w-[350px] lg:w-[400px] flex flex-col gap-4 shrink-0 overflow-y-auto hide-scrollbar">
      
      <div class="premium-card p-5">
        <h4 class="t-label mb-3 flex items-center gap-2">
          <i data-lucide="book-open" class="w-4 h-4"></i> Como ler este grafico
        </h4>
        <div class="t-body space-y-3">
          <p>Pense na volatilidade como o <b>preco do seguro</b> de um carro. Esse grafico mostra de qual lado o mercado esta com mais medo (pagando mais caro).</p>
          <ul class="list-disc pl-4 space-y-1" style="color: var(--text-tertiary); font-size: 12px;">
            <li><span style="color: var(--brand-rose); font-weight: bold;">Linha Vermelha (PUT):</span> Se o lado esquerdo estiver empinado nas alturas, o mercado esta em <b>panico</b>, comprando seguro contra quedas a qualquer preco.</li>
            <li><span style="color: var(--brand-indigo); font-weight: bold;">Linha Azul (CALL):</span> Se o lado direito subir muito, o mercado esta em <b>euforia</b>, apostando cegamente que a acao vai decolar.</li>
          </ul>
          <div class="mt-4 p-3 rounded text-xs" style="background: var(--surface-overlay); border-left: 4px solid var(--brand-amber);">
            <strong>A Mina de Ouro:</strong> Onde a linha faz um "calombo" ou sobe demais, o seguro esta superfaturado. E ai que voce entra <b>vendendo opcoes</b>, assumindo o risco e colocando esse premio gordo e inflado no bolso.
          </div>
        </div>
      </div>

      <div class="premium-card p-5 flex-1 flex flex-col" style="border-top: 4px solid var(--brand-amber);">
        <div class="flex justify-between items-center mb-4">
          <h4 class="t-label flex items-center gap-2" style="color: var(--brand-amber);">
            <i data-lucide="sparkles" class="w-4 h-4"></i> Insight Gemini AI
          </h4>
          <span v-if="loadingIA" class="text-xs animate-pulse" style="color: var(--brand-amber); font-weight: bold;">Analisando...</span>
        </div>
        
        <div class="flex-1 card-inner p-4 text-sm overflow-y-auto mb-4 custom-scrollbar" style="color: var(--text-secondary);">
          <div v-if="!insightIA && !loadingIA" class="h-full flex flex-col items-center justify-center text-center opacity-60">
            <i data-lucide="bot" class="w-10 h-10 mb-2"></i>
            <p>Deixe a IA analisar a inclinacao destas curvas de volatilidade.</p>
          </div>
          <div v-else-if="loadingIA" class="h-full flex items-center justify-center">
            <svg class="animate-spin h-8 w-8" style="color: var(--brand-amber);" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </div>
          <div v-else v-html="insightIA" class="space-y-2"></div>
        </div>

        <button 
          @click="solicitarLeituraIA"
          :disabled="loadingIA || !dadosFiltrados.length"
          class="btn-action w-full"
          :class="(loadingIA || !dadosFiltrados.length) ? 'btn-action-ghost opacity-50 cursor-not-allowed' : 'btn-action-primary'"
        >
          <i data-lucide="zap" class="w-4 h-4"></i> Gerar Leitura de Volatilidade
        </button>
      </div>

    </div>
  </div>
</template>

<script>
window.DashVolatilitySkew = {
  template: '#dash-volatility-skew-template',
  props: {
    opcoesBrutas: { type: Array, default: () => [] },
    ativos: { type: Array, default: () => [] }
  },
  setup(props) {
    const { ref, computed, onMounted, onUnmounted, watch } = Vue;
    
    const filtroAtivo = ref(props.ativos.length > 0 ? props.ativos[0] : '');
    const loadingIA = ref(false);
    const insightIA = ref('');
    let debounceTimer = null;

    const dadosFiltrados = computed(() => {
      if (!filtroAtivo.value) return [];
      return props.opcoesBrutas.filter(op => op.TICKER === filtroAtivo.value && parseFloat(op.IV_CALC || 0) > 0);
    });

    // Pega as cores do root CSS para o Plotly ficar harmonico
    const getCssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

    const atualizarGrafico = () => {
      const el = document.getElementById('skewPlotDiv');
      if (!el) return;

      const dados = dadosFiltrados.value;
      
      if (dados.length === 0) return;

      const calls = dados.filter(d => (d.CATEGORY || '').toUpperCase() === 'CALL').sort((a,b) => parseFloat(a.STRIKE) - parseFloat(b.STRIKE));
      const puts = dados.filter(d => (d.CATEGORY || '').toUpperCase() === 'PUT').sort((a,b) => parseFloat(a.STRIKE) - parseFloat(b.STRIKE));
      const spotValue = parseFloat(dados[0].SPOT || 0);

      const colorCall = getCssVar('--brand-indigo') || '#4F46E5';
      const colorPut = getCssVar('--brand-rose') || '#E11D48';
      const colorText = getCssVar('--text-secondary') || '#888';
      const colorGrid = getCssVar('--border-subtle') || '#333';

      const traceCalls = {
        x: calls.map(d => parseFloat(d.STRIKE)),
        y: calls.map(d => parseFloat(d.IV_CALC)),
        name: 'CALL Volatility',
        type: 'scatter',
        mode: 'lines+markers',
        line: { color: colorCall, width: 3, shape: 'spline' },
        marker: { size: 6 },
        hovertemplate: 'Strike: R$ %{x:.2f}<br>IV: %{y:.1%}<extra>CALL</extra>'
      };

      const tracePuts = {
        x: puts.map(d => parseFloat(d.STRIKE)),
        y: puts.map(d => parseFloat(d.IV_CALC)),
        name: 'PUT Volatility',
        type: 'scatter',
        mode: 'lines+markers',
        line: { color: colorPut, width: 3, shape: 'spline' },
        marker: { size: 6 },
        hovertemplate: 'Strike: R$ %{x:.2f}<br>IV: %{y:.1%}<extra>PUT</extra>'
      };

      const layout = {
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        margin: { t: 30, r: 20, b: 50, l: 60 },
        font: { color: colorText },
        xaxis: { title: 'Preco de Exercicio (Strike)', gridcolor: colorGrid, zerolinecolor: colorGrid },
        yaxis: { title: 'Volatilidade Implicita (IV)', gridcolor: colorGrid, zerolinecolor: colorGrid, tickformat: '.1%' },
        hovermode: 'x unified',
        legend: { orientation: 'h', y: 1.1, x: 0.5, xanchor: 'center', font: { color: colorText } }
      };

      if (spotValue > 0) {
        layout.shapes = [{
          type: 'line',
          x0: spotValue, x1: spotValue,
          y0: 0, y1: 1, yref: 'paper',
          line: { color: '#FBBF24', width: 2, dash: 'dash' }
        }];
        layout.annotations = [{
          x: spotValue, y: 1.05, yref: 'paper',
          text: 'SPOT R$ ' + (spotValue.toFixed(2)),
          showarrow: false,
          font: { color: '#FBBF24', size: 10, weight: 'bold' }
        }];
      }

      Plotly.react(el, [traceCalls, tracePuts], layout, { responsive: true, displayModeBar: false });
    };

    const handleResize = () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const el = document.getElementById('skewPlotDiv');
        if (el && el.data) Plotly.Plots.resize(el);
      }, 200);
    };

    onMounted(() => {
      if (filtroAtivo.value) setTimeout(atualizarGrafico, 100);
      window.addEventListener('resize', handleResize);
      // Ouve mudancas de tema para redesenhar as cores do grafico
      window.addEventListener('themechange', atualizarGrafico);
    });
    
    onUnmounted(() => { 
      window.removeEventListener('resize', handleResize); 
      window.removeEventListener('themechange', atualizarGrafico);
    });

    const solicitarLeituraIA = () => {
      if (dadosFiltrados.value.length === 0) return;
      loadingIA.value = true;
      insightIA.value = '';

      const puts = dadosFiltrados.value.filter(d => (d.CATEGORY || '').toUpperCase() === 'PUT');
      const minStrikePut = puts.reduce((min, p) => parseFloat(p.STRIKE) < parseFloat(min.STRIKE) ? p : min, puts[0] || {});
      const atmPut = puts.reduce((prev, curr) => Math.abs(curr.STRIKE - curr.SPOT) < Math.abs(prev.STRIKE - prev.SPOT) ? curr : prev, puts[0] || {});

      const payloadParaAPI = {
        ativo: filtroAtivo.value,
        spot: dadosFiltrados.value[0].SPOT,
        ivAtm: atmPut.IV_CALC || 0,
        ivExtremaPut: minStrikePut.IV_CALC || 0,
        strikeExtremoPut: minStrikePut.STRIKE || 0
      };

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(resposta => { insightIA.value = resposta; loadingIA.value = false; })
          .withFailureHandler(erro => { insightIA.value = '<span style="color: var(--brand-rose);">Erro: ' + (erro.message) + '</span>'; loadingIA.value = false; })
          .apiGerarInsightSkew(payloadParaAPI);
      }
    };

    return { filtroAtivo, ativos: props.ativos, atualizarGrafico, dadosFiltrados, loadingIA, insightIA, solicitarLeituraIA };
  }
};
</script>

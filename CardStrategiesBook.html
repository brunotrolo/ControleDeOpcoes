<style>
  /* CSB: calibra o sistema de tipos para métricas (fora da tabela) */
  .csb-root .t-label-sm { font-size: 0.75rem !important; }
  .csb-root .t-value-sm { font-size: 0.85rem !important; }
  /* Tabela de pernas: mais compacta para caber colunas */
  .csb-root table .t-label-sm { font-size: 0.62rem !important; }
  .csb-root table .t-value-sm { font-size: 0.68rem !important; }
</style>

<template id="card-strategies-book-template">
  <div class="premium-card csb-root" style="overflow:hidden;">

    <!-- HEADER -->
    <div style="padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;border-bottom:1px solid var(--border-subtle);">
      <div style="display:flex;align-items:center;gap:0.875rem;">
        <div style="padding:0.625rem;background:var(--brand-indigo-light);color:var(--brand-indigo);border-radius:var(--radius-lg);border:1px solid var(--brand-indigo-muted);flex-shrink:0;">
          <i data-lucide="layers" style="width:18px;height:18px;display:block;"></i>
        </div>
        <div>
          <h3 class="t-subtitle" style="color:var(--text-primary);">Livro de Estruturas <span style="font-size:0.45rem;opacity:0.25;color:var(--text-muted);font-weight:400;vertical-align:super;">v3</span></h3>
          <p class="t-label-sm" style="color:var(--text-muted);margin-top:0.125rem;">
            {{ estrategias.length }} estrutura{{ estrategias.length !== 1 ? 's' : '' }} ativa{{ estrategias.length !== 1 ? 's' : '' }}
          </p>
        </div>
      </div>

      <!-- Filtros -->
      <div style="display:flex;gap:0.375rem;flex-wrap:wrap;">
        <button
          v-for="f in filtros" :key="f.key"
          @click="filtroAtivo = f.key"
          :style="filtroAtivo === f.key
            ? 'background:var(--brand-indigo);color:#fff;border-color:var(--brand-indigo);'
            : 'background:var(--surface-base);color:var(--text-muted);border-color:var(--border-default);'"
          style="padding:0.3rem 0.75rem;border-radius:var(--radius-full);border:1px solid;font-size:0.75rem;font-weight:700;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.15s;"
        >{{ f.label }}<span v-if="f.count > 0" style="opacity:0.65;margin-left:0.25rem;">({{ f.count }})</span></button>
      </div>
    </div>

    <!-- GRID DE CARDS: máximo 3 colunas -->
    <div v-if="estrategiasFiltradas.length > 0"
      style="padding:1.25rem;display:grid;gap:1rem;"
      :style="isMobile ? 'grid-template-columns:1fr;' : 'grid-template-columns:repeat(3,1fr);'"
    >
      <div
        v-for="est in estrategiasFiltradas" :key="est.id"
        class="premium-card"
        style="padding:0;overflow:hidden;border:1px solid var(--border-default);display:flex;flex-direction:column;"
      >
        <!-- Card Header: badge+ticker empilhados | DTE+data à direita -->
        <div :style="'padding:0.875rem 1rem;display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;border-bottom:1px solid var(--border-subtle);background:' + est.corFundo + ';'">
          <div style="display:flex;flex-direction:column;gap:0.35rem;min-width:0;">
            <span :style="'display:inline-block;width:fit-content;padding:0.2rem 0.6rem;border-radius:var(--radius-xs);font-size:0.6rem;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;border:1px solid;white-space:nowrap;background:' + est.corBadge + ';color:' + est.corTexto + ';border-color:' + est.corBorda + ';'">{{ est.tipoEstrutura }}</span>
            <span style="font-size:1.4rem;font-weight:800;color:var(--text-primary);letter-spacing:0.03em;line-height:1.15;">{{ est.ticker }}</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.35rem;flex-shrink:0;">
            <span :style="'padding:0.2rem 0.55rem;border-radius:var(--radius-xs);font-size:0.68rem;font-weight:700;' + (est.dte <= 7 ? 'background:var(--brand-rose-light);color:var(--brand-rose);' : est.dte <= 21 ? 'background:var(--brand-amber-light);color:var(--brand-amber);' : 'background:var(--surface-overlay);color:var(--text-muted);')">{{ est.dte }}d</span>
            <span class="t-label-sm" style="color:var(--text-tertiary);">{{ fmtDate(est.vencimento) }}</span>
          </div>
        </div>

        <!-- Range Bar da Estrutura -->
        <div style="padding:0.5rem 1rem 0.5rem;background:var(--surface-sunken);border-bottom:1px solid var(--border-subtle);">
          <!-- Linha de valores: Spot | Badge moneyness | Strike/P&L -->
          <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:0.85rem;">
            <div>
              <div :style="'font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1px;color:'+est.moneyTone.cor">Spot</div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:800;color:var(--text-primary);">{{ fmt(est.spotAtual) }}</div>
            </div>
            <div :style="'font-size:0.65rem;font-weight:800;letter-spacing:0.08em;padding:3px 10px;border-radius:99px;background:'+est.moneyTone.light+';color:'+est.moneyTone.cor+';border:1px solid '+est.moneyTone.muted">{{ est.moneyTone.label }}</div>
            <div style="text-align:right;">
              <template v-if="est.pernas.length === 1">
                <div style="font-size:0.65rem;font-weight:700;color:var(--brand-indigo);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1px;">Strike</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:800;color:var(--text-primary);">{{ fmt(est.pernas[0].strike) }}</div>
              </template>
              <template v-else>
                <div style="font-size:0.65rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1px;">P/L Total</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:800;" :style="est.plTotal >= 0 ? 'color:var(--brand-emerald)' : 'color:var(--brand-rose)'">{{ fmtSigned(est.plTotal) }}</div>
              </template>
            </div>
          </div>
          <!-- Trilho -->
          <div v-if="est.trackData" style="padding-top:0.4rem;padding-bottom:0.25rem;">
            <div style="position:relative;height:13px;border-radius:99px;background:linear-gradient(90deg,var(--brand-rose-light),var(--brand-amber-light) 50%,var(--brand-emerald-light));border:1px solid var(--border-default);">
              <!-- Zona entre strikes (spread zone) -->
              <div v-if="est.trackData.spreadZone" :style="'position:absolute;top:0;bottom:0;background:rgba(217,119,6,0.15);border-left:1.5px dashed rgba(217,119,6,0.35);border-right:1.5px dashed rgba(217,119,6,0.35);left:'+est.trackData.spreadZone.left+'%;width:'+est.trackData.spreadZone.width+'%;'"></div>
              <!-- Linhas de strike por perna (sem labels flutuantes) -->
              <div v-for="(m, mi) in est.trackData.legMarkers" :key="'lm'+mi"
                :style="'position:absolute;top:-6px;bottom:-6px;width:3px;border-radius:2px;transform:translateX(-1.5px);z-index:2;left:'+m.pct+'%;' + (m.isVenda ? 'background:var(--brand-rose);' : 'background:var(--brand-indigo);')">
              </div>
              <!-- Bolinha spot (cor = moneyness das vendas) -->
              <div :style="'position:absolute;top:-5px;width:21px;height:21px;border-radius:50%;transform:translateX(-10.5px);border:3px solid var(--surface-base);z-index:3;left:'+est.trackData.spotPct+'%;background:'+est.moneyTone.cor+';box-shadow:'+est.moneyTone.glow+';'"></div>
            </div>
            <!-- Legenda compacta: uma entrada por perna, sem sobreposicao -->
            <div style="display:flex;flex-wrap:wrap;gap:0.2rem 0.75rem;margin-top:0.55rem;">
              <span v-for="(m, mi) in est.trackData.legMarkers" :key="'leg'+mi"
                style="display:inline-flex;align-items:center;gap:0.3rem;white-space:nowrap;">
                <span :style="'width:10px;height:3px;border-radius:1px;display:inline-block;flex-shrink:0;background:' + (m.isVenda ? 'var(--brand-rose)' : 'var(--brand-indigo)')"></span>
                <span :style="'font-size:0.72rem;font-weight:700;font-family:JetBrains Mono,monospace;' + (m.isVenda ? 'color:var(--brand-rose)' : 'color:var(--brand-indigo)')">{{ m.isVenda ? 'V' : 'C' }} {{ m.tipoOpcao }} · R${{ m.strike.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) }}</span>
              </span>
            </div>
          </div>
        </div>

        <!-- Tabela de Pernas -->
        <div style="padding:0.5rem 1rem 0.75rem;border-bottom:1px solid var(--border-subtle);overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr>
                <th class="t-label-sm" style="text-align:left;padding:0.25rem 0.3rem 0.4rem 0;color:var(--text-muted);font-weight:600;white-space:nowrap;">Opção</th>
                <th class="t-label-sm" style="text-align:center;padding:0.25rem 0.3rem 0.4rem;color:var(--text-muted);font-weight:600;">Lado</th>
                <th class="t-label-sm" style="text-align:right;padding:0.25rem 0.3rem 0.4rem;color:var(--text-muted);font-weight:600;">Strike</th>
                <th class="t-label-sm" style="text-align:right;padding:0.25rem 0.3rem 0.4rem;color:var(--text-muted);font-weight:600;">PM</th>
                <th class="t-label-sm" style="text-align:right;padding:0.25rem 0.3rem 0.4rem;color:var(--text-muted);font-weight:600;">Atual</th>
                <th class="t-label-sm" style="text-align:center;padding:0.25rem 0.3rem 0.4rem;color:var(--text-muted);font-weight:600;">MNY</th>
                <th class="t-label-sm" style="text-align:right;padding:0.25rem 0.3rem 0.4rem;color:var(--text-muted);font-weight:600;">Δ</th>
                <th class="t-label-sm" style="text-align:right;padding:0.25rem 0 0.4rem 0.3rem;color:var(--text-muted);font-weight:600;">Qtd</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="(leg, li) in est.pernas" :key="li" style="border-top:1px solid var(--border-subtle);">
                <td style="padding:0.4rem 0.3rem 0.4rem 0;">
                  <span class="t-value-sm" style="color:var(--text-primary);font-family:monospace;white-space:nowrap;">{{ leg.simboloOpcao }}</span>
                </td>
                <td style="padding:0.4rem 0.3rem;text-align:center;white-space:nowrap;">
                  <span :style="'padding:0.08rem 0.35rem;border-radius:var(--radius-xs);font-size:0.65rem;font-weight:800;' + (leg.direcaoTrade === 'VENDA' ? 'background:var(--brand-emerald-light);color:var(--brand-emerald);' : 'background:var(--brand-rose-light);color:var(--brand-rose);')">{{ leg.direcaoTrade === 'VENDA' ? 'V' : 'C' }}</span>
                  <span class="t-label-sm" style="color:var(--text-muted);margin-left:0.2rem;">{{ leg.tipoOpcao || '' }}</span>
                </td>
                <td class="t-value-sm" style="padding:0.4rem 0.3rem;text-align:right;color:var(--text-primary);">{{ fmt(leg.strike) }}</td>
                <td class="t-value-sm" style="padding:0.4rem 0.3rem;text-align:right;color:var(--text-secondary);">{{ fmt(leg.premioMedio) }}</td>
                <td class="t-value-sm" style="padding:0.4rem 0.3rem;text-align:right;font-weight:700;"
                  :style="leg.direcaoTrade === 'VENDA'
                    ? (leg.premioAtual > leg.premioMedio ? 'color:var(--brand-rose);' : 'color:var(--brand-emerald);')
                    : (leg.premioAtual < leg.premioMedio ? 'color:var(--brand-rose);' : 'color:var(--brand-emerald);')"
                >{{ fmt(leg.premioAtual) }}</td>
                <td style="padding:0.4rem 0.3rem;text-align:center;">
                  <span :style="'padding:0.1rem 0.4rem;border-radius:var(--radius-xs);font-size:0.65rem;font-weight:700;' + (leg.moneynessCode === 'ITM' ? 'background:var(--brand-rose-light);color:var(--brand-rose);' : leg.moneynessCode === 'ATM' ? 'background:var(--brand-amber-light);color:var(--brand-amber);' : 'background:var(--surface-overlay);color:var(--text-muted);')">{{ leg.moneynessCode || '--' }}</span>
                </td>
                <td class="t-value-sm" style="padding:0.4rem 0.3rem;text-align:right;font-weight:700;"
                  :style="(leg.delta || 0) >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);'"
                >{{ (leg.delta !== null && leg.delta !== undefined) ? Number(leg.delta).toFixed(2) : '--' }}</td>
                <td class="t-value-sm" style="padding:0.4rem 0 0.4rem 0.3rem;text-align:right;color:var(--text-secondary);">{{ leg.quantidade || '--' }}</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Métricas: layout vertical (label | valor em cada linha) -->
        <div style="padding:1rem;display:flex;flex-direction:column;flex:1;">

          <!-- Fluxo na Abertura -->
          <p class="t-label-sm" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem;">Fluxo na Abertura</p>
          <div style="display:flex;flex-direction:column;gap:0.35rem;">
            <div v-if="est.valorRecebido > 0" style="display:flex;justify-content:space-between;align-items:center;">
              <span class="t-label-sm" style="color:var(--text-tertiary);">Recebido (V)</span>
              <span class="t-value-sm" style="color:var(--brand-emerald);font-weight:700;">+ {{ fmt(est.valorRecebido) }}</span>
            </div>
            <div v-if="est.valorPago > 0" style="display:flex;justify-content:space-between;align-items:center;">
              <span class="t-label-sm" style="color:var(--text-tertiary);">Pago (C)</span>
              <span class="t-value-sm" style="color:var(--brand-rose);font-weight:700;">- {{ fmt(est.valorPago) }}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding-top:0.35rem;margin-top:0.1rem;border-top:1px solid var(--border-subtle);">
              <span class="t-label-sm" style="color:var(--text-secondary);font-weight:700;">{{ est.saldoLiquido >= 0 ? 'Crédito' : 'Débito' }} Líquido</span>
              <span class="t-value-sm" :style="'font-weight:800;' + (est.saldoLiquido >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);')">{{ fmtSigned(est.saldoLiquido) }}</span>
            </div>
          </div>

          <!-- Situação Atual -->
          <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border-subtle);">
            <p class="t-label-sm" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem;">Situação Atual</p>
            <div style="display:flex;flex-direction:column;gap:0.35rem;">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-tertiary);">Desmontar</span>
                <span class="t-value-sm" :style="'font-weight:700;' + (est.custoDesmontar <= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);')">
                  {{ est.custoDesmontar <= 0 ? '+ ' : '- ' }}{{ fmt(est.custoDesmontar) }}
                </span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-secondary);font-weight:700;">P/L Total</span>
                <span class="t-value-sm" :style="'font-weight:800;' + (est.plTotal >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);')">{{ fmtSigned(est.plTotal) }}</span>
              </div>
              <div v-if="est.plPct !== null" style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-tertiary);">Retorno</span>
                <span class="t-value-sm" :style="'font-weight:700;' + (est.plPct >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);')">{{ (est.plPct >= 0 ? '+' : '') + est.plPct.toFixed(1) }}%</span>
              </div>
            </div>
          </div>

          <!-- Spread Economics: só para spreads verticais -->
          <div v-if="est.maxProfit !== null" style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border-subtle);">
            <p class="t-label-sm" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem;">Estrutura do Spread</p>
            <div style="display:flex;flex-direction:column;gap:0.32rem;">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-tertiary);">Prêmio Líquido/op</span>
                <span class="t-value-sm" style="color:var(--text-secondary);font-weight:700;">{{ fmt(est.premioLiquidoUnit) }}</span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-tertiary);">Quantidade</span>
                <span class="t-value-sm" style="color:var(--text-secondary);font-weight:700;">{{ est.qtdTotal.toLocaleString('pt-BR') }} ops · {{ est.lotes }} lotes</span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;padding-top:0.32rem;margin-top:0.1rem;border-top:1px solid var(--border-subtle);">
                <span class="t-label-sm" style="color:var(--text-tertiary);">Prêmio Total (crédito)</span>
                <span class="t-value-sm" style="color:var(--brand-emerald);font-weight:700;">+ {{ fmt(est.maxProfit) }}</span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-tertiary);">Margem Bloqueada</span>
                <span class="t-value-sm" style="color:var(--text-primary);font-weight:700;">{{ fmt(est.margemBloqueada) }}</span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-secondary);font-weight:700;">Prejuízo Máx. Real</span>
                <span class="t-value-sm" style="color:var(--brand-rose);font-weight:800;">- {{ fmt(est.maxLoss) }}</span>
              </div>
            </div>
          </div>

          <!-- Greeks -->
          <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border-subtle);display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;">
            <div>
              <p class="t-label-sm" style="color:var(--text-muted);margin-bottom:0.3rem;">Delta Líq.</p>
              <p class="t-value-sm" style="color:var(--text-primary);font-weight:700;">{{ fmtNum(est.deltaNet) }}</p>
            </div>
            <div>
              <p class="t-label-sm" style="color:var(--text-muted);margin-bottom:0.3rem;">Theta/d</p>
              <p class="t-value-sm" :style="'font-weight:700;' + (est.thetaNet >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);')">{{ fmtSigned(est.thetaNet) }}</p>
            </div>
            <div>
              <p class="t-label-sm" style="color:var(--text-muted);margin-bottom:0.3rem;">Spot</p>
              <p class="t-value-sm" style="color:var(--text-secondary);font-weight:700;">{{ fmt(est.spotAtual) }}</p>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div v-else style="padding:3rem 1rem;text-align:center;">
      <i data-lucide="layers" style="width:32px;height:32px;color:var(--text-muted);margin:0 auto 0.75rem;display:block;opacity:0.4;"></i>
      <p class="t-label" style="color:var(--text-muted);">Nenhuma estrutura encontrada</p>
    </div>

  </div>
</template>

<script>
window.CardStrategiesBook = {
  template: '#card-strategies-book-template',
  props: {
    statsPreCalculados: { type: Object,  default: function() { return {}; } },
    isMobile:           { type: Boolean, default: false }
  },

  data: function() {
    return { filtroAtivo: 'todas' };
  },

  mounted:  function() { if (window.refreshIcons) window.refreshIcons(); },
  updated:  function() { if (window.refreshIcons) window.refreshIcons(); },

  computed: {
    trades: function() {
      return (this.statsPreCalculados && this.statsPreCalculados.listaAtivas) || [];
    },

    estrategias: function() {
      var self   = this;
      var grupos = {};
      this.trades.forEach(function(t) {
        var id = t.estrategiaId || ('_solo_' + (t.tradeId || t.simboloOpcao));
        if (!grupos[id]) grupos[id] = [];
        grupos[id].push(t);
      });
      return Object.keys(grupos).map(function(id) {
        return self._construirEstrutura(id, grupos[id]);
      }).sort(function(a, b) { return a.dte - b.dte; });
    },

    filtros: function() {
      var ests = this.estrategias;
      var nCred = 0, nDeb = 0, nSimp = 0, nComp = 0;
      for (var i = 0; i < ests.length; i++) {
        var e = ests[i];
        if (e.categoria === 'credito') nCred++; else nDeb++;
        if (e.isSimples) nSimp++; else nComp++;
      }
      return [
        { key: 'todas',    label: 'Todas',    count: ests.length },
        { key: 'credito',  label: 'Crédito',  count: nCred },
        { key: 'debito',   label: 'Débito',   count: nDeb  },
        { key: 'simples',  label: 'Simples',  count: nSimp },
        { key: 'composta', label: 'Compostas',count: nComp }
      ];
    },

    estrategiasFiltradas: function() {
      var f    = this.filtroAtivo;
      var ests = this.estrategias;
      if (f === 'credito')  return ests.filter(function(e) { return e.categoria === 'credito'; });
      if (f === 'debito')   return ests.filter(function(e) { return e.categoria === 'debito';  });
      if (f === 'simples')  return ests.filter(function(e) { return e.isSimples;  });
      if (f === 'composta') return ests.filter(function(e) { return !e.isSimples; });
      return ests;
    }
  },

  methods: {
    // Formata como "R$ X,XX" (valor absoluto — use para preços sempre positivos)
    fmt: function(v) {
      if (v === null || v === undefined || isNaN(v)) return '--';
      return 'R$ ' + Math.abs(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },

    // Formata com sinal explícito: "+R$ X,XX" ou "-R$ X,XX"
    fmtSigned: function(v) {
      if (v === null || v === undefined || isNaN(v)) return '--';
      var abs = Math.abs(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return (v >= 0 ? '+' : '-') + 'R$ ' + abs;
    },

    // Formata número puro (delta, qtd)
    fmtNum: function(v) {
      if (v === null || v === undefined || isNaN(v)) return '--';
      return v.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    },

    // Formata data como "DD/MM/AAAA"
    fmtDate: function(d) {
      if (!d) return '--';
      var dt = (d instanceof Date) ? d : new Date(d);
      if (isNaN(dt.getTime())) return '--';
      return String(dt.getDate()).padStart(2, '0') + '/'
           + String(dt.getMonth() + 1).padStart(2, '0') + '/'
           + dt.getFullYear();
    },

    // Calcula posicoes percentuais para o trilho de strikes.
    // Suporta 1..N pernas: cada strike vira uma linha colorida.
    _computeTrackData: function(spot, pernas) {
      spot = parseFloat(spot) || 0;
      var strikes = pernas.map(function(p) { return parseFloat(p.strike) || 0; }).filter(function(s) { return s > 0; });
      if (!spot || !strikes.length) return null;
      var all = [spot].concat(strikes);
      var minA = Math.min.apply(null, all), maxA = Math.max.apply(null, all);
      var pad  = Math.max((maxA - minA) * 1.8, maxA * 0.05);
      var lo   = minA - pad, hi = maxA + pad, range = hi - lo || 1;
      var pct  = function(v) { return Math.max(5, Math.min(95, ((v - lo) / range) * 100)); };
      var legMarkers = pernas.map(function(p) {
        return {
          pct:      pct(parseFloat(p.strike) || 0),
          isVenda:  p.direcaoTrade === 'VENDA',
          tipoOpcao: String(p.tipoOpcao || '').toUpperCase().slice(0, 4),
          strike:   parseFloat(p.strike) || 0
        };
      });
      var spreadZone = null;
      if (legMarkers.length >= 2) {
        var pcts   = legMarkers.map(function(m) { return m.pct; });
        var minPct = Math.min.apply(null, pcts), maxPct = Math.max.apply(null, pcts);
        spreadZone = { left: minPct, width: maxPct - minPct };
      }
      return { spotPct: pct(spot), legMarkers: legMarkers, spreadZone: spreadZone };
    },

    // Moneyness da estrutura: avalia pelas pernas VENDA (risco).
    // ITM vendido = vermelho, ATM vendido = ambar, resto = verde.
    _computeMoneyTone: function(pernas) {
      var vendasItm = pernas.filter(function(p) {
        return p.direcaoTrade === 'VENDA' && String(p.moneynessCode || '').toUpperCase().indexOf('ITM') >= 0;
      });
      var vendasAtm = pernas.filter(function(p) {
        return p.direcaoTrade === 'VENDA' && String(p.moneynessCode || '').toUpperCase().indexOf('ATM') >= 0;
      });
      if (vendasItm.length > 0) return {
        cor: 'var(--brand-rose)',    light: 'rgba(225,29,72,0.18)',  muted: 'rgba(225,29,72,0.55)',
        glow: '0 0 0 3px rgba(225,29,72,0.40), 0 0 10px rgba(225,29,72,0.20)', label: 'ITM'
      };
      if (vendasAtm.length > 0) return {
        cor: 'var(--brand-amber)',   light: 'rgba(217,119,6,0.18)',  muted: 'rgba(217,119,6,0.55)',
        glow: '0 0 0 3px rgba(217,119,6,0.45), 0 0 10px rgba(217,119,6,0.20)', label: 'ATM'
      };
      return {
        cor: 'var(--brand-emerald)', light: 'var(--brand-emerald-light)', muted: 'var(--brand-emerald-muted)',
        glow: '0 0 0 3px var(--brand-emerald-muted)', label: 'OTM'
      };
    },

    _construirEstrutura: function(id, pernas) {
      var self    = this;
      var tipo    = this._classificar(pernas);
      var cor     = this._cores(tipo);
      var metrics = this._metricas(pernas);
      var leg0    = pernas[0];
      var dte     = pernas.reduce(function(min, p) { var v = typeof p.dteCorridos === 'number' ? p.dteCorridos : 999; return v < min ? v : min; }, 999);

      var pernasSorted = pernas.slice().sort(function(a, b) { return (a.strike || 0) - (b.strike || 0); });
      return Object.assign({
        id:            id,
        ticker:        leg0.tickerAtivo || '--',
        vencimento:    leg0.dataVencimento || null,
        dte:           dte,
        tipoEstrutura: tipo,
        isSimples:     pernas.length === 1,
        spotAtual:     leg0.spotPrice || 0,
        pernas:        pernasSorted,
        corFundo:      cor.fundo,
        corBadge:      cor.badge,
        corTexto:      cor.texto,
        corBorda:      cor.borda,
        trackData:     self._computeTrackData(leg0.spotPrice || 0, pernasSorted),
        moneyTone:     self._computeMoneyTone(pernas)
      }, metrics);
    },

    _classificar: function(pernas) {
      var n       = pernas.length;
      var vendas  = pernas.filter(function(p) { return p.direcaoTrade === 'VENDA';  });
      var compras = pernas.filter(function(p) { return p.direcaoTrade === 'COMPRA'; });
      var puts    = pernas.filter(function(p) { return String(p.tipoOpcao).toUpperCase() === 'PUT';  });
      var calls   = pernas.filter(function(p) { return String(p.tipoOpcao).toUpperCase() === 'CALL'; });

      if (n === 1) {
        var l = pernas[0];
        return (l.direcaoTrade === 'VENDA' ? 'Venda' : 'Compra') + ' de ' + (l.tipoOpcao || 'Opção');
      }

      if (n === 2 && vendas.length === 1 && compras.length === 1) {
        var v = vendas[0], c = compras[0];
        if (puts.length === 2)  return v.strike > c.strike ? 'Trava de Alta com PUT'  : 'Trava de Baixa com PUT';
        if (calls.length === 2) return v.strike < c.strike ? 'Trava de Baixa com CALL': 'Trava de Alta com CALL';
        if (puts.length === 1 && calls.length === 1) return 'Risk Reversal';
      }

      if (n === 2 && vendas.length === 2) {
        var sA = pernas[0].strike || 0, sB = pernas[1].strike || 0;
        var mesmoStrikeV = Math.abs(sA - sB) < 0.01;
        // Straddle/Strangle real requer um PUT + um CALL
        if (puts.length === 1 && calls.length === 1) {
          return mesmoStrikeV ? 'Venda de Straddle' : 'Venda de Strangle';
        }
        // Dois do mesmo tipo — nomeia pelo tipo
        var tipoV = puts.length === 2 ? 'PUT' : 'CALL';
        return mesmoStrikeV ? ('Venda de ' + tipoV + ' (Strike Duplo)') : ('Venda de ' + tipoV + ' Dupla');
      }
      if (n === 2 && compras.length === 2) {
        var sC = pernas[0].strike || 0, sD = pernas[1].strike || 0;
        var mesmoStrikeC = Math.abs(sC - sD) < 0.01;
        if (puts.length === 1 && calls.length === 1) {
          return mesmoStrikeC ? 'Compra de Straddle' : 'Compra de Strangle';
        }
        var tipoC = puts.length === 2 ? 'PUT' : 'CALL';
        return mesmoStrikeC ? ('Compra de ' + tipoC + ' (Strike Duplo)') : ('Compra de ' + tipoC + ' Dupla');
      }

      return 'Estrutura Composta (' + n + ' pernas)';
    },

    _cores: function(tipo) {
      var t = tipo || '';
      if (t.indexOf('Venda') === 0 || t === 'Trava de Alta com PUT' || t === 'Trava de Baixa com CALL') {
        return { fundo: 'var(--brand-emerald-light)', badge: 'var(--brand-emerald-light)', texto: 'var(--brand-emerald)', borda: 'var(--brand-emerald)' };
      }
      if (t.indexOf('Compra') === 0 || t === 'Trava de Alta com CALL' || t === 'Trava de Baixa com PUT') {
        return { fundo: 'var(--brand-amber-light)', badge: 'var(--brand-amber-light)', texto: 'var(--brand-amber)', borda: 'var(--brand-amber)' };
      }
      if (t === 'Risk Reversal') {
        return { fundo: 'var(--brand-indigo-light)', badge: 'var(--brand-indigo-light)', texto: 'var(--brand-indigo)', borda: 'var(--brand-indigo)' };
      }
      return { fundo: 'var(--surface-overlay)', badge: 'var(--surface-overlay)', texto: 'var(--text-muted)', borda: 'var(--border-default)' };
    },

    _metricas: function(pernas) {
      // Passe único: classifica cada perna e acumula todas as métricas juntas
      var vendas = [], compras = [], puts = [], calls = [];
      var valorRecebido = 0, valorPago = 0;
      var custoFecharVendas = 0, ganhoFecharCompras = 0;
      var plTotal = 0, deltaNet = 0, thetaNet = 0, qtdTotal = 0;

      pernas.forEach(function(p) {
        var isVenda = p.direcaoTrade === 'VENDA';
        var tipo    = String(p.tipoOpcao || '').toUpperCase();
        var qtd     = p.quantidade || 1;
        var pm      = p.premioMedio || 0;
        var pa      = p.premioAtual || 0;
        var d       = (p.delta || 0) * qtd;
        var t       = (p.theta || 0) * qtd;

        if (isVenda) {
          vendas.push(p);
          valorRecebido     += pm * qtd;
          custoFecharVendas += pa * qtd;
          deltaNet          -= d;
          thetaNet          -= t;
        } else {
          compras.push(p);
          valorPago          += pm * qtd;
          ganhoFecharCompras += pa * qtd;
          deltaNet           += d;
          thetaNet           += t;
        }
        if (tipo === 'PUT')  puts.push(p);
        if (tipo === 'CALL') calls.push(p);
        plTotal  += p.plTotalValor || 0;
        if (qtd > qtdTotal) qtdTotal = qtd;
      });

      var saldoLiquido   = valorRecebido - valorPago;
      var custoDesmontar = custoFecharVendas - ganhoFecharCompras;
      var plPct          = saldoLiquido !== 0 ? (plTotal / Math.abs(saldoLiquido)) * 100 : null;

      // Ganho/Perda Máx: APENAS spreads verticais de mesmo tipo (2 PUTs ou 2 CALLs, 1V+1C)
      var maxProfit = null, maxLoss = null;
      var isVertSpread = pernas.length === 2 && vendas.length === 1 && compras.length === 1
                       && (puts.length === 2 || calls.length === 2);
      if (isVertSpread) {
        var vl = vendas[0], cl = compras[0];
        var qtdMin  = Math.min(vl.quantidade || 1, cl.quantidade || 1);
        var largura = Math.abs((vl.strike || 0) - (cl.strike || 0)) * qtdMin;
        if (saldoLiquido >= 0) {
          maxProfit = saldoLiquido;
          maxLoss   = Math.max(largura - saldoLiquido, 0);
        } else {
          maxProfit = Math.max(largura + saldoLiquido, 0);
          maxLoss   = -saldoLiquido;
        }
      }

      var categoria = saldoLiquido >= 0 ? 'credito' : 'debito';
      var lotes             = Math.round(qtdTotal / 100);
      var premioLiquidoUnit = qtdTotal > 0 ? saldoLiquido / qtdTotal : 0;
      var margemBloqueada   = (maxProfit !== null && maxLoss !== null) ? maxProfit + maxLoss : null;

      return {
        valorRecebido:    valorRecebido,
        valorPago:        valorPago,
        saldoLiquido:     saldoLiquido,
        custoDesmontar:   custoDesmontar,
        plTotal:          plTotal,
        plPct:            plPct,
        deltaNet:         deltaNet,
        thetaNet:         thetaNet,
        maxProfit:        maxProfit,
        maxLoss:          maxLoss,
        categoria:        categoria,
        qtdTotal:         qtdTotal,
        lotes:            lotes,
        premioLiquidoUnit:premioLiquidoUnit,
        margemBloqueada:  margemBloqueada
      };
    }
  }
};
</script>

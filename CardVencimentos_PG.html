<script>
window.CardVencimentosPG = Object.assign({}, window.CardVencimentos, {
  template: `
<div style="width:100%;font-family:'Plus Jakarta Sans',sans-serif;">

  <!-- DRAWER LATERAL -->
  <transition name="venc-drawer">
    <div v-if="drawer.aberto" class="pg-drawer" style="display:flex;flex-direction:column;gap:12px;">
      <div class="pg-drawer-h">
        <div>
          <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);">Vencimento</div>
          <div style="font-size:17px;font-weight:800;color:var(--text-primary);margin-top:2px;">{{ drawer.titulo }}</div>
        </div>
        <button @click="fecharDrawer" style="background:var(--surface-overlay);border:1px solid var(--border-subtle);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--text-tertiary);font-size:16px;line-height:1;">✕</button>
      </div>
      <div class="pg-drawer-strip">
        <div class="s"><div class="l">Posições</div><div class="v">{{ drawer.ops.length }}</div></div>
        <div class="s"><div class="l">Nocional</div><div class="v" style="font-size:13px;">{{ fmtK(somaDrawer('nocional')) }}</div></div>
        <div class="s"><div class="l">Ganho Máx</div><div class="v pg-pos" style="font-size:13px;">{{ fmtK(somaDrawer('ganhoMaximo')) }}</div></div>
      </div>
      <div v-for="op in drawer.ops" :key="op.simboloOpcao || op.tickerAtivo"
        class="pg-poscard" :class="cvCorBorda(op)" style="margin-bottom:8px;flex:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:17px;font-weight:800;color:var(--text-primary);">{{ op.tickerAtivo }}</span>
          <div style="display:flex;gap:5px;">
            <span class="pg-chip" :class="(op.tipoOpcao||'').toUpperCase()==='PUT' ? 'amber' : 'red'" style="font-size:10px;">
              {{ (op.direcaoTrade||'V')[0].toUpperCase() }} · {{ op.tipoOpcao }}
            </span>
            <span class="pg-chip" :class="(op.moneynessCode||'').toUpperCase().includes('OTM') ? 'green' : (op.moneynessCode||'').toUpperCase().includes('ITM') ? 'red' : 'amber'" style="font-size:10px;">
              {{ op.moneynessCode || '--' }}
            </span>
          </div>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">{{ op.simboloOpcao }} · {{ op.quantidade }} lotes</div>
        <div class="pg-pc-grid">
          <div class="b"><div class="l">Strike</div><div class="v">{{ fmt ? fmt('strike', op.strike) : op.strike }}</div></div>
          <div class="b"><div class="l">Spot</div><div class="v">{{ fmt ? fmt('spotPrice', op.spotPrice) : op.spotPrice }}</div></div>
          <div class="b"><div class="l">DTE</div><div class="v">{{ op.dteCorridos || '--' }}d</div></div>
          <div class="b"><div class="l">Prêmio PM</div><div class="v">{{ fmtMoeda ? fmtMoeda(op.premioMedio) : op.premioMedio }}</div></div>
          <div class="b"><div class="l">Ganho Máx</div><div class="v pg-pos">{{ fmtK(op.ganhoMaximo) }}</div></div>
          <div class="b"><div class="l">Nocional</div><div class="v">{{ fmtK(op.nocional) }}</div></div>
        </div>
        <div class="pg-pc-foot">
          <div>
            <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);">P/L Aberto</div>
            <div style="font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;" :class="parseFloat(op.plTotalValor) >= 0 ? 'pg-pos' : 'pg-neg'">
              {{ fmtSigned(op.plTotalValor) }}
            </div>
          </div>
          <div style="font-size:20px;">{{ parseFloat(op.plTotalValor) >= 0 ? '✅' : '🚨' }}</div>
        </div>
      </div>
    </div>
  </transition>
  <div v-if="drawer.aberto" class="pg-drawer-ov" @click="fecharDrawer"></div>

  <!-- CARD PRINCIPAL -->
  <div class="pg-card lead-amber">

    <!-- Cabeçalho -->
    <div class="pg-card-h">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="pg-card-icon">🗓</div>
        <div>
          <h2>Calendário de Vencimentos</h2>
          <div class="pg-hint">Clique numa data para ver as posições</div>
        </div>
      </div>
      <span class="pg-chip" v-if="!isEmpty">
        <b>{{ vencimentos.length }}</b> datas · <b>{{ totalPosicoes }}</b> pos
      </span>
    </div>

    <!-- Empty state -->
    <div v-if="isEmpty" style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">
      Nenhum vencimento registado
    </div>

    <!-- Buckets de urgência -->
    <div v-else>
      <div class="pg-kpis">
        <div class="pg-kpi" style="border-left:3px solid var(--brand-rose);">
          <div class="l">Urgente ≤15d</div>
          <div class="v sm red pg-neg">{{ urgente.pos }} pos</div>
          <div class="d">{{ urgente.datas }} vencimento{{ urgente.datas !== 1 ? 's' : '' }}</div>
        </div>
        <div class="pg-kpi" style="border-left:3px solid var(--brand-amber);">
          <div class="l">Atenção 16–45d</div>
          <div class="v sm pg-warn">{{ atencao.pos }} pos</div>
          <div class="d">{{ atencao.datas }} vencimento{{ atencao.datas !== 1 ? 's' : '' }}</div>
        </div>
        <div class="pg-kpi" style="border-left:3px solid var(--brand-emerald);">
          <div class="l">Conforto &gt;45d</div>
          <div class="v sm pg-pos">{{ conforto.pos }} pos</div>
          <div class="d">{{ conforto.datas }} vencimento{{ conforto.datas !== 1 ? 's' : '' }}</div>
        </div>
      </div>

      <!-- Tabela de vencimentos -->
      <div class="pg-scroll-x">
        <table class="pg-tbl">
          <thead><tr>
            <th>DTE</th>
            <th>Vencimento</th>
            <th class="num">Pos.</th>
            <th>Nocional</th>
            <th class="num">Ganho Máx</th>
            <th class="num">P/L Aberto</th>
          </tr></thead>
          <tbody>
            <tr v-for="v in vencimentos" :key="v.dataVencimento"
              @click="abrirDrawer(v)" style="cursor:pointer;">
              <td>
                <span class="pg-chip" :class="corDTE(v.dteCorridos).label === 'Urgente' ? 'red' : corDTE(v.dteCorridos).label === 'Atenção' ? 'amber' : 'green'" style="font-size:10px;">
                  {{ v.dteCorridos || calcDTE(v.dataVencimento) }}d
                </span>
              </td>
              <td style="font-weight:600;color:var(--text-primary);">{{ fmtData(v.dataVencimento) }}</td>
              <td class="num" style="font-weight:700;">{{ v.contagem }}</td>
              <td>
                <div style="font-size:11.5px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text-primary);">{{ fmtK(v.nocional) }}</div>
                <div class="pg-bar"><span class="pg-bar-fill" :style="'width:'+barPct(v.nocional)+'%'"></span></div>
              </td>
              <td class="num pg-pos" style="font-size:12px;font-weight:700;">{{ fmtK(v.ganhoMaximo) }}</td>
              <td class="num" :class="(v.plAberto || 0) >= 0 ? 'pg-pos' : 'pg-neg'" style="font-size:12px;font-weight:700;">
                {{ fmtSigned(v.plAberto || 0) }}
              </td>
            </tr>
          </tbody>
          <tfoot>
            <tr style="font-weight:800;">
              <td colspan="2" style="color:var(--text-primary);">Total do Portfólio</td>
              <td class="num">{{ totalPosicoes }}</td>
              <td style="color:var(--text-primary);font-variant-numeric:tabular-nums;font-weight:700;">{{ fmtK(totais.nocional) }}</td>
              <td class="num pg-pos">{{ fmtK(totais.ganhoMaximo) }}</td>
              <td class="num" :class="(totais.plAberto || 0) >= 0 ? 'pg-pos' : 'pg-neg'">{{ fmtSigned(totais.plAberto || 0) }}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

  </div>
</div>
  `
});
</script>

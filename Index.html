    <style>
      [v-cloak] { display: none; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>

  <body style="background: var(--app-bg); color: var(--text-primary);" class="font-sans antialiased overflow-hidden">

    <div id="app" v-cloak class="flex h-screen w-screen overflow-hidden">

      <!-- ================================================================
           MENU SIDEBAR
            FIX: props e eventos alinhados ao novo MenuSidebar.html:
             - :active-view   -> :current-view
             - :status        -> removido (MenuSidebar nao usa)
             - :is-loading    -> removido (MenuSidebar nao usa)
             - :last-sync     -> adicionado
             - @toggle        -> @toggle-sidebar
             - :is-mobile     -> adicionado
           ================================================================ -->
      <menu-sidebar
        :menu="menu"
        :current-view="currentView"
        :is-collapsed="isCollapsed"
        :is-mobile="isMobile"
        :last-sync="lastSync"
        @navigate="navigate"
        @toggle-sidebar="toggleSidebar"
        @atualizar="handleRefresh">
      </menu-sidebar>

      <!-- ================================================================
           AREA PRINCIPAL
           ================================================================ -->
      <main
        :class="isMobile ? 'pt-5 pb-[80px]' : 'p-8'"
        class="flex-1 overflow-y-auto relative transition-all duration-300 ease-in-out w-full"
        style="background: var(--surface-sunken);"
      >
        <div class="w-[95%] max-w-[1600px] mx-auto">

          <!-- Header -->
          <header class="mb-6 px-5 md:px-0">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">

              <!-- Titulo da view -->
              <div>
                <h1 class="t-title" style="color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.06em;">
                  {{ currentMenuLabel }}
                </h1>
                <p class="flex flex-wrap items-center gap-2 md:gap-3 mt-1.5" style="color: var(--text-tertiary);">

                  <span class="t-value-sm">
                    Atualizado: {{ db.resumoGerencial.timestamp || '--:--' }}
                  </span>

                  <span
                    v-if="tempoCarga"
                    class="px-2 py-0.5 rounded-[var(--radius-xs)]"
                    style="font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
                           background: var(--surface-overlay); color: var(--brand-indigo); border: 1px solid var(--border-subtle);"
                  >
                    {{ tempoCarga }}
                  </span>

                  <span
                    v-if="!isOrquestrando && isAutoSyncEnabled"
                    class="px-2 py-0.5 rounded-[var(--radius-xs)]"
                    style="font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
                           background: var(--surface-overlay); color: var(--text-muted); border: 1px solid var(--border-subtle);"
                  >
                    PROXIMA SYNC: {{ formatCountdown }}
                  </span>

                  <span
                    v-else-if="isOrquestrando"
                    class="px-2 py-0.5 rounded-[var(--radius-xs)] animate-pulse"
                    style="font-size: 9px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
                           background: var(--brand-indigo-light); color: var(--brand-indigo); border: 1px solid var(--brand-indigo-muted);"
                  >
                    [cfg] SINCRONIZANDO...
                  </span>

                </p>
              </div>

              <!-- Controles direita -->
              <div
                class="flex flex-row md:flex-col items-center md:items-end justify-between w-full md:w-auto gap-4 md:gap-2 mt-1 pt-3 md:pt-0"
                :class="isMobile ? 'border-t' : ''"
                :style="isMobile ? 'border-color: var(--border-subtle)' : ''"
              >
                <!-- Status do sistema -->
                <div style="font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
                             color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;">
                  System:
                  <span :style="status === 'Online' ? 'color: var(--brand-emerald)' : 'color: var(--brand-amber)'">
                    {{ status }}
                  </span>
                </div>

                <!-- Toggle Smart Polling -->
                <div class="flex items-center gap-2">
                  <span
                    class="t-label transition-colors duration-300"
                    :style="isAutoSyncEnabled ? 'color: var(--brand-indigo)' : 'color: var(--text-muted)'"
                  >
                    Smart Polling {{ isAutoSyncEnabled ? 'ON' : 'OFF' }}
                  </span>
                  <button
                    @click="toggleAutoSync"
                    class="relative inline-flex h-4 w-8 items-center rounded-full transition-colors duration-300 shadow-inner"
                    :style="isAutoSyncEnabled ? 'background: var(--brand-indigo)' : 'background: var(--border-strong)'"
                  >
                    <span
                      :class="isAutoSyncEnabled ? 'translate-x-4' : 'translate-x-0.5'"
                      class="inline-block h-3 w-3 transform rounded-full bg-white transition-transform duration-300 shadow-sm"
                    ></span>
                  </button>
                </div>
              </div>

            </div>
          </header>
          <!-- /Header -->

          <!-- Grid superior -->
          <div v-if="topGridComponents.length > 0" class="grid grid-cols-12 gap-4 md:gap-8 px-3 md:px-0 mb-4 md:mb-8">
            <div
              v-for="comp in topGridComponents"
              :key="comp.id"
              :class="comp.cols || 'col-span-12'"
              class="transition-all duration-500"
            >
              <component :is="comp.component" v-bind="getComponentProps(comp)" @refresh="handleRefresh"></component>
            </div>
          </div>

          <!-- Carrossel mobile -->
          <section v-if="mobileCarouselComponents.length > 0" class="mb-8 -mx-5">
            <div :class="[MOBILE_ORCHESTRATOR_CONFIG.settings.gap, 'flex overflow-x-auto pb-6 px-5 hide-scrollbar snap-x snap-mandatory']">
              <div
                v-for="comp in mobileCarouselComponents"
                :key="'carousel-' + comp.id"
                :class="[MOBILE_ORCHESTRATOR_CONFIG.settings.cardWidth, MOBILE_ORCHESTRATOR_CONFIG.settings.cardHeight, MOBILE_ORCHESTRATOR_CONFIG.settings.snap, 'flex-shrink-0']"
              >
                <component :is="comp.component" v-bind="getComponentProps(comp)" @refresh="handleRefresh"></component>
              </div>
            </div>
          </section>

          <!-- Grid inferior -->
          <div v-if="bottomGridComponents.length > 0" class="grid grid-cols-12 gap-4 md:gap-8 px-5 md:px-0">
            <div
              v-for="comp in bottomGridComponents"
              :key="comp.id"
              :class="comp.cols || 'col-span-12'"
              class="transition-all duration-500"
            >
              <component :is="comp.component" v-bind="getComponentProps(comp)" @refresh="handleRefresh"></component>
            </div>
          </div>

        </div>
      </main>

    </div><!-- /#app -->

      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();

        console.log('[PWA] App instalado com sucesso.');
        esconderBotaoInstalar();
        deferredPrompt = null;
      });

        btn.id = 'pwa-install-btn';

        ].join(';');

          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function (result) {
            console.log('[PWA] Escolha do usuario:', result.outcome);
            deferredPrompt = null;
            esconderBotaoInstalar();
          });
        });

        btn.addEventListener('mouseover',  function () { btn.style.opacity = '0.85'; });
        btn.addEventListener('mouseout',   function () { btn.style.opacity = '1'; });

        document.body.appendChild(btn);
      }

      function esconderBotaoInstalar() {
        var btn = document.getElementById('pwa-install-btn');
        if (btn) btn.remove();

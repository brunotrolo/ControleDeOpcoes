<template id="page-melhores-taxas-template">
  <div style="display:flex;flex-direction:column;gap:1rem;">

    <!-- Controles -->
    <div class="premium-card" style="display:flex;flex-wrap:wrap;align-items:center;gap:1rem;padding:1rem 1.5rem;">

      <!-- Filtro CALL/PUT -->
      <div style="display:flex;flex-direction:column;gap:0.25rem;">
        <label style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">Tipo</label>
        <div style="display:flex;gap:0.375rem;">
          <button v-for="t in ['TODOS','CALL','PUT']" :key="t" @click="filtroTipo = t"
                  style="padding:0.375rem 0.875rem;border-radius:99px;font-size:0.7rem;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.15s;"
                  :style="filtroTipo === t
                    ? (t==='CALL' ? 'background:var(--brand-indigo);color:#fff;border-color:var(--brand-indigo);'
                      : t==='PUT' ? 'background:var(--brand-amber);color:#fff;border-color:var(--brand-amber);'
                      : 'background:var(--text-primary);color:var(--surface-base);border-color:var(--text-primary);')
                    : 'background:var(--surface-base);color:var(--text-secondary);border-color:var(--border-default);'">
            {{ t }}
          </button>
        </div>
      </div>

      <!-- Filtro Setor -->
      <div style="display:flex;flex-direction:column;gap:0.25rem;">
        <label style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">Setor</label>
        <select v-model="filtroSetor"
                style="padding:0.375rem 0.75rem;background:var(--surface-base);border:1px solid var(--border-default);border-radius:var(--radius-md);color:var(--text-primary);font-size:0.8rem;cursor:pointer;outline:none;"
                onfocus="this.style.borderColor='var(--brand-indigo)'" onblur="this.style.borderColor='var(--border-default)'">
          <option value="">Todos os setores</option>
          <option v-for="s in setoresDisponiveis" :key="s" :value="s">{{ s }}</option>
        </select>
      </div>

      <!-- Filtro DTE maximo -->
      <div style="display:flex;flex-direction:column;gap:0.25rem;">
        <label style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">DTE maximo</label>
        <div style="display:flex;gap:0.375rem;">
          <button v-for="d in [7,14,21,45,999]" :key="d" @click="filtroDTE = d"
                  style="padding:0.375rem 0.75rem;border-radius:99px;font-size:0.7rem;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.15s;"
                  :style="filtroDTE === d
                    ? 'background:var(--brand-indigo);color:#fff;border-color:var(--brand-indigo);'
                    : 'background:var(--surface-base);color:var(--text-secondary);border-color:var(--border-default);'">
            {{ d === 999 ? 'Todos' : d + 'd' }}
          </button>
        </div>
      </div>

      <!-- Contagem -->
      <div style="margin-left:auto;font-size:0.75rem;color:var(--text-muted);">
        <span style="font-weight:700;color:var(--text-primary);">{{ linhasFiltradas.length }}</span> opcoes
      </div>
    </div>

    <!-- KPIs de topo -->
    <div style="display:flex;gap:1px;background:var(--border-subtle);border-radius:var(--radius-xl);overflow:hidden;overflow-x:auto;">
      <div v-for="kpi in kpis" :key="kpi.label"
           style="flex:1 1 0%;min-width:140px;padding:1rem 1.25rem;background:var(--surface-base);display:flex;flex-direction:column;gap:4px;">
        <span style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">{{ kpi.label }}</span>
        <span style="font-size:1.25rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;"
              :style="kpi.cor ? 'color:' + kpi.cor : 'color:var(--text-primary)'">{{ kpi.valor }}</span>
      </div>
    </div>

    <!-- Tabela principal -->
    <div class="premium-card" style="overflow:hidden;">
      <div v-if="linhasFiltradas.length === 0"
           style="padding:4rem 2rem;text-align:center;color:var(--text-muted);">
        Nenhuma opcao encontrada com os filtros atuais.
      </div>
      <div v-else style="overflow-x:auto;">
        <table style="width:100%;border-collapse:separate;border-spacing:0;min-width:700px;">
          <thead>
            <tr style="background:var(--surface-overlay);">
              <th v-for="col in colunas" :key="col.key"
                  @click="ordenarPor(col.key)"
                  style="padding:0.625rem 0.875rem;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;border-bottom:1px solid var(--border-subtle);cursor:pointer;white-space:nowrap;user-select:none;"
                  :style="col.align === 'right' ? 'text-align:right;' : col.align === 'center' ? 'text-align:center;' : 'text-align:left;'"
                  :class="ordemChave === col.key ? 'color:var(--brand-indigo)' : 'color:var(--text-muted)'">
                {{ col.label }}
                <span v-if="ordemChave === col.key" style="margin-left:3px;">{{ ordemAsc ? '^' : 'v' }}</span>
              </th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="(linha, idx) in linhasFiltradas" :key="linha.OPTION_TICKER || idx"
                style="cursor:default;transition:background 0.1s;"
                :style="idx % 2 === 0 ? 'background:var(--surface-base);' : 'background:var(--surface-sunken);'"
                onmouseover="this.style.background='var(--surface-overlay)'" onmouseout="">

              <!-- Opcao + ativo -->
              <td style="padding:0.625rem 0.875rem;border-bottom:1px solid var(--border-subtle);">
                <div style="display:flex;flex-direction:column;gap:2px;">
                  <span style="font-size:0.8rem;font-weight:800;color:var(--text-primary);font-family:'JetBrains Mono',monospace;">{{ linha.OPTION_TICKER }}</span>
                  <span style="font-size:0.7rem;color:var(--text-muted);">{{ linha.TICKER }} - {{ linha.COMPANY_NAME }}</span>
                </div>
              </td>

              <!-- Tipo badge -->
              <td style="padding:0.625rem 0.5rem;text-align:center;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:99px;"
                      :style="linha.CATEGORY === 'CALL'
                        ? 'background:var(--brand-indigo-light);color:var(--brand-indigo);border:1px solid var(--brand-indigo-muted);'
                        : 'background:var(--brand-amber-light);color:var(--brand-amber);border:1px solid var(--brand-amber-muted);'">
                  {{ linha.CATEGORY }}
                </span>
              </td>

              <!-- Taxa de lucro -- destaque principal -->
              <td style="padding:0.625rem 0.875rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:1rem;font-weight:900;color:var(--brand-emerald);font-family:'JetBrains Mono',monospace;">
                  {{ fmtPct(linha.PROFIT_RATE_IF_EXERCISED) }}
                </span>
              </td>

              <!-- Strike -->
              <td style="padding:0.625rem 0.875rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.8rem;font-weight:700;color:var(--text-primary);font-family:'JetBrains Mono',monospace;">{{ fmt(linha.STRIKE) }}</span>
              </td>

              <!-- VE/Strike -->
              <td style="padding:0.625rem 0.875rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.8rem;font-weight:600;color:var(--brand-indigo);font-family:'JetBrains Mono',monospace;">{{ fmtPct(linha.VE_OVER_STRIKE) }}</span>
              </td>

              <!-- Spot/Strike ratio -->
              <td style="padding:0.625rem 0.875rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.8rem;font-weight:600;font-family:'JetBrains Mono',monospace;"
                      :style="Number(linha.SPOT_STRIKE_RATIO) >= 1 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);'">
                  {{ fmtNum(linha.SPOT_STRIKE_RATIO, 3) }}
                </span>
              </td>

              <!-- DTE -->
              <td style="padding:0.625rem 0.875rem;text-align:center;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.8rem;font-weight:700;font-family:'JetBrains Mono',monospace;"
                      :style="Number(linha.DTE_CALENDAR) <= 7 ? 'color:var(--brand-rose);' : Number(linha.DTE_CALENDAR) <= 21 ? 'color:var(--brand-amber);' : 'color:var(--text-secondary);'">
                  {{ linha.DTE_CALENDAR }}d
                </span>
              </td>

              <!-- Vencimento -->
              <td style="padding:0.625rem 0.875rem;text-align:center;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.75rem;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;">{{ linha.EXPIRY }}</span>
              </td>

              <!-- Volume financeiro -->
              <td style="padding:0.625rem 0.875rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.75rem;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;">{{ fmtCompact(linha.VOLUME_FIN) }}</span>
              </td>

              <!-- Setor -->
              <td style="padding:0.625rem 0.875rem;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.65rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;display:block;">{{ linha.SECTOR }}</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</template>

<script>
window.PageMelhoresTaxas = {
  template: '#page-melhores-taxas-template',
  props: {
    dados:    { type: Array,   default: () => [] },
    isMobile: { type: Boolean, default: false }
  },
  setup(props) {
    const { ref, computed } = Vue;

    const filtroTipo  = ref('TODOS');
    const filtroSetor = ref('');
    const filtroDTE   = ref(999);
    const ordemChave  = ref('PROFIT_RATE_IF_EXERCISED');
    const ordemAsc    = ref(false);

    const fmt = (v) => {
      const n = parseFloat(v);
      if (isNaN(n) || n === 0) return '--';
      return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };
    const fmtPct = (v) => {
      const n = parseFloat(v);
      if (isNaN(n)) return '--';
      return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';
    };
    const fmtNum = (v, dec) => {
      const n = parseFloat(v);
      if (isNaN(n)) return '--';
      return n.toFixed(dec || 2);
    };
    const fmtCompact = (v) => {
      const n = parseFloat(v);
      if (isNaN(n) || n === 0) return '--';
      if (n >= 1e6) return 'R$ ' + (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return 'R$ ' + (n / 1e3).toFixed(0) + 'k';
      return 'R$ ' + n.toFixed(0);
    };

    const setoresDisponiveis = computed(() => {
      const s = new Set(props.dados.map(r => r.SECTOR).filter(Boolean));
      return [...s].sort();
    });

    const linhasFiltradas = computed(() => {
      let lista = [...props.dados];
      if (filtroTipo.value !== 'TODOS') lista = lista.filter(r => r.CATEGORY === filtroTipo.value);
      if (filtroSetor.value) lista = lista.filter(r => r.SECTOR === filtroSetor.value);
      if (filtroDTE.value !== 999) lista = lista.filter(r => parseFloat(r.DTE_CALENDAR) <= filtroDTE.value);
      lista.sort((a, b) => {
        const va = parseFloat(a[ordemChave.value]) || 0;
        const vb = parseFloat(b[ordemChave.value]) || 0;
        return ordemAsc.value ? va - vb : vb - va;
      });
      return lista;
    });

    const ordenarPor = (chave) => {
      if (ordemChave.value === chave) ordemAsc.value = !ordemAsc.value;
      else { ordemChave.value = chave; ordemAsc.value = false; }
    };

    const kpis = computed(() => {
      const lista = linhasFiltradas.value;
      if (!lista.length) return [];
      const melhorTaxa = Math.max(...lista.map(r => parseFloat(r.PROFIT_RATE_IF_EXERCISED) || 0));
      const calls = lista.filter(r => r.CATEGORY === 'CALL').length;
      const puts  = lista.filter(r => r.CATEGORY === 'PUT').length;
      const dteMedio = lista.reduce((s, r) => s + (parseFloat(r.DTE_CALENDAR) || 0), 0) / lista.length;
      return [
        { label: 'Melhores opcoes', valor: lista.length, cor: null },
        { label: 'Melhor taxa',     valor: fmtPct(melhorTaxa), cor: 'var(--brand-emerald)' },
        { label: 'CALL / PUT',      valor: calls + ' / ' + puts, cor: null },
        { label: 'DTE medio',       valor: Math.round(dteMedio) + 'd', cor: 'var(--brand-indigo)' },
      ];
    });

    const colunas = [
      { key: 'OPTION_TICKER',            label: 'Opcao',          align: 'left' },
      { key: 'CATEGORY',                 label: 'Tipo',           align: 'center' },
      { key: 'PROFIT_RATE_IF_EXERCISED', label: 'Taxa Lucro',     align: 'right' },
      { key: 'STRIKE',                   label: 'Strike',         align: 'right' },
      { key: 'VE_OVER_STRIKE',           label: 'VE/Strike',      align: 'right' },
      { key: 'SPOT_STRIKE_RATIO',        label: 'Spot/Strike',    align: 'right' },
      { key: 'DTE_CALENDAR',             label: 'DTE',            align: 'center' },
      { key: 'EXPIRY',                   label: 'Vencimento',     align: 'center' },
      { key: 'VOLUME_FIN',               label: 'Vol. Fin.',      align: 'right' },
      { key: 'SECTOR',                   label: 'Setor',          align: 'left' },
    ];

    return { filtroTipo, filtroSetor, filtroDTE, ordemChave, ordemAsc,
             setoresDisponiveis, linhasFiltradas, ordenarPor, kpis, colunas,
             fmt, fmtPct, fmtNum, fmtCompact };
  }
};
</script>

<template id="page-correl-ibov-template">
  <div style="display:flex;flex-direction:column;gap:1rem;">

    <!-- Controles -->
    <div class="premium-card" style="display:flex;flex-wrap:wrap;align-items:center;gap:1rem;padding:1rem 1.5rem;">

      <!-- Sentido -->
      <div style="display:flex;flex-direction:column;gap:0.25rem;">
        <label style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">Correlacao</label>
        <div style="display:flex;gap:0.375rem;">
          <button v-for="s in [{k:'TODOS',l:'Todas'},{k:'ALTA',l:'Alta (+0.6)'},{k:'BAIXA',l:'Baixa (0 a 0.6)'},{k:'NEGATIVA',l:'Negativa'}]"
                  :key="s.k" @click="filtroSentido = s.k"
                  style="padding:0.375rem 0.875rem;border-radius:99px;font-size:0.7rem;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.15s;"
                  :style="filtroSentido === s.k
                    ? (s.k==='ALTA' ? 'background:var(--brand-indigo);color:#fff;border-color:var(--brand-indigo);'
                      : s.k==='BAIXA' ? 'background:var(--brand-amber);color:#fff;border-color:var(--brand-amber);'
                      : s.k==='NEGATIVA' ? 'background:var(--brand-rose);color:#fff;border-color:var(--brand-rose);'
                      : 'background:var(--text-primary);color:var(--surface-base);border-color:var(--text-primary);')
                    : 'background:var(--surface-base);color:var(--text-secondary);border-color:var(--border-default);'">
            {{ s.l }}
          </button>
        </div>
      </div>

      <!-- Setor -->
      <div style="display:flex;flex-direction:column;gap:0.25rem;">
        <label style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">Setor</label>
        <select v-model="filtroSetor"
                style="padding:0.375rem 0.75rem;background:var(--surface-base);border:1px solid var(--border-default);border-radius:var(--radius-md);color:var(--text-primary);font-size:0.8rem;cursor:pointer;outline:none;"
                onfocus="this.style.borderColor='var(--brand-indigo)'" onblur="this.style.borderColor='var(--border-default)'">
          <option value="">Todos os setores</option>
          <option v-for="s in setoresDisponiveis" :key="s" :value="s">{{ s }}</option>
        </select>
      </div>

      <!-- Busca -->
      <div style="display:flex;flex-direction:column;gap:0.25rem;">
        <label style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">Busca</label>
        <input v-model="busca" placeholder="Ticker ou empresa..."
               style="padding:0.375rem 0.75rem;background:var(--surface-base);border:1px solid var(--border-default);border-radius:var(--radius-md);color:var(--text-primary);font-size:0.8rem;outline:none;width:180px;"
               onfocus="this.style.borderColor='var(--brand-indigo)'" onblur="this.style.borderColor='var(--border-default)'">
      </div>

      <div style="margin-left:auto;font-size:0.75rem;color:var(--text-muted);">
        <span style="font-weight:700;color:var(--text-primary);">{{ linhasFiltradas.length }}</span> ativos
      </div>
    </div>

    <!-- KPIs -->
    <div style="display:flex;gap:1px;background:var(--border-subtle);border-radius:var(--radius-xl);overflow:hidden;overflow-x:auto;">
      <div v-for="kpi in kpis" :key="kpi.label"
           style="flex:1 1 0%;min-width:130px;padding:1rem 1.25rem;background:var(--surface-base);display:flex;flex-direction:column;gap:4px;">
        <span style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">{{ kpi.label }}</span>
        <span style="font-size:1.2rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;"
              :style="kpi.cor ? 'color:' + kpi.cor : 'color:var(--text-primary)'">{{ kpi.valor }}</span>
      </div>
    </div>

    <!-- Explicacao do indicador -->
    <div class="premium-card" style="padding:1rem 1.5rem;display:flex;gap:1rem;align-items:flex-start;">
      <i data-lucide="info" style="width:1rem;height:1rem;color:var(--brand-indigo);flex-shrink:0;margin-top:2px;"></i>
      <div>
        <p style="font-size:0.8rem;font-weight:700;color:var(--text-primary);margin-bottom:4px;">O que e Correlacao com IBOV?</p>
        <p style="font-size:0.78rem;color:var(--text-secondary);line-height:1.5;">
          Mede o quanto o ativo se move junto com o IBOV. Valor proximo de 1.0 = ativo acompanha o indice de perto (risco sistemico alto).
          Valor proximo de 0 = ativo descorrelacionado (bom para diversificacao da carteira de opcoes).
          Valores negativos = ativo se move contra o IBOV (hedge natural).
        </p>
      </div>
    </div>

    <!-- Tabela -->
    <div class="premium-card" style="overflow:hidden;">
      <div v-if="linhasFiltradas.length === 0" style="padding:4rem 2rem;text-align:center;color:var(--text-muted);">
        Nenhum ativo encontrado com os filtros atuais.
      </div>
      <div v-else style="overflow-x:auto;">
        <table style="width:100%;border-collapse:separate;border-spacing:0;">
          <thead>
            <tr style="background:var(--surface-overlay);">
              <th style="padding:0.625rem 0.75rem;text-align:left;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);">#</th>
              <th @click="ordenarPor('TICKER')"
                  style="padding:0.625rem 1rem;text-align:left;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;border-bottom:1px solid var(--border-subtle);cursor:pointer;"
                  :style="ordemChave==='TICKER' ? 'color:var(--brand-indigo);' : 'color:var(--text-muted);'">Ativo</th>
              <th @click="ordenarPor('CORREL_VALUE')"
                  style="padding:0.625rem 1rem;text-align:right;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;border-bottom:1px solid var(--border-subtle);cursor:pointer;min-width:160px;"
                  :style="ordemChave==='CORREL_VALUE' ? 'color:var(--brand-indigo);' : 'color:var(--text-muted);'">
                Correlacao IBOV <span v-if="ordemChave==='CORREL_VALUE'">{{ ordemAsc ? '^' : 'v' }}</span>
              </th>
              <th style="padding:0.625rem 1rem;text-align:left;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);">Setor</th>
              <th style="padding:0.625rem 1rem;text-align:left;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);">Atualizado</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="(linha, idx) in linhasFiltradas" :key="linha.TICKER || idx"
                style="transition:background 0.1s;"
                :style="idx%2===0 ? 'background:var(--surface-base);' : 'background:var(--surface-sunken);'"
                onmouseover="this.style.background='var(--surface-overlay)'" onmouseout="">

              <td style="padding:0.625rem 0.75rem;border-bottom:1px solid var(--border-subtle);color:var(--text-muted);font-size:0.75rem;font-family:'JetBrains Mono',monospace;">{{ idx + 1 }}</td>

              <td style="padding:0.625rem 1rem;border-bottom:1px solid var(--border-subtle);">
                <div style="display:flex;flex-direction:column;gap:2px;">
                  <span style="font-size:0.875rem;font-weight:800;color:var(--text-primary);">{{ linha.TICKER }}</span>
                  <span style="font-size:0.65rem;color:var(--text-muted);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ linha.COMPANY_NAME }}</span>
                </div>
              </td>

              <!-- Barra de correlacao -->
              <td style="padding:0.625rem 1rem;border-bottom:1px solid var(--border-subtle);">
                <div style="display:flex;align-items:center;gap:0.75rem;">
                  <span style="font-size:0.95rem;font-weight:900;font-family:'JetBrains Mono',monospace;min-width:52px;text-align:right;"
                        :style="corValor(parseFloat(linha.CORREL_VALUE||0))">
                    {{ fmtNum(linha.CORREL_VALUE, 3) }}
                  </span>
                  <!-- Barra visual -1 a +1 -->
                  <div style="flex:1;height:8px;background:var(--surface-sunken);border-radius:99px;overflow:hidden;max-width:120px;position:relative;">
                    <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border-strong);"></div>
                    <div style="height:100%;border-radius:99px;transition:width 0.3s;"
                         :style="barraCorrel(parseFloat(linha.CORREL_VALUE||0))"></div>
                  </div>
                </div>
              </td>

              <td style="padding:0.625rem 1rem;border-bottom:1px solid var(--border-subtle);font-size:0.7rem;color:var(--text-muted);">
                {{ linha.SECTOR ? linha.SECTOR.substring(0,28) : '--' }}
              </td>

              <td style="padding:0.625rem 1rem;border-bottom:1px solid var(--border-subtle);font-size:0.7rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;">
                {{ linha.UPDATED_AT ? String(linha.UPDATED_AT).substring(0,10) : '--' }}
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</template>

<script>
window.PageCorrelIbov = {
  template: '#page-correl-ibov-template',
  props: {
    dados:    { type: Array,   default: () => [] },
    isMobile: { type: Boolean, default: false }
  },
  setup(props) {
    const { ref, computed } = Vue;

    const filtroSentido = ref('TODOS');
    const filtroSetor   = ref('');
    const busca         = ref('');
    const ordemChave    = ref('CORREL_VALUE');
    const ordemAsc      = ref(false);

    const fmtNum = (v, dec) => {
      const n = parseFloat(v);
      return isNaN(n) ? '--' : n.toFixed(dec || 2);
    };

    const corValor = (v) => {
      if (v >= 0.7)  return 'color:var(--brand-rose);';
      if (v >= 0.4)  return 'color:var(--brand-amber);';
      if (v >= 0)    return 'color:var(--brand-indigo);';
      return 'color:var(--brand-emerald);';
    };

    const barraCorrel = (v) => {
      // Barra centrada em 50% -- cresce para direita (positivo) ou esquerda (negativo)
      const pct    = Math.min(Math.abs(v) * 50, 50);
      const cor    = v >= 0.7 ? 'var(--brand-rose)' : v >= 0.4 ? 'var(--brand-amber)' : v >= 0 ? 'var(--brand-indigo)' : 'var(--brand-emerald)';
      const left   = v >= 0 ? '50%' : (50 - pct) + '%';
      const width  = pct + '%';
      return 'position:absolute;left:' + left + ';width:' + width + ';height:100%;background:' + cor + ';border-radius:99px;';
    };

    const setoresDisponiveis = computed(() => {
      const s = new Set(props.dados.map(r => r.SECTOR).filter(Boolean));
      return [...s].sort();
    });

    const linhasFiltradas = computed(() => {
      let lista = [...props.dados];
      if (filtroSentido.value === 'ALTA')     lista = lista.filter(r => parseFloat(r.CORREL_VALUE||0) >= 0.6);
      if (filtroSentido.value === 'BAIXA')    lista = lista.filter(r => parseFloat(r.CORREL_VALUE||0) >= 0 && parseFloat(r.CORREL_VALUE||0) < 0.6);
      if (filtroSentido.value === 'NEGATIVA') lista = lista.filter(r => parseFloat(r.CORREL_VALUE||0) < 0);
      if (filtroSetor.value) lista = lista.filter(r => r.SECTOR === filtroSetor.value);
      if (busca.value.trim()) {
        const b = busca.value.trim().toUpperCase();
        lista = lista.filter(r => (r.TICKER||'').toUpperCase().includes(b) || (r.COMPANY_NAME||'').toUpperCase().includes(b));
      }
      lista.sort((a, b) => {
        const va = parseFloat(a[ordemChave.value]||0);
        const vb = parseFloat(b[ordemChave.value]||0);
        const sa = String(a[ordemChave.value]||'');
        const sb = String(b[ordemChave.value]||'');
        if (!isNaN(va) && !isNaN(vb)) return ordemAsc.value ? va - vb : vb - va;
        return ordemAsc.value ? sa.localeCompare(sb) : sb.localeCompare(sa);
      });
      return lista;
    });

    const ordenarPor = (chave) => {
      if (ordemChave.value === chave) ordemAsc.value = !ordemAsc.value;
      else { ordemChave.value = chave; ordemAsc.value = false; }
    };

    const kpis = computed(() => {
      const lista = props.dados;
      if (!lista.length) return [];
      const alta     = lista.filter(r => parseFloat(r.CORREL_VALUE||0) >= 0.6).length;
      const baixa    = lista.filter(r => parseFloat(r.CORREL_VALUE||0) >= 0 && parseFloat(r.CORREL_VALUE||0) < 0.6).length;
      const negativa = lista.filter(r => parseFloat(r.CORREL_VALUE||0) < 0).length;
      const media    = lista.reduce((s, r) => s + (parseFloat(r.CORREL_VALUE||0)), 0) / lista.length;
      return [
        { label: 'Total ativos',    valor: lista.length,         cor: null },
        { label: 'Alta correl.',    valor: alta,                 cor: 'var(--brand-rose)' },
        { label: 'Baixa correl.',   valor: baixa,                cor: 'var(--brand-amber)' },
        { label: 'Descorrelac.',    valor: negativa,             cor: 'var(--brand-emerald)' },
        { label: 'Media geral',     valor: fmtNum(media, 3),     cor: 'var(--brand-indigo)' },
      ];
    });

    return { filtroSentido, filtroSetor, busca, ordemChave, ordemAsc,
             setoresDisponiveis, linhasFiltradas, ordenarPor, kpis,
             fmtNum, corValor, barraCorrel };
  }
};
</script>

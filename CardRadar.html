<template id="card-radar-template">
  <div style="width:100%;font-family:'Plus Jakarta Sans',sans-serif;">

    <!-- ══════════════════════════════════════════════════
         DRAWER DE DETALHE (sidebar deslizante à direita)
        <!-- DRAWER DE DETALHE -->
    <transition name="radar-drawer">
      <div v-if="drawer.aberto"
        style="position:fixed;top:0;right:0;bottom:0;width:420px;max-width:95vw;z-index:1000;
               display:flex;flex-direction:column;background:var(--surface-base);
               box-shadow:-8px 0 40px rgba(0,0,0,0.18);border-left:1px solid var(--border-subtle);">

        <!-- Header do drawer -->
        <div style="display:flex;align-items:center;justify-content:space-between;
                    padding:1.25rem 1.5rem;border-bottom:1px solid var(--border-subtle);
                    background:var(--surface-overlay);">
          <div>
            <div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;
                        letter-spacing:0.15em;color:var(--text-muted);margin-bottom:3px;">
              {{ drawer.grupoLabel }}
            </div>
            <div style="font-size:1.05rem;font-weight:800;color:var(--text-primary);letter-spacing:-0.02em;">
              {{ drawer.titulo }}
            </div>
          </div>
          <button @click="fecharDrawer"
            style="width:32px;height:32px;border-radius:50%;border:1px solid var(--border-subtle);
                   background:var(--surface-base);cursor:pointer;display:flex;align-items:center;
                   justify-content:center;color:var(--text-muted);font-size:1rem;transition:all 0.15s;">
            ✕
          </button>
        </div>

        <!-- Sumário do grupo -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;
                    background:var(--border-subtle);border-bottom:1px solid var(--border-subtle);">
          <div style="background:var(--surface-base);padding:1rem 1.25rem;">
            <div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;
                        letter-spacing:0.1em;color:var(--text-muted);margin-bottom:4px;">Posições</div>
            <div style="font-size:1.5rem;font-weight:800;color:var(--text-primary);
                        font-family:'JetBrains Mono',monospace;">{{ drawer.ops.length }}</div>
          </div>
          <div style="background:var(--surface-base);padding:1rem 1.25rem;">
            <div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;
                        letter-spacing:0.1em;color:var(--text-muted);margin-bottom:4px;">Nocional</div>
            <div style="font-size:1.1rem;font-weight:800;color:var(--brand-indigo);
                        font-family:'JetBrains Mono',monospace;">
              {{ fmtK(somaDrawer('nocional')) }}
            </div>
          </div>
          <div style="background:var(--surface-base);padding:1rem 1.25rem;">
            <div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;
                        letter-spacing:0.1em;color:var(--text-muted);margin-bottom:4px;">P/L Aberto</div>
            <div style="font-size:1.1rem;font-weight:800;font-family:'JetBrains Mono',monospace;"
              :style="somaDrawer('plTotalValor') >= 0 ? 'color:var(--brand-emerald)' : 'color:var(--brand-rose)'">
              {{ fmtK(somaDrawer('plTotalValor')) }}
            </div>
          </div>
        </div>

        <!-- Lista de operações — cards idênticos ao CarouselAtivas -->
        <div style="flex:1;overflow-y:auto;padding:0.875rem;
                    scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent;">

          <div v-for="op in drawer.ops" :key="op.tradeId || op.simboloOpcao"
            class="premium-card"
            style="margin-bottom:0.75rem;padding:0;display:flex;flex-direction:column;
                   border-width:2px !important;overflow:hidden;"
            :style="drawerCardBorder(op)">

            <!-- Header: ticker + badge tipo + badge moneyness -->
            <div style="padding:0.875rem 1rem 0.75rem;border-bottom:1px solid var(--border-subtle);">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem;">
                <div style="display:flex;align-items:center;gap:0.5rem;">
                  <span style="font-size:1.25rem;font-weight:800;color:var(--text-primary);
                               letter-spacing:-0.04em;line-height:1;font-family:'JetBrains Mono',monospace;">
                    {{ op.tickerAtivo || '--' }}
                  </span>
                  <span style="font-size:0.58rem;font-weight:700;text-transform:uppercase;
                               letter-spacing:0.08em;padding:2px 6px;border-radius:var(--radius-xs);border:1.5px solid;"
                    :style="getTipoStyle(op.tipoOpcao)">
                    {{ (op.direcaoTrade || '').charAt(0) }} {{ op.tipoOpcao || '—' }}
                  </span>
                </div>
                <span style="font-size:0.58rem;font-weight:700;text-transform:uppercase;
                             letter-spacing:0.08em;padding:2px 7px;border-radius:99px;border:1.5px solid;"
                  :style="getMoneynessStyle(op.moneynessCode)">
                  {{ op.moneynessCode || 'N/A' }}
                </span>
              </div>
              <div style="display:flex;align-items:center;gap:0.375rem;">
                <span style="font-size:0.65rem;font-weight:700;color:var(--text-muted);
                             font-family:'JetBrains Mono',monospace;">{{ op.simboloOpcao || '--' }}</span>
                <span style="color:var(--border-default);">|</span>
                <span style="font-size:0.6rem;color:var(--text-muted);">QTD: {{ fmt('qtdOpcoes', op.qtdOpcoes || op.quantidade) }}</span>
                <span style="margin-left:auto;font-size:0.6rem;font-weight:700;color:var(--text-muted);">
                  {{ op.dteCorridos }}d &middot; {{ fmt('dataVencimento', op.dataVencimento) }}
                </span>
              </div>
            </div>

            <!-- Spot / Dist / Strike -->
            <div style="display:flex;justify-content:space-around;align-items:center;
                        padding:0.5rem 0.75rem;background:var(--surface-sunken);
                        border-bottom:1px solid var(--border-subtle);">
              <div style="text-align:center;">
                <div style="font-size:0.55rem;font-weight:700;color:var(--text-muted);
                            text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;">Spot</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:0.78rem;font-weight:700;color:var(--text-primary);">
                  {{ fmt('spotPrice', op.spotPrice) }}
                </div>
              </div>
              <div style="width:1px;height:1.5rem;background:var(--border-default);"></div>
              <div style="text-align:center;">
                <div style="font-size:0.55rem;font-weight:700;color:var(--text-muted);
                            text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;">Dist.</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:0.78rem;font-weight:700;
                            padding:1px 5px;border-radius:var(--radius-xs);
                            background:var(--surface-base);border:1px solid var(--border-subtle);"
                  :style="(op.distanciaPct || 0) >= 0 ? 'color:var(--brand-emerald)' : 'color:var(--brand-rose)'">
                  {{ fmtDistPct(op.distanciaPct) }}
                </div>
              </div>
              <div style="width:1px;height:1.5rem;background:var(--border-default);"></div>
              <div style="text-align:center;">
                <div style="font-size:0.55rem;font-weight:700;color:var(--text-muted);
                            text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;">Strike</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:0.78rem;font-weight:700;color:var(--text-primary);">
                  {{ fmt('strike', op.strike) }}
                </div>
              </div>
            </div>

            <!-- Grid 3x3 métricas -->
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;
                        background:var(--border-subtle);">
              <div style="background:var(--surface-base);padding:0.5rem 0.625rem;display:flex;flex-direction:column;">
                <span style="font-size:0.52rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">Premio Medio</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--text-secondary);">{{ fmt('premioMedio', op.premioMedio) }}</span>
              </div>
              <div style="background:var(--surface-base);padding:0.5rem 0.625rem;display:flex;flex-direction:column;">
                <span style="font-size:0.52rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">Premio Atual</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--text-secondary);">{{ fmt('premioAtual', op.premioAtual) }}</span>
              </div>
              <div style="background:var(--surface-base);padding:0.5rem 0.625rem;display:flex;flex-direction:column;">
                <span style="font-size:0.52rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">Break-Even</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--text-secondary);">{{ drawerBreakEven(op) }}</span>
              </div>
              <div style="background:var(--surface-base);padding:0.5rem 0.625rem;display:flex;flex-direction:column;">
                <span style="font-size:0.52rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">Ganho Max.</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--brand-emerald);">{{ fmt('ganhoMaximo', op.ganhoMaximo) }}</span>
              </div>
              <div style="background:var(--surface-base);padding:0.5rem 0.625rem;display:flex;flex-direction:column;">
                <span style="font-size:0.52rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">P/L %</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;"
                  :style="(parseFloat(op.plTotalPct)||0) >= 0 ? 'color:var(--brand-emerald)' : 'color:var(--brand-rose)'">{{ drawerPlPct(op.plTotalPct) }}</span>
              </div>
              <div style="background:var(--surface-base);padding:0.5rem 0.625rem;display:flex;flex-direction:column;">
                <span style="font-size:0.52rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">Nocional</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--text-primary);">{{ fmtK(op.nocional) }}</span>
              </div>
              <div style="background:var(--surface-base);padding:0.5rem 0.625rem;display:flex;flex-direction:column;">
                <span style="font-size:0.52rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">Delta</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--brand-indigo);">{{ op.delta != null ? parseFloat(op.delta).toFixed(4) : '—' }}</span>
              </div>
              <div style="background:var(--surface-base);padding:0.5rem 0.625rem;display:flex;flex-direction:column;">
                <span style="font-size:0.52rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">POE</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--text-secondary);">{{ op.poe != null ? parseFloat(op.poe).toFixed(2) + '%' : '—' }}</span>
              </div>
              <div style="background:var(--surface-base);padding:0.5rem 0.625rem;display:flex;flex-direction:column;">
                <span style="font-size:0.52rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">Lucro Max.</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--text-secondary);">{{ drawerLucroMax(op.potencialLucroPct) }}</span>
              </div>
            </div>

            <!-- Footer P/L -->
            <div style="padding:0.625rem 1rem;display:flex;justify-content:space-between;align-items:center;
                        border-top:2px solid;"
              :style="drawerFooterStyle(op)">
              <div>
                <div style="font-size:0.52rem;font-weight:700;text-transform:uppercase;
                            letter-spacing:0.1em;opacity:0.7;margin-bottom:2px;">L/P Aberto</div>
                <div style="display:flex;align-items:baseline;gap:0.375rem;">
                  <span style="font-family:'JetBrains Mono',monospace;font-size:0.95rem;
                               font-weight:800;letter-spacing:-0.02em;white-space:nowrap;">
                    {{ fmt('plTotalValor', op.plTotalValor) }}
                  </span>
                  <span style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;
                               font-weight:600;opacity:0.6;white-space:nowrap;">
                    ({{ drawerPlPct(op.plTotalPct) }})
                  </span>
                </div>
              </div>
              <div style="font-size:1.25rem;line-height:1;">{{ drawerCardIcon(op) }}</div>
            </div>

          </div>

          <!-- Vazio -->
          <div v-if="drawer.ops.length === 0"
            style="text-align:center;padding:3rem;color:var(--text-muted);">
            <div style="font-size:2rem;opacity:0.4;margin-bottom:0.5rem;">📭</div>
            <div style="font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;">
              Nenhuma operacao neste grupo
            </div>
          </div>
        </div>

      </div>
    </transition>

    <!-- Overlay escurecido quando drawer aberto -->
    <div v-if="drawer.aberto"
      @click="fecharDrawer"
      style="position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.35);backdrop-filter:blur(2px);">
    </div>

    <!-- ══════════════════════════════════════════════════
         CARD PRINCIPAL
        <!-- /DRAWER -->
    <div class="premium-card" style="width:100%;overflow:hidden;">

      <!-- Cabeçalho -->
      <div style="display:flex;align-items:center;justify-content:space-between;
                  padding:1rem 1.5rem;border-bottom:1px solid var(--border-subtle);">
        <div style="display:flex;align-items:center;gap:0.875rem;">
          <span style="font-size:0.75rem;font-weight:700;text-transform:uppercase;
                       letter-spacing:0.05em;color:var(--text-muted);white-space:nowrap;">Radar de Portfólio <span style="font-size:0.45rem;opacity:0.25;color:var(--text-muted);font-weight:400;vertical-align:super;">v5</span></span>
          <span v-if="!isLoading"
            style="font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:99px;
                   background:var(--brand-indigo-light);color:var(--brand-indigo);
                   border:1px solid var(--brand-indigo-muted);">
            {{ operacoes.length }} ativas
          </span>
        </div>
        <!-- Nocional total + split PUT/CALL no header -->
        <div v-if="!isLoading" style="display:flex;align-items:center;gap:1.25rem;">
          <div style="text-align:right;">
            <div style="font-size:0.6rem;font-weight:700;text-transform:uppercase;
                        letter-spacing:0.1em;color:var(--text-muted);">Nocional Total</div>
            <div style="font-size:1.1rem;font-weight:800;color:var(--brand-indigo);
                        font-family:'JetBrains Mono',monospace;letter-spacing:-0.02em;">
              {{ fmtK(totalNocional) }}
            </div>
          </div>
          <div style="width:1px;height:2rem;background:var(--border-default);"></div>
          <div style="text-align:right;">
            <div style="display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-bottom:2px;">
              <span style="font-size:0.52rem;font-weight:800;padding:1px 4px;border-radius:3px;
                           background:var(--brand-indigo-light);color:var(--brand-indigo);border:1px solid var(--brand-indigo-muted);">PUT</span>
              <span style="font-size:0.56rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">capital</span>
            </div>
            <div style="font-size:0.9rem;font-weight:800;color:var(--brand-indigo);
                        font-family:'JetBrains Mono',monospace;letter-spacing:-0.02em;">
              {{ fmtK(totalNocionalPut) }}
            </div>
            <div v-if="totalNocionalPutDesmontagem > 0"
              style="font-size:0.52rem;font-weight:700;color:var(--brand-amber);white-space:nowrap;">
              &minus;{{ fmtK(totalNocionalPutDesmontagem) }} desmont.
            </div>
          </div>
          <div style="text-align:right;">
            <div style="display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-bottom:2px;">
              <span style="font-size:0.52rem;font-weight:800;padding:1px 4px;border-radius:3px;
                           background:var(--brand-amber-light);color:var(--brand-amber);border:1px solid var(--brand-amber-muted);">CALL</span>
              <span style="font-size:0.56rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">coberto</span>
            </div>
            <div style="font-size:0.9rem;font-weight:800;color:var(--brand-amber);
                        font-family:'JetBrains Mono',monospace;letter-spacing:-0.02em;">
              {{ fmtK(totalNocionalCall) }}
            </div>
          </div>
        </div>
      </div>

      <!-- Skeleton -->
      <div v-if="isLoading" style="padding:1.25rem;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
                                    background:var(--border-subtle);">
        <div v-for="n in 4" :key="n"
          style="background:var(--surface-base);padding:1.25rem;animation:radar-pulse 1.5s ease infinite;">
          <div style="height:10px;background:var(--surface-overlay);border-radius:4px;width:55%;margin-bottom:10px;"></div>
          <div style="height:24px;background:var(--surface-overlay);border-radius:4px;width:75%;margin-bottom:8px;"></div>
          <div style="display:flex;gap:6px;">
            <div style="height:28px;background:var(--surface-overlay);border-radius:6px;flex:1;"></div>
            <div style="height:28px;background:var(--surface-overlay);border-radius:6px;flex:1;"></div>
            <div style="height:28px;background:var(--surface-overlay);border-radius:6px;flex:1;"></div>
          </div>
        </div>
      </div>

      <!-- Vazio -->
      <div v-else-if="operacoes.length === 0"
        style="padding:4rem;text-align:center;color:var(--text-muted);">
        <div style="font-size:2.5rem;margin-bottom:0.75rem;opacity:0.4;">📡</div>
        <p style="font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;">
          Nenhuma posição ativa
        </p>
      </div>

      <!-- ══ GRADE DE VISÕES ══ -->
      <div v-else :class="isMobile ? 'radar-grid-1col' : 'radar-grid-2col'"
        style="gap:1px;background:var(--border-subtle);">

        <!-- BLOCO A — CICLO DE VENCIMENTO -->
        <div style="background:var(--surface-base);padding:1.25rem 1.5rem;order:1;">

          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;">
            <div style="width:10px;height:10px;border-radius:50%;background:var(--brand-indigo);flex-shrink:0;"></div>
            <span class="cr-tip" data-tip="Agrupa suas posicoes pelo mes de vencimento. Cada linha mostra o nocional total e o P/L acumulado naquele ciclo, com breakdown OTM/ATM/ITM. Clique no mes para ver todas as operacoes. Clique nas celulas coloridas para filtrar por moneyness." style="font-size:0.85rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-secondary);cursor:help;white-space:nowrap;">Ciclo de Vencimento</span>
          </div>

          <!-- DESKTOP: grid 6 colunas px original -->
          <template v-if="!isMobile">
            <div style="display:grid;grid-template-columns:58px 1fr 56px 56px 56px 70px;gap:4px;margin-bottom:6px;padding:0 2px;">
              <div></div>
              <div style="font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">Nocional</div>
              <div style="text-align:center;"><span style="font-size:0.65rem;font-weight:800;color:var(--brand-emerald);">OTM</span></div>
              <div style="text-align:center;"><span style="font-size:0.65rem;font-weight:800;color:var(--brand-amber);">ATM</span></div>
              <div style="text-align:center;"><span style="font-size:0.65rem;font-weight:800;color:var(--brand-rose);">ITM</span></div>
              <div style="text-align:right;font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">P/L</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:3px;">
              <div v-for="cv in cicloVisoes" :key="cv.chave"
                style="display:grid;grid-template-columns:58px 1fr 56px 56px 56px 70px;gap:4px;align-items:center;
                       border-radius:var(--radius-sm);padding:4px;transition:background 0.15s;"
                onmouseover="this.style.background='var(--surface-overlay)'"
                onmouseout="this.style.background='transparent'">
                <div @click="abrirDrawer('ciclo', cv.chave, cv.label)" :style="cv.badgeStyle"
                  style="text-align:center;padding:4px 6px;border-radius:var(--radius-xs);
                         font-size:0.72rem;font-weight:800;font-family:'JetBrains Mono',monospace;cursor:pointer;">
                  {{ cv.label }}
                </div>
                <div @click="abrirDrawer('ciclo', cv.chave, cv.label)" style="cursor:pointer;">
                  <div style="background:var(--surface-sunken);border-radius:99px;height:3px;overflow:hidden;margin-bottom:4px;max-width:64px;">
                    <div :style="'width:' + cv.pctNoc + '%;'" :class="cv.barClass"
                      style="height:100%;border-radius:99px;transition:width 0.5s;opacity:0.4;"></div>
                  </div>
                  <div style="font-size:0.88rem;font-weight:700;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;">
                    {{ fmtK(cv.nocional) }} <span style="color:var(--text-muted);font-size:0.7rem;">{{ cv.count }}p</span>
                  </div>
                  <div v-if="cv.nocionalDesmont > 0" style="font-size:0.58rem;color:var(--brand-amber);">&minus;{{ fmtK(cv.nocionalDesmont) }} desmont.</div>
                </div>
                <div @click="cv.OTM && cv.OTM.count > 0 && abrirDrawer('cicloMoney', cv.chave + '|OTM', cv.label + ' OTM')"
                  style="border-radius:var(--radius-xs);padding:4px 2px;text-align:center;transition:all 0.15s;"
                  :style="cv.OTM && cv.OTM.count > 0 ? 'background:var(--brand-emerald-light);border:1.5px solid var(--brand-emerald-muted);cursor:pointer;' : 'background:var(--surface-sunken);border:1.5px solid var(--border-subtle);'">
                  <div v-if="cv.OTM && cv.OTM.count > 0">

<script>
window.CardRadar = {
  props: {
    statsPreCalculados: Object,
    isMobile:           Boolean,
    isLoading:          Boolean
  },
  template: '#card-radar-template',

  data: function() {
    return {
      drawer: {
        aberto:     false,
        tipo:       '',
        filtro:     '',
        titulo:     '',
        grupoLabel: '',
        ops:        []
      }
    };
  },

  computed: {
    operacoes: function() {
      var s = this.statsPreCalculados;
      return (s && s.listaAtivas) ? s.listaAtivas : [];
    },

    totalNocional: function() {
      return this.operacoes.reduce(function(s, o) { return s + (parseFloat(o.nocional) || 0); }, 0);
    },

    putNetting: function() {
      var grupos = {}; var ordem = [];
      this.operacoes.forEach(function(o) {
        var tipo = String(o.tipoOpcao||'').toUpperCase();
        if (tipo.indexOf('PUT') < 0) return;
        var dir = String(o.direcaoTrade||'').toUpperCase();
        var venda = dir.indexOf('VENDA') >= 0;
        var dStr = o.dataVencimento ? String(o.dataVencimento).split('T')[0] : '';
        var key = (o.tickerAtivo||'')+'|'+(o.strike||'')+'|'+dStr;
        if (!grupos[key]) { grupos[key]={ticker:o.tickerAtivo,vendaNoc:0,compraNoc:0,vendaOps:[],compraOps:[]}; ordem.push(key); }
        var noc = parseFloat(o.nocional)||0;
        if (venda) { grupos[key].vendaNoc+=noc; grupos[key].vendaOps.push(o); }
        else       { grupos[key].compraNoc+=noc; grupos[key].compraOps.push(o); }
      });
      return ordem.map(function(k){ var g=grupos[k]; return Object.assign({},g,{key:k,liquidoNoc:Math.max(0,g.vendaNoc-g.compraNoc)}); });
    },

    totalNocionalPut: function() { return this.putNetting.reduce(function(a,g){return a+g.liquidoNoc;},0); },
    totalNocionalPutBruto: function() { return this.putNetting.reduce(function(a,g){return a+g.vendaNoc;},0); },
    totalNocionalPutDesmontagem: function() { return this.putNetting.reduce(function(a,g){return a+g.compraNoc;},0); },

    totalNocionalCall: function() {
      return this.operacoes.filter(function(o){ return String(o.tipoOpcao||'').toUpperCase().indexOf('CALL')>=0 && String(o.direcaoTrade||'').toUpperCase().indexOf('VENDA')>=0; }).reduce(function(a,o){return a+(parseFloat(o.nocional)||0);},0);
    },

    totalPL: function() {
      return this.operacoes.reduce(function(s, o) { return s + (parseFloat(o.plTotalValor) || 0); }, 0);
    },

    // -- MONEYNESS ---
    moneynessVisoes: function() {
      var ops = this.operacoes;
      var total = ops.length || 1;
      var grupos = {
        OTM: { count: 0, nocional: 0 },
        ATM: { count: 0, nocional: 0 },
        ITM: { count: 0, nocional: 0 }
      };
      ops.forEach(function(o) {
        var c = String(o.moneynessCode || '').toUpperCase();
        var key = c.indexOf('OTM') >= 0 ? 'OTM' : c.indexOf('ATM') >= 0 ? 'ATM' : c.indexOf('ITM') >= 0 ? 'ITM' : null;
        if (key) { grupos[key].count++; grupos[key].nocional += parseFloat(o.nocional) || 0; }
      });
      return [
        { code: 'OTM', label: 'Out of the Money', count: grupos.OTM.count, nocional: grupos.OTM.nocional, pct: Math.round((grupos.OTM.count / total) * 100), color: 'var(--brand-emerald)', badgeStyle: 'background:var(--brand-emerald-light);color:var(--brand-emerald);border-color:var(--brand-emerald-muted);' },
        { code: 'ATM', label: 'At the Money',     count: grupos.ATM.count, nocional: grupos.ATM.nocional, pct: Math.round((grupos.ATM.count / total) * 100), color: 'var(--brand-amber)',   badgeStyle: 'background:var(--brand-amber-light);color:var(--brand-amber);border-color:var(--brand-amber-muted);' },
        { code: 'ITM', label: 'In the Money',     count: grupos.ITM.count, nocional: grupos.ITM.nocional, pct: Math.round((grupos.ITM.count / total) * 100), color: 'var(--brand-rose)',    badgeStyle: 'background:var(--brand-rose-light);color:var(--brand-rose);border-color:var(--brand-rose-muted);' }
      ];
    },

    // -- TIPO (CALL / PUT) ---
    tipoVisoes: function() {
      var ops = this.operacoes;
      var r = { CALL: { count: 0, nocional: 0 }, PUT: { count: 0, nocional: 0 } };
      ops.forEach(function(o) {
        var t = String(o.tipoOpcao || '').toUpperCase();
        if (t.indexOf('CALL') >= 0) { r.CALL.count++; r.CALL.nocional += parseFloat(o.nocional) || 0; }
        else if (t.indexOf('PUT') >= 0) { r.PUT.count++; r.PUT.nocional += parseFloat(o.nocional) || 0; }
      });
      return [
        { tipo: 'CALL', label: 'Venda CALL', count: r.CALL.count, nocional: r.CALL.nocional },
        { tipo: 'PUT',  label: 'Venda PUT',  count: r.PUT.count,  nocional: r.PUT.nocional  }
      ];
    },

    // -- PROXIMO VENCIMENTO ---
    proxVencimento: function() {
      var ops = this.operacoes.slice().filter(function(o) { return !isNaN(parseInt(o.dteCorridos, 10)); });
      if (!ops.length) return null;
      ops.sort(function(a, b) { return parseInt(a.dteCorridos) - parseInt(b.dteCorridos); });
      return parseInt(ops[0].dteCorridos) <= 30 ? ops[0] : null;
    },

    // -- CONCENTRACAO POR TICKER ---
    tickerVisoes: function() {
      var ops = this.operacoes;
      var totalNoc = this.totalNocional || 1;
      var mapa = {};
      ops.forEach(function(o) {
        var t = o.tickerAtivo || 'N/A';
        if (!mapa[t]) mapa[t] = {
          ticker: t, count: 0, nocional: 0, pl: 0,
          OTM: { count: 0, nocional: 0 },
          ATM: { count: 0, nocional: 0 },
          ITM: { count: 0, nocional: 0 }
        };
        var mon = String(o.moneynessCode || '').toUpperCase();
        var col = mon.indexOf('OTM') >= 0 ? 'OTM' : mon.indexOf('ATM') >= 0 ? 'ATM' : mon.indexOf('ITM') >= 0 ? 'ITM' : null;
        mapa[t].count++;
        mapa[t].nocional += parseFloat(o.nocional)     || 0;
        mapa[t].pl       += parseFloat(o.plTotalValor) || 0;
        if (col) {
          mapa[t][col].count++;
          mapa[t][col].nocional += parseFloat(o.nocional) || 0;
        }
      });
      return Object.keys(mapa)
        .map(function(t) {
          var noc = mapa[t].nocional;
          var pl  = mapa[t].pl;
          return {
            ticker: mapa[t].ticker, count: mapa[t].count, nocional: noc,
            pct:    Math.round((noc / totalNoc) * 100),
            pl:     pl,
            plPct:  noc > 0 ? (pl / noc * 100).toFixed(1) : '0.0',
            OTM: mapa[t].OTM, ATM: mapa[t].ATM, ITM: mapa[t].ITM
          };
        })
        .sort(function(a, b) { return b.nocional - a.nocional; });
    },

    // -- P/L STATUS ---
    plVisao: function() {
      var ops = this.operacoes;
      var r = { lucro: 0, breakeven: 0, prejuizo: 0, nocionalLucro: 0, nocionalBreakeven: 0, nocionalPrejuizo: 0 };
      ops.forEach(function(o) {
        var pl  = parseFloat(o.plTotalValor) || 0;
        var noc = parseFloat(o.nocional) || 0;
        if      (pl >  0.01) { r.lucro++;     r.nocionalLucro      += noc; }
        else if (pl < -0.01) { r.prejuizo++;  r.nocionalPrejuizo   += noc; }
        else                 { r.breakeven++; r.nocionalBreakeven  += noc; }
      });
      var total = ops.length || 1;
      r.pctLucro     = Math.round((r.lucro     / total) * 100);
      r.pctBreakeven = Math.round((r.breakeven / total) * 100);
      r.pctPrejuizo  = Math.round((r.prejuizo  / total) * 100);
      return r;
    },

    // -- CICLO DE VENCIMENTO ---
    cicloVisoes: function() {
      var ops = this.operacoes;
      var totalNoc = this.totalNocional || 1;
      var meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      var hoje = new Date();
      var mapa = {};
      var ordem = [];

      // Ciclo: nocional principal = V PUT liquida. Saves desmont for display.
      this.putNetting.forEach(function(g) {
        if (g.liquidoNoc <= 0 || g.vendaOps.length === 0) return;
        var rep = g.vendaOps[0]; // op representativa
        var d = rep.dataVencimento instanceof Date ? rep.dataVencimento : new Date(rep.dataVencimento);
        if (isNaN(d.getTime())) return;
        var chave = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        var label = meses[d.getMonth()] + '/' + String(d.getFullYear()).slice(2);
        if (!mapa[chave]) {
          mapa[chave] = {
            chave: chave, label: label, count: 0, nocional: 0, nocionalDesmont: 0, pl: 0,
            mes: d.getMonth(), ano: d.getFullYear(),
            OTM: { count: 0, nocional: 0 },
            ATM: { count: 0, nocional: 0 },
            ITM: { count: 0, nocional: 0 }
          };
          ordem.push(chave);
        }
        var mon = String(rep.moneynessCode || '').toUpperCase();
        var col = mon.indexOf('OTM') >= 0 ? 'OTM' : mon.indexOf('ATM') >= 0 ? 'ATM' : mon.indexOf('ITM') >= 0 ? 'ITM' : null;
        mapa[chave].count += g.vendaOps.length;
        mapa[chave].nocional += g.liquidoNoc;
        mapa[chave].nocionalDesmont += g.compraNoc;
        g.vendaOps.forEach(function(op){ mapa[chave].pl += parseFloat(op.plTotalValor)||0; });
        if (col) { mapa[chave][col].count += g.vendaOps.length; mapa[chave][col].nocional += g.liquidoNoc; }
      });
      // P/L das compras de desmontagem tb entram no P/L do ciclo
      ops.forEach(function(o) {
        var tipo = String(o.tipoOpcao||'').toUpperCase();
        var dir  = String(o.direcaoTrade||'').toUpperCase();
        if (tipo.indexOf('PUT') < 0 || dir.indexOf('COMPRA') < 0) return;
        var d = o.dataVencimento instanceof Date ? o.dataVencimento : new Date(o.dataVencimento);
        if (isNaN(d.getTime())) return;
        var chave = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        if (mapa[chave]) mapa[chave].pl += parseFloat(o.plTotalValor)||0;
      });

      var maxNoc = 1;
      ordem.forEach(function(k) { if (mapa[k].nocional > maxNoc) maxNoc = mapa[k].nocional; });

      ordem.sort();
      return ordem.map(function(k) {
        var v = mapa[k];
        var isCurrent = v.ano === hoje.getFullYear() && v.mes === hoje.getMonth();
        var badgeStyle = isCurrent
          ? 'background:var(--brand-indigo-light);color:var(--brand-indigo);border:1.5px solid var(--brand-indigo-muted);'
          : 'background:var(--surface-sunken);color:var(--text-secondary);border:1.5px solid var(--border-default);';
        return {
          chave:          v.chave,
          label:          v.label,
          count:          v.count,
          nocional:       v.nocional,
          nocionalDesmont:v.nocionalDesmont || 0,
          pl:             v.pl,
          pctNoc:         Math.round((v.nocional / maxNoc) * 100),
          badgeStyle:     badgeStyle,
          barClass:       'radar-bar-indigo',
          plStyle:        v.pl >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);',
          OTM:            v.OTM,
          ATM:            v.ATM,
          ITM:            v.ITM
        };
      });
    },

    cicloCorrente: function() {
      var hoje = new Date();
      var mes  = hoje.getMonth() + 1;
      var ano  = hoje.getFullYear();
      var chave = ano + '-' + String(mes).padStart(2, '0');
      for (var i = 0; i < this.cicloVisoes.length; i++) {
        if (this.cicloVisoes[i].chave === chave) return this.cicloVisoes[i];
      }
      return null;
    },

    // -- THETA DIARIO ---
    thetaTotal: function() {
      return this.operacoes.reduce(function(s, o) {
        var theta = parseFloat(o.theta) || 0;
        var qtd   = Math.abs(parseFloat(o.qtdOpcoes || o.quantidade || o.QUANTITY || 1) || 1);
        return s + (theta * qtd);
      }, 0);
    },

    thetaPorTicker: function() {
      var ops = this.operacoes;
      var mapa = {};
      var ordem = [];
      ops.forEach(function(o) {
        var t = o.tickerAtivo || 'N/A';
        if (!mapa[t]) { mapa[t] = { ticker: t, theta: 0, count: 0 }; ordem.push(t); }
        var thetaUnit = parseFloat(o.theta) || 0;
        var qtd       = Math.abs(parseFloat(o.qtdOpcoes || o.quantidade || o.QUANTITY || 1) || 1);
        mapa[t].theta += thetaUnit * qtd;
        mapa[t].count++;
      });
      var maxAbs = 1;
      ordem.forEach(function(t) { var a = Math.abs(mapa[t].theta); if (a > maxAbs) maxAbs = a; });
      return ordem
        .map(function(t) { return { ticker: mapa[t].ticker, theta: mapa[t].theta, count: mapa[t].count, pct: Math.round((Math.abs(mapa[t].theta) / maxAbs) * 100) }; })
        .sort(function(a, b) { return Math.abs(b.theta) - Math.abs(a.theta); })
        .slice(0, 6);
    },

    // -- PRÊMIO CAPTURADO POR ATIVO ---
    // Max Ganho = soma dos prêmios recebidos (o máximo possível se tudo virar pó)
    // P/L Atual = quanto já foi realizado
    // % Capturada = P/L / MaxGanho -- o termômetro de cada posição
    riscoPorAtivo: function() {
      var ops  = this.operacoes;
      var mapa = {};
      var ordem = [];

      ops.forEach(function(o) {
        var t = o.tickerAtivo || 'N/A';
        if (!mapa[t]) {
          mapa[t] = { ticker: t, ganhoMax: 0, plAtual: 0, count: 0 };
          ordem.push(t);
        }
        mapa[t].ganhoMax += parseFloat(o.ganhoMaximo)  || 0;
        mapa[t].plAtual  += parseFloat(o.plTotalValor) || 0;
        mapa[t].count++;
      });

      return ordem
        .map(function(t) {
          var v       = mapa[t];
          var pctCap  = v.ganhoMax > 0 ? (v.plAtual / v.ganhoMax) * 100 : 0;
          // Barra: 0 a 100% = emerald, negativo = rose, >100% impossível mas clampa
          var barPct  = Math.min(100, Math.max(0, pctCap));
          var negPct  = pctCap < 0 ? Math.min(100, Math.abs(pctCap)) : 0;
          return {
            ticker:   v.ticker,
            ganhoMax: v.ganhoMax,
            plAtual:  v.plAtual,
            count:    v.count,
            pctCap:   pctCap,
            barPct:   barPct,
            negPct:   negPct
          };
        })
        .sort(function(a, b) { return b.pctCap - a.pctCap; });
    },

    // -- HEATMAP ---
    heatmapRows: function() {
      var ops = this.operacoes;
      var mapa = {};
      var ordem = [];
      ops.forEach(function(o) {
        var t   = o.tickerAtivo || 'N/A';
        var mon = String(o.moneynessCode || '').toUpperCase();
        var col = mon.indexOf('OTM') >= 0 ? 'OTM' : mon.indexOf('ATM') >= 0 ? 'ATM' : mon.indexOf('ITM') >= 0 ? 'ITM' : null;
        if (!col) return;
        if (!mapa[t]) {
          mapa[t] = { ticker: t, nocTotal: 0, OTM: { count:0, nocional:0 }, ATM: { count:0, nocional:0 }, ITM: { count:0, nocional:0 } };
          ordem.push(t);
        }
        mapa[t][col].count++;
        mapa[t][col].nocional += parseFloat(o.nocional) || 0;
        mapa[t].nocTotal      += parseFloat(o.nocional) || 0;
      });
      return ordem
        .map(function(t) { return mapa[t]; })
        .sort(function(a, b) { return b.nocTotal - a.nocTotal; })
;
    },

    heatmapMaxNoc: function() {
      var max = 1;
      this.heatmapRows.forEach(function(r) {
        ['OTM','ATM','ITM'].forEach(function(c) { if (r[c].nocional > max) max = r[c].nocional; });
      });
      return max;
    },

    heatmapLegenda: function() {
      return [
        { label: '0',   color: 'var(--surface-sunken)', opacity: '1'    },
        { label: '25',  color: 'var(--brand-indigo)',   opacity: '0.25' },
        { label: '50',  color: 'var(--brand-indigo)',   opacity: '0.50' },
        { label: '75',  color: 'var(--brand-indigo)',   opacity: '0.75' },
        { label: '100', color: 'var(--brand-indigo)',   opacity: '1'    }
      ];
    }
  },

  mounted: function() {
    this._initTooltipCR();
  },

  beforeUnmount: function() {
    var el = document.getElementById('cr-tooltip');
    if (el) el.remove();
    document.removeEventListener('mouseover', this._crTipOver);
    document.removeEventListener('mouseout',  this._crTipOut);
    document.removeEventListener('scroll',    this._crTipHide, true);
  },

  methods: {
    fmt: function(chave, valor) { return window.Formatador.campo(chave, valor); },
    fmtAuto: function(valor, tipo, chave) { return window.Formatador.auto(valor, tipo, chave); },
    fmtK: function(n) { return window.Formatador.moedaCompacta(n); },

    heatmapCellStyle: function(cell) {
      if (!cell || cell.count === 0) return 'background:var(--surface-sunken);opacity:0.4;';
      var intensity = Math.max(0.15, Math.min(1, cell.nocional / this.heatmapMaxNoc));
      return 'background:var(--brand-indigo);opacity:' + (0.12 + intensity * 0.75).toFixed(2) + ';color:var(--text-primary);';
    },

    abrirDrawer: function(tipo, filtro, titulo) {
      var ops = this.operacoes;
      var filtered = [];

      if (tipo === 'moneyness') {
        filtered = ops.filter(function(o) { return String(o.moneynessCode || '').toUpperCase().indexOf(filtro) >= 0; });
      } else if (tipo === 'tipo') {
        filtered = ops.filter(function(o) { return String(o.tipoOpcao || '').toUpperCase().indexOf(filtro) >= 0; });
      } else if (tipo === 'ciclo') {
        filtered = ops.filter(function(o) {
          var d = o.dataVencimento instanceof Date ? o.dataVencimento : new Date(o.dataVencimento);
          if (isNaN(d.getTime())) return false;
          var chave = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
          return chave === filtro;
        });
      } else if (tipo === 'cicloMoney') {
        var parts2   = filtro.split('|');
        var cChave   = parts2[0];
        var cMoney   = parts2[1];
        filtered = ops.filter(function(o) {
          var d = o.dataVencimento instanceof Date ? o.dataVencimento : new Date(o.dataVencimento);
          if (isNaN(d.getTime())) return false;
          var chave = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
          var mon = String(o.moneynessCode || '').toUpperCase();
          var col = mon.indexOf('OTM') >= 0 ? 'OTM' : mon.indexOf('ATM') >= 0 ? 'ATM' : mon.indexOf('ITM') >= 0 ? 'ITM' : '';
          return chave === cChave && col === cMoney;
        });
      } else if (tipo === 'ticker') {
        filtered = ops.filter(function(o) { return o.tickerAtivo === filtro; });
      } else if (tipo === 'heatmap') {
        var parts   = filtro.split('|');
        var hticker = parts[0];
        var hmoney  = parts[1];
        filtered = ops.filter(function(o) {
          var mon = String(o.moneynessCode || '').toUpperCase();
          var col = mon.indexOf('OTM') >= 0 ? 'OTM' : mon.indexOf('ATM') >= 0 ? 'ATM' : mon.indexOf('ITM') >= 0 ? 'ITM' : '';
          return o.tickerAtivo === hticker && col === hmoney;
        });
      } else if (tipo === 'pl') {
        filtered = ops.filter(function(o) {
          var pl = parseFloat(o.plTotalValor) || 0;
          if (filtro === 'lucro')     return pl >  0.01;
          if (filtro === 'prejuizo')  return pl < -0.01;
          if (filtro === 'breakeven') return Math.abs(pl) <= 0.01;
          return false;
        });
      }

      var labelMap = {
        moneyness: 'Moneyness',
        tipo:      'Tipo de Opcao',
        ciclo:     'Ciclo de Vencimento',
        cicloMoney:'Ciclo x Moneyness',
        ticker:    'Ativo',
        heatmap:   'Heatmap Ativo x Moneyness',
        pl:        'P/L Status'
      };

      this.drawer.tipo       = tipo;
      this.drawer.filtro     = filtro;
      this.drawer.titulo     = titulo;
      this.drawer.grupoLabel = labelMap[tipo] || tipo;
      this.drawer.ops        = filtered;
      this.drawer.aberto     = true;
    },

    fecharDrawer: function() {
      this.drawer.aberto = false;
    },

    somaDrawer: function(campo) {
      return this.drawer.ops.reduce(function(s, o) { return s + (parseFloat(o[campo]) || 0); }, 0);
    },

    // ── Helpers dos cards do drawer — identicos ao CarouselAtivas ──────────
    drawerCardIcon: function(op) {
      var mc = String(op.moneynessCode || '').toUpperCase();
      if (mc.indexOf('ITM') >= 0) return '🚨';
      if (mc.indexOf('ATM') >= 0) return '⚠️';
      return '✅';
    },

    drawerCardBorder: function(op) {
      var mc = String(op.moneynessCode || '').toUpperCase();
      if (mc.indexOf('ITM') >= 0) return 'border-color:var(--brand-rose-muted);background:var(--brand-rose-light);';
      if (mc.indexOf('ATM') >= 0) return 'border-color:var(--brand-amber-muted);background:var(--brand-amber-light);';
      return 'border-color:var(--brand-emerald-muted);background:var(--brand-emerald-light);';
    },

    drawerFooterStyle: function(op) {
      var mc = String(op.moneynessCode || '').toUpperCase();
      if (mc.indexOf('ITM') >= 0) return 'background:var(--brand-rose-light);border-color:var(--brand-rose-muted);color:var(--brand-rose);';
      if (mc.indexOf('ATM') >= 0) return 'background:var(--brand-amber-light);border-color:var(--brand-amber-muted);color:var(--brand-amber);';
      return 'background:var(--brand-emerald-light);border-color:var(--brand-emerald-muted);color:var(--brand-emerald);';
    },

    drawerBreakEven: function(op) {
      var F = window.Formatador;
      if (op.breakEven && parseFloat(op.breakEven) > 0) {
        return F ? F.moeda(op.breakEven) : 'R$' + parseFloat(op.breakEven).toFixed(2);
      }
      var pm = parseFloat(op.premioMedio || 0);
      var sk = parseFloat(op.strike      || 0);
      if (sk > 0) {
        var be = sk - pm;
        return F ? F.moeda(be) : 'R$' + be.toFixed(2);
      }
      return '—';
    },

    drawerPlPct: function(v) {
      var n = parseFloat(v || 0);
      if (isNaN(n)) return '—';
      return (n * 100).toFixed(2).replace('.', ',') + '%';
    },

    drawerLucroMax: function(v) {
      var n = parseFloat(v || 0);
      if (isNaN(n)) return '—';
      return (n * 100).toFixed(2).replace('.', ',') + '%';
    },

    fmtDistPct: function(v) {
      var F = window.Formatador;
      if (F && F.distanciaPct) return F.distanciaPct(v);
      if (v == null) return '—';
      var n = parseFloat(v);
      return (n >= 0 ? '+' : '') + n.toFixed(1).replace('.', ',') + '%';
    },

    getBarColor: function(op) {
      var lp = op.lucroPct != null ? parseFloat(op.lucroPct) : null;
      if (lp !== null && lp >= 75) return 'background:var(--brand-emerald);';
      var itm = String(op.moneynessCode || '').toUpperCase().indexOf('ITM') >= 0;
      if (itm) return 'background:var(--brand-rose);';
      return 'background:var(--border-strong);';
    },

    getMoneynessStyle: function(code) {
      var c = String(code || '').toUpperCase();
      if (c.indexOf('ITM') >= 0) return 'background:var(--brand-rose-light);color:var(--brand-rose);border-color:var(--brand-rose-muted);';
      if (c.indexOf('ATM') >= 0) return 'background:var(--brand-amber-light);color:var(--brand-amber);border-color:var(--brand-amber-muted);';
      if (c.indexOf('OTM') >= 0) return 'background:var(--brand-emerald-light);color:var(--brand-emerald);border-color:var(--brand-emerald-muted);';
      return 'background:var(--surface-overlay);color:var(--text-muted);border-color:var(--border-default);';
    },

    getTipoStyle: function(tipo) {
      var t = String(tipo || '').toUpperCase();
      if (t.indexOf('CALL') >= 0) return 'background:var(--brand-indigo-light);color:var(--brand-indigo);border-color:var(--brand-indigo-muted);';
      if (t.indexOf('PUT')  >= 0) return 'background:var(--brand-rose-light);color:var(--brand-rose);border-color:var(--brand-rose-muted);';
      return 'background:var(--surface-overlay);color:var(--text-muted);border-color:var(--border-default);';
    },

    // ── SISTEMA DE TOOLTIP GLOBAL ─────────────────────────────────────────
    // Injetado no body -- z-index maximo, nunca cortado por overflow:hidden
    _initTooltipCR: function() {
      var self = this;
      if (document.getElementById('cr-tooltip')) return;

      var el = document.createElement('div');
      el.id = 'cr-tooltip';
      Object.assign(el.style, {
        position:      'fixed',
        zIndex:        '2147483647',
        pointerEvents: 'none',
        background:    getComputedStyle(document.documentElement).getPropertyValue('--surface-overlay').trim() || '#1e1e2e',
        border:        '1px solid ' + (getComputedStyle(document.documentElement).getPropertyValue('--border-default').trim() || '#3a3a5c'),
        borderRadius:  '8px',
        padding:       '8px 11px',
        width:         '240px',
        maxWidth:      '90vw',
        fontSize:      '0.7rem',
        fontWeight:    '400',
        lineHeight:    '1.55',
        color:         getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#aaa',
        boxShadow:     '0 12px 32px rgba(0,0,0,0.5)',
        opacity:       '0',
        transition:    'opacity 0.15s ease',
        whiteSpace:    'normal',
        wordBreak:     'break-word'
      });
      document.body.appendChild(el);
      self._crTipEl = el;

      self._crTipHide = function() { el.style.opacity = '0'; };

      self._crTipShow = function(texto, triggerEl) {
        if (!texto || !triggerEl) return;
        el.textContent = texto;
        var rect = triggerEl.getBoundingClientRect();
        var w    = 240;
        var gap  = 10;
        var left = rect.left + rect.width / 2 - w / 2;
        if (left < 8) left = 8;
        if (left + w > window.innerWidth - 8) left = window.innerWidth - w - 8;
        el.style.opacity = '0';
        el.style.left    = left + 'px';
        el.style.top     = '-9999px';
        var h = el.offsetHeight || 60;
        var top = rect.top - h - gap;
        if (top < 8) top = rect.bottom + gap;
        el.style.top     = top + 'px';
        el.style.opacity = '1';
      };

      self._crTipOver = function(e) {
        var t = e.target.closest('.cr-tip');
        if (!t) return;
        var txt = t.getAttribute('data-tip');
        if (!txt) return;
        clearTimeout(self._crTipTimer);
        self._crTipShow(txt, t);
      };

      self._crTipOut = function(e) {
        var t = e.target.closest('.cr-tip');
        if (!t) return;
        self._crTipTimer = setTimeout(self._crTipHide, 80);
      };

      document.addEventListener('mouseover', self._crTipOver);
      document.addEventListener('mouseout',  self._crTipOut);
      document.addEventListener('scroll',    self._crTipHide, true);
    }
  }
};
</script>

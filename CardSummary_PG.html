<script>
window.CardSummaryPG = Object.assign({}, window.CardSummary, {
  template: `
<div style="width:100%;font-family:'Plus Jakarta Sans',sans-serif;display:flex;flex-direction:column;gap:16px;">

  <!-- BLOCO 1: RESUMO CONSOLIDADO -->
  <div class="pg-card lead-green">
    <div class="pg-card-h">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="pg-card-icon">Σ</div>
        <div>
          <h2>Resumo Consolidado</h2>
          <div class="pg-hint">Agregado por lado e tipo</div>
        </div>
      </div>
      <span class="pg-chip"><b>{{ cockpit.length }}</b> ops</span>
    </div>

    <div class="pg-scroll-x">
      <table class="pg-tbl">
        <thead><tr>
          <th>Operação</th>
          <th class="num">Qtde</th>
          <th class="num">Ganho Máx</th>
          <th class="num">Lucro Máx%</th>
          <th class="num">Nocional</th>
          <th class="num">Perda Máx</th>
          <th class="num">PM</th>
          <th class="num">Atual</th>
          <th class="num">P/L %</th>
          <th class="num">P/L R$</th>
        </tr></thead>
        <tbody>
          <template v-for="row in resumoCalculado" :key="row.id">
            <!-- Subtotal row -->
            <tr v-if="row.t === 's'"
              style="background:var(--surface-overlay);font-weight:700;">
              <td style="color:var(--text-primary);">SUBTOTAL {{ row.tipo }}</td>
              <td class="num">{{ fmtQ(row.qtd) }}</td>
              <td class="num" :class="(row.gmax||0) >= 0 ? 'pg-pos' : 'pg-neg'">{{ fmtR(row.gmax) }}</td>
              <td class="num">{{ fmtP(row.lmp) }}</td>
              <td class="num" style="font-weight:800;color:var(--text-primary);">{{ fmtR(row.noc) }}</td>
              <td class="num pg-neg">{{ fmtR(row.pmax) }}</td>
              <td class="num">{{ fmtR(row.pm) }}</td>
              <td class="num">{{ fmtR(row.pa) }}</td>
              <td class="num" :class="(row.plp||0) >= 0 ? 'pg-pos' : 'pg-neg'">{{ fmtP(row.plp) }}</td>
              <td class="num" :class="(row.plv||0) >= 0 ? 'pg-pos' : 'pg-neg'">{{ fmtR(row.plv) }}</td>
            </tr>
            <!-- Total row -->
            <tr v-else-if="row.t === 'T'"
              style="background:linear-gradient(90deg,var(--brand-indigo-light),var(--brand-emerald-light));font-weight:800;">
              <td style="color:var(--text-primary);">TOTAL GERAL</td>
              <td class="num">{{ fmtQ(row.qtd) }}</td>
              <td class="num" :class="(row.gmax||0) >= 0 ? 'pg-pos' : 'pg-neg'">{{ fmtR(row.gmax) }}</td>
              <td class="num">{{ fmtP(row.lmp) }}</td>
              <td class="num" style="color:var(--text-primary);">{{ fmtR(row.noc) }}</td>
              <td class="num pg-neg">{{ fmtR(row.pmax) }}</td>
              <td class="num">{{ fmtR(row.pm) }}</td>
              <td class="num">{{ fmtR(row.pa) }}</td>
              <td class="num" :class="(row.plp||0) >= 0 ? 'pg-pos' : 'pg-neg'">{{ fmtP(row.plp) }}</td>
              <td class="num" :class="(row.plv||0) >= 0 ? 'pg-pos' : 'pg-neg'">{{ fmtR(row.plv) }}</td>
            </tr>
            <!-- Detail row -->
            <tr v-else>
              <td>
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                  <span class="pg-chip" style="font-size:9px;padding:2px 7px;"
                    :class="(row.side||'').toUpperCase()==='VENDA' ? 'green' : 'red'">
                    {{ row.side }}
                  </span>
                  <span style="font-weight:600;font-size:12.5px;color:var(--text-primary);">{{ row.tipo }}</span>
                </div>
              </td>
              <td class="num">{{ fmtQ(row.qtd) }}</td>
              <td class="num" :class="(row.gmax||0) >= 0 ? 'pg-pos' : 'pg-neg'">{{ fmtR(row.gmax) }}</td>
              <td class="num">{{ fmtP(row.lmp) }}</td>
              <td class="num">{{ fmtR(row.noc) }}</td>
              <td class="num pg-neg">{{ fmtR(row.pmax) }}</td>
              <td class="num">{{ fmtR(row.pm) }}</td>
              <td class="num">{{ fmtR(row.pa) }}</td>
              <td class="num" :class="(row.plp||0) >= 0 ? 'pg-pos' : 'pg-neg'">{{ fmtP(row.plp) }}</td>
              <td class="num" :class="(row.plv||0) >= 0 ? 'pg-pos' : 'pg-neg'">{{ fmtR(row.plv) }}</td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>

  <!-- BLOCO 2: TABELA FILTRADA -->
  <div class="pg-card">
    <div class="pg-card-h">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="pg-card-icon">🔍</div>
        <div>
          <h2>Operações</h2>
          <div class="pg-hint">{{ linhasFiltradas.length }} de {{ cockpit.length }} · com filtros inline</div>
        </div>
      </div>
      <button v-if="Object.values(filtros).some(f => f && f.length)"
        @click="limparFiltros"
        style="background:var(--brand-rose-light);border:1px solid var(--brand-rose-muted);border-radius:999px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;color:var(--brand-rose);">
        Limpar filtros
      </button>
    </div>

    <div class="pg-scroll-x">
      <table class="pg-tbl" style="font-size:11.5px;">
        <thead>
          <tr>
            <th>Estratégia</th>
            <th>Ativo</th>
            <th>Tipo</th>
            <th>Dir.</th>
            <th class="num">Qtd</th>
            <th class="num">Strike</th>
            <th class="num">Spot</th>
            <th>MNY</th>
            <th class="num">PM</th>
            <th class="num">Atual</th>
            <th class="num">P/L%</th>
            <th class="num">P/L R$</th>
            <th class="num">Δ</th>
            <th class="num">θ</th>
            <th class="num">DTE</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="(op, idx) in linhasFiltradas" :key="op.tradeId || idx">
            <td style="white-space:nowrap;font-weight:600;color:var(--text-primary);">{{ op.estrategiaId }}</td>
            <td class="tk">{{ op.tickerAtivo }}</td>
            <td>
              <span class="pg-chip" style="font-size:9px;padding:2px 7px;"
                :class="(op.tipoOpcao||'').toUpperCase()==='PUT' ? 'amber' : 'red'">
                {{ op.tipoOpcao }}
              </span>
            </td>
            <td><span class="pg-chip" style="font-size:9px;padding:2px 7px;"
              :class="(op.direcaoTrade||'').toUpperCase()==='VENDA' ? 'green' : 'red'">
              {{ (op.direcaoTrade||'--')[0].toUpperCase() }}
            </span></td>
            <td class="num">{{ fmtQ(op.quantidade) }}</td>
            <td class="num">{{ fmtR(op.strike) }}</td>
            <td class="num">{{ fmtR(op.spotPrice) }}</td>
            <td>
              <span class="pg-chip" style="font-size:9px;padding:2px 7px;"
                :class="(op.moneynessCode||'').toUpperCase().includes('OTM') ? 'green' : (op.moneynessCode||'').toUpperCase().includes('ITM') ? 'red' : 'amber'">
                {{ op.moneynessCode || '--' }}
              </span>
            </td>
            <td class="num">{{ fmtR(op.premioMedio) }}</td>
            <td class="num">{{ fmtR(op.premioAtual) }}</td>
            <td class="num" :class="(parseFloat(op.plTotalPct)||0) >= 0 ? 'pg-pos' : 'pg-neg'">{{ fmtP(op.plTotalPct * 100) }}</td>
            <td class="num" :class="(parseFloat(op.plTotalValor)||0) >= 0 ? 'pg-pos' : 'pg-neg'" style="font-weight:700;">{{ fmtR(op.plTotalValor) }}</td>
            <td class="num" style="color:var(--brand-indigo);">{{ op.delta != null ? parseFloat(op.delta).toFixed(4).replace('.',',') : '--' }}</td>
            <td class="num">{{ op.theta != null ? parseFloat(op.theta).toFixed(4).replace('.',',') : '--' }}</td>
            <td class="num">{{ op.dteCorridos || '--' }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
  `
});
</script>

<script>
window.CardTablePG = Object.assign({}, window.CardTable, {
  template: `
<div style="width:100%;font-family:'Plus Jakarta Sans',sans-serif;">
  <div class="pg-card">

    <!-- Cabeçalho -->
    <div class="pg-card-h">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="pg-card-icon">▤</div>
        <div>
          <h2>Posições Detalhadas</h2>
          <div class="pg-hint">{{ totalFilteredItems }} operações · agrupadas por estratégia</div>
        </div>
      </div>
      <span class="pg-chip"><b>{{ totalFilteredItems }}</b> ops</span>
    </div>

    <!-- Skeleton -->
    <div v-if="isLoading">
      <div v-for="i in 5" :key="i" style="height:36px;background:var(--surface-overlay);border-radius:8px;margin-bottom:6px;animation:pulse 1.5s infinite;"></div>
    </div>

    <!-- Tabela -->
    <div v-else-if="activeData.length" class="pg-scroll-x">
      <table class="pg-tbl">
        <thead>
          <tr>
            <th v-for="col in columns" :key="col.key"
              :class="['numero','currency','percentage'].includes(col.type) ? 'num' : ''">
              {{ col.label }}
            </th>
          </tr>
        </thead>
        <tbody>
          <template v-for="(group, groupName) in groupedData" :key="groupName">
            <!-- Linha de grupo (expandível) -->
            <tr @click="toggleGroup(groupName)" style="cursor:pointer;background:var(--surface-overlay);">
              <td colspan="3" style="font-weight:700;color:var(--text-primary);white-space:nowrap;">
                <span style="font-size:10px;margin-right:6px;color:var(--brand-indigo);">{{ isExpanded(groupName) ? '▾' : '▸' }}</span>
                {{ groupName }}
              </td>
              <td colspan="2" style="font-size:10px;color:var(--text-muted);">
                <span class="pg-chip" style="font-size:9px;padding:2px 7px;">{{ group.rows.length }} pos</span>
              </td>
              <td v-for="col in columns.slice(5)" :key="'g-'+col.key"
                :class="['numero','currency','percentage'].includes(col.type) ? 'num' : ''"
                style="font-weight:700;font-size:12px;"
                :style="col.key==='plTotalPct'||col.key==='plTotalValor' ? (getGroupSum(group.rows,col.key)>=0?'color:var(--brand-emerald)':'color:var(--brand-rose)') : ''">
                <span v-html="formatGroupSum(getGroupSum(group.rows, col.key), col.type, col.key)"></span>
              </td>
            </tr>
            <!-- Linhas de detalhe -->
            <template v-if="isExpanded(groupName)">
              <tr v-for="row in group.rows" :key="row.simboloOpcao || row.tickerAtivo">
                <td v-for="col in columns" :key="col.key"
                  :class="['numero','currency','percentage'].includes(col.type) ? 'num' : ''"
                  style="font-size:12px;"
                  v-html="renderCell(row[col.key], col.type, col.key)">
                </td>
              </tr>
            </template>
          </template>
        </tbody>
        <!-- Totais -->
        <tfoot>
          <tr style="background:var(--brand-indigo-light);font-weight:800;">
            <td colspan="3" style="color:var(--text-primary);">Total do Portfólio</td>
            <td colspan="2"></td>
            <td v-for="col in columns.slice(5)" :key="'t-'+col.key"
              :class="['numero','currency','percentage'].includes(col.type) ? 'num' : ''"
              style="font-size:12px;"
              :style="col.key==='plTotalPct'||col.key==='plTotalValor' ? ((portfolioTotals[col.key]||0)>=0?'color:var(--brand-emerald)':'color:var(--brand-rose)') : ''"
              v-html="formatGroupSum(portfolioTotals[col.key], col.type, col.key)">
            </td>
          </tr>
        </tfoot>
      </table>
    </div>

    <!-- Empty state -->
    <div v-else style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">
      Nenhuma posição ativa
    </div>

  </div>
</div>
  `
});
</script>

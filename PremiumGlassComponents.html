<style>
/* =================================================================
   PREMIUM GLASS — Classes de componente (.pg-*)
   Usadas exclusivamente pelos 6 componentes *_PG.html.
   REVERT: deletar este arquivo e remover o include no Index.html.
   ================================================================= */

/* ── Card base ────────────────────────────────────────────────── */
.pg-card {
  background: var(--surface-base);
  border: 1px solid var(--border-default);
  border-radius: 22px;
  padding: 18px 20px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow-md);
  margin-bottom: 16px;
  transition: box-shadow 0.2s;
}
.pg-card:hover { box-shadow: var(--shadow-lg); }
.pg-card.lead-green  { border-left: 4px solid var(--brand-emerald) !important; }
.pg-card.lead-amber  { border-left: 4px solid var(--brand-amber)   !important; }
.pg-card.lead-red    { border-left: 4px solid var(--brand-rose)    !important; }
.pg-card.lead-cyan   { border-left: 4px solid #22D3EE              !important; }
.pg-card.lead-violet { border-left: 4px solid var(--brand-indigo)  !important; }

/* ── Card header ─────────────────────────────────────────────── */
.pg-card-h {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap; margin-bottom: 14px;
}
.pg-card-icon {
  width: 34px; height: 34px; border-radius: 13px;
  display: grid; place-items: center; font-size: 16px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--brand-indigo-muted), rgba(34,211,238,.15));
  border: 1px solid var(--border-strong);
}
.pg-card-h h2 { font-size: 15px; margin: 0; font-weight: 700; color: var(--text-primary); }
.pg-card-h .pg-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ── Chip / badge ────────────────────────────────────────────── */
.pg-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600;
  border: 1px solid var(--border-default); background: var(--surface-raised);
  border-radius: 999px; padding: 3px 10px;
  color: var(--text-tertiary); white-space: nowrap;
}
.pg-chip b { font-weight: 800; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.pg-chip.green  { color: var(--brand-emerald); border-color: var(--brand-emerald-muted); background: var(--brand-emerald-light); }
.pg-chip.red    { color: var(--brand-rose);    border-color: var(--brand-rose-muted);    background: var(--brand-rose-light); }
.pg-chip.amber  { color: var(--brand-amber);   border-color: var(--brand-amber-muted);   background: var(--brand-amber-light); }
.pg-chip.violet { color: var(--brand-indigo);  border-color: var(--brand-indigo-muted);  background: var(--brand-indigo-light); }

/* ── Tabela glass ────────────────────────────────────────────── */
.pg-scroll-x { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-subtle); }
.pg-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.pg-tbl th {
  font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
  color: var(--text-muted); font-weight: 700; text-align: left;
  padding: 8px 10px; border-bottom: 1px solid var(--border-default);
  position: sticky; top: 0;
  background: var(--surface-raised);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.pg-tbl td { padding: 8px 10px; border-bottom: 1px solid var(--border-subtle); font-variant-numeric: tabular-nums; color: var(--text-secondary); }
.pg-tbl tr:hover td { background: var(--surface-overlay); }
.pg-tbl .num { text-align: right; }
.pg-tbl .tk  { font-weight: 700; color: var(--text-primary); }
.pg-pos  { color: var(--brand-emerald) !important; }
.pg-neg  { color: var(--brand-rose)    !important; }
.pg-warn { color: var(--brand-amber)   !important; }

/* ── Barra de proporção ──────────────────────────────────────── */
.pg-bar { height: 5px; border-radius: 4px; background: var(--surface-overlay); overflow: hidden; margin-top: 4px; min-width: 60px; }
.pg-bar-fill { display: block; height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--brand-indigo), #22D3EE); }

/* ── KPIs (grid) ─────────────────────────────────────────────── */
.pg-kpis { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
.pg-kpi {
  background: var(--surface-overlay); border: 1px solid var(--border-subtle);
  border-radius: 13px; padding: 10px 12px;
}
.pg-kpi .l { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
.pg-kpi .v { font-size: 20px; font-weight: 800; margin-top: 3px; font-variant-numeric: tabular-nums; color: var(--text-primary); }
.pg-kpi .v.sm { font-size: 15px; }
.pg-kpi .d { font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }
@media (max-width: 720px) { .pg-kpis { grid-template-columns: repeat(2,1fr); } }

/* ── Anéis conic-gradient ────────────────────────────────────── */
.pg-rings { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; margin-top: 16px; }
.pg-gauge { display: flex; align-items: center; gap: 12px; }
.pg-ring {
  width: 72px; height: 72px; border-radius: 50%;
  display: grid; place-items: center; position: relative; flex: 0 0 auto;
}
.pg-ring::before {
  content: ""; position: absolute; inset: 9px; border-radius: 50%;
  background: var(--surface-bg);
}
.pg-ring > span { position: relative; font-weight: 800; font-size: 14px; font-variant-numeric: tabular-nums; color: var(--text-primary); }
.pg-ring-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 700; }
.pg-ring-desc  { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; max-width: 180px; line-height: 1.4; }

/* ── Range bar (spot/strike) ─────────────────────────────────── */
.pg-track-wrap { margin-top: 11px; margin-bottom: 6px; }
.pg-track {
  position: relative; height: 26px; border-radius: 8px;
  border: 1px solid var(--border-default);
  background: linear-gradient(90deg, var(--brand-rose-muted), var(--brand-amber-muted) 45%, var(--brand-emerald-muted));
}
.pg-track-exer {
  position: absolute; left: 0; top: 0; bottom: 0; border-radius: 8px 0 0 8px;
  border-right: 1.5px dashed var(--brand-rose);
  background: repeating-linear-gradient(45deg, var(--brand-rose-muted), var(--brand-rose-muted) 5px, transparent 5px, transparent 10px);
}
.pg-track-exer-call {
  position: absolute; top: 0; bottom: 0; right: 0; border-radius: 0 8px 8px 0;
  border-left: 1.5px dashed var(--brand-rose);
  background: repeating-linear-gradient(135deg, var(--brand-rose-muted), var(--brand-rose-muted) 5px, transparent 5px, transparent 10px);
}
.pg-mark { position: absolute; top: -4px; bottom: -4px; width: 2px; transform: translateX(-1px); }
.pg-mark-strike { background: var(--brand-indigo); box-shadow: 0 0 8px var(--brand-indigo-muted); }
.pg-mark-spot   { background: #22D3EE; box-shadow: 0 0 8px rgba(34,211,238,.4); }
.pg-mark-label {
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  white-space: nowrap; font-size: 9px; font-weight: 700;
  background: var(--surface-bg); padding: 1px 5px; border-radius: 5px;
  border: 1px solid var(--border-default); color: var(--text-secondary);
}
.pg-mark-strike .pg-mark-label { color: var(--brand-indigo); border-color: var(--brand-indigo-muted); }
.pg-mark-spot .pg-mark-label   { color: #22D3EE; border-color: rgba(34,211,238,.35); }

/* ── Cards de posição (carousel) ─────────────────────────────── */
.pg-carousel { display: flex; gap: 13px; overflow-x: auto; padding: 4px 2px 12px; scroll-snap-type: x mandatory; }
.pg-carousel::-webkit-scrollbar { height: 4px; }
.pg-carousel::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 9px; }
.pg-poscard {
  flex: 0 0 272px; scroll-snap-align: start;
  background: var(--surface-raised); border: 1px solid var(--border-default);
  border-radius: 15px; padding: 14px 15px;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.pg-poscard.lead-green { border-left: 3px solid var(--brand-emerald); }
.pg-poscard.lead-red   { border-left: 3px solid var(--brand-rose);    }
.pg-poscard.lead-amber { border-left: 3px solid var(--brand-amber);   }
.pg-pc-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin: 10px 0; }
.pg-pc-grid .b {
  background: var(--surface-overlay); border: 1px solid var(--border-subtle);
  border-radius: 9px; padding: 6px 7px;
}
.pg-pc-grid .b .l { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; font-weight: 600; }
.pg-pc-grid .b .v { font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; color: var(--text-primary); }
.pg-pc-foot {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding-top: 9px; border-top: 1px solid var(--border-subtle);
}

/* ── Drawer lateral ──────────────────────────────────────────── */
.pg-drawer-ov {
  position: fixed; inset: 0; background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  z-index: 9000;
}
.pg-drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(420px, 92vw);
  background: var(--surface-bg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-left: 1px solid var(--border-default);
  box-shadow: var(--shadow-xl);
  z-index: 9001; overflow-y: auto; padding: 20px;
}
.pg-drawer-h { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
.pg-drawer-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.pg-drawer-strip .s {
  background: var(--surface-raised); border: 1px solid var(--border-subtle);
  border-radius: 10px; padding: 9px 10px; text-align: center;
}
.pg-drawer-strip .s .l { font-size: 9.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
.pg-drawer-strip .s .v { font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums; margin-top: 2px; color: var(--text-primary); }

/* ── Tabs (Livro de Estruturas) ──────────────────────────────── */
.pg-tabs {
  display: inline-flex; gap: 4px; padding: 4px;
  border-radius: 13px; background: var(--surface-raised);
  border: 1px solid var(--border-default); flex-wrap: wrap;
}
.pg-tab {
  padding: 6px 12px; border-radius: 9px; cursor: pointer;
  font-weight: 600; font-size: 12px; color: var(--text-muted);
  white-space: nowrap; transition: .18s; user-select: none;
}
.pg-tab:hover { color: var(--text-primary); background: var(--surface-overlay); }
.pg-tab.active {
  color: #fff;
  background: linear-gradient(135deg, var(--brand-indigo), #22D3EE);
  box-shadow: 0 5px 14px var(--brand-indigo-muted);
  font-weight: 700;
}
.pg-tab .cnt {
  display: inline-block; margin-left: 4px; font-size: 10px;
  padding: 1px 5px; border-radius: 999px;
  background: rgba(255,255,255,.14); font-weight: 700;
}
.pg-tab.active .cnt { background: rgba(0,0,0,.2); }

/* ── Livro de Estruturas ─────────────────────────────────────── */
.pg-book { display: grid; grid-template-columns: 1fr; gap: 13px; }
@media (min-width: 980px) { .pg-book { grid-template-columns: repeat(2,1fr); } }
.pg-struct {
  background: var(--surface-raised); border: 1px solid var(--border-default);
  border-radius: 15px; padding: 15px 16px;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.pg-legtbl { width: 100%; border-collapse: collapse; font-size: 11.5px; margin-bottom: 11px; }
.pg-legtbl th {
  font-size: 9px; text-transform: uppercase; letter-spacing: .4px;
  color: var(--text-muted); font-weight: 700; text-align: left;
  padding: 5px 6px; border-bottom: 1px solid var(--border-subtle);
}
.pg-legtbl td { padding: 5px 6px; border-bottom: 1px solid var(--border-subtle); font-variant-numeric: tabular-nums; color: var(--text-secondary); }
.pg-tag { font-size: 9.5px; font-weight: 800; padding: 2px 6px; border-radius: 5px; letter-spacing: .3px; }
.pg-tag-v { background: var(--brand-emerald-light); color: var(--brand-emerald); }
.pg-tag-c { background: var(--brand-rose-light);    color: var(--brand-rose); }
.pg-flowbox {
  background: var(--surface-overlay); border: 1px solid var(--border-subtle);
  border-radius: 10px; padding: 10px 11px; margin-bottom: 9px;
}
.pg-flowbox-title {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  color: var(--text-muted); margin-bottom: 6px;
}
.pg-flow-r { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; font-variant-numeric: tabular-nums; }
.pg-flow-r.tot { border-top: 1px solid var(--border-subtle); margin-top: 4px; padding-top: 6px; font-weight: 800; }
.pg-greeks3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
.pg-greeks3 .g {
  background: var(--surface-overlay); border: 1px solid var(--border-subtle);
  border-radius: 9px; padding: 7px; text-align: center;
}
.pg-greeks3 .g .l { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; font-weight: 600; }
.pg-greeks3 .g .v { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; margin-top: 2px; color: var(--brand-indigo); }
</style>

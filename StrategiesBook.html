<template id="strategies-book-template">
  <div class="premium-card" style="overflow:hidden;">

    <!-- HEADER -->
    <div style="padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;border-bottom:1px solid var(--border-subtle);">
      <div style="display:flex;align-items:center;gap:0.875rem;">
        <div style="padding:0.625rem;background:var(--brand-indigo-light);color:var(--brand-indigo);border-radius:var(--radius-lg);border:1px solid var(--brand-indigo-muted);flex-shrink:0;">
          <i data-lucide="layers" style="width:18px;height:18px;display:block;"></i>
        </div>
        <div>
          <h3 class="t-subtitle" style="color:var(--text-primary);">Livro de Estruturas</h3>
          <p class="t-label-sm" style="color:var(--text-muted);margin-top:0.125rem;">
            {{ estrategias.length }} estrutura{{ estrategias.length !== 1 ? 's' : '' }} ativa{{ estrategias.length !== 1 ? 's' : '' }}
          </p>
        </div>
      </div>

      <!-- Filtros -->
      <div style="display:flex;gap:0.375rem;flex-wrap:wrap;">
        <button
          v-for="f in filtros" :key="f.key"
          @click="filtroAtivo = f.key"
          :style="filtroAtivo === f.key
            ? 'background:var(--brand-indigo);color:#fff;border-color:var(--brand-indigo);'
            : 'background:var(--surface-base);color:var(--text-muted);border-color:var(--border-default);'"
          style="padding:0.3rem 0.75rem;border-radius:var(--radius-full);border:1px solid;font-size:0.7rem;font-weight:700;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.15s;"
        >{{ f.label }} <span v-if="f.count > 0" style="opacity:0.75;">({{ f.count }})</span></button>
      </div>
    </div>

    <!-- GRID DE CARDS -->
    <div v-if="estrategiasFiltradas.length > 0"
      style="padding:1rem;display:grid;gap:0.875rem;"
      :style="isMobile ? 'grid-template-columns:1fr;' : 'grid-template-columns:repeat(auto-fill,minmax(360px,1fr));'"
    >
      <div
        v-for="est in estrategiasFiltradas" :key="est.id"
        class="premium-card"
        style="padding:0;overflow:hidden;border:1px solid var(--border-default);"
      >
        <!-- Card Header -->
        <div :style="'padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:0.5rem;border-bottom:1px solid var(--border-subtle);background:' + est.corFundo + ';'"
        >
          <div style="display:flex;align-items:center;gap:0.625rem;min-width:0;">
            <span
              :style="'padding:0.2rem 0.6rem;border-radius:var(--radius-xs);font-size:0.65rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;border:1px solid;white-space:nowrap;background:' + est.corBadge + ';color:' + est.corTexto + ';border-color:' + est.corBorda + ';'"
            >{{ est.tipoEstrutura }}</span>
            <span class="t-label" style="color:var(--text-primary);font-weight:700;">{{ est.ticker }}</span>
            <span class="t-label-sm" style="color:var(--text-tertiary);">{{ est.vencimento }}</span>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0;">
            <span
              :style="'padding:0.15rem 0.5rem;border-radius:var(--radius-xs);font-size:0.65rem;font-weight:700;' + (est.dte <= 7 ? 'background:var(--brand-rose-light);color:var(--brand-rose);' : est.dte <= 21 ? 'background:var(--brand-amber-light);color:var(--brand-amber);' : 'background:var(--surface-overlay);color:var(--text-muted);')"
            >{{ est.dte }}d</span>
          </div>
        </div>

        <!-- Pernas da Estrutura -->
        <div style="padding:0.625rem 1rem;border-bottom:1px solid var(--border-subtle);">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr>
                <th class="t-label-sm" style="text-align:left;padding:0.2rem 0.25rem;color:var(--text-muted);font-weight:600;">Opção</th>
                <th class="t-label-sm" style="text-align:center;padding:0.2rem 0.25rem;color:var(--text-muted);font-weight:600;">Lado</th>
                <th class="t-label-sm" style="text-align:right;padding:0.2rem 0.25rem;color:var(--text-muted);font-weight:600;">Strike</th>
                <th class="t-label-sm" style="text-align:right;padding:0.2rem 0.25rem;color:var(--text-muted);font-weight:600;">Entrada</th>
                <th class="t-label-sm" style="text-align:right;padding:0.2rem 0.25rem;color:var(--text-muted);font-weight:600;">Atual</th>
                <th class="t-label-sm" style="text-align:center;padding:0.2rem 0.25rem;color:var(--text-muted);font-weight:600;">Moneyness</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="leg in est.pernas" :key="leg.simboloOpcao" style="border-top:1px solid var(--border-subtle);">
                <td style="padding:0.3rem 0.25rem;">
                  <span class="t-value-sm" style="color:var(--text-primary);font-family:monospace;">{{ leg.simboloOpcao }}</span>
                </td>
                <td style="padding:0.3rem 0.25rem;text-align:center;">
                  <span
                    :style="'padding:0.1rem 0.45rem;border-radius:var(--radius-xs);font-size:0.6rem;font-weight:800;letter-spacing:0.06em;' + (leg.direcaoTrade === 'VENDA' ? 'background:var(--brand-emerald-light);color:var(--brand-emerald);' : 'background:var(--brand-rose-light);color:var(--brand-rose);')"
                  >{{ leg.direcaoTrade === 'VENDA' ? 'V' : 'C' }}</span>
                </td>
                <td class="t-value-sm" style="padding:0.3rem 0.25rem;text-align:right;color:var(--text-primary);">{{ fmt(leg.strike) }}</td>
                <td class="t-value-sm" style="padding:0.3rem 0.25rem;text-align:right;color:var(--text-secondary);">{{ fmt(leg.premioMedio) }}</td>
                <td class="t-value-sm" style="padding:0.3rem 0.25rem;text-align:right;color:var(--text-secondary);">{{ fmt(leg.premioAtual) }}</td>
                <td style="padding:0.3rem 0.25rem;text-align:center;">
                  <span
                    :style="'padding:0.1rem 0.4rem;border-radius:var(--radius-xs);font-size:0.6rem;font-weight:700;' + (leg.moneynessCode === 'ITM' ? 'background:var(--brand-rose-light);color:var(--brand-rose);' : leg.moneynessCode === 'ATM' ? 'background:var(--brand-amber-light);color:var(--brand-amber);' : 'background:var(--surface-overlay);color:var(--text-muted);')"
                  >{{ leg.moneynessCode || '--' }}</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Métricas Financeiras -->
        <div style="padding:0.75rem 1rem;display:grid;grid-template-columns:1fr 1fr;gap:0.5rem 1rem;">

          <!-- Col 1: Fluxo de Caixa Inicial -->
          <div>
            <p class="t-label-sm" style="color:var(--text-muted);margin-bottom:0.25rem;text-transform:uppercase;letter-spacing:0.1em;">Fluxo na Abertura</p>
            <div style="display:flex;flex-direction:column;gap:0.2rem;">
              <div v-if="est.valorRecebido > 0" style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-tertiary);">Recebido (V)</span>
                <span class="t-value-sm" style="color:var(--brand-emerald);font-weight:700;">+ {{ fmt(est.valorRecebido) }}</span>
              </div>
              <div v-if="est.valorPago > 0" style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-tertiary);">Pago (C)</span>
                <span class="t-value-sm" style="color:var(--brand-rose);font-weight:700;">- {{ fmt(est.valorPago) }}</span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;padding-top:0.2rem;border-top:1px solid var(--border-subtle);">
                <span class="t-label-sm" style="color:var(--text-secondary);font-weight:700;">{{ est.saldoLiquido >= 0 ? 'Crédito' : 'Débito' }} Líquido</span>
                <span class="t-value-sm" :style="'font-weight:800;' + (est.saldoLiquido >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);')">
                  {{ est.saldoLiquido >= 0 ? '+' : '' }}{{ fmt(est.saldoLiquido) }}
                </span>
              </div>
            </div>
          </div>

          <!-- Col 2: Situação Atual -->
          <div>
            <p class="t-label-sm" style="color:var(--text-muted);margin-bottom:0.25rem;text-transform:uppercase;letter-spacing:0.1em;">Situação Atual</p>
            <div style="display:flex;flex-direction:column;gap:0.2rem;">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-tertiary);">Desmontar</span>
                <span class="t-value-sm" :style="'font-weight:700;' + (est.custoDesmontar <= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);')">
                  {{ est.custoDesmontar <= 0 ? '+' : '- ' }}{{ fmt(Math.abs(est.custoDesmontar)) }}
                </span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-tertiary);">P/L Total</span>
                <span class="t-value-sm" :style="'font-weight:800;' + (est.plTotal >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);')">
                  {{ est.plTotal >= 0 ? '+' : '' }}{{ fmt(est.plTotal) }}
                </span>
              </div>
              <div v-if="est.plPct !== null" style="display:flex;justify-content:space-between;align-items:center;">
                <span class="t-label-sm" style="color:var(--text-tertiary);">Retorno</span>
                <span class="t-value-sm" :style="'font-weight:700;' + (est.plPct >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);')">
                  {{ est.plPct >= 0 ? '+' : '' }}{{ est.plPct.toFixed(1) }}%
                </span>
              </div>
            </div>
          </div>

          <!-- Limites da Estrutura (só para spreads verticais) -->
          <div v-if="est.maxProfit !== null" style="grid-column:1/-1;padding-top:0.5rem;border-top:1px solid var(--border-subtle);display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;">
            <div>
              <p class="t-label-sm" style="color:var(--text-muted);margin-bottom:0.125rem;">Ganho Máx.</p>
              <p class="t-value-sm" style="color:var(--brand-emerald);font-weight:700;">{{ fmt(est.maxProfit) }}</p>
            </div>
            <div>
              <p class="t-label-sm" style="color:var(--text-muted);margin-bottom:0.125rem;">Perda Máx.</p>
              <p class="t-value-sm" style="color:var(--brand-rose);font-weight:700;">{{ fmt(est.maxLoss) }}</p>
            </div>
            <div>
              <p class="t-label-sm" style="color:var(--text-muted);margin-bottom:0.125rem;">Delta Líq.</p>
              <p class="t-value-sm" style="color:var(--text-primary);font-weight:700;">{{ est.deltaNet.toFixed(2) }}</p>
            </div>
          </div>

          <!-- Greeks simples (só delta se não for spread) -->
          <div v-else style="grid-column:1/-1;padding-top:0.5rem;border-top:1px solid var(--border-subtle);display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;">
            <div>
              <p class="t-label-sm" style="color:var(--text-muted);margin-bottom:0.125rem;">Delta</p>
              <p class="t-value-sm" style="color:var(--text-primary);font-weight:700;">{{ est.deltaNet.toFixed(2) }}</p>
            </div>
            <div>
              <p class="t-label-sm" style="color:var(--text-muted);margin-bottom:0.125rem;">Theta/d</p>
              <p class="t-value-sm" style="color:var(--brand-emerald);font-weight:700;">{{ fmt(est.thetaNet) }}</p>
            </div>
            <div>
              <p class="t-label-sm" style="color:var(--text-muted);margin-bottom:0.125rem;">Qtd</p>
              <p class="t-value-sm" style="color:var(--text-primary);font-weight:700;">{{ est.quantidade }}</p>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div v-else style="padding:3rem 1rem;text-align:center;">
      <i data-lucide="layers" style="width:32px;height:32px;color:var(--text-muted);margin:0 auto 0.75rem;display:block;opacity:0.4;"></i>
      <p class="t-label" style="color:var(--text-muted);">Nenhuma estrutura encontrada</p>
    </div>

  </div>
</template>

<script>
window.StrategiesBook = {
  template: '#strategies-book-template',
  props: {
    statsPreCalculados: { type: Object,  default: function() { return {}; } },
    isMobile:           { type: Boolean, default: false }
  },

  data: function() {
    return { filtroAtivo: 'todas' };
  },

  mounted: function() {
    if (window.refreshIcons) window.refreshIcons();
  },

  updated: function() {
    if (window.refreshIcons) window.refreshIcons();
  },

  computed: {
    trades: function() {
      return (this.statsPreCalculados && this.statsPreCalculados.listaAtivas) || [];
    },

    estrategias: function() {
      var self = this;
      var grupos = {};

      this.trades.forEach(function(t) {
        var id = t.estrategiaId || ('_solo_' + t.tradeId);
        if (!grupos[id]) grupos[id] = [];
        grupos[id].push(t);
      });

      return Object.keys(grupos).map(function(id) {
        return self._construirEstrutura(id, grupos[id]);
      }).sort(function(a, b) { return a.dte - b.dte; });
    },

    filtros: function() {
      var ests = this.estrategias;
      var counts = { todas: ests.length, credito: 0, debito: 0, simples: 0, composta: 0 };
      ests.forEach(function(e) {
        if (e.categoria === 'credito')   counts.credito++;
        else if (e.categoria === 'debito')  counts.debito++;
        else if (e.categoria === 'simples') counts.simples++;
        else                                counts.composta++;
      });
      return [
        { key: 'todas',    label: 'Todas',    count: counts.todas },
        { key: 'credito',  label: 'Crédito',  count: counts.credito },
        { key: 'debito',   label: 'Débito',   count: counts.debito },
        { key: 'simples',  label: 'Simples',  count: counts.simples },
        { key: 'composta', label: 'Compostas',count: counts.composta }
      ];
    },

    estrategiasFiltradas: function() {
      var f = this.filtroAtivo;
      if (f === 'todas') return this.estrategias;
      return this.estrategias.filter(function(e) { return e.categoria === f; });
    }
  },

  methods: {
    fmt: function(v) {
      if (v === null || v === undefined || isNaN(v)) return '--';
      return 'R$ ' + Math.abs(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },

    _construirEstrutura: function(id, pernas) {
      var tipo    = this._classificar(pernas);
      var cor     = this._cores(tipo);
      var metrics = this._metricas(pernas);

      var leg0  = pernas[0];
      var dte   = Math.min.apply(null, pernas.map(function(p) { return p.dteCorridos || 999; }));
      var venc  = leg0.dataVencimento || '--';

      return Object.assign({
        id:           id,
        ticker:       leg0.tickerAtivo,
        vencimento:   venc,
        dte:          dte,
        tipoEstrutura:tipo,
        pernas:       pernas.slice().sort(function(a, b) { return (a.strike || 0) - (b.strike || 0); }),
        corFundo:     cor.fundo,
        corBadge:     cor.badge,
        corTexto:     cor.texto,
        corBorda:     cor.borda
      }, metrics);
    },

    _classificar: function(pernas) {
      var n      = pernas.length;
      var vendas = pernas.filter(function(p) { return p.direcaoTrade === 'VENDA'; });
      var compras= pernas.filter(function(p) { return p.direcaoTrade === 'COMPRA'; });
      var puts   = pernas.filter(function(p) { return p.tipoOpcao === 'PUT'; });
      var calls  = pernas.filter(function(p) { return p.tipoOpcao === 'CALL'; });

      if (n === 1) {
        var l = pernas[0];
        return (l.direcaoTrade === 'VENDA' ? 'Venda' : 'Compra') + ' de ' + l.tipoOpcao;
      }

      if (n === 2 && vendas.length === 1 && compras.length === 1) {
        var v = vendas[0], c = compras[0];

        if (puts.length === 2) {
          return v.strike > c.strike ? 'Trava de Alta com PUT' : 'Trava de Baixa com PUT';
        }
        if (calls.length === 2) {
          return v.strike < c.strike ? 'Trava de Baixa com CALL' : 'Trava de Alta com CALL';
        }
        // PUT + CALL mix
        if (puts.length === 1 && calls.length === 1) {
          return vendas[0].tipoOpcao === 'PUT' ? 'Risk Reversal (V-PUT / C-CALL)' : 'Risk Reversal (V-CALL / C-PUT)';
        }
      }

      if (n === 2 && vendas.length === 2) return 'Venda de Straddle/Strangle';
      if (n === 2 && compras.length === 2) return 'Compra de Straddle/Strangle';

      return 'Estrutura Composta (' + n + ' pernas)';
    },

    _cores: function(tipo) {
      var creditoTipos = ['Trava de Alta com PUT', 'Trava de Baixa com CALL', 'Venda de PUT', 'Venda de CALL', 'Venda de Straddle/Strangle'];
      var debitoTipos  = ['Trava de Alta com CALL', 'Trava de Baixa com PUT', 'Compra de PUT', 'Compra de CALL', 'Compra de Straddle/Strangle'];

      if (creditoTipos.some(function(t) { return tipo.indexOf(t) !== -1 || tipo === t; })) {
        return { fundo: 'var(--brand-emerald-light)', badge: 'var(--brand-emerald-light)', texto: 'var(--brand-emerald)', borda: 'var(--brand-emerald)' };
      }
      if (debitoTipos.some(function(t) { return tipo.indexOf(t) !== -1 || tipo === t; })) {
        return { fundo: 'var(--brand-amber-light)', badge: 'var(--brand-amber-light)', texto: 'var(--brand-amber)', borda: 'var(--brand-amber)' };
      }
      if (tipo.indexOf('Risk Reversal') !== -1) {
        return { fundo: 'var(--brand-indigo-light)', badge: 'var(--brand-indigo-light)', texto: 'var(--brand-indigo)', borda: 'var(--brand-indigo)' };
      }
      return { fundo: 'var(--surface-overlay)', badge: 'var(--surface-overlay)', texto: 'var(--text-muted)', borda: 'var(--border-default)' };
    },

    _metricas: function(pernas) {
      var vendas = pernas.filter(function(p) { return p.direcaoTrade === 'VENDA'; });
      var compras= pernas.filter(function(p) { return p.direcaoTrade === 'COMPRA'; });

      var valorRecebido = vendas.reduce(function(s, p) { return s + (p.premioMedio || 0) * (p.quantidade || 1); }, 0);
      var valorPago     = compras.reduce(function(s, p) { return s + (p.premioMedio || 0) * (p.quantidade || 1); }, 0);
      var saldoLiquido  = valorRecebido - valorPago;

      var custoFecharVendas  = vendas.reduce(function(s, p) { return s + (p.premioAtual || 0) * (p.quantidade || 1); }, 0);
      var ganhoFecharCompras = compras.reduce(function(s, p) { return s + (p.premioAtual || 0) * (p.quantidade || 1); }, 0);
      var custoDesmontar = custoFecharVendas - ganhoFecharCompras;

      var plTotal  = pernas.reduce(function(s, p) { return s + (p.plTotalValor || 0); }, 0);
      var plPct    = saldoLiquido !== 0 ? (plTotal / Math.abs(saldoLiquido)) * 100 : null;

      var deltaNet = pernas.reduce(function(s, p) {
        var d = p.delta || 0;
        return s + (p.direcaoTrade === 'VENDA' ? -d : d) * (p.quantidade || 1);
      }, 0);
      var thetaNet = pernas.reduce(function(s, p) {
        return s + (p.theta || 0) * (p.quantidade || 1);
      }, 0);
      var quantidade = pernas[0] ? (pernas[0].quantidade || 1) : 1;

      // Max profit / max loss: apenas para spreads verticais de 2 pernas
      var maxProfit = null, maxLoss = null;
      if (pernas.length === 2 && vendas.length === 1 && compras.length === 1) {
        var v = vendas[0], c = compras[0];
        var largura = Math.abs((v.strike || 0) - (c.strike || 0)) * Math.min(v.quantidade || 1, c.quantidade || 1);
        if (saldoLiquido > 0) {
          // Spread de crédito
          maxProfit = saldoLiquido;
          maxLoss   = largura - saldoLiquido;
        } else {
          // Spread de débito
          maxProfit = largura + saldoLiquido; // saldoLiquido é negativo
          maxLoss   = -saldoLiquido;
        }
      }

      // Categoria para filtro
      var categoria;
      var tipo = this._classificar(pernas);
      if (pernas.length === 1) categoria = 'simples';
      else if (['Trava de Alta com PUT','Trava de Baixa com CALL','Venda de Straddle/Strangle'].indexOf(tipo) !== -1) categoria = 'credito';
      else if (['Trava de Alta com CALL','Trava de Baixa com PUT','Compra de Straddle/Strangle'].indexOf(tipo) !== -1) categoria = 'debito';
      else categoria = 'composta';

      return {
        valorRecebido: valorRecebido,
        valorPago:     valorPago,
        saldoLiquido:  saldoLiquido,
        custoDesmontar:custoDesmontar,
        plTotal:       plTotal,
        plPct:         plPct,
        deltaNet:      deltaNet,
        thetaNet:      thetaNet,
        quantidade:    quantidade,
        maxProfit:     maxProfit,
        maxLoss:       maxLoss,
        categoria:     categoria
      };
    }
  }
};
</script>

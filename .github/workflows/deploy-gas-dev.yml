name: Deploy to GAS DEV

# ─────────────────────────────────────────────────────────────────
# CI/CD: GitHub → Google Apps Script
#
# Dispara quando:
#   1. Um push chega em main ou na branch de trabalho
#   2. Manualmente: Actions → Deploy to GAS DEV → Run workflow
#
# Requisitos (configurados uma única vez):
#   - Secret CLASPRC_JSON: credenciais OAuth do clasp (~/.clasprc.json)
#   - .clasp.json no repo: aponta para o scriptId do projeto GAS DEV
#   - .claspignore no repo: exclui arquivos não-GAS (pwa, mockups, docs)
# ─────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write   # necessário para commitar .deployment-id na primeira vez
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache clasp
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          # Chave inclui a versão: clasp v3 quebra o formato clássico do CLASPRC_JSON
          key: clasp-${{ runner.os }}-v2.4.2

      - name: Install clasp
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix ~/.npm-global
          # Pin em v2.4.2 — o secret CLASPRC_JSON usa o formato clássico (token +
          # oauth2ClientSettings). clasp v3 exige o formato "tokens" e quebra a auth.
          if [ ! -f ~/.npm-global/bin/clasp ]; then
            npm install -g @google/clasp@2.4.2
          fi
          ~/.npm-global/bin/clasp --version || true
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      # O refresh interno do clasp (node-fetch v2) quebra no Node 24 com
      # "Premature close" ao chamar oauth2.googleapis.com. Renovamos o access
      # token via curl (independente do node-fetch) e gravamos um token fresco
      # com expiry no futuro, para o clasp usá-lo direto sem tentar renovar.
      - name: Renova access token (curl, evita node-fetch quebrado)
        run: |
          CLIENT_ID=$(node -e "console.log(require(process.env.HOME+'/.clasprc.json').oauth2ClientSettings.clientId)")
          CLIENT_SECRET=$(node -e "console.log(require(process.env.HOME+'/.clasprc.json').oauth2ClientSettings.clientSecret)")
          REFRESH_TOKEN=$(node -e "console.log(require(process.env.HOME+'/.clasprc.json').token.refresh_token)")
          RESP=$(curl -s https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" -d grant_type=refresh_token)
          ACCESS_TOKEN=$(echo "$RESP" | node -e "let r='';process.stdin.on('data',d=>r+=d);process.stdin.on('end',()=>{try{console.log(JSON.parse(r).access_token||'')}catch(e){console.log('')}})")
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERRO: falha ao renovar access token. Resposta do Google:"
            echo "$RESP"
            echo "(invalid_grant = refresh_token revogado/expirado → refazer clasp login e atualizar o secret CLASPRC_JSON)"
            exit 1
          fi
          ACCESS_TOKEN="$ACCESS_TOKEN" node -e "
            const fs=require('fs'); const p=process.env.HOME+'/.clasprc.json';
            const c=require(p);
            c.token=c.token||{};
            c.token.access_token=process.env.ACCESS_TOKEN;
            c.token.token_type='Bearer';
            c.token.expiry_date=Date.now()+3500*1000;
            fs.writeFileSync(p, JSON.stringify(c));
          "
          echo "Access token renovado com sucesso (válido ~58min)."

      - name: Push to GAS DEV
        id: push
        run: |
          # set +e + exit $CODE: garante que a saída do clasp seja SEMPRE impressa
          # antes de falhar (com bash -e a substituição abortava e escondia o erro)
          set +e
          OUTPUT=$(clasp push --force 2>&1)
          CODE=$?
          echo "$OUTPUT"
          FILES=$(echo "$OUTPUT" | grep -c '└─' || true)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          exit $CODE

      # Publica o web app e captura as URLs REAIS direto da API do Apps Script.
      # Nada de montar URL na mão: a API retorna entryPoints[].webApp.url para
      # cada deployment. Se nenhum deployment tiver entry point WEB_APP, o web
      # app NÃO está implantado e o summary avisa em vez de mostrar link falso.
      #
      # GAS limita a 20 deployments versionados por script — por isso o passo
      # REUSA o deployment versionado mais recente (clasp deploy -i) em vez de
      # criar um novo a cada execução (que foi o que estourou o limite antes).
      - name: Publicar web app e capturar URLs reais
        id: webdeploy
        run: |
          # Renova o access token a partir do refresh token (mesmas credenciais do clasp)
          CLIENT_ID=$(node -e "console.log(require(process.env.HOME+'/.clasprc.json').oauth2ClientSettings.clientId)")
          CLIENT_SECRET=$(node -e "console.log(require(process.env.HOME+'/.clasprc.json').oauth2ClientSettings.clientSecret)")
          REFRESH_TOKEN=$(node -e "console.log(require(process.env.HOME+'/.clasprc.json').token.refresh_token)")
          ACCESS_TOKEN=$(curl -s https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" -d grant_type=refresh_token \
            | node -e "let r='';process.stdin.on('data',d=>r+=d);process.stdin.on('end',()=>console.log(JSON.parse(r).access_token||''))")
          SCRIPT_ID=$(node -e "console.log(require('./.clasp.json').scriptId)")

          fetch_deployments() {
            curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://script.googleapis.com/v1/projects/$SCRIPT_ID/deployments?pageSize=50" \
              > /tmp/deployments.json
          }

          # Acha o deployment versionado mais recente para reusar
          fetch_deployments
          EXISTING_ID=$(node -e "
            const deps = require('/tmp/deployments.json').deployments || [];
            let best = '', bestV = -1;
            for (const d of deps) {
              const v = Number(d.deploymentConfig && d.deploymentConfig.versionNumber) || 0;
              if (v > bestV) { bestV = v; best = d.deploymentId; }
            }
            console.log(best);
          ")

          if [ -n "$EXISTING_ID" ]; then
            clasp deploy -i "$EXISTING_ID" --description "Deploy automático $(date +%Y-%m-%d)" 2>&1 || true
          else
            clasp deploy --description "Deploy automático $(date +%Y-%m-%d)" 2>&1 || true
          fi

          # Relê os deployments com retry — a API pode demorar ~30s para
          # popular entryPoints após um deploy, causando URLs vazias na 1ª leitura
          parse_urls() {
            fetch_deployments
            node -e "
              const data = require('/tmp/deployments.json');
              const deps = data.deployments || [];
              let headUrl = '', execUrl = '', headId = '', bestVersion = -1;
              for (const d of deps) {
                const isHead = !(d.deploymentConfig && d.deploymentConfig.versionNumber);
                if (isHead && !headId) headId = d.deploymentId;
                for (const ep of (d.entryPoints || [])) {
                  if (ep.entryPointType === 'WEB_APP' && ep.webApp && ep.webApp.url) {
                    if (isHead) { headUrl = ep.webApp.url; headId = d.deploymentId; }
                    else {
                      const v = Number(d.deploymentConfig.versionNumber) || 0;
                      if (v > bestVersion) { bestVersion = v; execUrl = ep.webApp.url; }
                    }
                  }
                }
              }
              console.log('HEAD_URL=' + headUrl);
              console.log('EXEC_URL=' + execUrl);
              console.log('HEAD_ID=' + headId);
              console.log('TOTAL_DEPLOYMENTS=' + deps.length);
            " > /tmp/urls.env
          }

          for WAIT in 5 10 20 30; do
            parse_urls
            HEAD_URL_VAL=$(grep '^HEAD_URL=' /tmp/urls.env | cut -d= -f2)
            if [ -n "$HEAD_URL_VAL" ]; then break; fi
            echo "URLs vazias. Aguardando ${WAIT}s..."
            sleep $WAIT
          done

          cat /tmp/urls.env
          cat /tmp/urls.env >> $GITHUB_ENV

          # Persiste as URLs reais no repo para o Claude Code ler depois
          cp /tmp/urls.env .webapp-urls
          HEAD_ID_VAL=$(grep '^HEAD_ID=' /tmp/urls.env | cut -d= -f2)
          if [ -n "$HEAD_ID_VAL" ]; then echo "$HEAD_ID_VAL" > .deployment-id; fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .webapp-urls .deployment-id 2>/dev/null || true
          git diff --staged --quiet || git commit -m "ci: atualiza URLs reais do web app (via API)"
          git pull --rebase origin "$GITHUB_REF_NAME" 2>/dev/null || true
          git push 2>/dev/null || true

      - name: Deploy summary
        run: |
          echo "### ✅ Deploy GAS DEV concluído" >> $GITHUB_STEP_SUMMARY
          echo "- **Arquivos enviados:** ${{ steps.push.outputs.files }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ env.HEAD_URL }}" ]; then
            echo "### 🌐 Web App (URLs reais retornadas pela API do Google)" >> $GITHUB_STEP_SUMMARY
            echo "- **Código mais recente (HEAD):** ${{ env.HEAD_URL }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Versão publicada:** ${{ env.EXEC_URL }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Web app NÃO implantado" >> $GITHUB_STEP_SUMMARY
            echo "Nenhum deployment tem entry point WEB_APP. Verifique se o" >> $GITHUB_STEP_SUMMARY
            echo "\`appsscript.json\` contém a seção \`webapp\` e foi enviado no push." >> $GITHUB_STEP_SUMMARY
          fi

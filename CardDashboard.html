<div id="card-dashboard-html">

<!-- ======================================================================
     TEMPLATE: CARD-DASHBOARD
     Painel executivo de posições ativas agrupadas por estratégia.
     Dados: statsPreCalculados.listaAtivas
     ====================================================================== -->
<template id="card-dashboard-template">
<div style="width:100%;font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:1.5rem;">

  <!-- ═══════════════════════════════════════════════════════════
       ZONE A — HEADER STICKY
       ═══════════════════════════════════════════════════════════ -->
  <div style="position:sticky;top:0;z-index:50;
              background:var(--surface-base);border:1px solid var(--border-subtle);
              border-radius:var(--radius-lg) var(--radius-lg) 0 0;
              border-bottom:1px solid var(--border-subtle);">

    <!-- Linha superior: título + badges + controles -->
    <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;
                padding:1rem 1.25rem 0.75rem;">

      <div style="display:flex;align-items:center;gap:0.5rem;flex:1;min-width:0;">
        <i data-lucide="layout-dashboard" style="width:16px;height:16px;color:var(--brand-indigo);flex-shrink:0;"></i>
        <span style="font-size:0.65rem;font-weight:800;text-transform:uppercase;
                     letter-spacing:0.15em;color:var(--text-primary);">COCKPIT — Posições Ativas</span>
      </div>

      <!-- Contadores -->
      <span style="font-size:0.6rem;font-weight:700;color:var(--text-muted);white-space:nowrap;">
        {{ trades.length }} posições · {{ estrategias.length }} estratégias
      </span>

      <!-- Mercado status -->
      <span :style="'font-size:0.6rem;font-weight:700;padding:0.2rem 0.55rem;border-radius:9999px;white-space:nowrap;' +
                    (mercadoAberto ? 'background:var(--brand-emerald-light);color:var(--brand-emerald);' : 'background:var(--brand-rose-light);color:var(--brand-rose);')">
        {{ mercadoAberto ? '● Mercado Aberto' : '● Mercado Fechado' }}
      </span>

      <!-- Hora atualização -->
      <span style="font-size:0.6rem;color:var(--text-muted);white-space:nowrap;font-family:'JetBrains Mono',monospace;">
        {{ horaAtualizada }}
      </span>
    </div>

    <!-- Linha inferior: filtros -->
    <div style="display:flex;gap:0;border-top:1px solid var(--border-subtle);overflow-x:auto;">
      <button v-for="tab in filtrosTabs" :key="tab.key"
        @click="filtroAtivo = tab.key"
        :style="'padding:0.5rem 1rem;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;border:none;white-space:nowrap;transition:all 0.15s;border-bottom:2px solid transparent;background:transparent;' +
                (filtroAtivo === tab.key ? 'color:var(--brand-indigo);border-bottom-color:var(--brand-indigo);' : 'color:var(--text-muted);')">
        {{ tab.label }}
        <span v-if="tab.count > 0"
          :style="'margin-left:4px;padding:0.05rem 0.35rem;border-radius:9999px;font-size:0.55rem;' +
                  (filtroAtivo === tab.key ? 'background:var(--brand-indigo-light);color:var(--brand-indigo);' : 'background:var(--surface-overlay);color:var(--text-muted);')">
          {{ tab.count }}
        </span>
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       ZONE B — 6 KPI CARDS
       ═══════════════════════════════════════════════════════════ -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
              background:var(--border-subtle);border:1px solid var(--border-subtle);
              border-top:none;">

    <!-- KPI 1: P&L Total MtM -->
    <div style="background:var(--surface-base);padding:1rem 1.25rem;">
      <div style="font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;
                  color:var(--text-muted);margin-bottom:0.4rem;">P&amp;L Total MtM</div>
      <div :style="'font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;font-family:\'JetBrains Mono\',monospace;' +
                   'color:' + corPL(plTotalMtM)">
        {{ fmtSigned(plTotalMtM) }}
      </div>
    </div>

    <!-- KPI 2: Theta/dia estimado -->
    <div style="background:var(--surface-base);padding:1rem 1.25rem;">
      <div style="font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;
                  color:var(--text-muted);margin-bottom:0.4rem;">Theta / dia est.</div>
      <div style="font-size:1.15rem;font-weight:800;color:var(--brand-emerald);
                  letter-spacing:-0.02em;font-family:'JetBrains Mono',monospace;">
        {{ fmt(thetaDia) }}
      </div>
      <div style="font-size:0.55rem;color:var(--text-muted);margin-top:2px;">prêmio × 1,5% × qtd (VENDA)</div>
    </div>

    <!-- KPI 3: Posições Críticas -->
    <div style="background:var(--surface-base);padding:1rem 1.25rem;">
      <div style="font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;
                  color:var(--text-muted);margin-bottom:0.4rem;">Posições Críticas</div>
      <div :style="'font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;font-family:\'JetBrains Mono\',monospace;' +
                   'color:' + (posicoesCriticas > 0 ? 'var(--brand-rose)' : 'var(--text-primary)')">
        {{ posicoesCriticas }}
        <span style="font-size:0.7rem;font-weight:600;margin-left:4px;">
          {{ posicoesCriticas === 1 ? 'posição' : 'posições' }}
        </span>
      </div>
      <div style="font-size:0.55rem;color:var(--text-muted);margin-top:2px;">ITM + DTE &lt; 10</div>
    </div>

    <!-- KPI 4: DTE Mais Urgente -->
    <div style="background:var(--surface-base);padding:1rem 1.25rem;">
      <div style="font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;
                  color:var(--text-muted);margin-bottom:0.4rem;">DTE Mais Urgente</div>
      <div v-if="dteMaisUrgente !== null"
        :style="'font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;font-family:\'JetBrains Mono\',monospace;' +
                'color:' + dteCor(dteMaisUrgente)">
        {{ dteMaisUrgente }} <span style="font-size:0.7rem;font-weight:600;">dias</span>
      </div>
      <div v-else style="font-size:1.15rem;font-weight:800;color:var(--text-muted);">--</div>
    </div>

    <!-- KPI 5: Maior Perda Atual -->
    <div style="background:var(--surface-base);padding:1rem 1.25rem;">
      <div style="font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;
                  color:var(--text-muted);margin-bottom:0.4rem;">Maior Perda Atual</div>
      <div :style="'font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;font-family:\'JetBrains Mono\',monospace;' +
                   'color:' + corPL(maiorPerdaAtual)">
        {{ maiorPerdaAtual !== null ? fmtSigned(maiorPerdaAtual) : '--' }}
      </div>
      <div style="font-size:0.55rem;color:var(--text-muted);margin-top:2px;">pior posição individual</div>
    </div>

    <!-- KPI 6: Estratégias Ativas -->
    <div style="background:var(--surface-base);padding:1rem 1.25rem;">
      <div style="font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;
                  color:var(--text-muted);margin-bottom:0.4rem;">Estratégias Ativas</div>
      <div style="font-size:1.15rem;font-weight:800;color:var(--brand-indigo);
                  letter-spacing:-0.02em;font-family:'JetBrains Mono',monospace;">
        {{ estrategias.length }}
        <span style="font-size:0.7rem;font-weight:600;margin-left:4px;">
          {{ estrategias.length === 1 ? 'estrutura' : 'estruturas' }}
        </span>
      </div>
      <div style="font-size:0.55rem;color:var(--text-muted);margin-top:2px;">
        {{ estrategias.filter(e => !e.isSimples).length }} spreads · {{ estrategias.filter(e => e.isSimples).length }} simples
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       ZONE C — ALERTAS
       ═══════════════════════════════════════════════════════════ -->
  <div v-if="alertas.length > 0"
    style="border:1px solid var(--border-subtle);border-top:none;padding:0.75rem 1.25rem;
           background:var(--surface-overlay);">
    <div style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;
                color:var(--text-muted);margin-bottom:0.5rem;">
      {{ alertas.length }} {{ alertas.length === 1 ? 'Alerta' : 'Alertas' }}
    </div>
    <div style="display:flex;flex-direction:column;gap:0.3rem;">
      <div v-for="(alerta, i) in alertas" :key="i"
        :style="'font-size:0.68rem;font-weight:600;padding:0.3rem 0.6rem;border-radius:var(--radius-xs);' + alertaBg(alerta.nivel)">
        {{ alerta.msg }}
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       ZONE D — STRATEGY CARDS
       ═══════════════════════════════════════════════════════════ -->
  <div style="border:1px solid var(--border-subtle);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);overflow:hidden;">

    <!-- Empty state -->
    <div v-if="trades.length === 0"
      style="padding:3rem;text-align:center;color:var(--text-muted);font-size:0.8rem;">
      <i data-lucide="inbox" style="width:32px;height:32px;margin:0 auto 0.75rem;display:block;opacity:0.4;"></i>
      Nenhuma posição ativa encontrada
    </div>

    <!-- Separador de vencimento (modo Por Vencimento) -->
    <template v-if="filtroAtivo === 'vencimento'">
      <template v-for="grupo in gruposPorVencimento" :key="grupo.label">
        <div style="padding:0.5rem 1.25rem;background:var(--surface-overlay);
                    border-bottom:1px solid var(--border-subtle);
                    font-size:0.55rem;font-weight:800;text-transform:uppercase;
                    letter-spacing:0.12em;color:var(--text-muted);display:flex;align-items:center;gap:0.5rem;">
          <i data-lucide="calendar" style="width:11px;height:11px;"></i>
          {{ grupo.label }}
          <span style="background:var(--surface-base);padding:0.1rem 0.4rem;border-radius:9999px;font-size:0.55rem;">
            {{ grupo.estrategias.length }}
          </span>
        </div>
        <template v-for="estrategia in grupo.estrategias" :key="estrategia.id">
          <component :is="'div'" v-bind="null">
            <div @click="toggleCard(estrategia.id)"
              :style="cardRowStyle(estrategia)"
              style="cursor:pointer;display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;
                     padding:0.85rem 1.25rem;border-bottom:1px solid var(--border-subtle);
                     transition:background 0.1s;">

              <div v-bind="semaforoAttrs(estrategia)" style="font-size:1rem;flex-shrink:0;"></div>

              <div style="flex:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                  <span style="font-size:0.75rem;font-weight:800;color:var(--text-primary);
                               font-family:'JetBrains Mono',monospace;letter-spacing:-0.01em;">
                    {{ estrategia.id }}
                  </span>
                  <span :style="badgeStyle(estrategia.tipo)"
                    style="font-size:0.55rem;font-weight:700;padding:0.1rem 0.45rem;border-radius:9999px;">
                    {{ atalhoEstrutura(estrategia.tipo) }}
                  </span>
                  <span style="font-size:0.65rem;color:var(--text-muted);font-weight:600;">
                    {{ estrategia.ticker }}
                  </span>
                </div>
                <div style="margin-top:0.35rem;display:flex;align-items:center;gap:0.5rem;">
                  <div style="flex:1;max-width:120px;height:4px;border-radius:9999px;background:var(--border-subtle);overflow:hidden;">
                    <div :style="'height:100%;border-radius:9999px;background:' + dteCor(estrategia.dte) +
                                  ';width:' + dtePct(estrategia.dte) + '%;transition:width 0.3s;'"></div>
                  </div>
                  <span :style="'font-size:0.6rem;font-weight:700;color:' + dteCor(estrategia.dte)">
                    {{ estrategia.dte === 999 ? '--' : estrategia.dte + 'd' }}
                  </span>
                  <span style="font-size:0.6rem;color:var(--text-muted);">{{ fmtDate(estrategia.vencimento) }}</span>
                </div>
              </div>

              <div style="text-align:right;flex-shrink:0;">
                <div :style="'font-size:0.8rem;font-weight:800;font-family:\'JetBrains Mono\',monospace;color:' + corPL(estrategia.plTotal)">
                  {{ fmtSigned(estrategia.plTotal) }}
                </div>
                <div v-if="estrategia.plPct !== null"
                  :style="'font-size:0.6rem;font-weight:600;color:' + corPL(estrategia.plPct)">
                  {{ fmtPct(estrategia.plPct) }} do crédito
                </div>
              </div>

              <i :data-lucide="isExpanded(estrategia.id) ? 'chevron-up' : 'chevron-down'"
                style="width:14px;height:14px;color:var(--text-muted);flex-shrink:0;"></i>
            </div>

            <!-- EXPANDED DETAIL -->
            <div v-if="isExpanded(estrategia.id)"
              style="background:var(--surface-overlay);border-bottom:1px solid var(--border-subtle);padding:1rem 1.25rem;">

              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:1rem;">
                <!-- Crédito Líquido -->
                <div>
                  <div style="font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;
                               color:var(--text-muted);font-weight:700;margin-bottom:2px;">Crédito Recebido</div>
                  <div style="font-size:0.85rem;font-weight:800;font-family:'JetBrains Mono',monospace;
                               color:var(--brand-emerald);">
                    {{ fmt(estrategia.saldoLiquido) }}
                  </div>
                </div>
                <!-- P&L Total -->
                <div>
                  <div style="font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;
                               color:var(--text-muted);font-weight:700;margin-bottom:2px;">P&amp;L Total</div>
                  <div :style="'font-size:0.85rem;font-weight:800;font-family:\'JetBrains Mono\',monospace;color:' + corPL(estrategia.plTotal)">
                    {{ fmtSigned(estrategia.plTotal) }}
                  </div>
                </div>
                <!-- Spread (se spread) -->
                <div v-if="!estrategia.isSimples">
                  <div style="font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;
                               color:var(--text-muted);font-weight:700;margin-bottom:2px;">Largura do Spread</div>
                  <div style="font-size:0.85rem;font-weight:800;font-family:'JetBrains Mono',monospace;
                               color:var(--text-primary);">
                    {{ larguraSpread(estrategia) }}
                  </div>
                </div>
                <div v-else>
                  <div style="font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;
                               color:var(--text-muted);font-weight:700;margin-bottom:2px;">Posição</div>
                  <div style="font-size:0.85rem;font-weight:800;color:var(--text-primary);">
                    {{ estrategia.pernas.length === 1 ? (estrategia.pernas[0].quantidade || '--') + ' lotes' : '--' }}
                  </div>
                </div>
              </div>

              <!-- Tabela de pernas -->
              <div style="border:1px solid var(--border-subtle);border-radius:var(--radius-sm);overflow:hidden;">
                <div style="display:grid;grid-template-columns:auto 1fr 1fr 1fr 1fr 1fr;
                            background:var(--surface-base);border-bottom:1px solid var(--border-subtle);
                            padding:0.4rem 0.75rem;gap:0.5rem;">
                  <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">Lado</span>
                  <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">Opção</span>
                  <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);text-align:right;">Strike</span>
                  <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);text-align:right;">PM</span>
                  <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);text-align:right;">Atual</span>
                  <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);text-align:right;">P&amp;L</span>
                </div>
                <div v-for="(perna, pi) in estrategia.pernas" :key="pi"
                  :style="'display:grid;grid-template-columns:auto 1fr 1fr 1fr 1fr 1fr;gap:0.5rem;padding:0.5rem 0.75rem;align-items:center;' +
                          (pi < estrategia.pernas.length - 1 ? 'border-bottom:1px solid var(--border-subtle);' : '')">
                  <span :style="'font-size:0.6rem;font-weight:800;padding:0.1rem 0.35rem;border-radius:var(--radius-xs);' +
                                 (perna.direcaoTrade === 'VENDA' ? 'background:var(--brand-emerald-light);color:var(--brand-emerald);' : 'background:var(--brand-rose-light);color:var(--brand-rose);')">
                    {{ perna.direcaoTrade === 'VENDA' ? 'V' : 'C' }}
                  </span>
                  <span style="font-size:0.65rem;font-weight:700;color:var(--text-primary);font-family:'JetBrains Mono',monospace;">
                    {{ perna.simboloOpcao || '--' }}
                    <span style="font-size:0.55rem;font-weight:500;color:var(--text-muted);margin-left:2px;">{{ perna.moneynessCode || '' }}</span>
                  </span>
                  <span style="font-size:0.7rem;font-weight:700;color:var(--text-primary);text-align:right;font-family:'JetBrains Mono',monospace;">
                    {{ fmt(perna.strike) }}
                  </span>
                  <span style="font-size:0.7rem;color:var(--text-secondary);text-align:right;font-family:'JetBrains Mono',monospace;">
                    {{ fmt(perna.premioMedio) }}
                  </span>
                  <span style="font-size:0.7rem;color:var(--text-secondary);text-align:right;font-family:'JetBrains Mono',monospace;">
                    {{ fmt(perna.premioAtual) }}
                  </span>
                  <span :style="'font-size:0.7rem;font-weight:700;text-align:right;font-family:\'JetBrains Mono\',monospace;color:' + corPL(perna.plTotalValor)">
                    {{ fmtSigned(perna.plTotalValor) }}
                  </span>
                </div>
              </div>

              <!-- Botões de ação (v1.0 — não funcionais) -->
              <div style="display:flex;gap:0.5rem;margin-top:0.75rem;flex-wrap:wrap;">
                <button disabled
                  style="padding:0.3rem 0.75rem;font-size:0.6rem;font-weight:700;border-radius:var(--radius-xs);
                         border:1px solid var(--border-subtle);background:var(--surface-base);color:var(--text-muted);
                         cursor:not-allowed;opacity:0.5;text-transform:uppercase;letter-spacing:0.08em;">
                  Encerrar
                </button>
                <button disabled
                  style="padding:0.3rem 0.75rem;font-size:0.6rem;font-weight:700;border-radius:var(--radius-xs);
                         border:1px solid var(--border-subtle);background:var(--surface-base);color:var(--text-muted);
                         cursor:not-allowed;opacity:0.5;text-transform:uppercase;letter-spacing:0.08em;">
                  Rolar
                </button>
                <button disabled
                  style="padding:0.3rem 0.75rem;font-size:0.6rem;font-weight:700;border-radius:var(--radius-xs);
                         border:1px solid var(--border-subtle);background:var(--surface-base);color:var(--text-muted);
                         cursor:not-allowed;opacity:0.5;text-transform:uppercase;letter-spacing:0.08em;">
                  Stop
                </button>
                <span style="font-size:0.55rem;color:var(--text-muted);align-self:center;margin-left:auto;">
                  ações disponíveis em versões futuras
                </span>
              </div>
            </div>
          </component>
        </template>
      </template>
    </template>

    <!-- Lista padrão (Todos / Por Ativo / Apenas Alertas) -->
    <template v-else>
      <div v-if="estrategiasFiltradas.length === 0"
        style="padding:2rem;text-align:center;color:var(--text-muted);font-size:0.75rem;">
        Nenhuma estratégia encontrada para este filtro
      </div>

      <template v-for="estrategia in estrategiasFiltradas" :key="estrategia.id">
        <!-- ROW: cabeçalho colapsável -->
        <div @click="toggleCard(estrategia.id)"
          :style="cardRowStyle(estrategia)"
          style="cursor:pointer;display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;
                 padding:0.85rem 1.25rem;border-bottom:1px solid var(--border-subtle);
                 transition:background 0.1s;">

          <!-- Semáforo emoji -->
          <span style="font-size:1.05rem;flex-shrink:0;line-height:1;">{{ semaforo(estrategia).emoji }}</span>

          <!-- Info principal -->
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
              <span style="font-size:0.75rem;font-weight:800;color:var(--text-primary);
                           font-family:'JetBrains Mono',monospace;letter-spacing:-0.01em;">
                {{ estrategia.id }}
              </span>
              <span :style="badgeStyle(estrategia.tipo)"
                style="font-size:0.55rem;font-weight:700;padding:0.1rem 0.45rem;border-radius:9999px;">
                {{ atalhoEstrutura(estrategia.tipo) }}
              </span>
              <span style="font-size:0.65rem;color:var(--text-muted);font-weight:600;">
                {{ estrategia.ticker }}
              </span>
              <span v-if="estrategia.temAlerta"
                style="font-size:0.55rem;background:#fef3c7;color:#92400e;padding:0.1rem 0.4rem;
                       border-radius:9999px;font-weight:700;">
                alerta
              </span>
            </div>
            <!-- DTE progress bar -->
            <div style="margin-top:0.35rem;display:flex;align-items:center;gap:0.5rem;">
              <div style="flex:1;max-width:120px;height:4px;border-radius:9999px;background:var(--border-subtle);overflow:hidden;">
                <div :style="'height:100%;border-radius:9999px;transition:width 0.3s;background:' + dteCor(estrategia.dte) +
                              ';width:' + dtePct(estrategia.dte) + '%;'"></div>
              </div>
              <span :style="'font-size:0.6rem;font-weight:700;color:' + dteCor(estrategia.dte)">
                {{ estrategia.dte === 999 ? '--' : estrategia.dte + 'd' }}
              </span>
              <span style="font-size:0.6rem;color:var(--text-muted);">{{ fmtDate(estrategia.vencimento) }}</span>
            </div>
          </div>

          <!-- P&L -->
          <div style="text-align:right;flex-shrink:0;">
            <div :style="'font-size:0.8rem;font-weight:800;font-family:\'JetBrains Mono\',monospace;color:' + corPL(estrategia.plTotal)">
              {{ fmtSigned(estrategia.plTotal) }}
            </div>
            <div v-if="estrategia.plPct !== null"
              :style="'font-size:0.6rem;font-weight:600;color:' + corPL(estrategia.plPct)">
              {{ fmtPct(estrategia.plPct) }} crédito
            </div>
          </div>

          <i :data-lucide="isExpanded(estrategia.id) ? 'chevron-up' : 'chevron-down'"
            style="width:14px;height:14px;color:var(--text-muted);flex-shrink:0;"></i>
        </div>

        <!-- EXPANDED DETAIL -->
        <div v-if="isExpanded(estrategia.id)"
          style="background:var(--surface-overlay);border-bottom:1px solid var(--border-subtle);padding:1rem 1.25rem;">

          <!-- Métricas resumidas -->
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:1rem;">
            <div>
              <div style="font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;
                           color:var(--text-muted);font-weight:700;margin-bottom:2px;">Crédito Recebido</div>
              <div style="font-size:0.85rem;font-weight:800;font-family:'JetBrains Mono',monospace;
                           color:var(--brand-emerald);">{{ fmt(estrategia.saldoLiquido) }}</div>
            </div>
            <div>
              <div style="font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;
                           color:var(--text-muted);font-weight:700;margin-bottom:2px;">P&amp;L Total</div>
              <div :style="'font-size:0.85rem;font-weight:800;font-family:\'JetBrains Mono\',monospace;color:' + corPL(estrategia.plTotal)">
                {{ fmtSigned(estrategia.plTotal) }}</div>
            </div>
            <div v-if="!estrategia.isSimples">
              <div style="font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;
                           color:var(--text-muted);font-weight:700;margin-bottom:2px;">Largura</div>
              <div style="font-size:0.85rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--text-primary);">
                {{ larguraSpread(estrategia) }}</div>
            </div>
            <div v-else>
              <div style="font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;
                           color:var(--text-muted);font-weight:700;margin-bottom:2px;">Qtd</div>
              <div style="font-size:0.85rem;font-weight:800;color:var(--text-primary);">
                {{ estrategia.pernas[0] ? estrategia.pernas[0].quantidade : '--' }}</div>
            </div>
          </div>

          <!-- Tabela de pernas -->
          <div style="border:1px solid var(--border-subtle);border-radius:var(--radius-sm);overflow:hidden;">
            <div style="display:grid;grid-template-columns:auto 1fr 1fr 1fr 1fr 1fr;
                        background:var(--surface-base);border-bottom:1px solid var(--border-subtle);
                        padding:0.4rem 0.75rem;gap:0.5rem;">
              <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">Lado</span>
              <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);">Opção</span>
              <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);text-align:right;">Strike</span>
              <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);text-align:right;">PM</span>
              <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);text-align:right;">Atual</span>
              <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);text-align:right;">P&amp;L</span>
            </div>
            <div v-for="(perna, pi) in estrategia.pernas" :key="pi"
              :style="'display:grid;grid-template-columns:auto 1fr 1fr 1fr 1fr 1fr;gap:0.5rem;padding:0.5rem 0.75rem;align-items:center;' +
                      (pi < estrategia.pernas.length - 1 ? 'border-bottom:1px solid var(--border-subtle);' : '')">
              <span :style="'font-size:0.6rem;font-weight:800;padding:0.1rem 0.35rem;border-radius:var(--radius-xs);' +
                             (perna.direcaoTrade === 'VENDA' ? 'background:var(--brand-emerald-light);color:var(--brand-emerald);' : 'background:var(--brand-rose-light);color:var(--brand-rose);')">
                {{ perna.direcaoTrade === 'VENDA' ? 'V' : 'C' }}
              </span>
              <span style="font-size:0.65rem;font-weight:700;color:var(--text-primary);font-family:'JetBrains Mono',monospace;">
                {{ perna.simboloOpcao || '--' }}
                <span style="font-size:0.55rem;font-weight:500;color:var(--text-muted);margin-left:2px;">{{ perna.moneynessCode || '' }}</span>
              </span>
              <span style="font-size:0.7rem;font-weight:700;color:var(--text-primary);text-align:right;font-family:'JetBrains Mono',monospace;">
                {{ fmt(perna.strike) }}
              </span>
              <span style="font-size:0.7rem;color:var(--text-secondary);text-align:right;font-family:'JetBrains Mono',monospace;">
                {{ fmt(perna.premioMedio) }}
              </span>
              <span style="font-size:0.7rem;color:var(--text-secondary);text-align:right;font-family:'JetBrains Mono',monospace;">
                {{ fmt(perna.premioAtual) }}
              </span>
              <span :style="'font-size:0.7rem;font-weight:700;text-align:right;font-family:\'JetBrains Mono\',monospace;color:' + corPL(perna.plTotalValor)">
                {{ fmtSigned(perna.plTotalValor) }}
              </span>
            </div>
          </div>

          <!-- Botões de ação -->
          <div style="display:flex;gap:0.5rem;margin-top:0.75rem;flex-wrap:wrap;">
            <button disabled style="padding:0.3rem 0.75rem;font-size:0.6rem;font-weight:700;border-radius:var(--radius-xs);
                   border:1px solid var(--border-subtle);background:var(--surface-base);color:var(--text-muted);
                   cursor:not-allowed;opacity:0.5;text-transform:uppercase;letter-spacing:0.08em;">
              Encerrar
            </button>
            <button disabled style="padding:0.3rem 0.75rem;font-size:0.6rem;font-weight:700;border-radius:var(--radius-xs);
                   border:1px solid var(--border-subtle);background:var(--surface-base);color:var(--text-muted);
                   cursor:not-allowed;opacity:0.5;text-transform:uppercase;letter-spacing:0.08em;">
              Rolar
            </button>
            <button disabled style="padding:0.3rem 0.75rem;font-size:0.6rem;font-weight:700;border-radius:var(--radius-xs);
                   border:1px solid var(--border-subtle);background:var(--surface-base);color:var(--text-muted);
                   cursor:not-allowed;opacity:0.5;text-transform:uppercase;letter-spacing:0.08em;">
              Stop
            </button>
            <span style="font-size:0.55rem;color:var(--text-muted);align-self:center;margin-left:auto;">
              ações disponíveis em versões futuras
            </span>
          </div>
        </div>
      </template>
    </template>

  </div>
</div>
</template>

<script>
window.CardDashboard = {
  template: '#card-dashboard-template',
  props: {
    statsPreCalculados: { type: Object, default: function() { return {}; } },
    isMobile: Boolean
  },

  data: function() {
    return {
      filtroAtivo: 'todos',
      expandedCards: {},
      horaAtualizada: '--:--'
    };
  },

  mounted: function() {
    this.horaAtualizada = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    if (window.refreshIcons) window.refreshIcons();
  },
  updated: function() {
    if (window.refreshIcons) window.refreshIcons();
  },

  computed: {
    trades: function() {
      return (this.statsPreCalculados && this.statsPreCalculados.listaAtivas) || [];
    },

    estrategias: function() {
      var self = this;
      var grupos = {};
      this.trades.forEach(function(t) {
        var id = t.estrategiaId || ('_solo_' + (t.tradeId || t.simboloOpcao));
        if (!grupos[id]) grupos[id] = [];
        grupos[id].push(t);
      });
      return Object.keys(grupos).map(function(id) {
        return self._buildStrategy(id, grupos[id]);
      }).sort(function(a, b) { return a.dte - b.dte; });
    },

    // ── KPIs ──────────────────────────────────────────────────

    plTotalMtM: function() {
      return this.trades.reduce(function(s, t) { return s + (parseFloat(t.plTotalValor) || 0); }, 0);
    },

    thetaDia: function() {
      return this.trades
        .filter(function(t) { return t.direcaoTrade === 'VENDA'; })
        .reduce(function(s, t) {
          return s + (parseFloat(t.premioAtual) || 0) * 0.015 * (parseInt(t.quantidade) || 0);
        }, 0);
    },

    posicoesCriticas: function() {
      return this.trades.filter(function(t) {
        var dte = parseInt(t.dteCorridos);
        var isItm = String(t.moneynessCode || '').toUpperCase() === 'ITM';
        return (isNaN(dte) ? false : dte < 10) || isItm;
      }).length;
    },

    dteMaisUrgente: function() {
      if (!this.trades.length) return null;
      var vals = this.trades.map(function(t) { return parseInt(t.dteCorridos); }).filter(function(v) { return !isNaN(v); });
      return vals.length ? Math.min.apply(null, vals) : null;
    },

    maiorPerdaAtual: function() {
      if (!this.trades.length) return null;
      var vals = this.trades.map(function(t) { return parseFloat(t.plTotalValor) || 0; });
      return Math.min.apply(null, vals);
    },

    // ── Alertas ───────────────────────────────────────────────

    alertas: function() {
      var list = [];
      var nakedMap = {};

      this.trades.forEach(function(t) {
        var dte    = parseInt(t.dteCorridos);
        var isVenda = t.direcaoTrade === 'VENDA';
        var isPut   = String(t.tipoOpcao || '').toUpperCase() === 'PUT';
        var isItm   = String(t.moneynessCode || '').toUpperCase() === 'ITM';
        var delta   = parseFloat(t.delta) || 0;
        var plPct   = parseFloat(t.plTotalPct) || 0;
        var op      = t.simboloOpcao || t.tickerAtivo || '?';

        if (isVenda && !isNaN(dte) && dte < 10) {
          list.push({ nivel: 'vermelho', msg: '🔴 ' + op + ' — VENDA com DTE ' + dte + ' dias (crítico)' });
        }
        if (isVenda && isPut && isItm) {
          list.push({ nivel: 'vermelho', msg: '🔴 ' + op + ' — PUT VENDA exercível (ITM)' });
        }
        if (plPct < -100) {
          list.push({ nivel: 'vermelho', msg: '🔴 ' + op + ' — P&L abaixo de -100% do crédito' });
        }
        if (isVenda && Math.abs(delta) > 0.40) {
          list.push({ nivel: 'laranja', msg: '🟠 ' + op + ' — Delta ' + delta.toFixed(2) + ' (exposição alta)' });
        }
        if (isVenda && !isNaN(dte) && dte >= 10 && dte <= 21) {
          list.push({ nivel: 'amarelo', msg: '🟡 ' + op + ' — Vencimento em ' + dte + ' dias' });
        }

        var eid = t.estrategiaId || ('_solo_' + op);
        if (!nakedMap[eid]) nakedMap[eid] = { vendas: 0, compras: 0, ticker: t.tickerAtivo || '' };
        if (isVenda) nakedMap[eid].vendas++;
        else nakedMap[eid].compras++;
      });

      Object.keys(nakedMap).forEach(function(id) {
        var info = nakedMap[id];
        if (info.vendas > 0 && info.compras === 0) {
          list.push({ nivel: 'laranja', msg: '🟠 ' + info.ticker + ' — Short PUT sem proteção (posição nua)' });
        }
      });

      return list;
    },

    // ── UI helpers ─────────────────────────────────────────────

    mercadoAberto: function() {
      var now = new Date();
      var totalMin = now.getHours() * 60 + now.getMinutes();
      return totalMin >= 10 * 60 && totalMin < 17 * 60 + 55;
    },

    filtrosTabs: function() {
      return [
        { key: 'todos',      label: 'Todos',           count: this.estrategias.length },
        { key: 'vencimento', label: 'Por Vencimento',  count: this.estrategias.length },
        { key: 'ativo',      label: 'Por Ativo',       count: [...new Set(this.trades.map(function(t) { return t.tickerAtivo; }))].length },
        { key: 'alertas',    label: 'Alertas',         count: this.estrategias.filter(function(e) { return e.temAlerta; }).length }
      ];
    },

    estrategiasFiltradas: function() {
      var ests = this.estrategias;
      if (this.filtroAtivo === 'alertas')    return ests.filter(function(e) { return e.temAlerta; });
      if (this.filtroAtivo === 'ativo')      return ests.slice().sort(function(a, b) { return a.ticker.localeCompare(b.ticker); });
      return ests; // todos / vencimento já ordenados por dte
    },

    gruposPorVencimento: function() {
      var grupos = {};
      var ordemLabels = [];
      this.estrategias.forEach(function(e) {
        var d = e.vencimento;
        var label = d ? (function() {
          var dt = (d instanceof Date) ? d : new Date(d);
          return isNaN(dt.getTime()) ? 'Sem data' :
            String(dt.getDate()).padStart(2, '0') + '/' + String(dt.getMonth()+1).padStart(2,'0') + '/' + dt.getFullYear();
        })() : 'Sem data';
        if (!grupos[label]) { grupos[label] = []; ordemLabels.push(label); }
        grupos[label].push(e);
      });
      return ordemLabels.map(function(label) { return { label: label, estrategias: grupos[label] }; });
    }
  },

  methods: {
    toggleCard: function(id) {
      var current = this.expandedCards[id];
      var next = Object.assign({}, this.expandedCards);
      next[id] = !current;
      this.expandedCards = next;
    },
    isExpanded: function(id) { return !!this.expandedCards[id]; },

    // ── Formatação ─────────────────────────────────────────────

    fmt: function(v) {
      if (v === null || v === undefined || isNaN(v)) return '--';
      return 'R$ ' + Math.abs(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },
    fmtSigned: function(v) {
      if (v === null || v === undefined || isNaN(v)) return '--';
      var abs = Math.abs(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return (v >= 0 ? '+' : '-') + 'R$ ' + abs;
    },
    fmtPct: function(v) {
      if (v === null || v === undefined || isNaN(v)) return '--';
      return (v >= 0 ? '+' : '') + v.toLocaleString('pt-BR', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + '%';
    },
    fmtDate: function(d) {
      if (!d) return '--';
      var dt = (d instanceof Date) ? d : new Date(d);
      if (isNaN(dt.getTime())) return '--';
      return String(dt.getDate()).padStart(2, '0') + '/' + String(dt.getMonth()+1).padStart(2,'0') + '/' + dt.getFullYear();
    },

    corPL: function(v) {
      if (v === null || v === undefined || isNaN(v)) return 'var(--text-muted)';
      return v >= 0 ? 'var(--brand-emerald)' : 'var(--brand-rose)';
    },

    dtePct: function(dte) {
      var max = 45;
      return Math.min(100, Math.max(0, ((max - dte) / max) * 100));
    },

    dteCor: function(dte) {
      if (dte < 10) return 'var(--brand-rose)';
      if (dte < 21) return '#f97316';
      if (dte < 30) return '#eab308';
      return 'var(--brand-emerald)';
    },

    semaforo: function(e) {
      var isItm = e.pernas.some(function(p) { return String(p.moneynessCode || '').toUpperCase() === 'ITM'; });
      var dte   = e.dte;
      var plPct = e.plPct || 0;
      if (isItm && dte < 10)          return { emoji: '🔴', label: 'Crítico' };
      if (isItm || dte < 10)          return { emoji: '🔴', label: 'Risco Alto' };
      if (dte < 15 || plPct < -50)    return { emoji: '🟠', label: 'Atenção' };
      if (dte < 21 || plPct < 0)      return { emoji: '🟡', label: 'Alerta' };
      return { emoji: '🟢', label: 'OK' };
    },

    semaforoAttrs: function(estrategia) {
      return {};
    },

    cardRowStyle: function(e) {
      if (this.isExpanded(e.id)) return 'background:var(--surface-overlay);';
      return '';
    },

    badgeStyle: function(tipo) {
      var t = tipo || '';
      if (t.indexOf('Venda') === 0 || t.indexOf('Trava de Alta com PUT') >= 0 || t.indexOf('Bull') >= 0) {
        return 'background:var(--brand-emerald-light);color:var(--brand-emerald);';
      }
      if (t.indexOf('Compra') === 0 || t.indexOf('Bear') >= 0) {
        return 'background:var(--brand-rose-light);color:var(--brand-rose);';
      }
      return 'background:var(--surface-overlay);color:var(--text-muted);';
    },

    alertaBg: function(nivel) {
      if (nivel === 'vermelho') return 'background:#fef2f2;color:#991b1b;';
      if (nivel === 'laranja')  return 'background:#fff7ed;color:#9a3412;';
      return 'background:#fefce8;color:#713f12;';
    },

    atalhoEstrutura: function(tipo) {
      if (!tipo) return '--';
      if (tipo.indexOf('Trava de Alta com PUT')  >= 0) return 'Bull PUT Spread';
      if (tipo.indexOf('Trava de Baixa com PUT')  >= 0) return 'Bear PUT Spread';
      if (tipo.indexOf('Trava de Baixa com CALL') >= 0) return 'Bear CALL Spread';
      if (tipo.indexOf('Trava de Alta com CALL')  >= 0) return 'Bull CALL Spread';
      if (tipo.indexOf('Venda de PUT')  >= 0)           return 'Short PUT';
      if (tipo.indexOf('Venda de CALL') >= 0)           return 'Short CALL';
      if (tipo.indexOf('Compra de PUT') >= 0)           return 'Long PUT';
      if (tipo.indexOf('Compra de CALL')>= 0)           return 'Long CALL';
      return tipo;
    },

    larguraSpread: function(e) {
      if (!e.vendas.length || !e.compras.length) return '--';
      var kv = parseFloat(e.vendas[0].strike)  || 0;
      var kc = parseFloat(e.compras[0].strike) || 0;
      var larg = Math.abs(kv - kc);
      return larg > 0 ? this.fmt(larg) : '--';
    },

    // ── Builder de estratégia ──────────────────────────────────

    _buildStrategy: function(id, pernas) {
      var self    = this;
      var vendas  = pernas.filter(function(p) { return p.direcaoTrade === 'VENDA'; });
      var compras = pernas.filter(function(p) { return p.direcaoTrade === 'COMPRA'; });
      var tipo    = this._classificar(pernas);
      var dte     = Math.min.apply(null, pernas.map(function(p) {
        var v = parseInt(p.dteCorridos); return isNaN(v) ? 999 : v;
      }));

      var valorRecebido = vendas.reduce(function(s, p) {
        return s + (parseFloat(p.premioMedio) || 0) * (parseInt(p.quantidade) || 1);
      }, 0);
      var valorPago = compras.reduce(function(s, p) {
        return s + (parseFloat(p.premioMedio) || 0) * (parseInt(p.quantidade) || 1);
      }, 0);
      var saldoLiquido = valorRecebido - valorPago;

      var plTotal = pernas.reduce(function(s, p) { return s + (parseFloat(p.plTotalValor) || 0); }, 0);
      var plPct   = saldoLiquido !== 0 ? (plTotal / Math.abs(saldoLiquido)) * 100 : null;

      var isItm    = pernas.some(function(p) { return String(p.moneynessCode || '').toUpperCase() === 'ITM'; });
      var temAlerta = isItm || dte < 21 || (plPct !== null && plPct < 0) || compras.length === 0 && vendas.length > 0;

      return {
        id:          id,
        tipo:        tipo,
        dte:         dte,
        ticker:      pernas[0].tickerAtivo    || '--',
        nomeEmpresa: pernas[0].nomeEmpresa    || '--',
        vencimento:  pernas[0].dataVencimento || null,
        pernas:      pernas.slice().sort(function(a, b) { return (parseFloat(b.strike)||0) - (parseFloat(a.strike)||0); }),
        vendas:      vendas,
        compras:     compras,
        saldoLiquido: saldoLiquido,
        plTotal:     plTotal,
        plPct:       plPct,
        isSimples:   pernas.length === 1,
        temAlerta:   temAlerta,
        isItm:       isItm
      };
    },

    _classificar: function(pernas) {
      var n       = pernas.length;
      var vendas  = pernas.filter(function(p) { return p.direcaoTrade === 'VENDA'; });
      var compras = pernas.filter(function(p) { return p.direcaoTrade === 'COMPRA'; });
      var puts    = pernas.filter(function(p) { return String(p.tipoOpcao || '').toUpperCase() === 'PUT'; });
      var calls   = pernas.filter(function(p) { return String(p.tipoOpcao || '').toUpperCase() === 'CALL'; });

      if (n === 1) {
        var l = pernas[0];
        return (l.direcaoTrade === 'VENDA' ? 'Venda' : 'Compra') + ' de ' + (l.tipoOpcao || 'Opção');
      }
      if (n === 2 && vendas.length === 1 && compras.length === 1) {
        var v = vendas[0], c = compras[0];
        if (puts.length === 2)  return v.strike > c.strike ? 'Trava de Alta com PUT'  : 'Trava de Baixa com PUT';
        if (calls.length === 2) return v.strike < c.strike ? 'Trava de Baixa com CALL': 'Trava de Alta com CALL';
        if (puts.length === 1 && calls.length === 1) return 'Risk Reversal';
      }
      if (n === 2 && vendas.length === 2) {
        if (puts.length === 1 && calls.length === 1) {
          return Math.abs((pernas[0].strike||0) - (pernas[1].strike||0)) < 0.01 ? 'Venda de Straddle' : 'Venda de Strangle';
        }
      }
      return 'Estrutura Composta (' + n + ' pernas)';
    }
  }
});
</script>

</div>

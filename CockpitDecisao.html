<template id="cockpit-decisao-template">
  <div v-if="listaAtivas && listaAtivas.length > 0" class="premium-card" style="overflow:hidden;">

    <!-- Header clicável -->
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0.875rem 1.5rem;cursor:pointer;background:var(--surface-base);user-select:none;"
      @click="expandido = !expandido"
      onmouseover="this.style.background='var(--surface-overlay)'"
      onmouseout="this.style.background='var(--surface-base)'">

      <div style="display:flex;align-items:center;gap:0.875rem;">
        <div style="padding:0.5rem;background:var(--brand-indigo-light);border-radius:var(--radius-md);border:1px solid var(--brand-indigo-muted);flex-shrink:0;">
          <i data-lucide="brain-circuit" style="width:1rem;height:1rem;color:var(--brand-indigo);display:block;"></i>
        </div>
        <div>
          <span style="font-size:0.8rem;font-weight:700;color:var(--text-primary);">Assistente de Gestao</span>
          <span style="font-size:0.7rem;color:var(--text-muted);margin-left:0.5rem;">{{ listaAtivas.length }} posicoes analisadas</span>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:0.375rem;flex-wrap:wrap;justify-content:flex-end;">
        <span v-if="categorias.rolar.length"
          style="font-size:0.6rem;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--brand-rose-light);color:var(--brand-rose);border:1px solid var(--brand-rose-muted);white-space:nowrap;">
          {{ categorias.rolar.length }} Rolar
        </span>
        <span v-if="categorias.manejar.length"
          style="font-size:0.6rem;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--brand-amber-light);color:var(--brand-amber);border:1px solid var(--brand-amber-muted);white-space:nowrap;">
          {{ categorias.manejar.length }} Manejar
        </span>
        <span v-if="categorias.fechar.length"
          style="font-size:0.6rem;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--brand-emerald-light);color:var(--brand-emerald);border:1px solid var(--brand-emerald-muted);white-space:nowrap;">
          {{ categorias.fechar.length }} Coletar
        </span>
        <i :data-lucide="expandido ? 'chevron-up' : 'chevron-down'"
          style="width:1rem;height:1rem;color:var(--text-muted);margin-left:0.25rem;display:block;flex-shrink:0;"></i>
      </div>
    </div>

    <!-- Corpo colapsável -->
    <div v-if="expandido">
      <div :style="isMobile
        ? 'display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border-subtle);'
        : 'display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-subtle);'">

        <!-- ROLAR -->
        <div style="background:var(--surface-base);padding:1rem;">
          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:2px solid var(--brand-rose-muted);">
            <i data-lucide="alert-circle" style="width:0.875rem;height:0.875rem;color:var(--brand-rose);flex-shrink:0;display:block;"></i>
            <span style="font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand-rose);">Rolar</span>
            <span style="font-size:0.6rem;font-weight:700;padding:1px 6px;border-radius:99px;background:var(--brand-rose-light);color:var(--brand-rose);border:1px solid var(--brand-rose-muted);margin-left:auto;">
              {{ categorias.rolar.length }}
            </span>
          </div>
          <div v-if="categorias.rolar.length === 0"
            style="font-size:0.68rem;color:var(--text-muted);font-style:italic;text-align:center;padding:0.75rem 0;">
            Nenhuma posicao
          </div>
          <div v-for="item in categorias.rolar" :key="item.trade.tradeId || item.trade.simboloOpcao"
            style="padding:0.5rem 0.625rem;border-radius:var(--radius-sm);border:1px solid var(--brand-rose-muted);background:var(--brand-rose-light);margin-bottom:0.375rem;">
            <div style="display:flex;align-items:baseline;gap:0.375rem;margin-bottom:2px;">
              <span style="font-size:0.78rem;font-weight:800;color:var(--brand-rose);font-family:'JetBrains Mono',monospace;line-height:1;">{{ item.trade.simboloOpcao }}</span>
              <span style="font-size:0.6rem;color:var(--text-muted);font-weight:600;">{{ item.trade.tickerAtivo }}</span>
            </div>
            <div style="font-size:0.62rem;color:var(--brand-rose);line-height:1.35;">{{ item.razao }}</div>
          </div>
        </div>

        <!-- MANEJAR -->
        <div style="background:var(--surface-base);padding:1rem;">
          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:2px solid var(--brand-amber-muted);">
            <i data-lucide="eye" style="width:0.875rem;height:0.875rem;color:var(--brand-amber);flex-shrink:0;display:block;"></i>
            <span style="font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand-amber);">Manejar</span>
            <span style="font-size:0.6rem;font-weight:700;padding:1px 6px;border-radius:99px;background:var(--brand-amber-light);color:var(--brand-amber);border:1px solid var(--brand-amber-muted);margin-left:auto;">
              {{ categorias.manejar.length }}
            </span>
          </div>
          <div v-if="categorias.manejar.length === 0"
            style="font-size:0.68rem;color:var(--text-muted);font-style:italic;text-align:center;padding:0.75rem 0;">
            Nenhuma posicao
          </div>
          <div v-for="item in categorias.manejar" :key="item.trade.tradeId || item.trade.simboloOpcao"
            style="padding:0.5rem 0.625rem;border-radius:var(--radius-sm);border:1px solid var(--brand-amber-muted);background:var(--brand-amber-light);margin-bottom:0.375rem;">
            <div style="display:flex;align-items:baseline;gap:0.375rem;margin-bottom:2px;">
              <span style="font-size:0.78rem;font-weight:800;color:var(--brand-amber);font-family:'JetBrains Mono',monospace;line-height:1;">{{ item.trade.simboloOpcao }}</span>
              <span style="font-size:0.6rem;color:var(--text-muted);font-weight:600;">{{ item.trade.tickerAtivo }}</span>
            </div>
            <div style="font-size:0.62rem;color:var(--brand-amber);line-height:1.35;">{{ item.razao }}</div>
          </div>
        </div>

        <!-- FECHAR / COLETAR -->
        <div style="background:var(--surface-base);padding:1rem;">
          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:2px solid var(--brand-emerald-muted);">
            <i data-lucide="check-circle-2" style="width:0.875rem;height:0.875rem;color:var(--brand-emerald);flex-shrink:0;display:block;"></i>
            <span style="font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand-emerald);">Fechar / Coletar</span>
            <span style="font-size:0.6rem;font-weight:700;padding:1px 6px;border-radius:99px;background:var(--brand-emerald-light);color:var(--brand-emerald);border:1px solid var(--brand-emerald-muted);margin-left:auto;">
              {{ categorias.fechar.length }}
            </span>
          </div>
          <div v-if="categorias.fechar.length === 0"
            style="font-size:0.68rem;color:var(--text-muted);font-style:italic;text-align:center;padding:0.75rem 0;">
            Nenhuma posicao
          </div>
          <div v-for="item in categorias.fechar" :key="item.trade.tradeId || item.trade.simboloOpcao"
            style="padding:0.5rem 0.625rem;border-radius:var(--radius-sm);border:1px solid var(--brand-emerald-muted);background:var(--brand-emerald-light);margin-bottom:0.375rem;">
            <div style="display:flex;align-items:baseline;gap:0.375rem;margin-bottom:2px;">
              <span style="font-size:0.78rem;font-weight:800;color:var(--brand-emerald);font-family:'JetBrains Mono',monospace;line-height:1;">{{ item.trade.simboloOpcao }}</span>
              <span style="font-size:0.6rem;color:var(--text-muted);font-weight:600;">{{ item.trade.tickerAtivo }}</span>
            </div>
            <div style="font-size:0.62rem;color:var(--brand-emerald);line-height:1.35;">{{ item.razao }}</div>
          </div>
        </div>

        <!-- MONITORAR -->
        <div style="background:var(--surface-base);padding:1rem;">
          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:2px solid var(--brand-indigo-muted);">
            <i data-lucide="shield-check" style="width:0.875rem;height:0.875rem;color:var(--brand-indigo);flex-shrink:0;display:block;"></i>
            <span style="font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand-indigo);">Monitorar</span>
            <span style="font-size:0.6rem;font-weight:700;padding:1px 6px;border-radius:99px;background:var(--brand-indigo-light);color:var(--brand-indigo);border:1px solid var(--brand-indigo-muted);margin-left:auto;">
              {{ categorias.monitorar.length }}
            </span>
          </div>
          <div v-if="categorias.monitorar.length === 0"
            style="font-size:0.68rem;color:var(--text-muted);font-style:italic;text-align:center;padding:0.75rem 0;">
            Nenhuma posicao
          </div>
          <div v-for="item in categorias.monitorar" :key="item.trade.tradeId || item.trade.simboloOpcao"
            style="padding:0.5rem 0.625rem;border-radius:var(--radius-sm);border:1px solid var(--brand-indigo-muted);background:var(--brand-indigo-light);margin-bottom:0.375rem;">
            <div style="display:flex;align-items:baseline;gap:0.375rem;margin-bottom:2px;">
              <span style="font-size:0.78rem;font-weight:800;color:var(--brand-indigo);font-family:'JetBrains Mono',monospace;line-height:1;">{{ item.trade.simboloOpcao }}</span>
              <span style="font-size:0.6rem;color:var(--text-muted);font-weight:600;">{{ item.trade.tickerAtivo }}</span>
            </div>
            <div style="font-size:0.62rem;color:var(--brand-indigo);line-height:1.35;">{{ item.razao }}</div>
          </div>
        </div>

      </div>
    </div>

  </div>
</template>

<script>
window.CockpitDecisao = {
  template: '#cockpit-decisao-template',

  props: {
    statsPreCalculados: { type: Object, default: function() { return {}; } },
    isMobile:           { type: Boolean, default: false }
  },

  data: function() {
    return {
      expandido: !this.isMobile
    };
  },

  computed: {
    listaAtivas: function() {
      return (this.statsPreCalculados && this.statsPreCalculados.listaAtivas) || [];
    },

    categorias: function() {
      var resultado = { rolar: [], manejar: [], fechar: [], monitorar: [] };
      var self = this;
      self.listaAtivas.forEach(function(trade) {
        var c = self.classificarPosicao(trade);
        resultado[c.acao].push({ trade: trade, razao: c.razao });
      });
      return resultado;
    }
  },

  methods: {
    classificarPosicao: function(trade) {
      var dte      = trade.dteCorridos || 0;
      var moneyness= String(trade.moneynessCode || '').toUpperCase();
      var tipo     = String(trade.tipoOpcao    || '').toUpperCase();
      var direcao  = String(trade.direcaoTrade || '').toUpperCase();
      var lucroPct = trade.lucroPct   || 0;
      var plPct    = trade.plTotalPct || 0;
      var delta    = Math.abs(trade.delta || 0);
      var poe      = trade.poe        || 0;
      var isVenda  = direcao === 'VENDA';

      // 1. FECHAR / COLETAR
      if (isVenda && lucroPct >= 75)
        return { acao: 'fechar', razao: lucroPct.toFixed(0) + '% capturado — fechar e reposicionar' };
      if (!isVenda && plPct >= 50)
        return { acao: 'fechar', razao: 'P/L +' + plPct.toFixed(1) + '% — realizar lucro' };
      if (dte <= 5 && plPct > 0)
        return { acao: 'fechar', razao: dte + 'd — fechar antes do risco de gamma' };

      // 2. ROLAR
      if (dte <= 7)
        return { acao: 'rolar', razao: dte + 'd — vencimento iminente, rolar urgente' };
      if (moneyness === 'ITM' && dte <= 21) {
        var dir = tipo === 'PUT' ? 'rolar para baixo/fora' : 'rolar para cima/fora';
        return { acao: 'rolar', razao: 'ITM + ' + dte + 'd — risco de exercicio, ' + dir };
      }
      if (moneyness === 'ATM' && dte <= 10)
        return { acao: 'rolar', razao: 'ATM + ' + dte + 'd — zona de perigo, rolar' };

      // 3. MANEJAR
      if (isVenda && lucroPct >= 50)
        return { acao: 'manejar', razao: lucroPct.toFixed(0) + '% capturado — avaliar fechamento antecipado' };
      if (moneyness === 'ITM' && dte > 21)
        return { acao: 'manejar', razao: 'ITM + ' + dte + 'd — considerar defesa ou rolagem' };
      if (moneyness === 'ATM')
        return { acao: 'manejar', razao: 'ATM — zona de atencao, monitorar de perto' };
      if (isVenda && delta >= 0.60)
        return { acao: 'manejar', razao: 'Delta ' + (trade.delta || 0).toFixed(2) + ' — alta direcionalidade' };
      if (isVenda && poe > 0 && poe < 30)
        return { acao: 'manejar', razao: 'POE ' + poe.toFixed(0) + '% — alta prob. de exercicio' };
      if (dte <= 21)
        return { acao: 'manejar', razao: dte + 'd — janela de gestao ativa' };

      // 4. MONITORAR
      return { acao: 'monitorar', razao: 'OTM + ' + dte + 'd — posicao saudavel, manter curso' };
    }
  },

  mounted: function() {
    var self = this;
    self.$nextTick(function() {
      if (window.refreshIcons) window.refreshIcons();
      else if (window.lucide) window.lucide.createIcons();
    });
  },

  updated: function() {
    if (window.refreshIcons) window.refreshIcons();
  }
};
</script>

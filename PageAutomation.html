<template id="automation-view-template">

        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.5rem;">
          <button @click="run('AtualizarNecton_Menu')"      class="auto-btn">1. Atualizar Portfolio (Necton)</button>
          <button @click="run('AtualizarDadosAtivos_Menu')" class="auto-btn">2. Sincronizar Ativos</button>
          <button @click="run('AtualizarDetalhes_Menu')"    class="auto-btn">3. Sincronizar Detalhes de Opcoes</button>
          <button @click="run('AtualizarGregasAPI_Menu')"      class="auto-btn">4a. Gregas (API OPLab)</button>
          <button @click="run('CalcularGregasNativo_Menu')"   class="auto-btn">4b. Gregas (Nativo BS)</button>
          <button @click="run('AtualizarScannerOpcoes_Menu')" class="auto-btn">5. Scanner de Opcoes</button>
        </div>
      </div>
    </div>

    <!-- SEQUENCIA SCANNER (OPLab) -->
    <div class="premium-card" style="padding:0.5rem;">
      <div style="padding:1rem;display:flex;flex-direction:column;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:0.75rem;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border-subtle);">
          <div style="display:flex;align-items:center;gap:0.75rem;">
            <i data-lucide="scan-search" style="width:18px;height:18px;color:var(--text-muted);flex-shrink:0;display:block;"></i>
            <h3 class="t-label-sm" style="font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-tertiary);">Sequencia Scanner — OPLab</h3>
          </div>

        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.5rem;">
          <button @click="run('AtualizarScannerOpcoes_Menu')"          class="auto-btn">Scanner de Opcoes</button>
          <button @click="run('SyncHighestOptionsVolume_Menu')"        class="auto-btn">Maiores Volumes (PUT/CALL)</button>
          <button @click="run('SyncM9M21Ranking_Menu')"                class="auto-btn">Ranking Tendencia M9M21</button>
          <button @click="run('SyncCorrelIbovRanking_Menu')"           class="auto-btn">Ranking Correlacao IBOV</button>
          <button @click="run('SyncBestCoveredOptionsRates_Menu')"     class="auto-btn">Melhores Taxas Cobertas</button>
          <button @click="run('ScreenerQuantitativo_Menu')"
            style="border-color:var(--brand-emerald-muted);color:var(--brand-emerald);"

    <!-- EXPORTAR CSV -->
    <div class="premium-card" style="padding:0.5rem;">
      <div style="padding:1rem;display:flex;flex-direction:column;">
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border-subtle);">
          <i data-lucide="download" style="width:18px;height:18px;color:var(--text-muted);flex-shrink:0;display:block;"></i>
          <h3 class="t-label-sm" style="font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-tertiary);">Exportar CSV</h3>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.5rem;">

          <button @click="exportarCSV('COCKPIT', 'Cockpit')"
            :disabled="!!exportandoCSV"
            :style="exportandoCSV === 'COCKPIT' ? 'color:var(--brand-indigo);border-color:var(--brand-indigo-muted);background:var(--brand-indigo-light);' : ''"
            class="auto-btn" style="display:flex;align-items:center;gap:0.5rem;">
            <i :data-lucide="exportandoCSV === 'COCKPIT' ? 'loader-2' : 'file-down'"
               :style="exportandoCSV === 'COCKPIT' ? 'animation:auto-spin 0.8s linear infinite;' : ''"
               style="width:13px;height:13px;flex-shrink:0;display:block;"></i>
            <span>{{ exportandoCSV === 'COCKPIT' ? 'Exportando...' : 'Cockpit (Portfolio)' }}</span>
          </button>

          <button @click="exportarCSV('DADOS_ATIVOS', 'Ativos')"
            :disabled="!!exportandoCSV"
            :style="exportandoCSV === 'DADOS_ATIVOS' ? 'color:var(--brand-indigo);border-color:var(--brand-indigo-muted);background:var(--brand-indigo-light);' : ''"
            class="auto-btn" style="display:flex;align-items:center;gap:0.5rem;">
            <i :data-lucide="exportandoCSV === 'DADOS_ATIVOS' ? 'loader-2' : 'file-down'"
               :style="exportandoCSV === 'DADOS_ATIVOS' ? 'animation:auto-spin 0.8s linear infinite;' : ''"
               style="width:13px;height:13px;flex-shrink:0;display:block;"></i>
            <span>{{ exportandoCSV === 'DADOS_ATIVOS' ? 'Exportando...' : 'Dados Ativos' }}</span>
          </button>

          <button @click="exportarCSV('SCANNER_OPCOES', 'Scanner')"
            :disabled="!!exportandoCSV"
            :style="exportandoCSV === 'SCANNER_OPCOES' ? 'color:var(--brand-indigo);border-color:var(--brand-indigo-muted);background:var(--brand-indigo-light);' : ''"
            class="auto-btn" style="display:flex;align-items:center;gap:0.5rem;">
            <i :data-lucide="exportandoCSV === 'SCANNER_OPCOES' ? 'loader-2' : 'file-down'"
               :style="exportandoCSV === 'SCANNER_OPCOES' ? 'animation:auto-spin 0.8s linear infinite;' : ''"
               style="width:13px;height:13px;flex-shrink:0;display:block;"></i>
            <span>{{ exportandoCSV === 'SCANNER_OPCOES' ? 'Exportando...' : 'Scanner de Opcoes' }}</span>
          </button>

          <button @click="exportarCSV('SELECAO_OPCOES_MAIORES_LUCROS', 'MelhoresTaxas')"
            :disabled="!!exportandoCSV"
            :style="exportandoCSV === 'SELECAO_OPCOES_MAIORES_LUCROS' ? 'color:var(--brand-indigo);border-color:var(--brand-indigo-muted);background:var(--brand-indigo-light);' : ''"
            class="auto-btn" style="display:flex;align-items:center;gap:0.5rem;">
            <i :data-lucide="exportandoCSV === 'SELECAO_OPCOES_MAIORES_LUCROS' ? 'loader-2' : 'file-down'"
               :style="exportandoCSV === 'SELECAO_OPCOES_MAIORES_LUCROS' ? 'animation:auto-spin 0.8s linear infinite;' : ''"
               style="width:13px;height:13px;flex-shrink:0;display:block;"></i>
            <span>{{ exportandoCSV === 'SELECAO_OPCOES_MAIORES_LUCROS' ? 'Exportando...' : 'Melhores Taxas Cobertas' }}</span>
          </button>

          <button @click="exportarCSV('SELECAO_MAIORES_VOLUMES', 'MaioresVolumes')"
            :disabled="!!exportandoCSV"
            :style="exportandoCSV === 'SELECAO_MAIORES_VOLUMES' ? 'color:var(--brand-indigo);border-color:var(--brand-indigo-muted);background:var(--brand-indigo-light);' : ''"
            class="auto-btn" style="display:flex;align-items:center;gap:0.5rem;">
            <i :data-lucide="exportandoCSV === 'SELECAO_MAIORES_VOLUMES' ? 'loader-2' : 'file-down'"
               :style="exportandoCSV === 'SELECAO_MAIORES_VOLUMES' ? 'animation:auto-spin 0.8s linear infinite;' : ''"
               style="width:13px;height:13px;flex-shrink:0;display:block;"></i>
            <span>{{ exportandoCSV === 'SELECAO_MAIORES_VOLUMES' ? 'Exportando...' : 'Maiores Volumes' }}</span>
          </button>

          <button @click="exportarCSV('RANKING_TENDENCIA_M9M21', 'RankingM9M21')"
            :disabled="!!exportandoCSV"
            :style="exportandoCSV === 'RANKING_TENDENCIA_M9M21' ? 'color:var(--brand-indigo);border-color:var(--brand-indigo-muted);background:var(--brand-indigo-light);' : ''"
            class="auto-btn" style="display:flex;align-items:center;gap:0.5rem;">
            <i :data-lucide="exportandoCSV === 'RANKING_TENDENCIA_M9M21' ? 'loader-2' : 'file-down'"
               :style="exportandoCSV === 'RANKING_TENDENCIA_M9M21' ? 'animation:auto-spin 0.8s linear infinite;' : ''"
               style="width:13px;height:13px;flex-shrink:0;display:block;"></i>
            <span>{{ exportandoCSV === 'RANKING_TENDENCIA_M9M21' ? 'Exportando...' : 'Ranking M9M21' }}</span>
          </button>

          <button @click="exportarCSV('RANKING_CORREL_IBOV', 'CorrelIBOV')"
            :disabled="!!exportandoCSV"
            :style="exportandoCSV === 'RANKING_CORREL_IBOV' ? 'color:var(--brand-indigo);border-color:var(--brand-indigo-muted);background:var(--brand-indigo-light);' : ''"
            class="auto-btn" style="display:flex;align-items:center;gap:0.5rem;">
            <i :data-lucide="exportandoCSV === 'RANKING_CORREL_IBOV' ? 'loader-2' : 'file-down'"
               :style="exportandoCSV === 'RANKING_CORREL_IBOV' ? 'animation:auto-spin 0.8s linear infinite;' : ''"
               style="width:13px;height:13px;flex-shrink:0;display:block;"></i>
            <span>{{ exportandoCSV === 'RANKING_CORREL_IBOV' ? 'Exportando...' : 'Correlacao IBOV' }}</span>
          </button>

          <button @click="exportarCSV('SCREENER_QUANTITATIVO', 'ScreenerPUT')"
            :disabled="!!exportandoCSV"
            :style="exportandoCSV === 'SCREENER_QUANTITATIVO' ? 'color:var(--brand-emerald);border-color:var(--brand-emerald);background:var(--brand-emerald-light);' : ''"
            class="auto-btn" style="display:flex;align-items:center;gap:0.5rem;">
            <i :data-lucide="exportandoCSV === 'SCREENER_QUANTITATIVO' ? 'loader-2' : 'file-down'"
               :style="exportandoCSV === 'SCREENER_QUANTITATIVO' ? 'animation:auto-spin 0.8s linear infinite;' : ''"
               style="width:13px;height:13px;flex-shrink:0;display:block;"></i>
            <span>{{ exportandoCSV === 'SCREENER_QUANTITATIVO' ? 'Exportando...' : 'Screener PUT' }}</span>
          </button>

        </div>
      </div>
    </div>

    <!-- LOG CONSOLE -->
    <div style="margin-top:1rem;">
      <h3 class="t-label-sm" style="font-weight:700;text-transform:uppercase;letter-spacing:0.25em;color:var(--text-muted);margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border-subtle);">
        Monitoramento em Tempo Real
      </h3>
      <log-console :logs="logs" style="width:100%;" @refresh="$emit('refresh')"></log-console>
    </div>

    <!-- OVERLAY DE EXECUCAO -->
    <div v-if="running"
      style="position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;">
      <div class="premium-card" style="padding:2rem;max-width:26rem;width:100%;overflow:hidden;">

        <!-- Cabeçalho: ícone + título + tempo -->
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
          <div v-if="!finished"
            style="width:2.5rem;height:2.5rem;border:3px solid var(--border-subtle);border-top-color:var(--brand-indigo);border-radius:50%;animation:auto-spin 0.8s linear infinite;flex-shrink:0;"></div>
          <div v-else
            style="width:2.5rem;height:2.5rem;background:var(--brand-emerald-light);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid var(--brand-emerald);font-size:1.2rem;line-height:1;">✓</div>
          <div style="flex:1;min-width:0;">
            <h4 class="t-subtitle" :style="finished ? 'color:var(--brand-emerald);' : 'color:var(--text-primary);'">
              {{ finished ? 'Concluído!' : 'Processando...' }}
            </h4>
            <p class="t-label-sm" style="color:var(--text-muted);margin-top:0.2rem;">{{ formatElapsed }}</p>
          </div>
        </div>

        <!-- Barra de progresso (só quando há etapas) -->
        <div v-if="totalEtapas > 0" style="margin-bottom:1rem;">
          <div style="display:flex;justify-content:space-between;margin-bottom:0.4rem;">
            <span class="t-label-sm" style="color:var(--text-muted);">
              {{ finished ? 'Concluído' : ('Etapa ' + etapaAtual + ' de ' + totalEtapas) }}
            </span>
            <span class="t-label-sm" style="color:var(--text-muted);">{{ progressPct }}%</span>
          </div>
          <div style="height:6px;background:var(--border-subtle);border-radius:99px;overflow:hidden;">
            <div :style="'height:100%;border-radius:99px;transition:width 0.6s ease;' +
              (finished ? 'background:var(--brand-emerald);' : 'background:var(--brand-indigo);') +
              'width:' + progressPct + '%;'"></div>
          </div>
        </div>

        <!-- Etapa em execução -->
        <div v-if="!finished && etapaNomeAtual"
          style="background:var(--brand-indigo-light);border:1px solid var(--brand-indigo-muted);border-radius:var(--radius-md);padding:0.55rem 0.85rem;margin-bottom:1rem;">
          <p class="t-label-sm" style="color:var(--brand-indigo);font-weight:700;">▶ {{ etapaNomeAtual }}</p>
        </div>

        <!-- Lista de etapas -->
        <div v-if="fluxoEtapas.length > 0"
          style="display:flex;flex-direction:column;gap:0.25rem;max-height:13rem;overflow-y:auto;">
          <div v-for="(etapa, idx) in fluxoEtapas" :key="idx"
            style="display:flex;align-items:center;gap:0.6rem;padding:0.35rem 0.5rem;border-radius:var(--radius-sm);"
            :style="idx + 1 === etapaAtual && !finished ? 'background:var(--brand-indigo-light);' : ''">
            <!-- concluída -->
            <span v-if="finished || idx + 1 < etapaAtual"
              style="width:1.1rem;height:1.1rem;flex-shrink:0;color:var(--brand-emerald);font-size:0.85rem;text-align:center;line-height:1.1rem;">✓</span>
            <!-- em execução -->
            <span v-else-if="idx + 1 === etapaAtual"
              style="display:inline-block;width:1.1rem;height:1.1rem;flex-shrink:0;border:2px solid var(--brand-indigo-muted);border-top-color:var(--brand-indigo);border-radius:50%;animation:auto-spin 0.8s linear infinite;"></span>
            <!-- pendente -->
            <span v-else
              style="width:1.1rem;height:1.1rem;flex-shrink:0;color:var(--text-muted);font-size:0.75rem;text-align:center;line-height:1.1rem;">○</span>
            <span class="t-label-sm"
              :style="(finished || idx + 1 < etapaAtual) ? 'color:var(--text-tertiary);' :
                      (idx + 1 === etapaAtual ? 'color:var(--brand-indigo);font-weight:700;' : 'color:var(--text-muted);')">
              {{ etapa.displayName }}
            </span>
          </div>
        </div>

        <!-- Fallback quando não há lista de etapas -->
        <div v-if="!finished && fluxoEtapas.length === 0 && totalEtapas === 0" style="text-align:center;padding-top:0.5rem;">
          <p class="t-body" style="color:var(--text-tertiary);line-height:1.6;">
            A rotina esta sendo executada no Google Sheets.<br>Aguarde um momento...
          </p>
        </div>

      </div>
    </div>

  </div>
</template>

<style>
  @keyframes auto-spin { to { transform: rotate(360deg); } }

  .auto-btn {
    text-align: left;
    padding: 0.6rem 1rem;
    background: var(--surface-base);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-tertiary);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    width: 100%;
  }
  .auto-btn:hover {
    color: var(--brand-indigo);
    border-color: var(--brand-indigo-muted);
    background: var(--brand-indigo-light);
  }

</style>

<script>
window.AutomationView = {
  template: '#automation-view-template',
  props: ['logs'],
  data() {
    return {
      running:         false,
      finished:        false,
      exportandoCSV:   null,
      fluxoEtapas:     [],
      etapaAtual:      0,
      totalEtapas:     0,
      etapaNomeAtual:  '',
      elapsedSecs:     0,
      _fluxoAtivo:     null,
      _elapsedTimer:   null,
      _pollTimer:      null,
    };
  },
  computed: {
    progressPct() {
      if (this.finished) return 100;
      if (this.totalEtapas === 0 || this.etapaAtual === 0) return 0;
      return Math.round(((this.etapaAtual - 1) / this.totalEtapas) * 100);
    },
    formatElapsed() {
      const s = this.elapsedSecs;
      if (s < 60) return s + 's decorridos';
      const m = Math.floor(s / 60);
      return m + 'min ' + (s % 60) + 's decorridos';
    }
  },
  mounted() {
    if (window.refreshIcons) window.refreshIcons();
  },
  methods: {
    exportarCSV(nomeAba, label) {
      if (this.exportandoCSV) return;
      this.exportandoCSV = nomeAba;
      const self = this;

      const falha = (err) => {
        console.error('[ExportCSV]', err);
        self.exportandoCSV = null;
      };

      const gerarDownload = (resultado) => {
        if (!resultado || !resultado.success || !resultado.rows || resultado.rows.length === 0) {
          falha(resultado ? resultado.error : 'Sem dados');
          return;
        }
        const escapar = (v) => {
          const s = v === null || v === undefined ? '' : String(v);
          return (s.includes(';') || s.includes('"') || s.includes('\n'))
            ? '"' + s.replace(/"/g, '""') + '"' : s;
        };
        const csv  = resultado.rows.map(r => r.map(escapar).join(';')).join('\r\n');
        const bom  = '﻿';
        const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
        const pad  = n => String(n).padStart(2, '0');
        const now  = new Date();
        const ts   = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate())
                   + '_' + pad(now.getHours()) + '-' + pad(now.getMinutes()) + '-' + pad(now.getSeconds());
        const nome = 'StockOps_' + label + '_' + ts + '.csv';
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = nome;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
        self.exportandoCSV = null;
        if (window.refreshIcons) window.refreshIcons();
      };

      if (typeof google === 'undefined') {
        setTimeout(() => { self.exportandoCSV = null; }, 1500);
        return;
      }

      google.script.run
        .withSuccessHandler(gerarDownload)
        .withFailureHandler(falha)
        .exportarAbaCSV(nomeAba);
    },

    run(functionName) {
      const self = this;
      const isFluxo = (functionName === 'executarFluxoSequencial' || functionName === 'executarSequenciaScanner');
      const fluxoParam = functionName === 'executarSequenciaScanner' ? 'scanner' : 'mestre';

      self.running        = true;
      self.finished       = false;
      self.fluxoEtapas    = [];
      self.etapaAtual     = 0;
      self.totalEtapas    = 0;
      self.etapaNomeAtual = '';
      self.elapsedSecs    = 0;
      self._fluxoAtivo    = functionName;

      self._elapsedTimer = setInterval(() => { self.elapsedSecs++; }, 1000);

      const cleanup = () => {
        clearInterval(self._elapsedTimer);
        clearInterval(self._pollTimer);
        self._elapsedTimer = null;
        self._pollTimer    = null;
        self._fluxoAtivo   = null;
      };

      if (typeof google === 'undefined') {
        setTimeout(() => { cleanup(); self.running = false; self.finished = false; }, 1500);
        return;
      }

      if (isFluxo) {
        google.script.run
          .withSuccessHandler((steps) => {
            if (!steps) return;
            self.fluxoEtapas = steps;
            self.totalEtapas = steps.length;
          })
          .withFailureHandler(() => {})
          .getFluxoSteps(fluxoParam);

        self._pollTimer = setInterval(() => {
          if (!self.running || self.finished) { clearInterval(self._pollTimer); return; }
          google.script.run
            .withSuccessHandler((prog) => {
              if (!prog || !prog.ativo) return;
              self.etapaAtual     = prog.etapa;
              self.totalEtapas    = prog.total;
              self.etapaNomeAtual = prog.nomeEtapa;
            })
            .withFailureHandler(() => {})
            .getProgressoAtual();
        }, 2000);
      }

      google.script.run
        .withSuccessHandler(() => {
          if (self.totalEtapas > 0) { self.etapaAtual = self.totalEtapas; self.etapaNomeAtual = ''; }
          self.finished = true;
          cleanup();
          self.$emit('refresh');
          setTimeout(() => { self.running = false; self.finished = false; }, 3000);
        })
        .withFailureHandler((err) => {
          cleanup();
          self.running  = false;
          self.finished = false;
          alert('[x] Erro: ' + err);
        })
        [functionName]();
    }
  }
};
</script>

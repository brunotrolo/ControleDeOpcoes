<script>
window.CardCarouselAtivasPG = Object.assign({}, window.CardCarouselAtivas, {
  methods: Object.assign({}, window.CardCarouselAtivas.methods, {

    /* Retorna { strikePct, spotPct, exerW, exerLeft, isPut } para o range bar */
    pgTrackPos: function(op) {
      var strike = parseFloat(op.strike) || 0;
      var spot   = parseFloat(op.spotPrice) || 0;
      if (!strike || !spot) return null;
      var mid    = (strike + spot) / 2;
      var spread = Math.max(Math.abs(spot - strike) * 2.5, strike * 0.06);
      var min    = mid - spread / 2;
      var max    = mid + spread / 2;
      var range  = max - min || 1;
      var sPct   = Math.max(5, Math.min(95, ((strike - min) / range) * 100));
      var spPct  = Math.max(5, Math.min(95, ((spot   - min) / range) * 100));
      var isPut  = (String(op.tipoOpcao || '')).toUpperCase() === 'PUT';
      var exW, exL;
      if (isPut) { exW = sPct; exL = 0; }
      else       { exW = 100 - sPct; exL = sPct; }
      return { strikePct: sPct, spotPct: spPct, exerW: exW, exerLeft: exL, isPut: isPut };
    },

    /* classe de borda lateral da poscard conforme moneyness e P/L */
    pgLeadClass: function(op) {
      var m  = String(op.moneynessCode || '').toUpperCase();
      var pl = parseFloat(op.plTotalValor) || 0;
      if (m.includes('ITM')) return 'lead-red';
      if (m.includes('ATM')) return 'lead-amber';
      return pl < 0 ? 'lead-red' : 'lead-green';
    }
  }),

  template: `
<div style="width:100%;font-family:'Plus Jakarta Sans',sans-serif;">

  <!-- CARD PRINCIPAL -->
  <div class="pg-card lead-violet">

    <!-- Cabeçalho -->
    <div class="pg-card-h">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="pg-card-icon">🎴</div>
        <div>
          <h2>Operações por Posição</h2>
          <div class="pg-hint">Role para o lado · {{ activeTrades.length }} posições</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;">
        <span class="pg-chip green"><b>{{ opsOTM }}</b> OTM</span>
        <span class="pg-chip red"><b>{{ opsITM }}</b> ITM</span>
      </div>
    </div>

    <!-- Skeleton -->
    <div v-if="isLoading" style="display:flex;gap:13px;overflow:hidden;padding:4px 0 8px;">
      <div v-for="i in 4" :key="i" class="pg-poscard" style="min-height:260px;background:var(--surface-overlay);animation:pulse 1.5s infinite;"></div>
    </div>

    <!-- Carousel de posições -->
    <div v-else-if="activeTrades.length" class="pg-carousel">
      <div v-for="op in activeTrades" :key="op.simboloOpcao || op.tickerAtivo"
        class="pg-poscard" :class="pgLeadClass(op)">

        <!-- Ticker + badge V/C -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:17px;font-weight:800;color:var(--text-primary);">{{ op.tickerAtivo }}</span>
          <span class="pg-chip" :class="(op.tipoOpcao||'').toUpperCase()==='PUT' ? 'amber' : 'red'" style="font-size:10px;">
            {{ (op.direcaoTrade||'V')[0].toUpperCase() }} · {{ op.tipoOpcao }}
          </span>
        </div>

        <!-- Subtítulo: opção · qtd · dte · moneyness -->
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);margin-bottom:8px;flex-wrap:wrap;">
          <span>{{ op.simboloOpcao }}</span>
          <span>· {{ op.quantidade }}</span>
          <span>· {{ op.dteCorridos || '--' }}d</span>
          <span class="pg-chip" style="font-size:9px;padding:2px 7px;"
            :class="(op.moneynessCode||'').toUpperCase().includes('OTM') ? 'green' : (op.moneynessCode||'').toUpperCase().includes('ITM') ? 'red' : 'amber'">
            {{ op.moneynessCode || '--' }}
          </span>
        </div>

        <!-- Range bar spot/strike -->
        <div v-if="pgTrackPos(op)" class="pg-track-wrap">
          <div class="pg-track">
            <!-- zona de exercício -->
            <div v-if="pgTrackPos(op).isPut" class="pg-track-exer"
              :style="'width:'+pgTrackPos(op).exerW+'%;left:'+pgTrackPos(op).exerLeft+'%'"></div>
            <div v-else class="pg-track-exer-call"
              :style="'width:'+pgTrackPos(op).exerW+'%;left:'+pgTrackPos(op).exerLeft+'%'"></div>
            <!-- strike -->
            <div class="pg-mark pg-mark-strike" :style="'left:'+pgTrackPos(op).strikePct+'%'">
              <span class="pg-mark-label">strike {{ op.strike }}</span>
            </div>
            <!-- spot -->
            <div class="pg-mark pg-mark-spot" :style="'left:'+pgTrackPos(op).spotPct+'%'">
              <span class="pg-mark-label">spot {{ op.spotPrice }}</span>
            </div>
          </div>
        </div>

        <!-- Grid de métricas 3x2 (primeiros 6) -->
        <div class="pg-pc-grid" style="margin-top:10px;">
          <div v-for="m in buildMetricas(op).slice(0,6)" :key="m.label" class="b">
            <div class="l">{{ m.label }}</div>
            <div class="v" :style="m.style">{{ m.value }}</div>
          </div>
        </div>

        <!-- Footer P/L -->
        <div class="pg-pc-foot">
          <div>
            <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);">L/P Aberto</div>
            <div style="font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;"
              :class="parseFloat(op.plTotalValor) >= 0 ? 'pg-pos' : 'pg-neg'">
              {{ fmtMoeda(op.plTotalValor) }}
              <span style="font-size:11px;opacity:.7;">({{ fmtPct(op.plTotalPct) }})</span>
            </div>
          </div>
          <div style="font-size:20px;">{{ getCtx(op).icon }}</div>
        </div>

      </div>
    </div>

    <!-- Empty state -->
    <div v-else style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">
      Nenhuma posição ativa
    </div>

  </div>
</div>
  `
});
</script>

<template id="page-historico-template">
  <div style="display:flex;flex-direction:column;gap:1rem;">

    <!-- Controles -->
    <div class="premium-card" style="display:flex;flex-wrap:wrap;align-items:center;gap:1rem;padding:1rem 1.5rem;">
      <div style="display:flex;flex-direction:column;gap:0.25rem;min-width:140px;">
        <label style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">Ativo</label>
        <select v-model="filtroAtivo"
                style="padding:0.5rem 0.75rem;background:var(--surface-base);border:1px solid var(--border-default);border-radius:var(--radius-md);color:var(--text-primary);font-size:0.875rem;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;outline:none;"
                onfocus="this.style.borderColor='var(--brand-indigo)'" onblur="this.style.borderColor='var(--border-default)'">
          <option value="">-- Todos --</option>
          <option v-for="t in tickersDisponiveis" :key="t" :value="t">{{ t }}</option>
        </select>
      </div>

      <div style="display:flex;flex-direction:column;gap:0.25rem;">
        <label style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">Tipo</label>
        <div style="display:flex;gap:0.375rem;">
          <button v-for="t in ['TODOS','CALL','PUT']" :key="t" @click="filtroTipo = t"
                  style="padding:0.375rem 0.875rem;border-radius:99px;font-size:0.7rem;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.15s;"
                  :style="filtroTipo === t
                    ? (t==='CALL' ? 'background:var(--brand-indigo);color:#fff;border-color:var(--brand-indigo);'
                      : t==='PUT' ? 'background:var(--brand-amber);color:#fff;border-color:var(--brand-amber);'
                      : 'background:var(--text-primary);color:var(--surface-base);border-color:var(--text-primary);')
                    : 'background:var(--surface-base);color:var(--text-secondary);border-color:var(--border-default);'">
            {{ t }}
          </button>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:0.25rem;">
        <label style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">Moneyness</label>
        <div style="display:flex;gap:0.375rem;">
          <button v-for="m in ['TODOS','ITM','ATM','OTM']" :key="m" @click="filtroMoneyness = m"
                  style="padding:0.375rem 0.75rem;border-radius:99px;font-size:0.7rem;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.15s;"
                  :style="filtroMoneyness === m
                    ? (m==='ITM' ? 'background:var(--brand-rose);color:#fff;border-color:var(--brand-rose);'
                      : m==='ATM' ? 'background:var(--brand-amber);color:#fff;border-color:var(--brand-amber);'
                      : m==='OTM' ? 'background:var(--brand-emerald);color:#fff;border-color:var(--brand-emerald);'
                      : 'background:var(--text-primary);color:var(--surface-base);border-color:var(--text-primary);')
                    : 'background:var(--surface-base);color:var(--text-secondary);border-color:var(--border-default);'">
            {{ m }}
          </button>
        </div>
      </div>

      <div style="margin-left:auto;font-size:0.75rem;color:var(--text-muted);">
        <span style="font-weight:700;color:var(--text-primary);">{{ linhasFiltradas.length }}</span> registros
      </div>
    </div>

    <!-- KPIs da selecao atual -->
    <div v-if="filtroAtivo" style="display:flex;gap:1px;background:var(--border-subtle);border-radius:var(--radius-xl);overflow:hidden;overflow-x:auto;">
      <div v-for="kpi in kpis" :key="kpi.label"
           style="flex:1 1 0%;min-width:120px;padding:0.875rem 1rem;background:var(--surface-base);display:flex;flex-direction:column;gap:3px;">
        <span style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);">{{ kpi.label }}</span>
        <span style="font-size:0.95rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;"
              :style="kpi.cor ? 'color:' + kpi.cor : 'color:var(--text-primary)'">{{ kpi.valor }}</span>
      </div>
    </div>

    <!-- Tabela com gregas -->
    <div class="premium-card" style="overflow:hidden;">
      <div v-if="linhasFiltradas.length === 0" style="padding:4rem 2rem;text-align:center;color:var(--text-muted);">
        <p>{{ filtroAtivo ? 'Nenhum registro encontrado.' : 'Selecione um ativo ou aguarde o carregamento dos dados.' }}</p>
      </div>
      <div v-else style="overflow-x:auto;">
        <table style="width:100%;border-collapse:separate;border-spacing:0;min-width:900px;">
          <thead>
            <tr style="background:var(--surface-overlay);">
              <th v-for="col in colunas" :key="col.key"
                  @click="ordenarPor(col.key)"
                  style="padding:0.5rem 0.75rem;font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;border-bottom:1px solid var(--border-subtle);cursor:pointer;white-space:nowrap;"
                  :style="(col.align === 'right' ? 'text-align:right;' : col.align === 'center' ? 'text-align:center;' : 'text-align:left;') + (ordemChave === col.key ? 'color:var(--brand-indigo);' : 'color:var(--text-muted);')">
                {{ col.label }}<span v-if="ordemChave === col.key" style="margin-left:3px;">{{ ordemAsc ? '^' : 'v' }}</span>
              </th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="(linha, idx) in linhasFiltradas" :key="(linha.OPTION_TICKER || '') + (linha.UPDATED_AT || '') + idx"
                style="transition:background 0.1s;"
                :style="idx % 2 === 0 ? 'background:var(--surface-base);' : 'background:var(--surface-sunken);'"
                onmouseover="this.style.background='var(--surface-overlay)'" onmouseout="">

              <td style="padding:0.5rem 0.75rem;border-bottom:1px solid var(--border-subtle);">
                <div style="display:flex;flex-direction:column;gap:1px;">
                  <span style="font-size:0.78rem;font-weight:800;color:var(--text-primary);font-family:'JetBrains Mono',monospace;">{{ linha.OPTION_TICKER }}</span>
                  <span style="font-size:0.65rem;color:var(--text-muted);">{{ linha.TICKER }}</span>
                </div>
              </td>

              <td style="padding:0.5rem 0.5rem;text-align:center;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.6rem;font-weight:800;padding:2px 6px;border-radius:99px;"
                      :style="linha.CATEGORY === 'CALL'
                        ? 'background:var(--brand-indigo-light);color:var(--brand-indigo);border:1px solid var(--brand-indigo-muted);'
                        : 'background:var(--brand-amber-light);color:var(--brand-amber);border:1px solid var(--brand-amber-muted);'">
                  {{ linha.CATEGORY }}
                </span>
              </td>

              <td style="padding:0.5rem 0.75rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.78rem;font-weight:700;color:var(--brand-indigo);font-family:'JetBrains Mono',monospace;">{{ fmt(linha.SPOT) }}</span>
              </td>

              <td style="padding:0.5rem 0.75rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.78rem;font-weight:700;color:var(--text-primary);font-family:'JetBrains Mono',monospace;">{{ fmt(linha.STRIKE) }}</span>
              </td>

              <td style="padding:0.5rem 0.75rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.78rem;font-weight:700;color:var(--text-primary);font-family:'JetBrains Mono',monospace;">{{ fmt(linha.OPTION_CLOSE) }}</span>
              </td>

              <!-- Moneyness badge -->
              <td style="padding:0.5rem 0.5rem;text-align:center;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:99px;"
                      :style="linha.MONEYNESS === 'ITM'
                        ? 'background:var(--brand-rose-light);color:var(--brand-rose);border:1px solid var(--brand-rose-muted);'
                        : linha.MONEYNESS === 'ATM'
                        ? 'background:var(--brand-amber-light);color:var(--brand-amber);border:1px solid var(--brand-amber-muted);'
                        : 'background:var(--brand-emerald-light);color:var(--brand-emerald);border:1px solid var(--brand-emerald-muted);'">
                  {{ linha.MONEYNESS }}
                </span>
              </td>

              <!-- Gregas -->
              <td style="padding:0.5rem 0.75rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.75rem;font-family:'JetBrains Mono',monospace;color:var(--text-secondary);">{{ fmtGrega(linha.DELTA) }}</span>
              </td>
              <td style="padding:0.5rem 0.75rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.75rem;font-family:'JetBrains Mono',monospace;color:var(--text-secondary);">{{ fmtGrega(linha.GAMMA) }}</span>
              </td>
              <td style="padding:0.5rem 0.75rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.75rem;font-family:'JetBrains Mono',monospace;color:var(--brand-rose);">{{ fmtGrega(linha.THETA) }}</span>
              </td>
              <td style="padding:0.5rem 0.75rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.75rem;font-family:'JetBrains Mono',monospace;color:var(--text-secondary);">{{ fmtPct(linha.IV_CALC) }}</span>
              </td>
              <td style="padding:0.5rem 0.75rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.75rem;font-family:'JetBrains Mono',monospace;color:var(--brand-emerald);">{{ fmtPct(linha.POE) }}</span>
              </td>
              <td style="padding:0.5rem 0.75rem;text-align:right;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.75rem;font-family:'JetBrains Mono',monospace;color:var(--text-secondary);">{{ fmt(linha.BS_PRICE) }}</span>
              </td>

              <td style="padding:0.5rem 0.75rem;text-align:center;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.7rem;font-weight:700;font-family:'JetBrains Mono',monospace;"
                      :style="Number(linha.DTE_CALENDAR) <= 7 ? 'color:var(--brand-rose);' : Number(linha.DTE_CALENDAR) <= 21 ? 'color:var(--brand-amber);' : 'color:var(--text-secondary);'">
                  {{ linha.DTE_CALENDAR }}d
                </span>
              </td>

              <td style="padding:0.5rem 0.75rem;text-align:center;border-bottom:1px solid var(--border-subtle);">
                <span style="font-size:0.68rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;">{{ linha.UPDATED_AT }}</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</template>

<script>
window.PageHistorico = {
  template: '#page-historico-template',
  props: {
    dados:    { type: Array,   default: () => [] },
    isMobile: { type: Boolean, default: false }
  },
  setup(props) {
    const { ref, computed } = Vue;

    const filtroAtivo     = ref('');
    const filtroTipo      = ref('TODOS');
    const filtroMoneyness = ref('TODOS');
    const ordemChave      = ref('UPDATED_AT');
    const ordemAsc        = ref(false);

    const fmt     = (v) => { const n = parseFloat(v); return isNaN(n) || n === 0 ? '--' : 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };
    const fmtPct  = (v) => { const n = parseFloat(v); return isNaN(n) ? '--' : n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%'; };
    const fmtGrega= (v) => { const n = parseFloat(v); return isNaN(n) ? '--' : n.toFixed(4); };

    const tickersDisponiveis = computed(() => {
      const s = new Set(props.dados.map(r => r.TICKER).filter(Boolean));
      return [...s].sort();
    });

    const linhasFiltradas = computed(() => {
      let lista = [...props.dados];
      if (filtroAtivo.value)     lista = lista.filter(r => r.TICKER === filtroAtivo.value);
      if (filtroTipo.value !== 'TODOS') lista = lista.filter(r => r.CATEGORY === filtroTipo.value);
      if (filtroMoneyness.value !== 'TODOS') lista = lista.filter(r => r.MONEYNESS === filtroMoneyness.value);
      lista.sort((a, b) => {
        const va = a[ordemChave.value] || '';
        const vb = b[ordemChave.value] || '';
        const na = parseFloat(va); const nb = parseFloat(vb);
        if (!isNaN(na) && !isNaN(nb)) return ordemAsc.value ? na - nb : nb - na;
        return ordemAsc.value ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });
      return lista;
    });

    const ordenarPor = (chave) => {
      if (ordemChave.value === chave) ordemAsc.value = !ordemAsc.value;
      else { ordemChave.value = chave; ordemAsc.value = false; }
    };

    const kpis = computed(() => {
      const lista = linhasFiltradas.value;
      if (!lista.length) return [];
      const ivMedia  = lista.reduce((s, r) => s + (parseFloat(r.IV_CALC) || 0), 0) / lista.length;
      const poeMedia = lista.reduce((s, r) => s + (parseFloat(r.POE)    || 0), 0) / lista.length;
      const dteMedio = lista.reduce((s, r) => s + (parseFloat(r.DTE_CALENDAR) || 0), 0) / lista.length;
      const otm      = lista.filter(r => r.MONEYNESS === 'OTM').length;
      return [
        { label: 'Registros',  valor: lista.length,              cor: null },
        { label: 'IV Medio',   valor: fmtPct(ivMedia),           cor: 'var(--brand-amber)' },
        { label: 'POE Medio',  valor: fmtPct(poeMedia),          cor: 'var(--brand-emerald)' },
        { label: 'DTE Medio',  valor: Math.round(dteMedio) + 'd', cor: 'var(--brand-indigo)' },
        { label: 'OTM',        valor: otm + ' / ' + lista.length, cor: null },
      ];
    });

    const colunas = [
      { key: 'OPTION_TICKER', label: 'Opcao',      align: 'left' },
      { key: 'CATEGORY',      label: 'Tipo',       align: 'center' },
      { key: 'SPOT',          label: 'Spot',       align: 'right' },
      { key: 'STRIKE',        label: 'Strike',     align: 'right' },
      { key: 'OPTION_CLOSE',  label: 'Premio',     align: 'right' },
      { key: 'MONEYNESS',     label: 'Moneyness',  align: 'center' },
      { key: 'DELTA',         label: 'Delta',      align: 'right' },
      { key: 'GAMMA',         label: 'Gamma',      align: 'right' },
      { key: 'THETA',         label: 'Theta',      align: 'right' },
      { key: 'IV_CALC',       label: 'IV Calc',    align: 'right' },
      { key: 'POE',           label: 'POE',        align: 'right' },
      { key: 'BS_PRICE',      label: 'BS Price',   align: 'right' },
      { key: 'DTE_CALENDAR',  label: 'DTE',        align: 'center' },
      { key: 'UPDATED_AT',    label: 'Data',       align: 'center' },
    ];

    return { filtroAtivo, filtroTipo, filtroMoneyness, ordemChave, ordemAsc,
             tickersDisponiveis, linhasFiltradas, ordenarPor, kpis, colunas,
             fmt, fmtPct, fmtGrega };
  }
};
</script>

name: Deploy to GAS DEV

# ─────────────────────────────────────────────────────────────────
# CI/CD: GitHub → Google Apps Script
#
# Dispara quando:
#   1. Uma PR é MERGEADA em main (deploy automático)
#   2. Manualmente: Actions → Deploy to GAS DEV → Run workflow
#
# Requisitos (configurados uma única vez):
#   - Secret CLASPRC_JSON: credenciais OAuth do clasp (~/.clasprc.json)
#   - .clasp.json no repo: aponta para o scriptId do projeto GAS DEV
#   - .claspignore no repo: exclui arquivos não-GAS (pwa, mockups, docs)
# ─────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write   # necessário para comentar na PR após o deploy

jobs:
  deploy:
    # Roda se for disparo manual OU se a PR foi de fato mergeada
    # (PR fechada sem merge NÃO dispara deploy)
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Cache do clasp: evita baixar 262 pacotes a cada deploy (~15s mais rápido)
      - name: Cache clasp
        id: cache-clasp
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: clasp-${{ runner.os }}-node24

      - name: Install clasp
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix ~/.npm-global
          if [ ! -f ~/.npm-global/bin/clasp ]; then
            npm install -g @google/clasp
          fi
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push to GAS DEV
        id: push
        run: |
          OUTPUT=$(clasp push --force 2>&1)
          echo "$OUTPUT"
          FILES=$(echo "$OUTPUT" | grep -c '└─' || true)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      # Comenta na PR confirmando o deploy (só quando veio de PR, não no manual)
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ **Deploy GAS DEV concluído** — ${{ steps.push.outputs.files }} arquivos enviados. [Ver log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            })

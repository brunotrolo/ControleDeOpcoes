name: Deploy to GAS DEV

# ─────────────────────────────────────────────────────────────────
# CI/CD: GitHub → Google Apps Script
#
# Dispara quando:
#   1. Um push chega em main ou na branch de trabalho
#   2. Manualmente: Actions → Deploy to GAS DEV → Run workflow
#
# Requisitos (configurados uma única vez):
#   - Secret CLASPRC_JSON: credenciais OAuth do clasp (~/.clasprc.json)
#   - .clasp.json no repo: aponta para o scriptId do projeto GAS DEV
#   - .claspignore no repo: exclui arquivos não-GAS (pwa, mockups, docs)
# ─────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/add-claude-documentation-GwgaT

permissions:
  contents: write   # necessário para commitar .deployment-id na primeira vez
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache clasp
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: clasp-${{ runner.os }}-node24

      - name: Install clasp
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix ~/.npm-global
          if [ ! -f ~/.npm-global/bin/clasp ]; then
            npm install -g @google/clasp
          fi
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push to GAS DEV
        id: push
        run: |
          OUTPUT=$(clasp push --force 2>&1)
          echo "$OUTPUT"
          FILES=$(echo "$OUTPUT" | grep -c '└─' || true)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      # Cria ou atualiza o web app deployment e captura o link /dev correto.
      # O link /dev usa o HEAD deployment ID (diferente do versionado).
      # Estratégia:
      #   1ª vez → clasp deploy cria o versionado + GAS cria o HEAD automaticamente
      #   Sempre  → clasp deployments --json lista todos; pegamos o HEAD
      - name: Publicar web app e capturar link DEV
        id: webdeploy
        run: |
          # Cria/atualiza o deployment versionado
          clasp deploy --description "Deploy automático $(date +%Y-%m-%d)" 2>&1 || true

          # Lista todos os deployments em JSON e extrai o HEAD deployment ID
          DEPLOYMENTS=$(clasp deployments --json 2>/dev/null || clasp deployments 2>&1)
          echo "$DEPLOYMENTS"

          # Tenta parsear JSON primeiro (clasp >= 2.4)
          HEAD_ID=$(echo "$DEPLOYMENTS" | node -e "
            let raw = '';
            process.stdin.on('data', d => raw += d);
            process.stdin.on('end', () => {
              try {
                const arr = JSON.parse(raw);
                const head = arr.find(d =>
                  d.deploymentConfig && d.deploymentConfig.versionNumber === undefined ||
                  (d.deploymentId && JSON.stringify(d).includes('HEAD'))
                );
                console.log(head ? head.deploymentId : '');
              } catch(e) {
                // fallback: regex sobre texto plano
                const m = raw.match(/- (AKfycb[A-Za-z0-9_-]+) @HEAD/);
                console.log(m ? m[1] : '');
              }
            });
          " 2>/dev/null || echo "")

          # Se não achou HEAD, pega o primeiro deployment disponível
          if [ -z "$HEAD_ID" ]; then
            HEAD_ID=$(echo "$DEPLOYMENTS" | grep -oE 'AKfycb[A-Za-z0-9_-]+' | head -1)
          fi

          if [ -n "$HEAD_ID" ]; then
            echo "$HEAD_ID" > .deployment-id
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add .deployment-id
            git diff --staged --quiet || git commit -m "ci: atualiza deployment ID do web app"
            git push 2>/dev/null || true
          fi

          DEV_URL="https://script.google.com/macros/s/${HEAD_ID}/dev"
          echo "dev_url=$DEV_URL" >> $GITHUB_OUTPUT
          echo "deployment_id=$HEAD_ID" >> $GITHUB_OUTPUT

      - name: Deploy summary
        run: |
          echo "### ✅ Deploy GAS DEV concluído" >> $GITHUB_STEP_SUMMARY
          echo "- **Arquivos enviados:** ${{ steps.push.outputs.files }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Web App (DEV)" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.webdeploy.outputs.dev_url }}" >> $GITHUB_STEP_SUMMARY

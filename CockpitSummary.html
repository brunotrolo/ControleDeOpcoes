                <td style="padding:0.4rem 0.875rem;text-align:right;font-size:0.72rem;color:var(--text-muted);border-top:1px solid var(--border-default);border-bottom:2px solid var(--border-default);font-family:'JetBrains Mono',monospace;white-space:nowrap;">{{ fmtR(row.pmax) }}</td>
                <td style="padding:0.4rem 0.875rem;text-align:right;font-size:0.72rem;color:var(--text-secondary);border-top:1px solid var(--border-default);border-bottom:2px solid var(--border-default);font-family:'JetBrains Mono',monospace;white-space:nowrap;">{{ fmtR(row.pm) }}</td>
                <td style="padding:0.4rem 0.875rem;text-align:right;font-size:0.72rem;color:var(--text-secondary);border-top:1px solid var(--border-default);border-bottom:2px solid var(--border-default);font-family:'JetBrains Mono',monospace;white-space:nowrap;">{{ fmtR(row.pa) }}</td>
                <td style="padding:0.4rem 0.875rem;text-align:right;font-size:0.72rem;font-weight:900;border-top:1px solid var(--border-default);border-bottom:2px solid var(--border-default);font-family:'JetBrains Mono',monospace;white-space:nowrap;" :style="row.plp>=0?'color:var(--brand-emerald);':'color:var(--brand-rose);'">{{ fmtP(row.plp) }}</td>

              <td style="padding:0.3rem 0.75rem;border-bottom:1px solid var(--border-subtle);white-space:nowrap;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:0.66rem;">{{ fmtN4(op.theta) }}</td>
              <td style="padding:0.3rem 0.75rem;border-bottom:1px solid var(--border-subtle);white-space:nowrap;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:0.66rem;">{{ fmtN4(op.rho) }}</td>
              <td style="padding:0.3rem 0.75rem;border-bottom:1px solid var(--border-subtle);white-space:nowrap;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:0.66rem;">{{ fmtN4(op.volatilidadeImpl) }}</td>
              <td style="padding:0.3rem 0.75rem;border-bottom:1px solid var(--border-subtle);white-space:nowrap;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:0.66rem;">{{ fmtN4(op.poe) }}</td>
              <td style="padding:0.3rem 0.75rem;border-bottom:1px solid var(--border-subtle);white-space:nowrap;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:0.66rem;">{{ op.directionFlag || '' }}</td>
              <td style="padding:0.3rem 0.75rem;border-bottom:1px solid var(--border-subtle);white-space:nowrap;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:0.66rem;">{{ op.controlFlag || '' }}</td>
            </tr>
            <tr v-if="linhasFiltradas.length === 0">
              <td colspan="42" style="padding:2.5rem;text-align:center;color:var(--text-muted);font-size:0.875rem;">
                Nenhuma operacao encontrada com os filtros selecionados.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</template>

<script>
window.CockpitSummary = {
  template: '#cockpit-summary-template',
  props: {
    cockpit:  { type: Array,   default: function() { return []; } },
    isMobile: { type: Boolean, default: false }
  },

  data: function() {
    return {
      filtros:        {tradeId:[], estrategiaId:[], status:[], tradeDateTxt:[], tradeMonth:[], expiryTxt:[], expiryMonth:[], opcaoTicker:[], ticker:[], nomeEmpresa:[], setor:[], side:[], tipo:[], moneyness:[], dirFlag:[], ctrlFlag:[]},
      buscas:         {tradeId:"", estrategiaId:"", status:"", tradeDateTxt:"", tradeMonth:"", expiryTxt:"", expiryMonth:"", opcaoTicker:"", ticker:"", nomeEmpresa:"", setor:"", side:"", tipo:"", quantidade:"", strike:"", spot:"", moneyness:"", premioMedio:"", premioAtual:"", ganhoMaximo:"", maxProfPct:"", perdaMaxima:"", nocional:"", plPct:"", plTotal:"", plValor:"", breakEven:"", dteCorridos:"", dteUteis:"", iv:"", ivRank:"", variacao:"", moneynessR:"", delta:"", gamma:"", vega:"", theta:"", rho:"", ivCalc:"", poe:"", dirFlag:"", ctrlFlag:""},
      dropdownAberto: {tradeId:false, estrategiaId:false, status:false, tradeDateTxt:false, tradeMonth:false, expiryTxt:false, expiryMonth:false, opcaoTicker:false, ticker:false, nomeEmpresa:false, setor:false, side:false, tipo:false, moneyness:false, dirFlag:false, ctrlFlag:false}
    };
  },

  computed: {

    temFiltro: function() {
      var f = this.filtros, b = this.buscas;
      if (f.tradeId.length>0 || f.estrategiaId.length>0 || f.status.length>0 || f.tradeDateTxt.length>0 || f.tradeMonth.length>0 || f.expiryTxt.length>0 || f.expiryMonth.length>0 || f.opcaoTicker.length>0 || f.ticker.length>0 || f.nomeEmpresa.length>0 || f.setor.length>0 || f.side.length>0 || f.tipo.length>0 || f.moneyness.length>0 || f.dirFlag.length>0 || f.ctrlFlag.length>0) return true;
      return Object.keys(b).some(function(k){return (b[k]||'').trim()!==''; });
    },

    linhasFiltradas: function() {
      var f = this.filtros, b = this.buscas, self = this;
      return this.cockpit.filter(function(o) {
        if (f.tradeId.length && f.tradeId.indexOf(String(o.tradeId||'').trim().toUpperCase())<0) return false;
        if (f.estrategiaId.length && f.estrategiaId.indexOf(String(o.estrategiaId||'').trim().toUpperCase())<0) return false;
        if (f.status.length && f.status.indexOf(String(o.status||'').trim().toUpperCase())<0) return false;
        if (f.tradeDateTxt.length && f.tradeDateTxt.indexOf(String(o.dataTrade||'').trim().toUpperCase())<0) return false;
        if (f.tradeMonth.length && f.tradeMonth.indexOf(self.mesVal(o.dataTrade))<0) return false;
        if (f.expiryTxt.length && f.expiryTxt.indexOf(String(o.dataVencimento||'').trim().toUpperCase())<0) return false;
        if (f.expiryMonth.length && f.expiryMonth.indexOf(self.mesVal(o.dataVencimento))<0) return false;
        if (f.opcaoTicker.length && f.opcaoTicker.indexOf(String(o.simboloOpcao||'').trim().toUpperCase())<0) return false;
        if (f.ticker.length && f.ticker.indexOf(String(o.tickerAtivo||'').trim().toUpperCase())<0) return false;
        if (f.nomeEmpresa.length && f.nomeEmpresa.indexOf(String(o.nomeEmpresa||'').trim().toUpperCase())<0) return false;
        if (f.setor.length && f.setor.indexOf(String(o.setor||'').trim().toUpperCase())<0) return false;
        if (f.side.length && f.side.indexOf(String(o.direcaoTrade||'').trim().toUpperCase())<0) return false;
        if (f.tipo.length && f.tipo.indexOf(String(o.tipoOpcao||'').trim().toUpperCase())<0) return false;
        if (b.quantidade && String(o.quantidade||'').indexOf(b.quantidade)<0) return false;
        if (b.strike && String(o.strike||'').indexOf(b.strike)<0) return false;
        if (b.spot && String(o.spotPrice||'').indexOf(b.spot)<0) return false;
        if (f.moneyness.length && f.moneyness.indexOf(String(o.moneynessCode||'').trim().toUpperCase())<0) return false;
        if (b.premioMedio && String(o.premioMedio||'').indexOf(b.premioMedio)<0) return false;
        if (b.premioAtual && String(o.premioAtual||'').indexOf(b.premioAtual)<0) return false;
        if (b.ganhoMaximo && String(o.ganhoMaximo||'').indexOf(b.ganhoMaximo)<0) return false;
        if (b.maxProfPct && String(o.potencialLucroPct||'').indexOf(b.maxProfPct)<0) return false;
        if (b.perdaMaxima && String(o.perdaMaxima||'').indexOf(b.perdaMaxima)<0) return false;
        if (b.nocional && String(o.nocional||'').indexOf(b.nocional)<0) return false;
        if (b.plPct && String(o.plTotalPct||'').indexOf(b.plPct)<0) return false;
        if (b.plTotal && String(o.plTotalUnitario||'').indexOf(b.plTotal)<0) return false;
        if (b.plValor && String(o.plTotalValor||'').indexOf(b.plValor)<0) return false;
        if (b.breakEven && String(o.breakEven||'').indexOf(b.breakEven)<0) return false;
        if (b.dteCorridos && String(o.dteCorridos||'').indexOf(b.dteCorridos)<0) return false;
        if (b.dteUteis && String(o.dteUteis||'').indexOf(b.dteUteis)<0) return false;
        if (b.iv && String(o.ivAtual||'').indexOf(b.iv)<0) return false;
        if (b.ivRank && String(o.ivRank||'').indexOf(b.ivRank)<0) return false;
        if (b.variacao && String(o.variacao||'').indexOf(b.variacao)<0) return false;
        if (b.moneynessR && String(o.moneynessRatio||'').indexOf(b.moneynessR)<0) return false;
        if (b.delta && String(o.delta||'').indexOf(b.delta)<0) return false;
        if (b.gamma && String(o.gamma||'').indexOf(b.gamma)<0) return false;
        if (b.vega && String(o.vega||'').indexOf(b.vega)<0) return false;
        if (b.theta && String(o.theta||'').indexOf(b.theta)<0) return false;
        if (b.rho && String(o.rho||'').indexOf(b.rho)<0) return false;
        if (b.ivCalc && String(o.volatilidadeImpl||'').indexOf(b.ivCalc)<0) return false;
        if (b.poe && String(o.poe||'').indexOf(b.poe)<0) return false;
        if (f.dirFlag.length && f.dirFlag.indexOf(String(o.directionFlag||'').trim().toUpperCase())<0) return false;
        if (f.ctrlFlag.length && f.ctrlFlag.indexOf(String(o.controlFlag||'').trim().toUpperCase())<0) return false;
        return true;
      });
    },

    resumoCalculado: function() {
      var dados = this.linhasFiltradas, acc = {};
      dados.forEach(function(o) {
        var side = String(o.direcaoTrade||'').trim().toUpperCase();
        var tipo = String(o.tipoOpcao||'').trim().toUpperCase();
        if (!side || !tipo) return;
        var k = side + '_' + tipo;
        if (!acc[k]) acc[k] = { side:side, tipo:tipo, qtd:0, gmax:0, lmp:0, noc:0, pmax:0, pm:0, pa:0, plp:0, plv:0 };
        var g = acc[k];
        g.qtd  += parseFloat(o.quantidade)||0;
        g.gmax += parseFloat(o.ganhoMaximo)||0;
        g.lmp  += (parseFloat(o.potencialLucroPct)||0)*100;
        g.noc  += parseFloat(o.nocional)||0;
        g.pmax += parseFloat(o.perdaMaxima)||0;
        g.pm   += parseFloat(o.premioMedio)||0;
        g.pa   += parseFloat(o.premioAtual)||0;
        g.plp  += (parseFloat(o.plTotalPct)||0)*100;
        g.plv  += parseFloat(o.plTotalValor)||0;
      });
      function soma(lista) {
        var r = {qtd:0,gmax:0,lmp:0,noc:0,pmax:0,pm:0,pa:0,plp:0,plv:0};
        lista.forEach(function(g){r.qtd+=g.qtd;r.gmax+=g.gmax;r.lmp+=g.lmp;r.noc+=g.noc;r.pmax+=g.pmax;r.pm+=g.pm;r.pa+=g.pa;r.plp+=g.plp;r.plv+=g.plv;});
        return r;
      }
      function row(g, id, t, tipoLabel) {
        return {id:id,t:t,side:g.side||'',tipo:tipoLabel!==undefined?tipoLabel:g.tipo,
          qtd:g.qtd,gmax:g.gmax,lmp:g.lmp,noc:g.noc,pmax:g.pmax,pm:g.pm,pa:g.pa,plp:g.plp,plv:g.plv};
      }
      var res=[], tudo=[];
      ['PUT','CALL'].forEach(function(tipo) {
        var it=[];
        ['VENDA','COMPRA'].forEach(function(side) {
          var k=side+'_'+tipo;
          if (acc[k]) { res.push(row(acc[k],k,'d',null)); it.push(acc[k]); tudo.push(acc[k]); }
        });
        if (it.length) { var s=soma(it); s.side=''; s.tipo=tipo; res.push(row(s,'s_'+tipo,'s',tipo)); }
      });
      if (tudo.length) { var t=soma(tudo); t.side=''; t.tipo=''; res.push(row(t,'T','T','')); }
      return res;
    }
  },

  methods: {

    toggle: function(campo, valor) {
      var l = this.filtros[campo], i = l.indexOf(valor);
      if (i >= 0) l.splice(i, 1); else l.push(valor);
    },

    limparFiltros: function() {
      var self = this;
      Object.keys(this.filtros).forEach(function(k) { self.filtros[k] = []; });
      Object.keys(this.buscas).forEach(function(k)  { self.buscas[k]  = ''; });
      Object.keys(this.dropdownAberto).forEach(function(k) { self.dropdownAberto[k] = false; });
    },

    fecharDelay: function(campo) {
      var self = this;
      setTimeout(function() {
        self.dropdownAberto[campo] = false;
        self.buscas[campo] = '';
      }, 200);
    },

    // opcoesCol: gera lista de opcoes unicas para dropdown de uma coluna
    // campoFiltro = chave em filtros/buscas, campoObj = campo no objeto cockpit, isMes = bool
    opcoesCol: function(campoFiltro, campoObj, isMes) {
      var busca = (this.buscas[campoFiltro] || '').toLowerCase().trim();
      var self  = this, data = this.cockpit;
      if (isMes) {
        var seen = {}, res = [];
        data.forEach(function(o) {
          var v = self.mesVal(o[campoObj]), l = self.mesLabel(o[campoObj]);
          if (v && !seen[v]) { seen[v]=true; res.push({val:v, label:l}); }
        });
        res.sort(function(a,b){ return a.val.localeCompare(b.val); });
        return busca ? res.filter(function(o){ return o.label.toLowerCase().indexOf(busca)>=0; }) : res;
      }
      var set = {}, arr = [];
      data.forEach(function(o) {
        var v = String(o[campoObj]||'').trim().toUpperCase();
        if (v && !set[v]) { set[v]=true; arr.push(v); }
      });
      arr.sort();
      return busca ? arr.filter(function(v){ return v.toLowerCase().indexOf(busca)>=0; }) : arr;
    },

    mesVal: function(val) {
      if (!val) return '';
      var d = val instanceof Date ? val : new Date(val);
      if (isNaN(d.getTime())) { var s = String(val).trim(); return s.length >= 7 ? s.substring(0,7) : s; }
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    },
    mesLabel: function(val) {
      var M = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      if (!val) return '';
      var d = val instanceof Date ? val : new Date(val);
      if (isNaN(d.getTime())) return String(val).trim();
      return M[d.getMonth()] + '/' + d.getFullYear();
    },
    mesNum: function(val) {
      if (!val) return '';
      var d = val instanceof Date ? val : new Date(val);
      if (isNaN(d.getTime())) return '';
      return d.getMonth() + 1;
    },
    fmtData: function(val) {
      if (!val) return '';
      var d = val instanceof Date ? val : new Date(val);
      if (isNaN(d.getTime())) return String(val).substring(0,10);
      return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
    },
    fmtR: function(v) {
      var n = parseFloat(v)||0;
      return (n<0?'-R$ ':'R$ ')+Math.abs(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
    },
    fmtP: function(v) {
      var n = parseFloat(v)||0;
      return (n>=0?'+':'')+n.toFixed(2)+'%';
    },
    fmtQ: function(v) { return (parseFloat(v)||0).toLocaleString('pt-BR'); },
    fmtN4: function(v) { var n=parseFloat(v); if(isNaN(n)||n===0) return ''; return n.toFixed(4); }
  }
};
</script>
